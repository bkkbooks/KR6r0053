body:
  text: 大唐西明寺沙門釋道宣撰譯經篇四本傳二人京大慈恩寺釋玄奘傳一京大慈恩寺梵僧那提傳二釋玄奘本名褘姓陳氏漢太丘仲弓後也子孫徙於河南故又為洛州緱氏人焉祖康北齊國子博士父慧早通經術長八尺明眉目拜江陵令解纓而返即大業末年識者以為剋終隱淪之候故也兄素出家即長捷法師也容貌堂堂儀局瓌秀講釋經義聯班群伍住東都淨土寺以奘少罹窮酷携以將之日授精理旁兼巧論年十一誦維摩法華東都恆度便預其次自爾卓然梗正不偶朋流口誦目緣略無間缺覩諸沙彌劇談掉戲奘曰經不云乎夫出家者為無為法豈復恆為兒戲可謂徒喪百年且思齊之懷尚鄙而不取拔萃出類故復形在言前耳時東都慧日盛弘法席涅槃攝論輪馳相係每恆聽受昏明思擇僧徒異其欣奉美其風素愛敬之至師友參榮大衆重其學功弘開役務時年十五與兄住淨土寺由是專門受業聲望逾遠大業餘曆兵飢交貿法食兩緣投庇無所承沙門道基化開井絡法俗欽仰乃與兄從之行達長安住莊嚴寺又非本望西踰劍閣既達蜀都即而聽受阿毗曇論一聞不忘見稱昔人隨言鏡理又高倫等至於婆沙廣論雜心玄義莫不鑿窮巖穴條疏本幹然此論東被弘唱極繁章鈔異同計逾數十皆蘊結胸府聞持自然至於得喪筌旨而能引用無滯時皆訝其憶念之力終古罕類也基每顧而歎曰余少遊講肆多矣未見少年神悟若斯人也席中聽侶僉號英雄四方多難總歸綿益相與稱讚逸口傳聲又僧景攝論道振迦延世號難加人推精覆皆師承宗據隅隩明銓昔來攝論十二住義中表銷釋十有二家講次誦持率多昏漠而奘初聞記録片無差舛登座敘引曾不再緣須便為述狀逾宿構如斯甚衆不可殫言武德五年二十有一為諸學府雄伯沙門講揚心論不窺文相而誦注無窮時目神人不神何能此也晚與兄俱住益南空慧寺私自惟曰學貴經遠義重疏通鑽仰一方未成探賾有沙門道深體悟成實學稱包富控權敷化振網趙邦憤發內心將捐巴蜀捷深知其遠量也情顧勤勤每勸勉之而正意已行誓無返面遂乃假緣告別間行江硤經途所及荊楊等州訪逮道鄰莫知歸詣便北達深所委參勇鎧素襲嘉問縱洽無遺終始十月資承略盡時燕趙學侶相顧逢秋後發前至抑斯人也沙門慧休道聲高邈行解相富夸罩古今獨據鄴中昌言傳授詞鋒所指海內高尚又往從焉不面生來相逢若舊去師資禮事等法朋偏為獨講雜心攝論指摘纖隱曲示綱猷相續八月領酬無厭休又驚異絶歎撫掌而嗟曰希世若人爾其是也沙門道嶽宗師俱舍闡弘有部包籠領袖吞納喉襟揚業帝城來儀群學乃又從焉創迹京都詮途義苑沙門法常一時之最經論教悟其從如林奘乃一舉十問皆陳幽奧坐中杞梓拔思未聞由是馳譽道流擅聲日下沙門僧辨法輪論士機慧是長命來連坐吾之徒也但為俱舍一論昔所未聞因爾伏膺曉夕咨請嶽審其殷至慧悟霞明樂説不窮任其索隱覃思研採晬周究竟沙門玄會匠剖涅槃刪補舊疏更張琴瑟承斯令問親位席端咨質遲疑煥然祛滯僕射宋公蕭瑀敬其脫頴奏住莊嚴然非本志情栖物表乃又惟曰余周流吳蜀爰逮趙魏末及周秦預有講筵率皆登踐已布之言令雖蘊胸襟未吐之詞宗解籤無地若不輕生殉命誓往華胥何能具覿成言用通神解一覩明法了義真文要返東華傳揚聖化則先賢高勝豈決疑於彌勒後進鋒頴寧輟想於瑜伽耶時年二十九也遂厲然獨舉詣闕陳表有司不為通引頓迹京臯廣就諸蕃遍學書語行坐尋授數日便通側席面西思聞機候會貞觀三年時遭霜儉下敕道俗逐豐四出幸因斯際徑往姑臧漸至燉煌路由天塞裹糧弔影前望悠然但見平沙絶無人徑回遑委命任業而前展轉因循達高昌境初奘在涼州講揚經論華夷士庶盛集歸崇商客通傳預聞蕃域高昌王麴文泰特信佛經復承奘告將遊西鄙恆置郵馹境次相迎忽聞行達通夕立候王母妃屬執炬殿前見奘苦辛備言意故合宮下淚驚異希有延留夏坐長請開弘王命為弟母命為子殊禮厚供日時恆致乃為講仁王等經及諸機教道俗係戀並願長留奘曰本欲通開大化遠被家國不辭賤命忍死西奔若如來語一滯此方非唯自虧發足亦恐都為法障乃不食三日僉見極意無敢措言王母曰今與法師一遇並是往業因緣脫得果心東返願重垂誡誥遂與奘手傳香信誓為母子麴氏流淚執足而別仍敕殿中侍郎齎綾帛五百匹書二十四封并給從騎六十人送至突厥葉護牙所以大雪山北六十餘國皆其部統故重遺達奘開前路也初至牙所信物倍多異於恆度謂是親弟具以情告終所不信可汗重其賄賂遣騎前告所部諸國但有名僧勝地必令奘到於是連騎數十盛若皇華中途經國道次參候供給頓具倍勝於初自高昌至於鐵門凡經一十六國人物優劣奉信淳疏具諸圖傳其鐵門也即鐵門關漢之西屏入山五百旁無異路一道南出險絶人物左右石壁竦立千仞色相如鐵故因號焉見漢門扇一竪一臥外鐵裏木加懸諸鈴必掩此關實惟天固南出斯門土田溫沃花果榮茂地名覩貨羅也縱千餘里廣三千餘東拒蔥嶺西接波斯南大雪山北據鐵門縛芻大河中境西流即經所謂博叉河也其境自分為二十七國各有君長信重佛教僧以十二月十六日安居坐其春分以斯時溫熱雨多故也又前經國凡度十三至縛喝國土地華博時俗號為小王舍城國近葉護南牙也突厥常法夏居北野花草繁茂放牧為勝冬處山中用遮寒厲故有兩牙王都城外西南寺中有佛澡罐可容斗許及佛掃帚并以佛牙守護莊嚴殆難瞻覩奘為國使躬事頂戴西北不遠有提謂波利兩城建塔淩虛即爰初道成獻長者之本邑髮爪塔也又東南行大雪山中七百餘里至梵衍國僧有數千學出世部王城北山有立石像高百五十尺城東臥佛長千餘尺並精舍重接金寶莊校晃曜人目見者稱歎又有佛齒舍利劫初緣覺齒長五寸許金輪王齒長三寸許并商那和修鉢及九條衣絳色猶存又東山行至迦畢試國奉信彌勝僧有六千多大乘學其王歲造銀像舉高丈八延請遐邇廣樹名壇國有如來為菩薩時齒長可寸餘又有其髮引長尺餘放還螺旋自斯地北民雜胡戎制服威儀不參大夏名為邊國蜜利車類唐言譯之垢濁種也又東南七百至濫波國即印度之北境矣言印度者即天竺之正名猶身毒賢豆之訛號耳論其境也北背雪山三陲大海地形南狹如月上弦川平廣衍周九萬里七十餘國依止其中時或乖分略地為國今則盡三海際同一王命又東雪山至那伽羅曷國即布髮掩泥之故地也詳諸經相意有疑焉何則討尋本事乃在賢劫已前蓮花定光名殊三佛既非同劫頻被火災何得故處今猶泥濕若以為虛佛非妄語如彼諸師各陳異解有論者言此實本地佛非妄也雖經劫壞本空之處願力莊嚴如因事也並是如來流化斯迹常在不足怪矣故其勝地左則標樹諸窣覩波即靈塔之正名猶偷婆斗藪婆之訛號耳阿育王者此號無憂恨不覩佛興諸感戀絓是聖迹皆起銘記故於此處為建石塔高三十餘丈又有石壁佛影蹈迹衆相皆竪標記並如前也城南不遠醯羅城中有佛頂骨周尺二寸其相仰平形如天蓋佛髑髏蓋如荷葉盤佛眼圓睛狀如奈許澄淨皎然有佛大衣其色黃赤佛之錫杖以鐵為環紫檀為笴此五聖迹同在一城固守之務如傳國寶北近突厥昔經侵奪雖至所在還潛本處斯則赴緣隱顯未在兵威奘奉覲靈相悲淚橫流手撥末香親看體狀倍增欣悅即以和香印其頂骨覩有嘉瑞又增悲慶近有北狄大月支王欲知來報以香取相乃示馬形甚非所望加諸布施積功懺悔又以香取現師子形雖位狩王終為畜類情倍歸依又加施戒乃現人天方還本國故其俗法見五相者相一金錢取其相者酬七金錢俗利其寶用充福物既非僧掌固守彌崇無論道俗必先酬價奘被王命觀視具周旁國諸僧承斯榮望同來禮謁又東山行至健馱邏國佛寺千餘民皆雜信城中素有鉢廟衆事莊嚴昔如來鉢經於此廟乃數百年今移波斯王宮供養城東有迦膩王大塔基周里半佛骨舍利一斛在中舉高五百餘尺相輪上下二十五重天火三災今正營構即世中所謂雀離浮圖是也元魏靈太后胡氏奉信情深遣沙門道生等齎大幡長七百餘尺往彼挂之腳才及地即斯塔也亦不測雀離名生所由左側諸迹其相極多近則世親如意造論之地遠則捨於千眼睒奉二親檀特名山達拏本迹仙為女亂佛化鬼母並在其境皆無憂王為建石塔高者數百餘尺立標記焉自北山行達烏長那國即世中所謂北天竺烏長國也其境周圍五千餘里果實充備為諸國所重傳云即昔輪王之苑囿也僧有萬餘兼大乘學王都四周多諸古迹忍仙佛跖半偈避讎折骨書經割肉代鴿蛇藥護命血飲夜叉如斯等相備列其境各具瞻奉情倍欣欣城之東北減三百里大山龍泉名阿波邏即信度河之本源西南而流經中所謂辛頭河也王都東南越山逆河鐵橋棧道路極懸險千有餘里至極大川即古烏仗之王都也中有木慈氏像高百餘尺即末田地羅漢將諸工人三返上天方得成者身相端嚴特難陳説還返烏仗南至呾叉始羅國具見伊羅鉢龍所住之池月光決目之地育王標塔舉高十丈北有石門殊極高大崇竦重山道由中過斯又薩埵捨身處也自此東南山行險阻經一小國度數鐵橋減二千里至迦濕彌羅國即此俗常傳罽賓是也莫委罽賓由何而生觀其圖域同罽賓耳本是龍海羅漢取之引衆而住通三藏也故其國境四面負山周七千餘里門徑狹迮僧徒五千多學小乘國有大德名僧勝匠奘就學俱舍順正理因明聲明及大毗婆沙王愍遠至給書手十人供給寫之有佛牙長可寸餘光白如雪自濫波至此繞山諸國形體鄙薄俗習胡蕃雖預五方非印度之正境也以住居山谷風雜諸邊自此南下通望無山將及千里至磔迦國土據平川周萬餘里兩河分注卉木繁榮于時徒伴二十餘人行至大林中遇賊劫掠才獲命全入村告乞乃達東境大林有婆羅門年七百歲貌如三十明中百論及外道書云是龍猛弟子乃停一月學之又東至那僕底國就調伏光法師學對法顯宗理門等論又東詣那伽羅寺就月胄論師學衆事分婆沙又東至祿勒那國就闍那崛多大德學經部婆沙又就蜜多犀那論師學薩婆多部辨真論漸次東南路經六國多有遺迹育王標塔高二十丈者其數不少中有末葂羅國最饒蹤緒城東六里有一山寺昔烏波毱多唐言近護即五師之一也是其本住所建北巖石室高二十餘丈廣三十步其側不遠復有獼猴墮坑處四佛經行處賢聖依住處靈相衆矣又東南行經于七國至劫比他國俗事大自在天其精舍者高百餘尺中有天貌形極偉大謂諸有趣由之而生王民同敬不為鄙恥諸國天祠率置此形大都異道乃有百數中所高者自在為多有一大寺五百僧徒淨人僕隸乃有數萬皆宅其寺側中有三道階南北而列即佛為母忉利安居夏竟下天帝釋之所作也寶階本基淪沒並盡後王倣之在其故地猶高七十餘尺育王為建石柱高七丈餘光淨明照隨人罪福影現其中旁有賢劫四佛經行石基長五十許步高于七尺足蹈所及皆有蓮華文生焉國西北不遠二百許里至羯若鞠闍國唐言曲女城也王都臨殑伽河即恆河之正名矣源從北來出大雪山其土邪正雜敬僧徒盈萬多諸聖迹四佛行坐處七日説法處佛牙髮爪等塔精舍千餘名寺異相多臨河北奘於此國學佛使日胄二毗婆沙於毗耶犀那三藏所經于三月王號戒日正法治世將五十載言戒日者諡法之名此方薨後量德以贈彼土初登即先薦號以滅後美之徒虛名耳今猶御世統五印度初治邊陲為小國也先有室商佉王威行海內酷虐無道劉殘釋種拔菩提樹絶其根苗選簡名德三百餘人留之餘者並充奴隸戒日深知樹於禍始也與諸官屬至菩提坑立大誓曰若我有福統臨海內必能崇建佛法願菩提樹從地而生言已尋視見菩提萌坑中上踊遂回兵馬往商佉所威福力故當即除滅所以抱信誠篤倍發由來還統五方象兵八萬軍威所及並藉其力素不血食化境有羊皆贖施僧用供乳酪五年一施傾其帑藏藏盡還蓄時至復行用此為常有犯王法乃至叛逆罪應死者遠斥邊裔餘者懲罰蓋不足言故諸國中多行盜竊非假伴援不可妄進又東南行二千餘里經于四國順殑伽河側忽被秋賊須人祭天同舟八十許人悉被執縛唯選奘公堪充天食因結壇河上置奘壇中初便生饗將加鼎鑊當斯時也取救無緣注想慈尊彌勒如來及東夏住持三寶私發誓曰餘運未絶會蒙放免必其無遇命也如何同舟一時悲啼號哭忽惡風四起賊船而覆沒飛沙折木咸懷恐怖諸人又告賊曰此人可愍不辭危難專心為法利益邊陲君若殺之罪莫大也寧殺我等不得損他衆賊聞之投刃禮愧受戒悔失放隨所往達憍償彌外道殷盛王都城中有佛精舍高六十尺中有檀像即昔優田大王造之倣在天之影也其側龍窟聖迹多矣又東北千餘里至室羅伐悉底國即舍衛舍婆提之正名也周睇荒毀才有故基斯匿治宮須達故宅趾墌存焉城南五里有逝多林即祇陀園也勝軍王臣善施所造全寺頽滅尚有石柱舉高七丈育王標樹邊有磚室一區中安如來為母説法像自餘院宇湮沒蕩盡但有佛洗病比丘處目連舉身子衣處佛僧常汲故井處外道陰謗殺淫女處佛異論處身子捔處琉璃沒處得眼林處迦葉波佛本生地諸如上處皆建石塔並無憂王之所造也寺東不遠三大深坑即調達瞿波戰遮女人所沒之處坑極深邃臨望無底自古及今大雨洪注終無溢滿又東將七百里至劫毗羅伐窣堵國即迦毗羅衛淨飯王所治之都也空城十餘無人栖住故宮甎城周十五里荒寺千餘惟宮中一所在焉王寢殿基上有銘塔即如來降神之處也彼有説云五月八日神來降者上座部云十五日者與此方述微復不同豈有異耶至如東夏所尚素王為聖將定年算前達尚迷況復曆有三代述時紀號猶自差舛顧惟理越情求赴機應感皆乘權道適變為先豈以常人之耳目用通於至極也城之南北有過去二佛生地諸塔育王石柱銘記甚多都城西北數百千塔並是流璃所誅諸釋既是聖者後人為造當斯時也有四釋子忿其見逼不思犯戒出外拒軍琉璃遂退後還本國城中不受告曰吾為法種誓不行師汝退彼軍非吾族也既被放斥遠投諸國本是聖胤競宗樹之今烏仗梵衍等王並其後也城東百里即是如來生地之林今尚存焉或有説者三月八日上座部云十五日也此土諸經咸云四月八日斯非感見之機異計多耳又東七百里方至拘尸中途諸異略不復紀創達此城不覺五情失守崩踊躄地頃之顧眄但見荒城頽褫純陀宅基有標志耳西北四里河之西岸即娑羅大林周匝輪徑四十餘里中央高竦即涅槃地有一甎室臥像北首旁施塔柱具書銘記而諸説混淆通列其上有云二月十五日入涅槃者或云九月八日入涅槃者或云自彼至今過千五百年者或云過九百年者城北渡河即焚身地方二里餘深三丈許土尚黃黑狀同焦炭諸國有病服其土者無不除愈故其焚處致有坑耳其側復有現足分身雉鹿諸塔並具瞻已又西南行大深林中七百餘里達婆羅痆廝國即常所謂波羅奈也城臨殑伽外道殷盛乃出萬計天寺百餘多遵自在僧徒三千並小乘正量部也王都東北波羅奈河之西塔柱雙建育王所立影現佛像覩者興敬度河十里即鹿野寺也周閭重閣望若仙宮僧減二千皆同前部佛事高勝諸國最矣中有轉法輪像狀如言説旁樹石柱高七十餘尺內影外現衆相備矣斯即如來初轉法處其側復有五百獨覺塔三佛行坐處寺中銘塔聖迹極多乃有數百又有佛所浴池浣衣洗器之水皆有龍護曝衣方石鹿王迎佛之地並建石塔動高三百餘尺相甚弘偉故略陳耳順河東下減於千里達吠舍釐即毗舍離也露形異術偏所豐足國城舊基周七十里人物寡鮮但為名地其中説淨名經處寶積淨名諸故宅處身子證果處姨母滅度處七百結集處阿難分身處此之五處各建勝塔標示後代自斯東北二千餘里入大雪山至尼波羅國純信於佛僧有二千大小兼學城東有池中有天金光浮水上古老傳云彌勒下生用為首飾或有利其寶者夜往盜之但見火聚騰焰都不可近今則沈深叵窮其底水又極熱難得措足唐國使者試火投之焰便踊起因用煮米便得成飯其境北界即東女國與吐蕃接境比來國命往還率由此地約指為語唐梵相去一萬餘里自古回邅致途遠阻又從梵吠舍南濟殑伽河達摩揭陀國即摩竭提之正號也其國所居是為中印度矣今王祖胤繼接無憂無憂即頻毗娑羅之曾孫也王即戒日之女壻矣今所治城非古所築殑伽南岸有波吒釐城周七十里即經所謂華氏城也王宮多花故因名焉昔阿育王自離王舍遷都於此左側聖所其量彌繁城之西南四百餘里度尼連禪河至伽耶城人物希少可千餘家又行六里有伽耶山自古諸王所登封也故此一山世稱名地如來應俗就斯成道頂有石塔高百餘尺即寶雲等經所説之處周回四十里內聖迹充滿山之西南即道成處有金剛座周百餘步其地則今所謂菩提寺是也寺南有菩提樹高五丈許繞樹周垣壘甎為之輪回五百許步東門對河北門通寺院中靈塔相狀多矣如來得道之日互説不同或云三月八日及十五日者垣北門外大菩提寺六院三層牆高四丈皆甎為之師子國王買取此處興造斯寺僧徒僅千大乘上座部所住持也有骨舍利狀人指節肉舍利者大如真珠彼土十二月三十日當此方正月十五日世稱大神變月若至其夕必放光瑞天雨香花充滿樹院奘初到此不覺悶絶良久蘇醒歷覩靈相昔聞經説今宛目前恨居邊鄙生在末世不見真容倍復悶絶旁有梵僧就地接撫相與悲慰雖備禮謁恨無光瑞停止安居迄於解坐彼土常法至於此時道俗千萬七日七夜競伸供養凡有兩意謂覩光相及希樹葉每年樹葉恰至夏末一時飛下通夕新抽與故齊等時有大乘居士為奘開釋瑜伽師地爾夜對講忽失燈明又觀所佩珠璫瓔珞不見光釆但有通明晃朗內外洞然而不測其由也怪斯所以共出草廬望菩提樹乃見有僧手擎舍利大如人指在樹基上遍示大衆所放光明照燭天地于時衆鬧但得遙禮雖目覩瑞心疑其火合掌虔跪乃至明晨心漸萎頓光亦歇滅居士問曰既覩靈瑞心無疑耶奘具陳意居士曰余之昔疑還同此也其瑞既現疑自通耳余見菩提樹葉如此白楊具以問之奘曰相狀略同而扶踈茂盛少有異也於此寺東望屈屈吒播陀山即經所謂雞足山也直上三峯狀如雞足因取號焉去菩提寺一百餘里頂樹大塔夜放神炬光明通照即大迦葉波寂定所也路極梗澀多諸林竹師子虎象縱橫騰倚每思登踐取進無由奘乃告王請諸防援蒙給兵三百餘人各備鋒刃斬竹通道日行十里爾時彼國聞奘往山士女大小數盈十萬奔隨繼至共往雞足既達山阿壁立無路乃縛竹為梯相連而上達山頂者三千餘人四睇欣然轉增喜踊具覩石罅散花供養自山東北百有餘里至佛陀代那山有大石室佛曾遊此天帝就石塗香以供行至其處今猶郁烈不遠山室可受千人如來三月於中坐夏壘石為道廣二十步長五里許即頻毗娑羅修覲上山之所由也又東六十便至矩奢揭羅補羅古城唐言茅城多出香茅故因名也其城即摩揭陀之正中經本所謂王舍城者是矣崇山四周為其外郭上如陴堄皆甎為之西通小徑北闢山門廣長從狹周輪百五十里其中宮城周三十餘里內諸古迹其量復多宮之東北可十五里有姞栗陀羅矩吒山即經所謂耆闍崛山者是也唐言鷲峯之臺於諸山中最高顯映奪接山之陽佛多居住從下至頂編石為階廣十餘步長六里許佛常往來於斯道也歷觀崖岫備諸古迹不可勝紀廣如圖傳山城北門強一里許即迦蘭陀竹園精舍石基東戶甎室今仍現在自園西南行六里許南山之陰大竹林中有石室焉即大迦葉波與千無學結集經教所託之地又西二十餘里即大衆部結集處也山城之北可五里許至曷羅闍姞利呬城唐言新王舍也餘傳所稱者是矣又北三十餘里至那爛陀寺唐言施無厭也贍部洲中寺之最者勿高此矣五王共造供給倍隆故因名焉其寺都有五院同一大門周閭四重高八丈許並用甎壘其最上壁猶厚六尺外郭三重牆亦甎壘高五丈許中間水繞極深池塹備有花畜嚴麗可觀自置已來防衛清肅女人非濫未曾容隱常住僧衆四千餘人外容道俗通及邪正乃出萬數皆周給衣食無有窮竭故復號寺為施無厭也中有佛院備諸聖迹精舍高者二十餘丈佛昔於中四月説法又有精舍高三十餘丈中諸變態不可名悉置立銅像高八丈餘六層閣盛莊嚴綺飾即戒日之兄滿胄王造也又有鍮石精舍高可八丈戒日親造雕裝未備日役千功彼國常法欽敬德望有諸論師智識清遠王給封戶乃至十城漸降量賞不減三城其寺現在受封大德三百餘人通經已上不掌僧役重愛學問咨訪異法故烏耆已西被於海內諸出家者皆多義學任國往返都無隔礙王雖守國不敢遮障故彼學徒博聞該贍奘歷諸國風聲久達將造其寺衆差大德四十人至莊迎宿莊即目連之本村也明日食後僧二百餘俗人千餘擎輿幢蓋香花來迎引入都會與衆相慰問訖唱令住寺一切共同又差二十人引至正法藏所即戒賢論師也年百六歲衆所重故號正法藏博聞強識內外大小一切經書無不通達即昔室商佉王所坑之者為賊擎出潛淪草莾後興法顯道俗所推戒日增邑十城科稅以入賢以稅物成立寺廟奘禮讚訖並命令坐問從何來答從支那國來欲學瑜伽等論聞已啼泣召弟子覺賢説己舊事賢曰和上三年前患困如刀刺欲不食而死夢金色人曰汝勿厭身往作國王多害物命當自悔責何得自盡有支那僧來此學問已在道中三年應至以法惠彼彼復流通汝罪自滅吾是曼殊室利故來相勸和上今損正法藏問在路幾時奘曰出三年矣既與夢同悲喜交集禮謝訖寺素立法通三藏者員置十人由來闕一以奘風問便處其位日給上饌二十盤大人米一斗檳榔豆䓻龍腦香乳蘇蜜等淨人四婆羅一行乘象輿三十人從大人米者粳米也大如烏豆飯香百步惟此國有王及知法者預焉故此寺通三藏者給二十盤即二十日漸減通一經者猶給五盤五日過此已後便依僧位便請戒賢講瑜伽論聽者數千人十有五月方得一遍重為再講九月方了自餘順理顯揚對法等並得咨稟然於瑜伽偏所鑽仰經於五年晨夕無輟將事博議未忍東旋賢誡曰吾老矣見子殉命求法經途十年方至今日不辭朽老力為伸明法貴流通豈期獨善更參他部恐失時緣智無涯也惟佛乃窮人命如露非旦則夕即可還也便為裝行調付給經論奘曰敢聞命矣意欲南巡諸國還途北指以高昌昔言不得違也便爾東行大山林中至伊爛拏國見佛坐迹入石寸許長五尺二寸廣二尺一寸旁有瓶迹沒石寸許八出花文都似新置有佛立迹長尺八寸闊強六寸又東南行路經五國將四千里至三摩呾吒國濱斥大海四佛曾遊見青玉像舉高八尺自斯東北山海之中凡有六國即達林邑道阻且長兼多瘴癘故不遊踐又從西行將至二千里達揭羅拏國邪正兼事別有三寺不食乳酪調達部也又西南行七百餘里至烏荼國東境臨海有發行城多有商侶停於海次南大海中有僧伽羅國謂執師子也相去約指二萬餘里每夜南望見彼國中佛牙塔上寶珠光明騰焰暉赫見於天際又西南行具經諸國並有異迹可五千里至憍薩國即南印度之正境也崇信佛法僧徒萬許其土寬廣林野相次王都西南三百餘里有黑蜂山昔古大王為龍猛菩薩造立斯寺即龍樹也其寺上下五重鑿石為之引水旋注多諸變異沿波方達令淨人固守罕有登者龕中石像形極偉大寺成之日龍猛就山以藥塗之變成紫金世無等者又有經藏夾縛無數古老相傳盡初結集並現存在雖外佛法屢遭誅殄而此一山住持無改近有僧來於彼夏坐但得讀誦不許持出具陳此事但路幽阻難可尋問又復南行七千餘里路經五國並有靈迹至秣羅矩吒國即贍部最南濱海境也山出龍腦香焉旁有巖頂清流繞旋二十許匝南注大海中有天宮觀自在菩薩常所住處即觀世音之正名也臨海有城古師子國今入海中可三千餘里非結大伴則不可至故不行也自此西北四千餘里中途經國具諸神異達摩訶剌他國其王果勇威英自在未賓戒日寺有百餘僧徒五千大小兼學東境山寺羅漢所造有大精舍高百餘尺中安石像長八丈許上施石蓋凡有七重虛懸空中相去各三尺許禮謁見者無不歎訝斯神也自此因循廣尋聖迹至鉢伐多國有數名德學業可遵又停二年學正量部根本論攝正法論成實論等便東南還那爛陀參戒賢已往杖林山勝軍論師居士所其人剎利種學通內外五明數術依林養徒講佛經義道俗歸者日數百人諸國王等亦來觀禮洗足供養封賞城邑奘從學唯識決擇論意義論成無畏論等首尾二年夜夢寺內及外林邑火燒成灰見一金人告曰却後十年戒日王崩印度便亂當如火蕩覺已向勝軍説之奘意方決嚴具東還及永徽之末戒日果崩今並飢荒如所夢矣初那爛陀寺大德師子光等立中百論宗破瑜伽等義奘曰聖人作論終不相違但學者有向背耳因造會宗論三千頌以呈戒賢諸師咸稱善先有南印度王灌頂師名般若毱多明正量部造破大乘論七百頌時戒日王討伐至烏荼國諸小乘師保重此論以用上王請與大乘師決勝王作書與那爛陀寺可差四僧善大小內外者詣行宮在所擬有論義戒賢乃差海慧智光師子光及奘為四應命將往未發間有順世外道來求論難書四十條義懸於寺門若有屈者斬首相謝彼計四大為人物因旨理沈密最難徵核如此陰陽誰窮其數此道執計必求捔決彼土常法論有負者先令乘驢屎瓶澆頂公於衆中形心折伏然後依投永為皂隸諸僧同疑恐有殿負默不陳對奘停既久究達論道告衆請對何得同恥各立旁證往復數番通解無路神理俱喪溘然潛伏預是釋門一時騰踊彼既屈已請依先約奘曰我法弘恕不在刑科稟受我法如奴事主因將向房遵正法要彼烏荼論又別訪得尋擇其中便有謬濫謂所伏外道曰汝聞烏荼所立義不曰彼義曾聞特解其趣即令説之備通其要便指纖芥申大乘義破之名制惡見論千六百頌以呈戒賢等師咸曰斯論窮天下之勍寇也何敵當之奘意欲流通教本乃放任開正法遂往東印度境迦摩縷多國以彼風俗並信異道故其部衆乃有數萬佛法雖弘未至其土王事天神愛重教義但聞智人不問邪正皆一奉敬其人創染佛法將事弘闡故往開化既達於彼王歎奘勝度神思清遠童子王聞欣得面欵遣使來請再三乃往既至相見宛若舊遊言議接對又經晦朔于時異術雲聚請王決論言辨才交邪徒草靡王加崇重初開信門請問諸佛何所功德奘讚如來三身利物因造三身論三百頌以贈之王曰未曾有也頂戴歸依此國東境接蜀西蠻聞其途路兩月應達于時戒日王臣告曰東蕃童子王所有支那大乘天者道德弘被彼王所重請往致之其大乘天者即印度諸僧美奘之目也王曰我已頻請辭而不來何因在彼即使語拘摩羅王可送支那法師來共會祇羅國童子王命象軍二萬船三萬與奘泝殑伽河以赴戒日戒日與諸官屬百餘萬衆順河東下同集羯朱祇羅國初見頂禮嗚足盡敬散花設頌無量供已曰弟子先請何為不來答以聽法未了故此延命又曰彼支那國有秦王破陳樂歌舞曲秦王何人致此歌詠奘曰即今正國之天子也是大聖人撥亂反政恩霑六合故有斯詠王曰故天縱之為物主也乃延入行宮陳諸供養乃述制惡見論顧謂門師曰日光既出熒燭奪明師所寶者他皆破訖試救取看小乘諸僧無敢言者王曰此論雖好然未廣聞欲於曲女城大會命五印度能言之士對衆顯之使邪從正捨小就大不亦可乎是日發敕普告天下總集沙門婆羅門一切異道會曲女城自冬初泝流臘月方到爾時四方翕集乃有萬數能論義者數千人各擅雄辨咸稱克敵先立行殿各容千人安像陳供香花音樂請奘升座即標舉論宗命衆徵核竟十八日無敢問者王大嗟賞施銀錢三萬金錢一萬上㲲一百具仍令大臣執奘袈裟巡衆唱言支那法師論勝十八日來無敢問者並宜知之于時僧衆大悅曰佛法重興乃令邊人權智若此便辭東歸王重請住觀七十五日大施場相事訖辭還王敕所部遞送出境并施青象金銀錢各數萬戒日拘摩羅等十八大國王流淚執別奘便辭而不受以象形大日常料草四十餘圍餅食所須又三斛許戒日又敕令諸屬國隨到供給諸僧勸受象施皆曰斯勝相也佛滅度來王雖崇敬種種布施未聞以象用及釋門象為國寶今既見惠信之極矣因即納象而反錢寶然其象也其形圓大高可丈三長二丈許上容八人并諸什物經象等具並在其上狀如重都相似空行雖逢奔逸而安隱不墜瓶水不側緣國北旋出印度境戒日威被咸蒙供侍入皂利國山川相半沃壤豐熟僧徒數萬並學大乘東北山行過諸城邑上大雪山及至其頂諸山並下又上三日達最高嶺南北通望但見橫山各有九重過斯已往皆是平地雖有小山孤斷不續唯斯一嶺曼延高遠約略為言贍部一洲山叢斯地何以知耶至如西境波斯平川眇漫東尋嵬崿莫有窮蹤北則橫野蕭條南則印度皋衍即經所謂香山者也達池幽邃未可尋源四河所從皆由斯出爾雅所謂昆崙之墟豈非斯耶案諸禹貢河出磧石蓋局談其潛出處耳張騫尋之乃遊大夏固是超步所經猶不言其發源之始斯可知矣奘引從前後自勒行衆沿嶺而下三日至地達覩貨羅諸故都邑山行八百路極艱險寒風切骨到於活國中途所經皆屬北狄而此王者突厥之胤統管諸胡總御鐵門以南諸小國也自此境東方入蔥嶺嶺據贍部洲中南接雪山北至熱海東漸烏鎩西極波斯縱廣結固各數千里冬夏積雪氷巖崖險過半已下多出山蔥故因名焉昔人云蔥嶺停雪即雪山也今親目驗則知其非雪山乃居蔥嶺已南東西亘海南望平野北達叢山方名蔥嶺又東山行經於十國二千餘里至達摩悉鐵帝國境在山間東西千六百里南北極廣不踰四五里許臨縛芻河從南而來不測其本僧寺十餘有一石像上施金銅圓蓋人有旋繞蓋亦隨轉豈由機巧莫測其然又東山行近有千里達商彌國東至大川廣千餘里南北百餘里絶無人住川有龍池東西三百南北五十其池正在大蔥嶺內贍部洲中最高地也何以明之池出二河其西流者至達摩悉鐵國與縛芻河合自此以西水皆西流其東流者至佉沙西界與徙多河合自此已東水皆東流故分二河各注兩海故知高也河出大鳥卵如𭽎許案條支國大卵如甕豈非斯耶又東五百至朅盤陀國北背徙多河即經所謂悉陀河也東入鹽澤潛於地中涌於積石為東夏河矣其國崇信佛法城之東南三百餘里大崖兩室各一羅漢現入滅定七百餘年鬚髮漸長左近諸僧年別為剃又東千餘里方出蔥嶺至烏鎩國城臨徙多西有大山崖自崩墜中有僧焉冥目而坐形甚奇偉鬚髮下垂至於肩面問其委曲乃迦葉佛時人矣近重崩崖沒於山內奘至斯國與象別行先度雪河象晚方至水漸泛漲不悉山道尋嶺直下牙衝岸樹象性凶獷反拔却頓因即致死悵恨所經已越山險將達平壤不果祈願東過踈勒乃至沮渠可千餘里同伴五百皆共推奘為大商主處位中營四面防守且自沮渠一國素來常鎮十部大經各十萬偈如前所傳國寶護之不許分散今屬突厥南有大山現三羅漢入滅盡定東行八百達于遁國地惟沙壤寺有百餘僧徒五千並大乘學城西山寺佛曾遊踐有大石室羅漢入定石門封掩初奘既度蔥嶺先遣侍人齎表陳露達國化也下敕流問令早相見行達于遁以象致死所齎經像交無運致又上表請尋下別敕令于遁王給其鞍乘既奉嚴敕駝馬相連至于沙州又蒙別敕計其行程酬雇價直自爾乘傳二十許乘以貞觀十九年正月二十四日屆于京郊之西道俗相趨屯赴闐𨶮數十萬衆如值下生將欲入都人物喧擁取進不前遂停別館通夕禁衛候備遮斷停駐道旁從故城之西南至京師朱雀街之都亭驛二十餘里列衆禮謁動不得旋于時駕幸洛陽奘乃留諸經像送弘福寺京邑僧衆競列幢帳助運莊嚴四部喧譁又倍初至當斯時也復感瑞雲現于日北團圓如蓋紅白相映當于像上顯發輪光既非繞日同共嗟仰從午至晡像入弘福方始歇滅致使京都五日四民廢業七衆歸承當此一期傾仰之高終古罕類也奘雖逢榮問獨守館宇坐鎮清間恐陷物議故不臨對及至洛濱特蒙慰問并獻諸國異物以馬馱之別敕引入深宮之內殿面奉天顏談敘真俗無爽帝旨從卯至酉不覺時延迄于閉鼓上即事戎旃問罪遼左明旦將發下敕同行固辭疾苦兼陳翻譯不違其請乃敕京師留守梁國公房玄齡專知監護資備所須一從天府初奘在印度聲暢五天稱述支那人物為盛戒日大王并菩提寺僧思聞此國為日久矣但無信使未可依憑彼土常傳贍部一洲四王所治東謂脂那主人王也西謂波斯主寶王也南謂印度主象王也北謂獫狁主馬王也皆謂四國藉斯以治即因為言奘既安達恰述符同戒日及僧各遣中使齎諸經寶遠獻東夏是則天竺信命自奘而通宣述皇猷之所致也使既西返又敕王玄策等二十餘人隨往大夏并贈綾帛千有餘段王及僧等數各有差并就菩提寺僧召石蜜匠乃遣匠二人僧八人俱到東夏尋敕往越州就甘蔗造之皆得成就先是菩提寺僧三人送經初至下敕普請京城設齋仍於弘福譯大嚴等經不久之間奘信又至乃敕且停待到方譯主上虛心企仰頻下明敕令奘速至但為事故留連不早程達既見洛宮深沃虛想即陳翻譯搜擢賢明上曰法師唐梵具贍詞理通敏將恐徒揚仄陋終虧聖典奘曰昔者二秦之譯門位三千雖復翻傳猶恐後代無聞懷疑乖信若不搜舉同奉玄規豈以褊能妄參朝委頻又固請乃蒙降許帝曰自法師行後造弘福寺其處雖小禪院虛靜可為翻譯所須人物吏力並與玄齡商量務令優給既承明命返迹京師遂召沙門慧明靈閏等以為證義沙門行友玄賾等以為綴緝沙門智證辨機等以為録文沙門玄模以證梵語沙門玄應以定字偽其年五月創開翻譯大菩薩藏經二十卷余為執筆并刪綴詞理其經廣解六度四攝十力四畏三十七品諸菩薩行合十二品將四百紙又復旁翻顯揚聖教論二十卷智證等更迭録文沙門行友詳理文句奘公於論重加陶練次又翻大乘對法論一十五卷沙門玄賾筆受微有餘隙又出西域傳一十二卷沙門辨機親受時事連紕前後兼出佛地六門神呪等經都合八十許卷自前代已來所譯經教初從梵語倒寫本文次乃回之順同此俗然後筆人亂理文句中間增損多墜全言今所翻傳都由奘旨意思獨斷出語成章詞人隨寫即可披玩尚賢吳魏所譯諸文但為西梵所重貴於文句鉤鎖聯類重沓布在唐文頗居繁復故使綴工專司此位所以貫通詞義加度節之銓本勒成祕書繕寫于時駕返西京奘乃表上并請序題尋降手敕曰法師夙標高行早出塵表泛寶舟而登彼岸搜妙道而闢法門弘闡大猷蕩滌衆纍是以慈雲欲卷舒之廕四空慧日將昏朗之照八極舒朗之者其惟法師乎朕學淺心拙在物猶迷況佛教幽微豈敢仰測請為經題非已所聞其新撰西域傳者當自披覽及西使再返又敕二十餘人隨往印度前來國命通議中書敕以異域方言務取符會若非伊人將論聲教故諸信命並資於奘乃為轉唐言依彼西梵文詞輕重令彼讀者尊崇東夏尋又下敕令翻老子五千文為梵言以遺西域奘乃召諸黃巾述其玄奧領疊詞旨方為翻述道士蔡晃成英等競引釋論中百玄意用通道經奘曰佛道兩教其致天殊安用佛言用通道義窮核言疏本出無從晃歸情曰自昔相傳祖憑佛教至於三論晃所師遵準義幽通不無同會故引解也如僧肇著論盛引老莊猶自申明不相為怪佛言似道何爽綸言奘曰佛教初開深文尚擁老談玄理微附佛言肇論所傳引為聯類豈以喻詞而成通極今經論繁富各有司南老但五千論無文解自餘千卷多是醫方至如此土賢明何晏王弼周顒蕭繹顧歡之徒動數十家注解老子何不引用乃復旁通釋氏不乃推步逸蹤乎既依翻了將欲封勒道士成英曰老經幽邃非夫序引何以相通請為翻之奘曰觀老治身治國之文文詞具矣叩齒咽液之序其言鄙陋將恐西聞異國有愧鄉邦英等以事聞諸宰輔奘又陳露其情中書馬周曰西域有道如老莊不奘曰九十六道並欲超生師承有滯致淪諸有至如順世四大之術冥初六諦之宗東夏所未言也若翻老序則恐彼以為笑林遂不譯之奘以弘讚之極勿尚帝王開化流布自古為重又重表曰伏奉墨敕猥垂獎喻祇奉綸言精守振越玄奘業尚空踈謬參法侶幸屬九瀛有截四表無虞憑皇靈以遠征恃國威而訪道窮遐冒險雖勵愚誠纂異懷荒實資朝化所獲經論奉敕翻譯見成卷軸未有詮序伏惟陛下睿思雲敷天華景爛理包繫象調逸咸英跨千古以飛聲掩百王而騰實竊以神力無方非神思不足詮其理聖教玄遠非聖藻何以序其源故乃冒犯威嚴敢希題目宸眷沖邈不垂矜許撫躬纍息相顧失圖玄奘聞日月麗天既分暉於戶牖江河紀地亦流潤於巖涯雲和廣樂不祕響於聾昧金璧奇珍豈韜彩於愚瞽敢緣斯理重以干祈伏乞雷雨曲垂天文俯照配兩儀而同久與二耀而俱懸然則鷲嶺微言假神筆而弘遠雞園奧義託英詞而宣暢豈止區區梵衆獨荷恩榮亦使蠢蠢迷生方超塵纍而已表奏之日敕遂許焉謂駙馬高履行曰汝前請朕為汝父作碑今氣力不如昔願作功德為法師作序不能作碑汝知之貞觀二十二年幸玉華宮追奘至問翻何經論答正翻瑜伽上問何聖所作明何等義具答已令取論自披閲遂下敕新翻經論寫九本頒與雍洛相兗荊楊等九大州奘又請經題上乃出之名大唐三藏聖教序於明月殿命弘文館學士上官儀對群僚讀之其詞曰蓋聞二儀有象顯覆載以含生四時無形潛寒暑以化物是以窺天鑑地庸愚皆識其端明陰洞陽賢哲罕窮其數然而天地包乎陰陽而易識者以其有象也陰陽處乎天地而難窮者以其無形也故知象顯可徵雖愚不惑形潛莫覩在智猶迷況乎佛道崇虛乘幽控寂弘濟萬品典御十方舉威靈而無上抑神力而無下大之則彌於宇宙細之則攝於毫釐無滅無生歷千劫而不古若隱若顯運百福而長今妙道凝玄遵之莫知其際法流湛寂挹之莫測其源故知蠢蠢凡愚區區庸鄙投其旨趣能無疑惑者哉然則大教之興基乎西土騰漢庭而皎夢照東域而流慈昔者分形分迹之時言未馳而成化當常現常之世民仰德而知遵及乎晦影歸真遷儀越世金容掩色不鏡三千之光麗象開圖空端四八之相於是微言廣被拯含類於三塗遺訓遐宣導群生於十地然而真教難仰莫能一其指歸曲學易遵邪正於焉紛糾所以空有之論或習俗而是非大小之乘乍沿時而隆替有玄奘法師者法門之領袖也幼懷貞敏早悟三空之心長契神情先包四忍之行松風水月未足比其清華仙露明珠詎能方其朗潤故以智通無纍神測未形超六塵而逈出敻千古而無對凝心內境悲正法之淩遲栖慮玄門慨深文之訛謬思欲分條析理廣彼前聞截偽續真開茲後學是以翹心淨土往遊西域乘危遠邁杖策孤征積雪晨飛途間失地驚砂夕起空外迷天萬里山川撥煙霞而進影百重寒暑躡霜雨而前蹤誠重勞輕求深願達周遊西宇十有七年窮歷道邦詢求正教雙林八水味道餐風鹿苑鷲峯瞻奇仰異承至言於先聖受真教於上賢探賾妙門精窮奧業一乘五律之道馳驟於心田八藏三篋之文波濤於口海爰自所歷之國總將三藏要文凡六百五十七部譯布中夏宣揚勝業引慈雲於西極注法雨於東垂聖教缺而復全蒼生罪而還福濕火宅之乾焰共拔迷塗朗愛水之昏波同臻彼岸是知惡因業墜善以緣升升墜之端惟人所託譬夫桂生高嶺雲露方得泫其華蓮出淥波飛塵不能污其葉非蓮性自潔而桂質本貞良由所附者高則微物不能纍所憑者淨則濁類不能沾夫以卉木無知猶資善而成善況乎人倫有識不緣慶而求慶方冀茲經流施將日月而無窮斯福遐敷與乾坤而永大百僚稱慶奘表謝曰竊聞六爻探賾局於生滅之場百物正名未涉真如之境猶且遠徵羲册覩奧不測其神遐想軒圖歷選並歸其美伏惟皇帝陛下玉毫降質金輪御天廓先王之九州掩百千之日月斥列代之區域納恆沙之法界遂使給園精舍並入堤封貝葉靈文咸歸册府玄奘往因振錫聊謁崛山經途萬里怙天威如咫步匪乘千葉詣雙林如食頃搜揚三藏盡龍宮之所儲研究一乘窮鷲嶺之遺旨並已載於白馬還獻紫宸尋蒙下詔賜使翻譯玄奘識乖龍樹謬忝傳燈之榮才異馬鳴深愧寫瓶之敏所譯經論紕舛尤多遂荷天恩留神構序文超象繫之表若聚日之放千光理括衆妙之門同惠雲之濡百草一音演説億劫罕逢忽以微生親承梵響踊躍歡喜如聞受記表奏之日尋下敕曰朕才謝圭璋言慚博達至於內典尤所未間昨製序文深為鄙拙惟恐穢翰墨於金簡標瓦礫於珠林忽得來書謬承褒讚循躬省慮彌益厚顏善不足稱空勞致謝又重表謝敕云朕性不讀經兼無才智忽製論序翻污經文具覽來言枉見褒飾愧逢虛美唯益真慚自爾朝宰英達咸申擊讚釋宗弘盛氣接成陰皇太子述上所作三藏聖教序曰夫顯揚正教非智無以廣其文崇闡微言非賢莫能定其旨蓋真如聖教者諸法之玄宗衆經之軌躅也綜括宏遠奧旨遐深極空有之精微體生滅之機要詞茂道曠尋之者不究其源文顯義幽履之者莫測其際故知聖慈所被業無善而不臻妙化所敷緣無惡而不翦開法網之綱紀弘六度之正教拯群有之塗炭啓三藏之祕扃是以名無翼而長飛道無根而永固道名流慶歷遂古而鎮常赴感應身經塵劫而不朽晨鍾夕梵交二音於鷲峯慧日法流轉雙輪於鹿苑排空寶蓋接翔雲而共飛莊野春林與天花而合彩伏惟皇帝陛下上玄資福垂拱而治八荒德被黔黎斂衽而朝萬國恩加朽骨石室歸於貝葉之文澤及昆蟲金匱流乎梵説之偈遂使阿耨達水通神甸之八川耆闍崛山接嵩華之翠嶺竊以法性凝寂靡歸心而不通智地玄奧感懇誠而遂顯豈謂重昏之夜燭慧炬之光火宅之朝降法雨之澤於是百川異流同會於海萬區分義總成乎實豈與湯武校其優劣堯舜比其聖德者哉玄奘法師者夙懷聰令立志夷簡神清髫齓之年體拔浮華之世凝情定室匿迹幽巖栖息三禪巡遊十地超六塵之境獨步迦維會一乘之旨隨機化物以中華之無質尋印度之真文遠涉恆河終期滿字頻登雪嶺更獲半珠問道往還十有七載備通釋典利物為心以貞觀十九年二月六日奉敕於弘福寺翻譯聖教要文凡六百五十七部引大海之法流洗塵勞而不竭傳智燈之長焰皎幽暗而恆明自非久植勝緣何以顯揚斯旨所謂法相常住齊三光之明我皇福臻同二儀之固伏見御製衆經論序照古騰今理含金石之聲文抱風雲之潤治輒以輕塵足嶽墜露添流略舉大綱以為斯記自此常參內禁扣問沈隱翻譯相續不爽法機敕賜雲納一領妙絶古今又敕天下寺度五人維持聖種皆其力也冬十月隨駕入京於北闕造弘法院鎮恆在彼初於曲池為文德皇后造慈恩寺追奘令住度三百人有令寺西北造翻經院給新度弟子一十五人弘福舊處仍給十人今上嗣籙素所珍敬追入優問禮殊恆祑永徽二年請造梵本經臺蒙敕賜物尋得成就又追入內於修文殿翻發智等論降手詔飛白書慰問優洽顯慶元年正月為皇太子於慈恩設大齋朝寀總至黃門郎薛元超中書郎李義府曰譯經佛法之大未知何德以光揚耶奘曰公此之問常所懷矣譯經雖位在僧光價終憑朝貴至如姚秦鳩摩羅什則安成侯姚嵩筆受元魏菩提流支則侍中崔光録文貞觀初波頗初譯則僕射蕭瑀太府蕭璟庶子杜正倫等監閲詳定今並無之不足光遠又大慈恩寺聖上切風樹之哀追造壯麗騰實之美勿過碑頌若蒙二公為致則不朽之迹自形於今古矣便許之明旦遣給事宣敕云所須官人助翻者已處分訖其碑朕自作尋敕慈恩翻譯文義須精宜令左僕射于志寧中書令來濟禮部許敬宗黃門郎薛元超中書郎李義府等有不安穩隨事潤色若須學士任追三兩人及碑成請神翰自書蒙特許克日送寺京寺咸造幢蓋又敕王公已下太常九部及兩縣伎樂車徒千餘乘駐弘福寺上居安福門俯臨將送京邑士女列於道側自北之南二十餘里充牣衢街光俗興法無與儔焉又賜山納妙勝前者并時服玩百有餘件顯慶二年駕幸洛陽預從安置東都積翠宮召入大內麗日殿翻觀所緣等論又於明德宮翻大毗婆沙等論奘少離桑梓白首言歸訪問親故零落殆盡惟有一姊迎與相見訪以墳隴旋殯未遷便卜勝地旋塋改葬其少室山西北緱氏故縣東北遊仙鄉控鶴里鳳凰谷即奘之生地也下近有少林寺即魏孝文所立是翻十地之所意願栖託為國翻譯蒙手敕云省表知欲晦迹巖泉追林遠而架往託慮禪寂軌澄什以標今仰挹風徽實所欽尚朕業空學寡靡究高深然以淺識薄聞未見其可法師津梁三界汲引四生智皎心燈定凝意水非情塵之所曀豈識浪而能驚然以道德可居何必太華疊嶺空寂可舍豈獨少室重巒幸戢來言勿復陳請即市朝大隱不獨貴於昔賢見聞弘益更可珍於即代遂因寢言顯慶三年下敕為皇太子造西明寺成令給上房僧十人以充侍者有大般若者二十萬偈此土八部咸在其中不久下敕令住玉華翻經供給一準京寺遂得託靜不爽譯功以顯慶五年正月元日創翻大本至龍朔三年十月末了凡四處十六會説總六百卷般若空宗此焉周盡於間又翻成唯識論辨中邊論唯識二十論品類足論等至十一月表上此經請製經序於蓬萊宮通事舍人馮義宣敕許之奘生常以來願生彌勒及遊西域又聞無著兄弟皆生彼天又頻祈請咸有顯證懷此專至益增翹勵後至玉華但有隙次無不發願生覩史多天見彌勒佛自般若翻了惟自策勤行道禮懺麟德元年告翻經僧及門人曰有為之法必歸磨滅泡幻形質何得久停行年六十五矣必卒玉華於經論有疑者可速問聞者驚曰年未耆耄何出此言報曰此事自知遂往辭佛先造俱胝十億像所禮懺辭別有門人外行者皆報好去今與汝別亦不須來來亦不見至正月九日告寺僧曰奘必當死經云此身可惡猶如死狗奘既死已勿近宮寺山靜處埋之因既臥疾開目閉目見大蓮花鮮白而至又見偉相知生佛前命僧讀所翻經論名目已總有七十三部一千三百三十卷自懷欣悅總召門人有緣並集云無常將及急來相見於嘉壽殿以香木樹菩提像骨對寺僧門人辭訣并遺表訖便默念彌勒令傍人稱曰南謨彌勒如來應正等覺願與含識速奉慈顏南謨彌勒如來所居內衆願捨命已必生其中至二月四日右脅纍足右手支頭左手髀上鏗然不動有問何相報曰勿問妨吾正念至五日中夜弟子問曰和上定生彌勒前不答曰決定得生言已氣絶迄今兩月色貌如常又有冥應略故不述又下敕葬日聽京城僧尼幢蓋往送於是素蓋素幢浮空雲合哀笳哀梵氣遏人神四俗以之悲涼七衆惜其沈沒乃葬於白鹿原四十里中皂素彌滿其塋與兄捷公相近苕然白塔近燭帝城尋下別敕令改葬樊川與州縣相知供給吏力乃又出之衆咸歎異經久埋瘞色相如初自非願力所持焉能致此余以暗昧濫霑斯席與之對晤屢展炎涼聽言觀行名實相守精厲晨昏計時分業虔虔不懈專思法務言無名利行絶虛浮曲識機緣善通物性不倨不諂行藏適時吐味幽深辨開疑議實季代之英賢乃佛宗之法將矣且其發蒙入法特異常倫聽覽經論用為恆任既周行東夏挹酌諸師披露肝膽盡其精義莫不傾倒林藪更新學府遂能不遠數萬咨求勝法誓捨形命必會為期發趾張掖途次龍沙中途艱險身心僅絶既達高昌倍光來價傳國祖送備閲靈儀路出鐵門石門躬乘沙嶺雪嶺歷天險而志逾慷慨遭凶賊而神彌厲勇兼以歸稟正教師承戒賢理遂言揚義非再授廣開異論包藏胸臆致使梵侶傾心不匱其法又以起信一論文出馬鳴彼土諸僧思承其本奘乃譯唐為梵通布五天斯則法化之緣東西互舉又西華餘論深尚聲明奘乃卑心請決隨授隨曉致有七變其勢動發異蹤三循廣論恢張懷抱故得施無厭寺三千學僧皆號智囊護持城塹及覩其脣吻聽其詞義皆彈指讚歎何斯人也隨其遊歷塞外海東百三十國道俗邪正承其名者莫不仰德歸依更崇開信可以家國增榮光宅惟遠獻奉歲至咸奘之功若非天挺英靈生知聖授何能振斯鴻緒導達遺蹤前後僧傳往天竺者首自法顯法勇終于道邃道生相繼中途一十七返取其通言華梵妙達文筌揚導國風開悟邪正莫高於奘矣恨其經部不翻猶涉過半年未遲暮足得出之無常奄及惜哉那提三藏唐曰福生具依梵言則云布如烏代邪以言煩多故此但訛略而云那提也本中印度人少出家名師開悟志氣雄遠弘道為懷歷遊諸國務在開物而善達聲明通諸詁訓大夏召為文士擬此土蘭臺著作者性泛愛好奇尚聞有涉悟不憚遠夷曾往執師子國又東南上楞伽山南海諸國隨緣達化善解書語至即敷演度人立寺所在揚扇承脂那東國盛轉大乘佛法崇盛贍洲稱最乃搜集大小乘經律論五百餘夾合一千五百餘部以永徽六年創達京師有敕令於慈恩安置所司供給時玄奘法師當途翻譯聲華騰蔚無由克彰掩抑蕭條般若是難既不蒙引返充給使顯慶元年敕往崑崙諸國採取異藥既至南海諸王歸敬為別立寺度人授法弘化之廣又倍於前以昔被敕往理須返命慈恩梵本擬重尋研龍朔三年還返舊寺所齎諸經並為奘將北出意欲翻度莫有依憑惟譯八曼荼羅禮佛法阿吒那智等三經要約精最可常行學其年南海真臘國為那提素所化者奉敬無己思見其人合國宗師假途遠請乃云國有好藥唯提識之請自採取下敕聽往返亦未由余自博訪大夏行人云那提三藏乃龍樹之門人也所解無相與奘頗返西梵僧云大師隱後斯人第一深解實相善達方便小乘五部毗尼外道四韋陀論莫不洞達源底通明言義詞出珠聯理暢霞舉所著大乘集義論可有四十餘卷將事譯之被遣遂闕夫以抱麟之歎代有斯蹤知人難哉千齡罕遇那提挾道遠至投俾北冥既無所待乃三被毒載充南役崎嶇數萬頻歷瘴氣委命斯在嗚呼惜哉論曰觀夫翻譯之功誠遠大矣前録所載無德稱焉斯何故耶諒以言傳理詣惑遣道清有由寄也所以列代賢聖祖述弘導之風奉信賢明憲章翻譯之意宗師舊轍頗見詞人埏埴既圓稍功其趣至如梵文天語元開大夏之鄉鳥迹方韻出自神州之俗具如別傳曲盡規猷遂有僥幸時譽叨臨傳述逐轉鋪詞返音列喻繁略科斷比事擬倫語迹雖同校理誠異自非明逾前聖德邁往賢方能隱括殊方用通弘致道安著論五失易窺彥琮屬文八例難涉斯並古今通敘豈妄登臨若夫九代所傳見存簡録漢魏守本本固去華晉宋傳揚時開義舉文質恢恢諷味餘逸厥斯以降輕靡一期騰實未聞講悟蓋寡皆由詞逐情轉義寫情心共激波瀾永成通式充車溢藏法寶住持得在福流失在訛競故勇猛陳請詞同世華制本受行不惟文綺至聖殷鑒深有其由群籍所傳滅法故也即事可委況弘識乎然而習俗生常知過難改雖欲徙轍終陷前蹤粵自漢明終于唐運翻傳梵本多信譯人事語易明義求罕見厝情獨斷惟任筆功縱有覆疏還遵舊緒梵僧執葉相等情乖音語莫通是非俱濫至如三學盛典唯詮行旨八藏微言宗開詞義前翻後出靡墜風猷古哲今賢德殊恆律豈非方言重阻臆斷是授世轉澆波奄同浮俗昔聞淳風雅暢既在皇唐綺飾訛雜實鍾季葉不思本實妄接詞鋒競掇芻蕘鄭聲難偃原夫大覺希言絶世特立八音四辨演暢無垠安得凡懷虛參聖慮用為標擬誠非立言雖復樂説不窮隨類各解理開情外詞逸寰中固當斧藻標奇文高金玉方可聲通天樂韻過恆致近者晉宋顏謝之文世尚企而無比況乖於此安可言乎必踵斯蹤時俗變矣其中蕪亂安足涉言往者西涼法讖世號通人後秦童壽時稱僧傑善披文意妙顯經心會達言方風骨流便弘衍於世不虧傳述宋有開士慧嚴寶雲世係賢明勃興前作傳度廣部聯輝絶蹤將非面奉華胥親承詁訓得使聲流千載故其然哉餘則事義相傳足開神府寧得如瓶瀉水不妄叨流薄乳之喻復存今日終虧受誦足定澆淳世有奘公獨高聯類往還振動備盡觀方百有餘國君臣謁敬言議接對不待譯人披析幽旨華戎胥悅故唐朝後譯不屑古人執本陳勘頻開前失既闕今乖未遑釐正輒略陳此夫復何言義解篇初本傳十二附見一十九梁楊都安樂寺沙門釋法申傳一道達慧命梁楊都建元寺沙門釋僧韶傳二法朗法亮梁楊都建元寺沙門釋法護傳三智遠僧達梁鍾山宋熙寺沙門釋智欣傳四梁吳郡虎丘山沙門釋僧若傳五僧令法度慧梵慧朗梁楊都宣武寺沙門釋法寵傳六智果僧淑梁楊都靈根寺沙門釋僧遷傳七梁楊都莊嚴寺沙門釋僧旻傳八道超梁楊都光宅寺沙門釋法雲傳九梁南海隨喜寺沙門釋慧澄傳十慧朗慧略法生慧武梁鍾山上定林寺沙門釋法令傳十一慧泰慧纂梁鍾山開善寺沙門釋智藏傳十二釋法申本姓呂任城人也祖世寓居青州申幼出家夙懷儒素廣學經論妙思獨遠彌歷年祀規空畫有日夜惆悵隱士平原明曇聊嘲之曰三陽在節明辰淑景何不飲美酒賦新詩而終日竟歲瞪視四壁百年俄頃知得成儒素以不答曰蓋是平生鄙好何論得失頃之而大明成論譽美州鄉值宋太始之初莊嚴寺法集敕請度江住安樂寺纍當師匠道俗欽賞建元之中遭本親遠喪道途回岨有礙北歸因爾屏絶人事杜塞講説逮齊竟陵王蕭子良永明之中請二十法師弘宣講授苦相徵屈辭不獲免當斯之盛無與友者兼又淳厚仁慧不出厲言安間守素不狎人世以天監二年卒春秋七十有四時復有道達慧命並以勤學顯名達姓裴河東聞喜人住廣陵永福精舍少以孝行知名拯濟危險道閏江濆永明中為南兗州僧正在職廉潔雅有治才罷任之日唯有紙故五束慧命廣陵人住安樂寺開濟篤素專以成實見知釋僧韶姓王齊國高安人幼願拔俗弱年從志斂服道俗恭敬師宗美姿制善舉止情性溫和韻調清雅好弘經數名顯州壤專以毗曇擅業元徽之初始來皇邑住建元寺寬厚間淡不妄交遊宋季澆薄體裁無準物競目前榮枯俄頃韶間房自守狀若無人及齊氏開泰禮教夙被白黑鑽仰講説頻仍後學知宗前修改觀毗曇一部化流海內咨聽之徒常有百數齊文惠及竟陵王蕭子良雅相欽禮清河崔慧親從北面咨承餘誨以天監三年卒于住寺春秋五十有八時建元又有法朗兼以慧學知名本姓沈氏吳興武康人家遭世禍因住建業大明七年與兄法亮被敕紹繼慧益出家初住藥王寺亮履行高潔經數修明朗稟性疏率不事威儀聲轉有聞義解傳譽集注涅槃勒成部帙而言謔調笑不擇交遊高人勝己見必齒録並卒于天監中釋法護姓張東平人初以廉直居性不耐貪叨年始十三而善於草隸其師道雍亦有清風撫其首曰觀汝意氣必能振發遺法及至受戒仍遭父憂居喪房內經涉四載不預法事禮畢羸瘠不堪隨衆宋孝建中來都遊觀住建元寺雅好博古多講經論常以毗曇命家弗尚流俗言去浮華不求適會趣通文理從其學者百有餘人齊竟陵王總校玄釋定其虛實仍於法雲寺建竪義齋以護為標領解釋膠結每無遺滯物益懷之遠有曠度不交榮俗凡所遊往必皆名輩齊侍中陳留阮韜光祿阮晦中書侍郎汝南周顒並虛心禮待未嘗廢也自從天子至于侯伯不與一人遊狎皎然獨坐勗勵門徒無營苟利惟以經數仁義存懷以天監六年卒于住所春秋六十有九時新安寺智遠天保寺僧達並以勤學有功遠幼懷清靜守志不競講説大乘好修福務達平和開拓頗自矜尚釋智欣姓潘丹陽建康人也稚而聰警稟懷變躁率爾形儀過無修整年七八歲世間近事經耳不忘曾入栖靜寺正值上講聞十二因緣義云生死輪轉無有窮已便慨然有離俗之志他日即就栖靜僧審禪師求出家焉篤好博學多集近事師訓之曰觀汝神明人非率爾所可習學皆非奧遠何耶答曰欲廣其節目耳及具足後從東安寺道猛聽成實論四遍雖周未曾注記結帙而反亭然獨悟莫與為群不交當世無因得參其門者也及至講説文義精悉四衆推服聽者八百餘人陳心序事貴在可解不務才華有異流俗客問未申酬答已罷皆美其豐贍名重四海齊永明末太子數幸東田携諸內侍亟經住寺欣因謝病鍾山居宋熙寺確然自得不與富貴遊往行不苟合交不委親嚫施之物構改住寺以天鑑五年卒春秋六十一葬于山墓釋僧若莊嚴寺僧璩之兄子也璩以律行清嚴見之前傳若少而廉靜邑里推之十五出家住虎丘東山精舍事師恭孝與人友善性好勤學出都住治城寺二十餘年經數通達道俗器賞太常卿吳郡陸惠曉左氏尚書陸澄深相待接年三十二志絶風塵末東返虎丘栖身幽室簡出人世披文玩古自足雲霞雖復茹菜不充單復不贍隨宜任運罕復經懷琅瑘王斌守吳每延法集還都謂知己曰在郡賴得若公言謔大忘衰老見其比歲放生為業仁逮蟲魚愛及飛走講説雖疏津梁不絶何必滅迹巖岫方謂為道但出處不失其機彌覺其德高也天監八年敕為彼郡僧正親當元師猶肆意山內故失匡救之美致有貪慢之謗未必加諸己要亦有貶暮齡以普通元年卒春秋七十復有僧令者若之兄也亦以碩學知名少而俊警長益廉退經律通明不永早世復有法度者住定林寺沈審其性言不卒暴先行而後從焉時莊嚴寺又有慧梵慧朗並以內外通博期標聲譽梵本吳氏剡人剛決強斷不事形名朗肌貌霜潔時人目為白朗屢講衆經頗入能例釋法寵姓馮氏南陽冠軍人後遭世難寓居海鹽少有絶俗之志二親愛而弗許執志固請乃曰須待為汝婚竟隨意所欲十八納妻經始半年捨家服道住光興寺成辦法式習學威儀其後出都住興皇寺又從道猛曇濟學成實論二公雅相歎賞日夜辛勤不以寒暑動意吳郡張融與周顒書曰古人遺放故留兒女法寵法師絶塵如棄唾若斯之志大矣遠矣又從長樂寺僧周學通雜心及法勝毗曇又從莊嚴曇斌歷聽衆經探玄析奧妙盡深極高難所指罕不倒戈音吐蘊藉風神秀舉齊竟陵王子良甚加禮遇嘗於西邸義集選諸名學事委治城智秀而競者尤多秀謂寵曰當此應對卿何如我答曰先悅後拒我不及卿詮名定賞卿不及我秀有慚色年三十八正勝寺法願道人善通樊許之術謂寵曰君年滿四十當死無可避處唯有祈誠諸佛懺悔先愆跳脫或可冀耳寵因引鏡驗之見面有黑氣於是貨賣衣鉢資餘併市香供飛舟東逝直至海鹽居在光興閉房禮懺杜絶人物晝忘食息夜不解衣迄年四十歲暮之夕忽覺兩耳腫痛彌生怖懅其夜懺禮已達四更聞戶外有人言曰君死業已盡遽即開戶都無所見明晨借問僉言黑氣都除兩耳乃是生骨斯實懺蕩之基功不虛也末又從東夏慧基聽其講導言論往復旬日之間文疑理滯反啓其志又鼓棹西歸住道林寺開宇臨澗敞軒映水解帙尋經每自惆悵而不能已及東昏在位多請遊於北山因而移寓天保寺天監七年齊隆寺法鏡徂歿僧正惠超啓寵鎮之敕曰法寵法師造次舉動不逾律儀不俠性欲不事形勢慈仁愷悌雅有君子之風匡政寺廟信得其人矣上每義集以禮致之略其年臘敕常居坐首不呼其名號為上座法師請為家僧敕施車牛人力衣服飲食四時不絶寺本陜小帝為宣武王修福下敕王人繕改張飾以待寵焉因立名為宣武寺也門徒敦厚常百許人普通四年忽感風疾不能執捉舒經格上晝夜不休赴諸法事坐輿講説未疾禮佛常以百拜為限後不能起居猶於床上依時百過俯仰虔敬所懺所願與本無異後疾甚中使參候相望於道以普通五年三月十六日卒春秋七十四皇上傷悼道俗悲戀敕葬定林寺墓一切凶事天府供給舍人主書監視訖事復有沙門智果管氏吳人住海鹽光興寺清直平簡善諸經術又剡縣公車寺沙門僧淑捃採衆師並為己任隨問隨答思慮周廣雖有徵核而未盡其要妙釋僧遷姓樂氏襄陽杜人幼出家進忠退儉早協州鄉晚遊都邑住靈根寺却掃一房淨若仙觀潔整衣服塵水不染從靈味寺寶亮咨學經論文理通達籍甚知名性方稜不撓高自崇遇若非意得罕所賓接武帝以家僧引之吳平侯蕭昺亦遇之以禮天監十六年夏帝嘗夜見沙門慧詡他日因計法會遷問詡曰御前夜何所道詡曰卿何忽問此而言氣甚厲遷抗聲曰我與卿同出西州俱為沙門卿一時邀逢天接便欲陵駕儕黨我惟事佛視卿輩蔑如也衆人滿坐詡有慚忒其為梗正皆類此也以普通四年卒春秋五十九矣釋僧旻姓孫氏家于吳郡之富春有吳開國大皇帝其先也幼孤養能言而樂道七歲出家住虎丘西山寺為僧回弟子從回受五經一聞能記精神洞出標群獨秀每與同輩言謔及諸典禮未嘗不慨慨然欲為己任宋吏部郎吳郡張辨謂之曰沙彌何姓家在何處旻曰貧道姓釋家于此山辨甚異之特進張緒見而歎曰松柏雖小已有陵雲之氣由是顯譽年十三隨回出都住白馬寺寺僧多以轉讀唱導為業旻風韻清遠了不厝意年十六而回亡哀容俯仰率由自至喪禮畢移住莊嚴師仰曇景景久居寺任雅有風軌大小和從寺給僧足旻安貧好學與同寺法雲禪岡法開稟學柔次達亮四公經論夕則合帔而臥晝則假衣而行往返咨詢不避炎雪其精力篤課如此大明數論究統經律原始要終望表知裏內鑒諸己旁啓同志前疑往結靡不氷泮雖命世碩學有是非之辨旻居中振發曾無擁滯光緒既著風猷弘遠齊文惠帝竟陵王子良深相貴敬請遺連接尚書令王儉延請僧宗講涅槃經旻扣問聯環言皆摧敵儉曰昔竺道生入長安姚興於逍遙園見之使難道融義往復百翻言無不切衆皆覩其風神服其英秀今此旻法師超悟天體性極照窮言必典詣能使前無橫陳便是過之遠矣文宣嘗請柔次二法師於普弘寺共講成實大致通勝冠蓋成陰旻於末席論議詞旨清新致言宏邈往復神應聽者傾屬次公乃放麈尾而歎曰老子受業於彭城精思此之五聚有十五番以為難窟每恨不逢勍敵必欲研盡自至金陵纍年始見竭於今日矣且試思之晚講當答及晚上講裁復數交詞義遂擁次公動容顧四坐曰後生可畏斯言信矣年二十六永明十年始於興福寺講成實論先輩法師高視當世排競下筵其會如市山栖邑寺莫不掩扉畢集衣冠士子四衢輻湊坐皆重膝不謂為迮言雖竟日無起疲倦皆仰之如日月矣希風慕德者不遠萬里相造自晉宋相承凡論議者多高談大語競相誇罩及旻為師範稜落秀上機變如神言氣典正座無洪聲之侶重又性多謙讓未常以理勝加人處衆澄眸如入禪定其為道俗所推如此時人稱曰折剖磐隱通古無例條貫始終受者易悟庶方蕩諸異論大同正法矣於是名振日下聽衆千餘孜孜善誘曾無告倦晉安太守彭城劉業嘗謂旻曰法師經論通博何以立義多儒答曰宋世貴道生開頓悟以通經齊時重僧柔影毗曇以講論貧道謹依經文文玄則玄文儒則儒耳時竟陵王世子蕭照胄出守會稽要旻共往征虜別之旻曰吾止講席相識未嘗修詣承其得郡便狼狽遠別意所不欲衆因是亦止永元元年敕僧局請三十僧入華林園夏講僧正擬旻為法主旻止之或曰何故答曰此乃內潤法師不能外益學士非謂講者由是譽傳遐邇名動京師琅瑘王仲寶吳人張思光學冠當時清貞獨絶並投分請交申以縞帶年立之後頻事開解蔚為宗匠九部五時若指諸掌玄理伏難坦然夷易故緇素結轍華俗邀延往復屯萃矣時有令聞夙成負先來之風耆年素望懷新舊之恥設伏者比肩翹關者間出旻隨方領會弘量有餘皆銜璧輿櫬響然風靡者一人而已值齊曆橫流道屬昏詖時寵小人世嫉君子因避地徐部仍受請入吳法輪繼轉勝幢屢建皆隨根獲潤有聲南北皇梁膺運乃翻然自遠言從帝則以天監五年遊于都輦天子禮接下筵亟深眷悅敕僧正慧超銜詔至房欲屈與法寵法雲汝南周捨等時入華林園講論道義自茲已後優位日隆六年制注般若經以通大訓朝貴皆思弘厥典又請京邑五大法師於五寺首講以旻道居其右乃眷帝情深見悅可因請為家僧四事供給又敕於慧輪殿講勝鬘經帝自臨聽仍選才學道俗釋僧智僧晃臨川王記室東莞劉協等三十人同集上定林寺抄一切經論以類相從凡八十卷皆令取衷於旻十一年春忽感風疾後雖小間心猶忘誤言語遲蹇旻曰自登座講説已二十年如見此病例無平復講事盡矣乃修飾房內隔立道場日夜禮懺後吳郡太守張充吳興太守謝覽各遣僚佐至都表上延請有敕給船仗資糧發遣二郡迎候舟楫滿川京師學士雲隨霧合中途守宰莫不郊迎晉陵太守蔡樽出侯門迎之歎曰昔仲尼素王於周今旻公又素王於梁矣天監末年下敕於莊嚴寺建八座法輪講者五僧以年臘相次旻最處後衆徒彌盛莊嚴講堂宋世祖所立欒櫨增映延袤遐遠至於是日不容聽衆執事啓聞有敕聽停講五日悉移窗戶四出簷霤又進給床五十張猶為迫迮桄桯摧折日有十數得人之盛皆此類焉旻因捨什物嚫施擬立大堂慮未周用付庫生長傳付後僧又於簡靜寺講十地經堂宇先有五間慮有迫迮又於堂前權起五間合而為一及至就講寺內悉滿斯感化之來殆非意矣少與齊人張融謝眺友善天下才學通人莫不致禮雖居重名不嘉榮勢間處一室簡通豪右衆人多恨之唯吳郡陸倕博學自居名位通顯早崇禮敬旻亦密相器重時為太子中庶儐從到房旻稱疾不見倕欣然曰此誠弟子所望也人皆推倕之愛名德也彌重旻之不趣於世暨普通之後先疾連發彌懷退靜夜還虎丘人無知者時蕭昂出守吳興欲過山展禮山主智遷先知以告旻旻曰吾山藪病人無事見貴二千石昔戴顒隱居北嶺宋江夏王入山詣之高臥牖下不與相見吾雖德薄請附戴公之事矣及蕭至旻從後門而遁其年皇太子遣通事舍人何思澄銜命致禮贈以几杖爐奩褥席麈尾拂扇等五年下敕延還移住開善使所在備禮發遣不得循常以稽天望於路增劇未堪止寺權停莊嚴因遂彌留以至大漸良醫上藥備于寺內中使參候相望馳道以大通八年二月一日清旦卒于寺房春秋六十一天子悲惜儲君嗟惋敕以其月六日窆於鍾山之開善墓所喪事大小隨由備辦隱士陳留阮孝緒為著墓志弟子智學慧慶等建立三碑其二碑皇太子湘東王並為製文樹于墓側徵士何胤著文立於本寺初旻嘗樂於禪默乃依所立義試遍安心旬日之間遂得入定問諸禪師皆云門戶雖殊造寂不異又嘗於講日謂衆曰昔彌天釋道安每講於定坐後常使都講等為含靈轉經三契此事久廢既是前修勝業欲屈大衆各誦觀世音經一遍於是合坐欣然遠近相習爾後道俗捨物乞講前誦經由此始也時有靈根寺道超比丘勤學自勵願明解如旻夢有人言僧旻法師毗婆尸佛已能講説君始修習云何可等但自加功不患不達隨分得解後大領悟旻嘗造彌勒佛并諸供具朝夕禮謁乃夢見彌勒佛遣化菩薩送菩提樹與之菩薩曰菩提樹者梁言道場樹也弟子頗宣其言旻聞而勗之曰禮有六夢正夢唯一乃是好惡之先徵故周立占夢之官後代廢之正以俗人澆薄亟多假託吾前所夢乃心想耳汝勿傳之以莊嚴寺門及諸牆宇古製不工又吳虎丘山西寺朽壞日久並加繕改事盡弘麗旻所造經像全不封附須者便給放生布施未嘗倦廢弟子咨曰和上所修功德誠多未始建大齋會恐福事未圓旻曰大齋乃有一時發起之益吾寡乏人力難得盡理又且米菜醬酢樵水湯灰踐踰澆炙信傷害微蟲豈有數量慮有此事故不敢為也始復求寄王官官府有勢之家使役雖多彌難盡意近識觀之藉此開悟智者窺人有求名之誚要請法俗侵星早到若不專至有乖素心若現斯言猶涉譏笑故吾不為也旻美言笑善舉止吐納膏油自生顧眄風飈滿室凡所施為不為名利勤注教勗形於言晤先人後己常若不及常有餘師言弟子不恭者旻呼與相見為設飲食方便誘喻遂成善士生無左道卜筮不妄同惑凡人又不假託奇怪以誑近識貴人君子皆景慕焉營居負販者亦望風而畏敬聞其名者偽夫正鄙夫立所著論疏雜集四聲指歸詩譜決疑等百有餘卷流世釋法雲姓周氏義興陽羡人晉平西將軍處之七世也母吳氏初産在草見雲氣滿室因以名之七歲出家更名法雲從師住莊嚴寺為僧成玄趣寶亮弟子而俊朗英秀卓絶時世年十三始就受業大昌僧宗莊嚴僧達甚相稱讚寶亮每曰我之神明殊不及也方將必當棟梁大法矣齊永明中僧柔東歸於道林寺發講雲咨決纍日詞旨激揚衆所歎異年小坐遠聲聞難敘命置小床處之於前共盡往復由是顯名與同寺僧旻等年臘齊名譽歷採衆師且經且論四時遊聽寒暑不輟或講前講末初夜後夜覆述文義間隙遊習於路思義輒不自覺行過所造其勤勵專至類皆如此曾觀長樂寺法調講論出而顧曰震旦天子之都衣冠之富動靜威儀勿易為也前後法師或有詞無義或有義無詞或俱有詞義而過無威儀今日法坐俱已闕矣皆由習學不優未應講也及年登三十建武四年夏初於妙音寺開法華淨名二經序正條源群分名類學徒海湊四衆盈堂僉謂理因言盡紙卷空存及至為賓構擊縱橫比類紛鯁機辨若疾風應變如行雨當其鋒者罕不心務賓主咨嗟朋僚胥悅時人呼為作幻法師矣講經之妙獨步當時齊中書周顒琅瑘王融彭城劉繪東莞徐孝嗣等一代名貴並投莫逆之交孝嗣每日見雲公俊發自顧缺然而性靈誠孝勞於色養及居母憂毀瘠過禮纍日不食殆不勝喪僧旻謂曰聖人制禮賢者俯就不賢者企及且毀不滅性尚出儒宗況佛有至言欲報生恩近則時奉顏儀使物生悅遠則啓發菩提以道神識又云恩愛重賊不可寬放寬放此者及所親愛墮於惡道唯有智者以方便力善能治制則惠兼存沒入諸善趣矣宜思遠理使有成津何可恣情同於細近耶雲乃割裂哀情微進飲粥永元元年曾受毗陵郡請道俗傾家異端必集弘振風猷道被京城鼓舞知歸巾褐識反及梁氏高臨甚相欽禮天監二年敕使長召出入諸殿影響弘通之端囋揚利益之漸皇高亟延義集未曾不敕令雲先入後下詔令時諸名德各撰成實義疏雲乃經論合撰有四十科為四十二卷俄尋究了又敕於寺三遍敷講廣請義學充諸堂宇敕給傳詔車牛吏力皆備足焉至七年制注大品朝貴請雲講之辭疾不赴帝云弟子既當今日之位法師是後來名德流通無寄不可不自力為講也因從之尋又下詔禮為家僧資給優厚敕為光宅寺主創立僧制雅為後則皇太子留情內外選請十僧入於玄圃經於兩夏不止講經而亦懸談文外雲居上首偏加供施自從王侯逮于榮貴莫不欽敬至於吉凶慶弔不避寒暑時人頗謂之遊俠而動必弘法不以此言關懷中書郎順陽范軫著神滅論群僚未詳其理先以奏聞有敕令雲答之以宣示臣下雲乃遍與朝士書論之文采雖異而理義倫通又與少傅沈約書曰主上令答神滅論今遣相呈夫神妙寂寥可知而不可説義經丘而未曉理涉旦而猶昏至人凝照有本襲道赴機垂審臣下旨訓周密孝享之祀既彰桀懷曾史之慕三世之言復闡紂綴波崙之情預非草木誰不歔欷同挹風猷共加弘贊也約答曰神本不滅深所伏膺神滅之談良用駭惕近約法師殿內亦蒙敕答一本歡受頂戴尋覽忘疲豈徒伏斯外道可以永離衆魔孔釋兼弘於是乎在實不刊之弘旨百代之舟航弟子亦即彼論微厝疑核比展具以呈也雲以天監末年欲報施主之恩於秣陵縣同下里中造寺一所敕以法師建造可仍以法師為名即禪岡之西山也郊郭內地實為爽塏結宇孤巖北面城市懷澗隱嶺窮人野之致終日論談曾無休廢天監將末扶南國獻經三部敕雲譯之詳決梁梵皆理明意顯狀若親承帝抄諸方等經撰受菩薩法構等覺道場請草堂寺慧約法師以為智者躬受大戒以自莊嚴自茲厥後王侯朝士法俗傾都或有年臘過於智者皆望風奄附啓受戒法雲曰戒終是一先已同稟今重受者誠非所異有若趣時於是固執帝纍勸獎每加説喻答曰當先發願若得相應然後從受雲欲發起中表菩提之心捨己身外嚫施之物通啓於華林園光華殿設千僧大會分此諸物為五種功德上帝隨喜警梵從時鏘金候旭百和𭾍氳衆妓繁會觀者傾城莫不稱歎普通六年敕為大僧正於同泰寺設千僧會廣集諸寺知事及學行名僧羯磨拜授置位羽儀衆皆見所未聞得未曾有爾後雖遘疾時序而講説無廢及於扶接登座弊劇乃止至御幸同泰開大涅槃敕許乘輿上殿憑几聽講及遭父憂由是疾篤至于大漸以大通三年三月二十七日初夜卒于住房春秋六十有三二宮悲惜為之流慟敕給東園祕器凡百喪事皆從王府下敕令葬定林寺側太子中庶琅瑘王筠為作銘志弟子周長胤等有猶子之慕創造二碑立于墓所湘東王蕭繹各為製文初雲年在息慈雅尚經術於妙法華研精纍思品酌理義始末照覽乃往幽巖獨講斯典竪石為人松葉為拂自唱自導兼通難解所以垂名梁代誠績有聞而文疏稠疊前後繁映致依講誦有阻恆功嘗於一寺講散此經忽感天華狀如飛雪滿空而下延于堂內升空不墜訖講方去有保志神僧道超方外罕有得其情者與雲互相敬愛呼為大林法師每來雲所輒停住信宿嘗言欲解師子吼請法師為説即為剖析志便彈指讚曰善哉微妙微妙矣儀同陳郡袁昂云有常供養僧學雲法華日夜發願望得慧解等之忽夢有異僧曰雲法師燈明佛時已講此經那可卒敵也每於講次有送錢物乞誦經者多獲徵應及得善夢如別記述夷陵縣漁人於網中得經一卷是泥洹四法品末題云宋元徽二年王寶勝敬造奉光宅寺法雲法師以事勘校時雲年始十歲名未遠布寺無光宅而此品正則初云弘法次斷魚肉驗今意行頗用相符其有機神變化人莫敢競其類者雲得此告彌深弘演云爾釋慧澄姓蘭氏番禺高要人十四出家依和上道達住隨喜寺而在性貞苦立素齋戒魚肉葷辛畢世未視當齊氏之季百工輟業澄閉戶禮誦不修聞達天監初建開闡學校白黑樂求皆得其志澄深懷願望以日為歲世始廓清南路猶梗負笈踟蹰欲前未進親舊諫曰何不就饒聚糧貨待路好通為爾栖栖橫生憂苦澄曰榮華賄貨此何見關日月如電時不待人耳於是間行寄託遂至京室憩莊嚴寺仍從僧旻以伸北面勤苦下帷專攻一事且經且律或數或論十餘年中鉤深索隱猶晦迹下筵而名聞日遠桂陽王蕭象聞風欽悅延請入第頂禮歸依求屈講説親自餐服遂使遠近投集聞者斐然後桂陽出鎮南嶽請與同行瀟湘道俗重增歸敬法席繼興善誘忘倦澄以違親歲久誓暫定省而番禺四衆向風欽德迎請重疊年年轉倍以普通四年隨使南返中途危阻素情無憚食值飢客合盤施之船人更辦不肯復受又見單薄解衣賑之及至南海復停隨喜七衆屯結其會如林讚請法施頻仍纍迹理喻精微淺深無隱新舊學望如草偃焉於斯五載法利無限未及旋都遇疾而卒春秋五十有二即大通元年也時復有慧朗慧略法生慧武等皆從僧旻受學雖復廣綜諸部並以成實擅名朗居貧好學博達多通久當師匠巧於傳述略聰明俊警宣講有則品別支條分籍甚有嘉譽生尋訪異聞博述經論銓次祕奧物益奇之武振揚文義省約不繁宣流未廣蘭摧中葉年三十餘卒釋法令姓董氏未詳何人家遭世禍因寓建康少出家住定林上寺立操貞堅廉和寡欲博覽經論多所通達善涅槃大小品尤精法華阿毗曇心登師子座發無畏辨先標綱要却派條流言約旨遠馳名京學兼好禪寂以息攀緣但多疹瘵亟為廢替自責先身執相分別起諸違害今受殃咎因誦大品一部用祛封滯清淨調和隨從梵行足不下山三十三載葷辛不食弊衣畢世以天監五年卒春秋六十有九時寺復有慧泰慧纂並以學聞泰剋己修身篤勤禪智偏能談授纂心性清率不務形骸貞實抱素雅有國士之器釋智藏姓顧氏本名淨藏吳郡吳人吳少傅曜之八世也高祖彭年司農卿曾祖淳錢唐令祖瑤之員外郎父映奉朝請早亡其母嘗夢出繞吳城一匝密雲四布而天中開朗衆星墜地取而吞之因而有娠焉及生藏也少而聰敏常懷退讓果食衣服爰及威儀皆新華先讓而處下末由此擊譽鄉閭敬而尚重年十六代宋明帝出家以泰初六年敕住興皇寺事師上定林寺僧遠僧祐天安寺弘宗此諸名德傳如前述藏稟依訓範敬義弘隆嘗遇師疾甚不食多日藏亦從之待師進飲藏還進飲乃至平復方從師好自是戒德堅明學業通奧衆所知識超於夷等當時柔次二公玄宗蓋世初從受學挹酌經論統辨精理及其開關延敵莫能涉其津者藏洞曉若神微言每吐預有比蹤罔不折伏於是二僧歎揖自以弗及之也齊太尉文憲王公深懷欽悅爰請安居常歎相知之晚太宰文宣王建立正典紹隆釋教將講淨名選窮上首乃招集精解二十餘僧探授符策乃得於藏年臘最小獨居末坐敷述義理罔或抗衡道俗翕然彌崇高譽先是會稽慎法師志欲宣通妙法乃請文宣方求講匠以藏名稱普聞允當僉屬遂流連會稽多歷年祀伏膺鼓篋實繁有徒但以律部未精重遊京輦信同瓶喻有似燈傳俄而十誦明了諸部薄究未還吳郡道流生地學人裹糧隨之不少永元二年重遊禹穴居法華山結衆弘業及齊德將謝王室大騷天地既閉經籍道廢遂翻然高舉欲終焉禹穴逮有梁革命大弘正法皇華繼至方遊京輦天子下禮承修榮貴莫不竦敬聖僧寶志遷神窀穸于鍾阜於墓前建塔寺名開善敕藏居之初藏未受具戒遇志於定林上寺遂推令居前垂示崇敬之迹識知德望有歸告之先見矣時梁武崇信釋門宮闕恣其遊踐主者以負扆南面域中一人議以御坐之法唯天子所升沙門一不霑預藏聞之勃然厲色即入金門上正殿踞法座抗聲曰貧道昔為吳中顧郎尚不慚御榻況復乃祖定光金輪釋子也檀越若殺貧道即殺不慮無受生之處若付在尚方獄中不妨行道即拂衣而起帝遂罷敕任從前法斯跨略天子高岸釋門皆此類也有墅姥者工相人也為記吉凶百不失一謂藏曰法師聰辨蓋世天下流名但恨年命不長可至三十一矣時年二十有九聞斯促報講解頓息竭精修道發大誓願足不出門遂探經藏得金剛般若受持讀誦畢命奉之至所厄暮年香湯洗浴淨室誦經以待死至俄而聞空中聲曰善男子汝往年三十一者是報盡期由般若經力得倍壽矣藏後出山試過前相者乃大驚起曰何因尚在世也前見短壽之相今了一無沙門誠不可相矣藏問今得至幾答云色相骨法年六十餘藏曰五十為命已不為夭況復過也乃以由緣告之相者欣服竟以畢年辭世終如相言於是江左道俗競誦此經多有徵應乃至于今日有光大感通屢結逮梁大同中敬重三寶利動昏心澆波之儔肆情下達僧正憲網無施於過門帝欲自御僧官維任法侶敕主書遍令許者署名于時盛哲無敢抗者匿然投筆後以疏聞藏藏以筆橫轢之告曰佛法大海非俗人所知帝覽之不以介意斯亦拒懷略萬乘季代一人而帝意彌盛事將施行於世雖藏後未同而敕已先被晚於華光殿設會衆僧大集後藏方至帝曰比見僧尼多未誦習白衣僧正不解科條俗法治之傷於過重弟子暇日欲自為白衣僧正亦依律立法此雖是法師之事然佛亦復付囑國王向來與諸僧共論咸言不異法師意旨如何藏曰陛下欲自臨僧事實光顯正法但僧尼多不如律所願垂慈矜恕此事為後帝曰弟子此意豈欲苦衆僧耶正謂俗愚過重自可依律定之法師乃令矜恕此意何在答曰陛下誠欲降重從輕但末代衆僧難皆如律故敢乞矜恕帝曰請問諸僧犯罪佛法應治之不答曰竊以佛理深遠教有出沒意謂亦治不治帝曰惟見付囑國王治之何處有不治之説答曰調達親是其事如來置之不治帝曰法師意謂調達何人答曰調達乃誠不可測夫示迹正欲顯教若不可不治聖人何容示此若一向治之則衆僧不立一向不治亦復不立帝動容追停前敕諸僧震懼相率啓請帝曰藏法師是大丈夫心謂是則道是言非則道非致詞宏大不以形命相纍諸法師非大丈夫意實不同言則不異弟子向與藏法師碩諍而諸法師默然無見助者豈非意在不同耳事遂獲寢藏出告諸徒屬曰國王欲以佛法為己任乃是大士用心然衣冠一家子弟十數未必稱意況復衆僧五方混雜未易辨明正須去其甚泰耳且如來戒律布在世間若能遵用足相綱理僧正非但無益為損弘多常欲勸令罷之豈容贊成此事或曰理極如此當萬乘之怒何能夷然藏笑曰此實可畏但吾年老縱復荷旨附會終不長生然死本所不惜故安之耳後法雲謂衆曰帝於義理之中未能相謝一日之事真可愧服不久敕於彭城寺講成實聽侶千餘皆一時翹秀學觀榮之又敕於慧輪殿講波若經別敕大德三十人預座藏開釋發趣各有清拔皆著私記擬後傳習天監末年春捨身大懺招集道俗并自講金剛般若以為極悔惟留衣鉢餘者傾盡一無遺餘陳郡謝幾卿指挂衣竹戲曰猶留此物尚有意耶藏曰身猶未滅意何由盡而尚懷靖處託意山林還居開善因不履世時或敕會乃上啓辭曰夙昔顧省心惑不調欲依佛一語於空間自制而從緣流二十餘載在乎少壯故可推斥今既老病身心俱減若復退一毫便不堪自課故願言靜處少自營衛非敢傲世求名非欲從間自誕是常人近情懼前徑之已迫耳帝手敕喻曰求空自間依空入慧高蹈養神實是勝樂不違三乘亦以隨喜惟別之際能無悵然岐路贈言古人所重猶勸法師行無礙心大悲為首方便利益隨時用舍不宜頓杜以隔礙心行菩薩道無有是處敕往反頻仍久之然持操不改帝將受菩薩戒敕僧正牒老宿德望時超正略牒法深慧約智藏三人而帝意在於智者仍取之矣皇太子尤相敬接將致北面之禮肅恭虔往朱輪徐動鳴笳啓路降尊下禮就而謁之從遵戒範永為師傅又請於寺講大涅槃親臨幄坐爰命咨質朝賢時彥道俗盈堂法筵之盛未之前聞又於北閣更延談論皆歎曰陪預勝席未曾有也藏任吹虛舟真行平等毀譽不動榮利未干宴坐空間毅然山立雖神宇凝隔風韻清高其應物也汲汲然如有不足可謂望儼即溫君子之變者矣自現處巖岫晦形人世又於寺外山曲別立頭陀之舍六所並是茅茨容膝而已皇太子聞而遊覽各賦詩而返其後章云非曰樂逸遊意欲識箕潁藏結心世表常行懺悔每於六時翹仰靈相口云理味深玄淺思斟酌自抱疑礙恐乖聖意多僻因而懇惻詞淚俱發嘗宿靈曜寺夜行暫用心見有金光照曜一室洞明人問其故答曰此中奇妙未可得言是旦遘疾至于大漸帝及儲君中使相望四部白黑日夜參候敕為建齊手製願文并繼以醫藥而天子不整唯增不降臨終詞色詳正遺言唯在弘法以普通三年九月十日卒于寺房春秋六十有五敕葬獨龍之山赴送盈道同為建碑墳所寺內各一新安太守蕭機製文湘東王繹製銘太子中庶子陳郡殷鈞為立墓志初藏常夢見金粟如來入室共談執二麈尾其一寶裝其一者素留素者與藏又徵士廬江何胤居吳郡虎丘遇一神僧捉一函書云有人來寄語頃失之及開函視全不識其文詞後訪魏僧云是大莊嚴論中間兩紙也時人咸謂藏之所致又彭城劉混之罪當從戮藏時處後堂為帝述四等義外奏聞之帝曰今為國事不得道四等義如何藏曰言行乘機也今機發而不中失在何人四等之舉義非徒設帝遂捨而不問竟以獲免劉氏終亦不委斯由其潛濟益被率多如此凡講大小品涅槃般若法華十地金光明成實百論阿毗曇心等各著義疏行世
