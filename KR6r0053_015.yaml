body:
  text: 大唐西明寺沙門釋道宣撰義解篇十一正紀十五附見四唐越州靜林寺釋法敏傳一唐襄州光福寺釋慧傳二唐襄州神足寺釋慧眺傳三唐綿州隆寂寺釋靈睿傳四唐京師弘福寺釋僧辨傳五唐京師普光寺釋法常傳六唐澤州清化寺釋智徽傳七唐澤州清化寺釋玄鑒傳八唐京師弘福寺釋玄會傳九唐京師慈悲寺釋行等傳十唐蒲州仁壽寺釋志寬傳十一唐相州慈潤寺釋慧休傳十二曇元靈範唐京師弘福寺釋靈潤傳十三淨元智衍唐京師慈恩寺釋道洪傳十四唐京師慈恩寺釋義褒傳十五釋法敏姓孫氏丹陽人也八歲出家事英禪師為弟子入茅山聽明法師三論明即興皇之遺屬也初朗公將化通召門人言在後事令自舉處皆不衷意以所舉者並門學有聲言令自屬朗曰如吾所舉乃明公乎徒侶將千名明非一皆曰義旨所擬未知何者明耶朗曰吾坐之東柱下明也明居此席不移八載口無談述身無妄涉衆目癡明既有此告莫不回惑私議法師他力扶矣朗曰吾舉明公必駭衆意法教無私不容瑕隱命就法座對衆敘之明性謙退泣涕固讓朗曰明公來吾意決矣為靜衆口聊舉其致命少年捧就傳座告曰大衆聽今問論中十科深義初未曾言而明已解可一一敘之既敘之後大衆愜伏皆慚謝於輕蔑矣即日辭朗領門人入茅山終身不出常弘此論故興皇之宗或舉山門之致者是也敏採摘精理出聽東安言同意異更張部別年二十三又聽高麗實公講大乘經論躬為南坐結軫三周及實亡後高麗印師上蜀講論法席雕散陳氏亡國敏乃反俗三年潛隱還襲染衣避難入越住餘姚梁安寺領十沙彌講法華三論相續不絶貞觀元年出還丹陽講華嚴涅槃二年越州田都督追還一音寺相續法輪于時衆集義學沙門七十餘州八百餘人當境僧千二百人尼衆三百士俗之集不可復紀時為法慶之嘉會也至十九年會稽士俗請往靜林講華嚴經至六月末正講有蛇懸半身在敏頂上長七尺許作黃金色吐五色光終講方隱至夏訖還一音寺夜有赤衣二人禮敏曰法師講四部大經功德難量須往他方教化故從東方來迎法師弟子數十人同見此相至八月十七日爾前三日三夜無故暗冥恰至二十三日將逝忽放大光夜明如日地為震動因爾遷化春秋六十有七身長七尺六寸停喪七日異香不滅莫不怪歎道俗莊嚴送於隆安之山焉釋慧姓董氏少出家在襄州周滅法後南往陳朝入茅山聽明師三論又入栖霞聽懸布法師四論大品涅槃等晚於安州大林寺聽圓法師釋論凡所遊刃並契幽極又返鄉梓住光福寺會亂入城盧總管等請在官舍講華嚴經僧徒擁聚千五百人既屬賊圍各懷翹敬不久退散深惟法力唐運斯泰又住龍泉三論大經鎮常弘闡兼達莊老史子談笑動人公私榮達參問繁結蔣紀諸王互臨襄部躬申敬奉坐鎮如初王出門顧曰迎送不行佛法之望也由此聲譽又逸漢南貞觀二十三年講涅槃經四月八日夜山神告曰法師疾作房宇不久當生西方至七月十四日講盂蘭盆經竟斂手曰生常信施今須通散一毫以上捨入十方衆僧及窮獨乞人并諸異道言已而終於法座矣春秋七十有九惟立性虛靜不言人非賓客相投欣若朋友面常含笑慈育在懷涉獵玄儒通冠文釆襄荊士素咸傾仰之聞其長往無不墮淚初住光福寺居山頂引汲為勞將移他寺夜見神人身長一丈衣以紫袍頂禮曰奉請住此常講大乘勿以小乘為慮其小乘者亦如高山無水不能利人大乘經者猶如大海自止此山多佛出世一人讀誦講說大乘能令所住珍寶光明眷屬榮勝飲食豐饒若有小乘前事並失惟願弘持勿孤所望法師須水此易得耳來月八日定當得之自往劍南慈母山大泉請一龍王去也言已不見恰至來期七日初夜大風卒起從西南來雷震雨注在寺北漢高廟下佛堂後百步許通夜相續至明方住惟見清泉香而且美合衆同幸及亡龍泉漸便乾竭據斯以言亦感通之奇致矣釋慧眺姓莊氏少出家以小乘為業遊學齊徐青海諸州數論之精馳譽江漢開皇末年還住鄉壤之報善寺承象王哲公在下龍泉講開三論心生不忍曰三論明空講者著空當發言訖舌出三尺鼻眼兩耳並皆流血七日不語有汰律師聞其撥略大乘舌即挺出告曰汝大癡也一言毀經罪過五逆可信大乘方可免耳乃令燒香發願懺悔前言舌還收入便輿往哲所誓心斂迹惟聽大乘哲之云亡為設大齊於墓又建七處八會廣請道俗百日既滿即往香山神足寺足不踰閫常習大乘每勸諸村年別四時講華嚴等經用陳懺謝常於衆中顯陳前失獨處一房常坐常念貞觀十一年四月三日在寺後松林坐禪見有三人形貌都雅赤服禮拜請受菩薩戒訖白曰禪師大利根若不改心信大乘者千佛出世猶在地獄聞此重囑涕泗交流大哭還寺在講者房前宛轉嗚咽不能得言以水灑醒乃更大哭繞佛懺悔用此為恆又勸化士俗造華嚴大品法華維摩思益佛藏三論等各一百部至十三年三月九日中時佛前禮懺因此而終春秋八十餘矣自終七日林樹變白大泉渾濁過此方復斯亦知過能改無過者同誠可嘉矣寺去城邑將五十里從受歸戒者七千餘人填赴山河為建大齊於墓所三十法師各開一經用津靈造釋靈睿姓陳本惟穎川流寓蜀部益昌之陳鄉人也祖宗信於李氏其母以二月八日道觀設齊因乞有子還家夢見在松林下坐有七寶鉢於樹顛飛來入口便覺有娠即不喜五辛諸味及其誕已設或食者母子頭痛於是遂斷八歲二親將至道士所令誦步虛詞便面孔血出遂不得誦還家入田遇見智勝法師便曰家門奉道自欲奉佛隨師出家即將往益州勝業寺為沙彌一夏之中大品暗通開皇之始高麗印公入蜀講三論又為印之弟子常業大乘後隨入京流聽諸法大業之末又返蜀部住法聚寺武德二年安州皓公上蜀在大建昌寺講開大乘睿止法延三年後還蜀本住常弘此部經二年許寺有異學成實朋流嫌此空論常破吾心將興害意睿在房中北壁而止初夜還床栖遑不定身毛自竪移往南床坐至三更忽聞北壁外有物撞度達於臥處就而看之乃漆竹笴槊長二丈許向若在床身即穿度既害不果又以銀挺雇賊入房睿坐案邊覓終不獲但有一領甲在常坐處睿知相害之為惡也即移貫還綿州益昌之隆寂寺身相黑短止長五尺言令所及通悟為先常講大乘以為正業貞觀元年通州騫禪師作檀越盡形供給三百聽衆至七年八月二十五日夜睿夢有衣冠者來迎騫往西方去徒衆鉢中皆空無物至三十日寺鍾大小七口銅磬十餘一時皆鳴至三更據繩床加坐而終睿自此後周流講唱傳化不絶至二十年八月二十一日四更大風忽起高聲言曰靈睿法師來年十月往南海大國光明山西阿觀世音菩薩所受生也至期十月三日合寺長幼道俗見幡華菩薩滿寺而下晚講入房看疏讀經外有僧告幡花異香充寺及房睿聞捉經出看斂容立終堅持不倒扶臥房中三更忽起加坐如生刺史以下躬手付香供養其尸道俗相送歸東度山設大會八千人時年八十三矣然其潔清童稚過中不飲葷辛莫履具盡報云釋僧辨俗姓張南陽人也渚宮陷沒入關住於馮翊焉年甫七歲日誦千言時以奇之聲于鄉壤十歲欣仰道法思欲出家局以公憲未蒙剃落乃聽維摩仁王二經文義俱收升座覆述宣吐教理有稱於時先學大德相顧曰吾等沒後不足憂也此人出家紹隆遺法矣開皇初年敕遣蘇威簡取三千人用充度限辨年幼小最在末行輕其行業召令口誦言詞清囀章句契斷神明朗正見者屬目由是大蒙嗟賞餘並不試同得出家受具已後專尋經論時有智凝法師學望京華德隆嶽表辨從問知津乃經纍載承席覆述允合同倫遂使旁疏異解曲有正量識者僉悟擊其大節大業初歲召入大禪定道場衆復屯之欣其開解武德之始步出關東蒲虞陝虢大弘法化四遠馳造倍勝初聞嘗處芮城將開攝論露縵而聽李釋同奔序王將了黃巾致問酬答乃竟終誦前關辨曰正法自明邪風致翳雖重廣誦不異前通黃巾高問轉增愚叟謂其義壯忽旋風勃起徑趣李宗縵倒掩抑身首煩擾冠幘交橫衣髮紊亂風至僧倫怗然自滅大衆笑異其相一時便散明旦入文𧹞然莫集辨雖乘此勝而言色不改時共服其度也貞觀翻經被徵證義弘福寺立又召居之雖屢處以英華而情不存得喪約時講說不替寒溫異學名賓皆欣預席故使海之內外僧雜華夷不遠萬里承風參謁俱舍一論振古未開道嶽法師命章搆釋辨正講論廢而聽之隨聞出鈔三百餘紙或聞初開法肆或中途少間但有法坐無論勝負咸預位席橫經而聽斯渴法之深良未儔矣而謙讓知足不重榮勢名滿天下公卿咸委而不識其形也皆來覓之辨如常威儀不變其節任其來去曾無迎送時儕倫諸德以此懷尚而不能行也以貞觀十六年六月十三日卒於弘福寺春秋七十有五于時炎曦赫盛停尸二旬而相等生存形色不變迄至于葬日亦不腐朽于時亢旱積久埃塵涱天明當將送夜降微雨故得幢蓋引列俱得升濟七衆導從不疲形苦殯於郊西龍首之原鑿土為龕處之于內門通行路道俗同觀至今四年鮮明如在自辨置懷慈濟愛法為功路見貧苦不簡人畜皆盡其身命濟其危厄講聽之務惟其恆習其攝論中邊唯識思塵佛性無論並具出章疏在世流布釋法常俗姓張氏南陽白水人也高祖隆仕魏因移于河北郡焉少踐儒林頗知梗概而厭其喧雜情欣出家奉戒自守不群非類霜懷標舉為衆所推年十九投曇延法師登蒙剃落既預聽限大闡宏猷學不逾歲即講涅槃道俗聽者咸奇理趣自爾專親侍奉曉夕咨謀每擊幽致延欣其情理深當乃摩頂曰觀子所涉必住持正法矣於即研精覃思無釋寸陰時年二十二攝論初興隨聞新法仰其弘義于時論門初闢師學多途封守舊章鮮能回覺常乃博聽衆鋒校其銛鋭秦齊趙魏靡不周行時積五年鑽核名理至於成實毗曇華嚴地論博考同異皆為軌轍末旋踵上京慨茲異敘隨講出疏示顯群迷隋齊王暕召結時望盛演釋經登預法座敷陳至理詞義弘遠罕得其門僉共美之嘉歎成俗遂有胥徒歸湊相續依承四時講解以為恆任大業之始榮唱轉高爰下敕旨入大禪定相尋講肆成濟極多唐運初興遐邇清晏四遠投造增倍於前每席傳燈播揚非一貞觀之譯證義所資下敕徵召恆知翻任後造普光宏壯華敞又召居之衣服供給四時隨改又下敕令為皇儲受菩薩戒禮敬之極衆所傾心貞觀九年又奉敕召入為皇后戒師因即敕補兼知空觀寺上座撫接客舊妙識物心弘導法化長鎮不絶前後預聽者數千東蕃西鄙難可勝述及學成返國皆為法匠傳通正教于今轉盛新羅王子金慈藏輕忽貴位棄俗出家遠聞虔仰思覩言令遂架山航海遠造京師乃於船中夢矚顏色及覩形狀宛若夢中悲涕交流欣其會遇因從受菩薩戒盡禮事焉十四年有僧犯過下敕普責京寺大德綱維因集於玄武門召常上殿論及僧過常曰僧等蒙荷恩惠得預法門不能躬奉教網致有上聞天聽特由常等寡於訓誨恥愧難陳遂引涅槃付屬之旨上然之因宥大理獄囚百有餘人又延設供食訖而退及李道居先不勝此位率僧邀駕隨頓表上既不蒙遂因染餘疾的無痛所右脅而終于住寺春秋七十有九即貞觀十九年六月二十六日也至七月二日葬於南郊高陽之原時炎景陵天遊塵翳日逮至發引之前夜降微雨及於明旦天地清朗雲霧四除纖塵不飛道路無擁京寺僧侶門人子弟等各建修幢三十餘車前後威儀四十餘里信心士女執素幡花列侍左右乃盈數萬卿相儐從僉以榮之初常涉詣義門妙崇行解故衆所推美歸於攝論而志之所尚慕涅槃恆欲披講未之欣悟遂依衆請專弘此論陶冶理味精貫胸懷依時赴講全無讀誦才有餘暇課業行道六時自勵片無違缺有大神王冠服皆素率其部從隨其旋繞道俗時見密以高之又曾宵夜至佛堂中壁畫樂天一時起舞後於中夜又在佛堂觀音菩薩從外入戶上住空中身相瓌奇佩服瓔珞晃發希有良久便滅後經五年天將欲曙又感普賢菩薩從東而來去地五六丈許常之專精徵應為如此也故立志清峻逾久逾劇所獲法利多造經像但務奇妙不言其價歲建檀會終盡京師悲敬兩田無遮供養自所服用麁弊而已講揚別供一不受之還布衆中持操無改著攝論義疏八卷玄章五卷涅槃維摩勝鬘等各垂疏記廣行於世弟子德遜等為立碑于普光之門宗正卿李百藥為文釋智徽俗姓焦澤州高平人也年十三志樂出家不希世纍住本州清化寺依隨遠法師聽涉經論於大涅槃偏洞幽極故齒年學稔為諸沙彌之卓秀者也立性勤恪樂理僧務每有執役不憚形苦晝供養僧夜讀章疏衣不解帶研精無怠受具已後神思高正戒行明潔然平恕儉約見者欽屬歆慕弘道歲常講涅槃十地地持維摩勝鬘用為恆業聲務廣被遠近追風提襆裹糧尋造非一隋煬御曆珍敬彌隆大業七年下詔延請入於東都內道場禮異恆倫日增榮供徽立操自昔一不受之盈尺之貯不附箱囊率性超然不妄傾涅但專講誦宣導為先僞鄭之初洛城恆閉徽以兵戈方始開悟未因乃杖錫出城思濟鄉壤于時守衛嚴防梗澀難通而徽安行限閾守當不覺斯固善神之所送也既達高平道俗欣赴世接屯難飢餒相委乃遺以糧粒拯濟實多皂素賴之皆餐法味便即四時長講屢有升堂外施衣帛悉供講衆頻值儉歲米食不豐異客暴來兩倍過舊徽以聽侶不安為營別院四方學士同萃其中財法兩施無時寧舍懷州都督鄖國公張亮欽抱德教遠延講說道俗屯赴又結河陽乃請為菩薩戒師珍敬道風誓為善友夏講涅槃解恣便訖覺少不悆衆咸怪之還房靜念俄頃便逝春秋七十九即貞觀十二年三月二十日也懷州道俗哀若至親送葬歸于本邑自徽之在遠門也敬法尊人誠孝第一每登法席講析幽通皆云大法師意如此因即聲淚俱下常謂諸徒曰父母生吾肉身法師生吾法身思報此恩何由可逮惟有弘教利物薄展余懷耳所以每歲常講不敢告勞以惟斯故也兼以課己行業無虧六時手執熏爐約數承禮夜不解衣一生恆爾清素寡欲不樂交遊敷化之餘便營僧事故澤部長幼詠仰于今釋玄鑒俗姓焦澤州高平人也天性仁慈志樂清潔酒肉葷辛自然厭離十九發心投誠釋種愛重松林終日庇其下忘遺食息後住清化寺依止遠公聽採經論於大涅槃深得其趣隋運末齡賊徒交亂佛寺僧坊並隨灰燼衆侶分散顛仆溝鑒守心戒禁曾無愆犯食唯蔬菜衣則蘊麻屢經歲序情無嚬蹙及至年穀豐熟還返故鄉招集緇素崇建法席勸諸信識但故伽藍皆得營復有故塔廟並令塗掃遂使合境莊嚴赫然榮麗奉信歸向十室其九兼以正性敦直言行相高行值飲噉非法無不面諫訶毀極言過狀不避強禦或與語不受者便碎之酒器不酬其費故諸俗士聚集宴飲聞鑒來至並即奔散由是七衆尊虔敬其嚴厲重其清貞數有繕造工匠繁多豪族之人或遺酒食鑒云吾今所營必令如法乍可不造理無飲酒遂即止之時清化寺修營佛殿合境民庶同共崇建澤州官長長孫義素頗奉信聞役工匠其數甚衆乃送酒兩輿以致之鑒時檢校營造見有此事又破酒器狼籍地上告云吾之功德乍可不成終不用此非法物也義聞大怒明欲加惱夜夢有人以刀臨之既忽驚寤即事歸懺又遇疫氣死亡非一皆投心乞命鑒為之懺悔令斷酒肉病者痊復時大重之有鄉人李遷者性偏嗜酒既遇時氣無由自濟遂悔酒過用為死調俄爾鑒至無何便去遷遂除差因爾厭離飲酒永不涉言縱忽聞氣如逢毒勢告其友曰自見鑒師已來尚不喜聞況當見也故戒節冥感皆此之類于今神志貞亮每講涅槃十地維摩四時不輟春秋八十有三初鑒以傳法之務職司其憂衆侶乖儀則糾彈驅擯時俗僉訝其梗直也及武德六年當部濩澤縣李録事者死經七日隱身謂妻曰吾是李録事也計吾猶得六年在世但為司命枉來取我生埋冢中已訴閻王蒙放在人中浮遊六年今在鬼道未然之事皆預知也卿家貧窘但為他卜無不必中因可獲財以利大小便爾賣卜鬼為通疑方遠皆詣謂為大聖後謂妻曰人命無常何不修福可往鑒師所聽法遂相將入講堂中安置壁角以物自障共人言議應變迅速乃經晦朔或有問者何不現形耶答曰今在鬼趣受身極陋自不忍見況復他也又往景業寺聽維摩經有餘法師謂曰今講此經感何人聽答曰自人頭已上便是鬼神上及諸天重級充滿然都講唱文諸天神等皆斂容傾耳恐其聲絶法師解釋皆散亂縱恣無心聽受願如法講說勿妄飲噉也何以知然見天神等聞法師酒氣皆回面而聽因即悔過令廢飲之鬼曰此定須斷天神不許寧不講也非惟此會獨感諸天但有法事無不來降不可輕矣鑒聞異寺有此聲告倍復信奉兢兢異常釋玄會字懷默俗姓席氏其先豳土安定人也遠祖因官故又居京兆樊川之祕坂焉年十二精苦絶倫欣志捐俗而儀相秀挺有異神童隋漢王諒見而奇之奏度出家仍住海覺寺為總法師弟子自落采之後即預講席專志涅槃勤至之功倫等推尚總深會之解也舉為覆述所以槃節拘致由來擁慮者皆剖決通釋泠然可見時大賞之以為涅槃之後胤也因爾改前舊章更新戶牖穿鑿之功難與讎抗造涅槃義章四卷義源文本時文釋抄部各四卷自延遠輟斤之後作者祖述前言惟會一人獨稱孤拔武德之始學觀大張沙門曇獻道開國望造慈悲寺奏會以為寺主經始惟新法務連續引接後昆講揚此部將四十遍于時同侶同業相推元席而讓以成治雅為學宗性慕人法不濫尊嚴但有法座皆通咨聽縱己舊聞傾如新渴斯敬重之極末象罕遇也總法師曰吾非聖人何得此子入吾室乎相法師曰經云後五百歲有福智者此子謂乎法之大將豈不然乎嶽法師曰此公就我學俱舍者同事攝也願以妙莊嚴世值善知識矣振法師曰此公就我學迦延者乃贊成吾學耳以我小術不恥下問乃回龍象於兔徑也吾何言哉貞觀八年又敕住弘福寺講事都廢專修定業夢登佛手號無量壽遂造彌陀像一座常擬繫心作身同觀欲入山林寺衆勸住請講涅槃至藤蛇喻忽有異蛇從栿而下顧視四方尋即不見講至諍論常有魔事因茲遘疾還返慈悲見佛來迎因而氣盡春秋五十有九即十四年五月二十七日也合邑聞知悲涼相及葬于高陽原晚又收其遺骸於故城西南隅起磚塔供養自會之弘道也溫柔在性弘贍為心遠近流寓投造非一而能推心接誘惟法是務晚又常坐乃終身世釋行等姓吉氏馮翊人十二出家與會公同事總師為弟子服章麁素立性鏗卓登聽淨影遠公涅槃伏讀文義時以榮之相從講說百一十遍中逢阻難必預先知或聞異香或感怪夢幢折蓋翻以為標據即令大衆同念般若所有魔事無何而退故每講後常禮佛名及讀華嚴以為消障之本也又與玄會同住慈悲弘法之時等必先登會隨後赴時以為相成之道也故常講時感雞伏聽從受戒者死而還活冥曹所放云傳等教斯亦駭動幽顯非言厝也以貞觀十六年三月六日因疾而終春秋七十有三初臨終纍日護戒之語吾何重及但少欲知足可為永誡吾今死後勿作威儀惟以一椽輿送山所願食吾身早成正覺有乖此願非吾門人弟子等營辦幢輿盛設威儀將欲塋送其夜列宿大明地方欲了大雨洪注道俗同擁一不得往還依遺訣單輿至山雨即通霽收葬于京南神和原起塔樹松立銘塔所釋志寬姓姚氏蒲州河東人也祖宗仕族不交群小父任隋青州刺史寬自幼及長清約知名歷聽諸經以涅槃地論為心要也東西訪道無釋寸陰業成登器遊講為務生常履信言行不乖望似專正而懷抱虛蕩嘗以遊學長安詣市買絹有人曰可見付直明當送絹於此便付直還寺為諸僧所笑寬曰自憶不負於人豈有人而乖信至期果獲以事陳之彼人云兵食可亡信不可廢弟子俗人奉之豈意釋門綴斯慮也寬常誦維摩及戒本所居住房每夜必有振動介胄之響竊而觀者咸見非常神人繞房而行又一時夜中房重閣上有打物聲同學寶通聞之驚迷不安其席寬就而慰之猶打物如故至旦看之乃舍梁將折即令拄之得免其命其為幽靈所衛如此而性好瞻病無憚遠近及以道俗知無人治者皆輿迎房中躬運經理或患腹癰不可膿出者乃口就𠲿之遂至於差往往非一其慈惠之懷信難繼也後於中夜室內大明及觀房外與晝無異乃自縫綻衣帛不謂神光所照後召諸徒方知半夜此相數現後遂不怪加以開務誘引弘濟為業道俗胥悅慶其幸遇屬煬帝弘道海內搜揚以寬行解同推膺斯榮命既處慧日講悟相仍會梟感作逆齊事拘纏寬便下獄待罪有來餉遺一不自資通給囚僧歡笑如昔後並配徒隸役於天路常令負土使裝滿籠盡力輦送初不懈息役僧曰此無監檢當可小停寬曰業報如此何能自欺違心行事誠未安耳未又配流西蜀行達陝州有送財帛祖餞之者並即散而不遺唯留一驢負經而已路次潼關流僧寶暹者高解碩德足破不進寬見臥于道側泣而哀焉即捨驢與乘自擔經論徒行至蜀雖有事勞而口不告倦其仁恕之性登苦知其人矣既達蜀境大發物情所在利安咸興敬悅時川邑虎暴行人斷路或數百為群經歷村郭傷損人畜中有獸王其頭最大五色純備威伏諸狩遂州都督張遜遠聞慈德遣人往迎寬乃令州縣立齊行道各受八戒當夕虎災銷散莫知所往時人感之奉為神聖然寬因名立行弘裕有儀凡所宣化如風之靡每至散席禮䞋相仍或至十萬二十萬者皆即坐散盡了無資己告施者曰財猶種子聚則難繁故為散之令從用有在耳其虛懷應物為若此也兼又輕生疏素弊服尋常一經御形動經纍稔愛護之甚有過身肉時逢儉歲躬煮糜粥親惠飢餒銜泣說化令誦佛名又以所服衣之與氈或割或減用充貧乏每年冬首預積坐氈履替觀諸沙門少者便給以此為常貞觀之初還反蒲壤緇素慶幸歡詠如雲屢建法筵重揚利涉時州部遇旱諸祈不遂官民素承嘉績乃同請焉寬為置壇場以身自誓不降雨者不處室房曝形兩日密雲垂布三日已後合境滂流民賴來蘇有年斯在昔在蜀土亦以此致譽故使遍洽時諺號為一代佛日有沙門神素者架業相鄰尤所欽友以先卒於栖巖寬住州寺先絶凶問忽降形歡敘欣若生平明晚來告乃知其死寬致書慰曰等同幻境俱稟泡形不意之情非復言象素法師俗風清美道器冲深包總義門研幾至實但正業久成必之淨土此方薄運頓失所歸老病之僧早應先去罪重福微猶守餘報耳法師不遺故舊昨二十五日夜降神共聚同臥一床通夕言議至曉方別情猶今昔事即存亡冥感之誠未可陳述素以貞觀十七年春二月二十四日卒素見別傳寬以其年夏五月十六日卒於仁壽寺春秋七十有八初未終之前右脅而臥枕於右臂告門徒曰生死長遠有待者皆爾汝等但自觀身如幻便無愛結自纏吾命亦斷當取椽兩根𥱿篨一領裹縛輿送無得隨俗紛紜為不益事也言訖而卒時蒲虞等州道俗奔赴號慟川野屯於壙側七里人滿自寬從釋種靜攝居形不臥全氈不畜匹絹匱篋之事由來絶心騎乘勞具終身不涉口不及利手不執錢或有忤之便掩口私默不行讚毀於人物也曾用錢一千五百買驢負經既至東京值卒科運大貴或頭至數萬者同侶欲為賣之寬不許曰已勞負荷豈復過本乎便詣市自出之但取元價此雖小事廉恥本矣釋慧休姓樂氏瀛州人也世居海濱以蠶漁為業而生知離惡深惟罪報常思出濟無緣拔足或纍歎通宵晨或忘餐近逾信宿雖憤氣填胸無免斯厄十六遇相州沙門巡里行化談三世之循擾述八苦之交侵雅會夙懷背世情決乃違親背俗投勗律師而出家焉勗導以義方禮逾天屬又聞靈裕法師震名西壤行解所歸現居鄴下命休從學休天機秀舉惟道居心乃背負華嚴遠遊京鄴一聞裕講鎣動身心不略昏明幽求體性而章句無昧至理未融展轉陶埏五十餘遍研諷文理轉加昏漠試以所解遍問諸師皆慮涉重關返啓其致乃悟曰斯固上聖之至理也豈下凡而抑度哉且搏聽衆師沐心法海耳乃往渤海從明彥法師聽成實論先出章抄品藻異同慧滿冲情解律法友以彥公化世受染餘流從志念法師受學小論加雜婆沙各聞數遍窮其本支曉其固執解既清逈行實貞嚴念曰余講小乘歲序多矣今乃值子諒不虛延休即著雜心玄章抄疏各區別部類條貫攸歸文教才出初尋重敬頻當元宰講授相續幽致既舉慧燭天懸故使馳名冀都擊響河渭抱帙橫經肩排日謁結疑懷籤踵接登堂皆總為書紳永開冥府故於立破諸教探隱洞明雖學冠空宗而梗情塵境欲通惟識之旨取悟無方會裕師入關因便預從遇曇遷禪師及尼論師等講揚攝論每舉一會餘駕停輪詞吐既新領拔彌悉周涉三遍即造疏章神會幽陳廣疏聽視自大小諸藏並統關鍵惟有律部未遑精閲昔以戒禁隨事可用緣求案讀即了未勞師授曾披一卷持犯茫然方悔先議更弘神府乃負律提瓶從洪律師聽採四分一經講肆三十餘遍日漸其致終未極言顧諸學徒曰余聽涉多矣至於經論一遍入神今遊律部逾增逾暗豈非理可虛求事難通會乎而敬慎三業懍課六時纖塵或阻即申懺洗目見大小講匠知名者多奉法自修實罕聯類嘗聽礪公講律礪曰法師大德暮年如何猶勤律部休曰余憶出家之始從虎口中來即奉投戒法豈以老朽而可斯須離耶恨吾不得常聞耳其清慎之高率此例也又屢經寇蕩荒荐相仍寺衆僧厨亟經宿觸故從隋末終至唐初四度翻穢獲資淨供致使四方嘉會休有功焉暨武德年內劉闥賊興魏相諸州並遭殘戮忽一日警急官民小大棄城逃隱休在雲門聞有斯事乃率學士二十餘人東赴相州了無人物便牢城自固四遠道俗承休城內方來歸附當斯時也人各藏身而休挺節存國守城引衆可謂亂世知人者矣其年不久天策陳兵遠臨賊境軍實無委並出當機休既處僧端預明利害集衆告曰官軍靜亂須有逢迎僧食衆物義當先送再和大衆並無從者休懼被後罰必可乘權獨詣軍門具陳來意于時曹公徐世績引勞賞悅仍令部從隨休至寺任付糧粒及平殄後曹公為奏具述休功登即下敕入賊諸州見有僧尼止留三十相州一境特宜依定以事驗人休量難准又荒亂之後律法不行並用銅盂身御俗服同諸流俗休恐法滅於事躬自經營立樣造壞依法施熏遂成好𭽽遍送受持今大行用並是休功緝遺緒也又僧庫火起時當中夜忽有人告走往觀之賴始發焰救而獲免退問告由了無知者良以道通幽顯屢動禎祥貞觀九年頻敕徵召令入京師並固辭以疾無預榮問至今十九年中春秋九十有八見住慈潤爽健如前四衆懷蒲柳之慕猶執卷咨謀乃力倦而告曰吾學功多矣每有經律雖聽二三十遍文旨乃鏡猶恨少功欲兼異部未遑多涉耳今之後學則不同之薄知文句宗致眇然即預師範更無通觀所以終夜長慨有耿于懷致有窮括教源莫知由序此法滅在人矣今暮年開道意在成器斯猶砥礪合其刃耳安能爐錘其朴耶所以引化席端直陳綱要而奉禁守道抑在天然挫拉形心逾衰逾篤衣服率然趣便蓋體襆懸壁上尺絹不居所得外利即回講衆補綻衣服不勞人助見著麻鞋經今三十餘年雖有斷壞綴而蹈涉暫有泥雨徒跣而行有問其故答云泥軟易履不損信施耳又寒不加火熱不依涼瓶水若凍裹之草束受具已來𭽽無他洗入夏已去不噉菜蔬旋繞往還執先掃存護物命寧有過之凡斯衆行前後一揆余以親展徽音奉茲景行猶恨標其大抵事略文繁以為輕約耳弟子曇元高潔僧也經論及律並曾披導偏重清行不妄衣食寺雖結淨猶懷塵點常乞食自資今託靜林慮寶山志道辭世門人靈範學通休涉慧悟少之敕召弘福時揚攝論今居宗樹業振名京邑又休以年學高遠今上重之因事遼左親幸其室敘故陳道彌會帝心故又續其績釋靈潤俗姓梁河東虞鄉人也家世衣冠鄉閭望族而風格弘毅統擬大方少踐清猷長承餘烈故能正行倫據不肅而成昆季十人秀美時譽中間三者齊慕出家父告子曰但誦觀音先度即當許也潤執卷便誦一坐不起從旦至中文言遂徹便預公度依止靈粲法師住興善寺粲有正行備于別傳年十三初聽涅槃妙通文旨將及志學銷會前聞括悟新理便登講座宣釋教意部分科宗英秀諸僧咸欣其德加又欽重行禁動靜惟安不妄遊從常資規矩所以興善大德海內名僧咸相顧而言曰此沙彌發蹤能爾堪住持矣於後深心至道通贍群師預在見聞包蘊神府當即斧藻人法圭璋解行皆統其本支該其成敗仁壽感瑞懷州造塔有敕令往官供驛乘隨師東赴乞食徒行獨無受給既達河內道俗服其精通敬其行範所有歸戒並從於潤當即名厲河北譽滿京師聞泰嶽靈巖寺僧德肅清四方是則乃杖策尋焉既覩副師遂從咨訓乃習般舟行定無替晨昏初經三七情事略疲自斯已後頓忘眠倦身心精勵遂經夏末于時同侶五百餘人各奉行之互相敦勵至於解坐同行無幾惟潤獨節秀出情事莫移皆不謀同詞敬稱徽績時父任青州益都令外祖吳超任懷州懷令堂祖吳同任齊州山荐令姨夫侯援任曹州金鄉令並潤之宗族內外親姻雖經還講肆遊其所部事逾行路一無過造及生緣背喪或有悲慕邀延者潤情若風傳不往登踐斯割愛從道皆此類也有道奘法師擅名海岱講攝大乘又往尋焉時未具戒早飛聲采周流法席文義圓通問難深微稱傳元宰預是同席心共揖之既承師有本即奉奘以為和上大戒已後方詣律司十地諸經略觀文體年二十三還返京室值志念法師正弘小論將欲博觀智海預在聽徒有辨相法師學兼大小聲聞于天攝論初興盛其麟角在淨影寺創演宗門造疏五卷即登敷述京華聽衆五百餘僧竪義之者數登二百潤初從關表創預講筵祖習異聞遂奮奇論一座驚異側目嘉之登有辨行法師機論難擬處衆高謝而敬憚焉雖則負譽帝京而神氣自得或譏毀達其耳者曾若不聞以道鎮心情無喜怒末法攸寄誠可嘉焉大業初歲風疾暴增後復本心更精新業又恐報傾旦夕不守本懷講導世流往還煩雜遂脫略人事厭俗歸間遂往南山之北西極澧鄠東漸玉山依寒林頭陀為業時與沙門空藏慧璡智信智光等京邑貞幹同修出離既處叢塜鬼神斯惱或被推蕩偃仆或揚聲震叫者潤獨體其空寂宴坐如空諸被嬈者皆來依附或於深林曠野狼虎行處試心安止都無有畏當遵此務盡報傳持屬大業末年不許僧出遂虧此行乃還興善託於西院獨靜資業一食入淨常講涅槃衆經有慧定禪師等歸依受業相率修課不出院宇經于三年結侶漸多行清動衆時僧粲法師一寺頂蓋鋭辨無前抗衡京國乃率諸翹望五十餘僧來至法會詳其神略人並投問玄隱之義潤領宗酬答位判泠然咸共欣賞妙符經旨爾後譽傳光價衆聚相從既懿業內傳將流法味大業十年被召入鴻臚教授三韓并在本寺翻新經本並宗轄有承不虧風采會隋氏亂倫道光難緝乃隱潛于藍田之化感寺首尾一十五載足不垂世離經專業衆請便講以示未聞春秋入定還遵靜操沙門志超抗節禪府聞風造展遂等宿交相師念定欣從語默時天步飢餒道俗同霑化感一寺獨延賓侶磨穀為飯菽麥等均晝夜策勤弘道為任故四方慕義歸者雲屯周贍精麁無乖僧法共餐菜果遂達有年斯誠至德冥符兼濟有日矣潤以化洽外流道聲載路興善本寺敬奉芳塵上陳敕使請充寺任便不守專志就而維之貞觀八年敕造弘福復被徵召即現翻譯證義須明衆所詳准又當斯任至於詞理有礙格言正之同倫糾位斯人最上京邑釋門實惟僧傑初潤隋末在興善院感魔相嬈定志不移冥致善神捉去經宿告曰昨日魔子依法嚴繩深知纍重自感而死若此徵應其量難紀武德七年時住化感寺主智信為人所告敕使圍寺大顯威權潤曰山居行道心不負物賢聖所知計非所告使人逾怒忽有大風雷震山崩樹折吹其巾帽坐席飄落異處人衆喪膽遂求悔過潤曰檀越有福能感幽靈斯之祥徵昔來未有使者深愧釋然事解貞觀年中與諸法侶登山遊觀野燒四合衆並奔散惟潤安行如常顧陟語諸屬曰心外無火火實自心謂火可逃無由免火及火至潤熸餘自斂據事以量知人難矣後住弘福有僧因事奉敕還俗復經恩蕩情願出家大德連名同舉得度上聞天聽下敕深責投諸南裔歡州行道于時諸僧創別帝里無非慟絶潤獨安然容儀自若顧曰三界往還由來恆理敕令修道何有悲泣拂衣東舉欣然而趣道俗聞見莫不歎服尋爾敕追洛東安置化行鄭魏負帙排筵弘闡涅槃十有餘遍奧義泉飛惠流河洛乃報京邑門人疏曰吾今東行略有三益一酬往譴二順厭生三成大行吾有宿纍蒙天慈責今得見酬則業纍轉滅惟加心悅何所憂也愚夫癡愛隨處興著正智不爾厭不重生夫淨穢兩境同號大空凡聖有情咸惟覺性覺空平等何所著也自度度人俱利之道舉人出家依道利物願在三有普濟四生常無退轉三益如是汝等宜知各調諍根業與善而住吾無慮矣僕射房玄齡遇之稱歎纍息曰大德樹言詞理俱至名實之副誠所望也不久敕追還住弘福居宗揚化涅槃正義惟此一人然其爰初入道奉節不虧持操攝儀魁質雄雅形器八尺動靜溫和挺超聯類十三離俗更不重臨二親既崩弟兄哀訴情守自若曾無動容但為修冥福設會千僧再度盡京施悲田食而已至於世情得喪浮艷雕華既不附心口亦無述時俗往還直知敘對皆絶供給隨言將遣前後所講涅槃七十餘遍攝大乘論三十餘遍并各造義疏一十三卷玄章三卷自餘維摩勝鬘起信論等隨緣便講各有疏部而玄義備通頗異恆執至如攝論黎耶義該真俗真即無念性淨諸位不改俗即不守一性通具諸義轉依已後真諦義邊即成法身俗諦義邊成應化體如未轉依作果報體據於真性無滅義矣俗諦自相有滅不滅以體從能染分義滅分能異體慮知不滅及資糧章中衆師並謂有三重觀無相無生及無性性也潤揣文尋旨無第三重也故論文上下惟有兩重捨得如文第一前七處捨外塵邪執得意言分別第八處內捨唯識想得真法界前觀無相捨外塵想後觀無生捨唯識想第二剎那即入初地故無第三筌約三性說三無性觀據遣執惟有兩重至如本識三相自相受熏依他性中說有總別三滅又四涅槃離合義異兩處三種熏習體無有別諸如此等有異諸師存廢之旨陳具章疏弟子淨元神睿卓越博要之舉振績京畿講釋經論亟經載紀銓辨名理響逸學門加以性愛林泉捐諸名利弊衣麁食談玄為本元以潤之立義建志尋求轉解傳風被于當世有僧法御道定人也夢見淨元兩手極大執印憑案若有所通寤以告之正披此義即因而遂廣乃成王路矣沙門智衍即潤之猶子也幼携入道勗以教宗承明詞義深有會擊講攝論涅槃近住藍田之法池寺統律成匠亟動時譽然有法以來師資傳道其宗罕接惟潤之緒繼美前修亞迹安遠斯塵難濟見於今日矣釋道洪姓尹氏河東人也父曜仕隋歷任江陵令有子五人洪其第三矣聰敏易悟深厭形有年在十三以開皇六年出家事京邑大德曇延法師博通內外馳譽門序雖廣流衆部偏以涅槃為業教之極也故敷演之所以師資傳道聲績逾遠近亦於法衆親喻覆述後於願法師所學窮地論傍通經數德器崇振及隋祖升遐禪定構立乃召處之自爾專事弘經周輪無輟貞觀伊始弘護道張凡寺綱維無非令達乃敕為律藏寺上座緝諧理事允副朝委立性清慤無競榮辱故使厚供殊禮鱗接邀延致令二宮樹福妙資搜舉物議所及莫不推先尋又下敕任大總持本居寺主春宮異供隨時薦及以追受戒之禮也貞觀十四年寶昌寺衆請講涅槃時感白雞隨人聽法集散馴狎終于講會相從傳授迄于暮齒凡講涅槃八十七遍依承宗旨罕墜彛倫及弘福譯經選充證義慈恩創起又敕徵臨以貞觀末年微覺輕貶才經一旬奄爾長逝春秋七十有九初染疾之始全無別痛少食不語用乖常候而數以手撝撥於空侍問其故答曰有二衣冠者數來禮拜故以止之又曰紅花淥池鮮榮可玩尋爾合掌目送於空曰大德羅睺羅來辭去也因爾潛逝殊香滿院洪形器端偉七尺有餘沈簡仁愛慈濟存沒喜慍莫顯操節不形傳者目其梗概要妙固多略耳釋義褒姓薛常州晉陵人蓋齊相孟嘗君之後吳名臣綜瑩之胤也天體高遠履性明朗出家已後遊談在務周流會計統御法筵初從蘇州永定寺小明法師稟學華嚴大品其即有陳興皇朗公之後嗣也專經強對亦當時之僧傑矣褒優柔教義屢啓請之談將事通覽辭往縉雲山婺州永安寺曠法師所曠在陳朝興皇盛集時當法選亟動神幾法主既崩遍流視聽長干禪衆栖霞布公並具式瞻親霑餘令所以四經三論江表高推褒敬竭義筵縱思披擇諸方後鋭將事別輪曠亦勸褒行傳燈禮乃從之傳經述論三十餘年光問五湖馳名三輔每以大乘至教元出渭陰中原播蕩乃興揚越嗟乎淳味不無流靡後住東陽金華法幢寺弘道不倦終日坐忘會慈恩申請搜揚髦彥京邑承風以事聞奏下敕徵延便符昔願即而入朝時翻經三藏玄奘法師盛處權衡當陽弘演承思遠問用寫繁蕪亦既至止共許幽致乃詰大乘經論無所不通唐朝後學多尚名體耽迷成性膠柱守株如何解網以開玄照請所學宗頓講十遍勒諸門位並往歸依時在慈恩創開宏旨有空雙遣藥病齊亡乃有負氣盱衡傲然亂舉褒為提紉解玦疏刷神㦗責以三開徵研五句詳括文義統略悟迷經難論易悼時俗之反昏論釋深經誨今聞之異昔所以每日在座前唱聖經半講已後方明賢論于時英彥皆預席端歎其竦拔之神奇伏其辨給之銛利宰輔冠蓋傾仰德音留連言晤寫送無絶顯慶三年冬雩祈雪候內設福場敕召入宮令與東明觀道士論義有道士李榮立本際義褒問曰既義標本際為道本於際為際本於道邪答曰互得又問道本於際際為道本亦可際本於道道為際原答亦通又並曰若使道將本際互得相反亦可自然與道互得相法答曰道法自然自然不法道又並若道法於自然自然不法道亦可道本於本際本際不本道榮既被難不能報浪嘲云既喚我為先生汝便成我弟子褒曰對聖言論申明邪正用簡帝心芻蕘嘲謔塵黷天聽雖然無言不酬聊以相答我為佛之弟子由以事佛為師汝既稱為先生即應先道而生汝則斯為道祖于時忸怩無對便下座又令褒竪義便立大智度義李徒雖難隨言即遣于時天子欣然內宮嗟賞李榮不勝其憤曰如此解義何須遠從吳來褒答曰三吳之地本出英賢橫目狗身舊無人物爾後諸寺連講多以法華淨名中百經論等以開時俗龍朔元年駕往東都別召追往頻入宮禁義論橫馳乃於淨土講解經論七衆載驅群公畢至英聲逾盛不久遘疾卒於淨土春秋五十有一道俗悲涼恨法門之早掩皇上悼傷久之遂敕送柩返金華山舊寺賻贈之榮光聞遠近論曰自佛教東傳年代惟遠條暢銓府開喻精靈可略言矣昔者漢明入夢滕蘭赴雒通悟道俗抑引邪正故使時俗一期翕然改觀非夫辨慧何以明哉然則教本通揚宗歸義舉談吐誠易識敏攸難不輕被錯授之儔淨名垂失機之責並為沈淪典誥以解齊緣藥病相翻斯迷斯覺況復教流千載情纏五濁控詞談理能無糾紛得在傳揚失於熏習晉有道安獨興論旨准的前聖商攉義方廣疏注述首開衢路遠持追蹤於遂古願睿振藻而傳芳故著序云安和上鑿荒塗以開轍標玄旨於性空削格義於既往啓神理於來世至如道生孤拔擅奇思於當年道林遠識標新理而改旦自斯厥後祖習餘風雖云較異蓋可知矣梁高端拱御曆膺奉護持天監初年捨邪歸正遊心佛理陶思幽微於重雲殿千僧講衆月建義筵法化通洽制五時論轉四方等注解涅槃情用未愜重申大品發明奧義當斯時也天下無事家國會昌風化所覃被于荒服鍾山帝里寶剎相臨都邑名寺七百餘所咨質文理往往而繁時有三大法師雲旻藏者方駕當途復稱僧傑挹酌成論齊騖先驅考定昔人非無臧否何以然耶至如講解傳授經教本宗摘文揣義情猶有失何得背本追末意言引用每日敷化但竪玄章不覩論文經于皓首如斯處位未曰紹隆若夫立文本宗誠遊義苑指月之況不爽先模隨文五失又開弘誡然則教為理依理隨教顯附教通理弘之在人准此承遵居然多惑寧乖此喻安得相符是使梁氏三師互指為謬審文紕亂可有致言義在情求情安倚伏其中縱達論宗肅成風素榮冠道俗行業相兼者則開善智藏抑其人乎餘則慧解是長儀範多雜非無十數翹楚遵修細行然定學攝心未聞於俗故略言也太宗簡文在昔東府委心妙法遍覽玄章志歸般若刺心血而書十部又撰法集聯璧各二百餘卷然以晚從窘縶故使釋侶無聞中宗孝元體悟幽鍵更崇深信法華成論常自敷揚沙門道侃德隆時彥業冠通賢綴述新奇帝偏鄭重奉為僧正盛開學府廣召義僧還遵舊轍戶牖為異宣明已下福事雖弘至於教理頗翳徽緒陳氏五政世屬虔劉京邑僧寺誅焚略盡及初臨統普備修治接棟連甍復基梁日弘福慧門世稱難紀名德勝行故是可傳雖獲五三蓋失多矣恨闕餘傳與時俱喪對此可悲至如琰𮍟騰光於五湖榮朗飛蓋於三楚二瓊以匡救而傳世兩等以護法而相嗣盛德弘矣逮于北鄴最稱光大移都茲始基構極繁而兼創道場殄絶魔網故使英俊林蒸業正雲會每法筵一建聽侶千餘慧光道憑躡跡通軌法融慧遠顧視爭衡然而開剖章途解散詞義並推光統以為言先豈非唱高和寡獨振今古即當鋒之領袖乃萬葉之師模然光初學律宗晚通理教郁郁兼美能振其芳觀其成樹骨梗分布毛目意存行猷護法為本所以華嚴地論咸位綱模被及當今成誦無墜蓋有由矣且夫佛教道東世稱弘播論其榮茂勿盛梁齊故武帝撫期師承護法戒定慧品莫匪陶甄受持十善無缺六時永絶辛羶長齊卒歲言行相檢誠可尊嚴自有帝王罕能相擬于時釋侶顧視思齊篤學翹誠多陳濟器齊宣受禪權用不思或出或處非小節之所量乍智乍愚信大人之壯觀至於宗敬佛理師承戒護每布髮於地令上統踐之又能率土之內禁斷酒肉放捨鷹犬畋漁屠殺普國不行年三月六勸民齊戒公私葷菜悉滅除之又置昭玄十統肅清正法使夫二百萬衆綏緝無塵法上一人誠有功矣周武定業秦川大開釋府沙門道安復稱弘量降禮宸極展敬華夷導龍樹之江河嚮彌天之輿蓋地維武服道寄文弘開蒙博施之功是其經略但以運屬道消中年毀廢雖陳顯論莫表深衷蚌病成珠竟于身世末有亡名復接斯咎坎壈貧病陷遭戎俗孝宣即位政異前朝經像漸開齊福稍起而厥化草創義學猶微隋高荷負在躬專弘佛教開皇伊始廣樹仁祠有僧行處皆為立寺召諸學徒普會京輦其中高第自為等級故二十五衆峙列帝城隨慕學方任其披化每日登殿坐列七僧轉讀衆經及開理義帝目覽萬機而耳餐正法于時釋門重稱高敞雖減梁齊亦後之寄沙門慧遠齊餘開士隋運高僧首達帝城即陳講議服勤請益七百餘人道化天下三分其二自餘明勝聯騼等驅僧粲以論士馳名慧藏以知微取號僧休洞精於大論法經妙體於教源餘則玼瑣群英抵訶龍象者復叵知矣其中尤最沙門曇延復是高傑至如坐鎮御床口敷聲教致令萬乘頂足其德弘矣煬帝嗣籙重飛聲實道莊顧言於內外法論禮御於始終相願光揚於兩都奘脫振藻於周魯厚德懷仁又難加也自爰初晉邸即位道場慧日法雲廣陳釋侶玉清金洞備引李宗一藝有稱三徵別館法輪長轉慧炬恆明風靡之化曇延復遠當時諸部雖復具揚而涅槃攝論最為繁富世近易照無勞廣顯及皇唐御曆道務是崇義學之明方為弘遠伊人之風豈易披述輒託攸聞故略其致然皓壁抗聲於金陵基景標宗於玉壘常辨弘揚於三輔深懿馳譽於兩河并晉則二達開模齊魯則密才程略閏會剖符日下敬其名教徽空位席嵩澤仰其義門本紀時或漏之其德不無光敘統明衆師注述通以章鈔為工課文引義仰順前軌徒盛改張差無弘誘或接綴前篇或糅雜時見或虛控胸臆詞理相非或旁竊他文意義蹇塞皆勒成命氏騰譽一時言行之間河漢遼阻本實邪求妄承傳教審夫意本焉可強乎且自經誥所被元在受持大集顯法行之文涅槃明知時之說今則婆娑章句流演澆浮翻種諸有未為靜業超生之教豈意然耶貴如說行斯誠旨也故今當坐講客寫送文義其隙復廣何以明耶且如聖行諸漏由來杜言惟識離念競陳橫想受學毗曇行惡戒者奉為聰慧聽習楞伽樂飲噉者用為通極夸罩蒙俗陵轢往賢眄視天漢率輕禁網謂邪慧為真解以亂識為圓智不深悛悟枉喪餘齡故使說法天禽被于念處盤特庸敻具列賢愚辨俊異之前生顯頑嚚之後報冷然釋相可不誡歟原夫論義之設其本四焉或擊揚以明其道幽旨由斯得開或影響以扇其風慧業由斯弘樹或抱疑以咨明決斯要正是當機或矜伐以冒時賢安詞以拔愚箭託緣乃四通在無嫌必事相陵還符畜狩故世中論士鮮會清柔初事含容終成陷黷名聞誰賞境界非凡徒盛拒輪畢歸磨臆故有王斌論並明琛蛇勢會空屋子宗統語工聽其論道惟聞殺死之言觀其容色但見紛披之相及後業之作也或生充蛇報或舌爛喉中或僧獄接其來生或猛火焚其往咎彥琮山樓之驗又可誡哉是知道寄人弘非人未可言道豈言義府並若斯耶故智藏遺塵慧光後嗣宗仰徽烈豈有玷耶沙門靈裕行解相高內外通贍亦當時之難偶也然而立性剛毅峭急不倫侍人流汗非可師範世或譏論以此為先斯亦不比德而觀也語俗而談滔滔風流愛心綿密未覿其短多容瑕纍見心機動禍福相鄰若不先知何成懲艾致使裕公虛沾此及若能返求諸己斯言自亡故宣尼流無備之詞居士設未輕之論誠有由矣世有慧休即承裕緒學雜心而懼陵小犯受師禮而親執瓶衣遭難而更立淨厨臨危而深誨禁約人法斯具慧解通微章疏所行誦為珠璧猶恨不係於先業餘則故略言也習禪初正傳二十三附見十五梁鍾山定林寺釋僧副傳一梁鍾山延賢寺釋慧勝傳二慧初梁江州廬山釋道珍傳三法歸慧景魏嵩嶽少林寺天竺僧佛陀傳四齊鄴下南天竺僧菩提達摩傳五道育齊鄴中釋僧可傳六向居士化公廖公和公法林僧那慧滿齊林慮山洪谷寺釋僧達傳七齊鄴西龍山雲門寺釋僧稠傳八後梁南雍州襄陽景空寺釋法聰傳九陳鍾山開善寺釋智遠傳十後梁荊州覆船山釋法常傳十一後梁荊州長沙寺釋法京傳十二後梁荊州玉泉山釋法懍傳十三後梁荊州支江禪慧寺釋惠成傳十四後梁荊州玉泉山釋法忍傳十五周京師大追遠寺釋僧實傳十六周京師天寶寺釋僧瑋傳十七周京師大福田寺釋曇相傳十八隋滄州蘭若沙門釋道正傳十九隋懷州柏尖山寺釋曇詢傳二十隋江州廬山化城寺釋法充傳二十一隋京師真寂寺釋信行傳二十二裴玄證隋襄州景空寺釋慧意傳二十三法永岑闍梨智曉釋僧副姓王氏太原祁縣人也弱而不弄鑒徹絶群年過小學識成景行鄉黨稱奇不仁者遠矣而性愛定靜遊無遠近裹糧尋師訪所不逮有達摩禪師善明觀行循擾巖穴言問深博遂從而出家義無再問一貫懷抱尋端極緒為定學宗焉後乃周歷講座備嘗經論並知學唯為己聖人無言齊建武年南遊楊輦止於鍾山定林下寺副美其林藪得栖心之勝壤也行逾氷霜言而有信三衣六物外無盈長應時入里道俗式瞻加以王侯請道頽然不作咫尺宮闈未嘗謁覲既行為物覽道俗攸屬梁高素仰清風雅為嗟貴乃命匠人考其室宇於開善寺以待之恐有山林之思故也副每逍遙於門負杖而歎曰環堵之室蓬戶甕牖匡坐其間尚足為樂寧貴廣廈而賤茅茨乎且安而能遷古人所尚何必滯此用賞耳目之好耶乃有心岷嶺觀彼峨眉會西昌侯蕭淵藻出鎮蜀部於即拂衣附之爰至井絡雖途經九折無忘三念又以少好經籍執卷緘默動移晨晷遂使庸蜀禪法自此大行久之還返金陵復住開善先是胡翼之山有神人現以慧印三昧授與野人何規曰可以此經與南平王觀為病行齊三七日也若不曉此法問之於副時以訪之果是其曾所行法南平遂行齊祀疾便康復豈非內因外構更相起豫不久卒於開善寺春秋六十有一即普通五年也窆於下定林之都門外天子哀焉下敕流贈初疾殛之時有勸修福者副力疾而起厲聲曰貨財延命去道遠矣房中什物並施招提僧身死之後但棄山谷飽於鳥獸不亦善乎勿營棺隴以乖我意門徒涕淚不忍從之將為勒碑旌德而永興公主素有歸信進啓東宮請著其文有令遣湘東王繹為之樹碑寺所釋慧勝交址人住仙洲山寺栖遁林澤間放物表誦法華日計一遍亟淹年序衣食節約隨身遊任從外國禪師達摩提婆學諸觀行一入寂定周晨乃起彭城劉繢出守南海聞風遣請携與同歸因住幽栖寺韜明祕采常示如愚久處者重之禪學者敬美幽栖寺中絶無食調唯資分衛大遵清儉永明五年移憩鍾山延賢精舍自少及老心貞正焉以天鑒年中卒春秋七十時淨名寺有慧初禪師者魏天水人在孕七月而生才有所識好習禪念嘗間居空宇不覺霆擊大震斯固住心深寂未可量也而志高清遠淡然物外晚遊梁國住興皇寺間房攝靜圭璋外映白黑咨訪有聲皇邑武帝為立禪房於淨名寺以處之四時資給禪學道俗雲趣請法素懷恢廓守志淳重貴勝王公曾不迎候普通五年卒春秋六十八葬鍾山之陰弟子智顒樹碑墓側御史中丞吳郡陸倕製文釋道珍未詳何人梁初住廬山中恆作彌陀業觀夢有人乘船處大海中云向阿彌陀國珍欲隨去船人云未作淨土業謂須經營浴室并誦阿彌陀經既覺即如夢所作年歲綿遠乃於房中小池降白銀臺時人不知獨記其事安經函底及命過時當夕半山已上如列數千炬火近村人見謂是諸王觀禮旦就山尋乃云珍卒方委冥祥外應也後因搜檢經中方知往生本事遂封記焉用示後學時此山峰頂寺有法歸禪師者本住襄陽漢陰出家味靜為務感夢有神來請遂往廬山遊歷諸處忽然驚覺乃尋夢而往但廬山者生來不到及至彼處樹石寺塔宛如前夢方知為廬山神之所請也依而結宇晨夕繼業遂終山舍時又有慧景禪師者清卓出類不偶道俗孤行林阜禪慧在宗及其終後乃返掘兩指人有捋者雖伸還屈如前故傳所紀獲二果矣當景卒旦山峰松樹並雨甘露今名甘露峰是也生常感二鳥依時乞食及其沒後絶迹此山斯之三德道扇梁朝樹銘山阿各題芳績矣佛陀禪師此云覺者本天竺人學務靜攝志在觀方結友六人相隨業道五僧證果惟佛陀無獲遂勤苦勵節如救身衣進退惟谷莫知投厝時得道友曰修道藉機時來便剋非可斯須徒為虛死卿於震旦特是別緣度二弟子深有大益也因從之遊歷諸國遂至魏北臺之恆安焉時值孝文敬隆誠至別設禪林鑿石為龕結徒定念國家資供倍架餘部而徵應潛著皆異之非常人也恆安城內康家資財百萬崇重佛法為佛陀造別院常居室內自靜遵業有小兒見門隙內炎火赫然驚告院主合家總萃都無所見其通徵玄觀斯例衆也識者驗以為得道矣後隋帝南遷定都伊洛復設靜院敕以處之而性愛幽栖林谷是託屢往嵩嶽高謝人世有敕就少室山為之造寺今之少林是也帝用居處四海息心之儔聞風響會者衆恆數百篤課出要成濟極焉時或告衆曰此少林精舍別有靈祇衛護一立已後終無事乏由使造者彌山而僧廩豐溢沿彼至今將二百載雖荒荐頻繁而寺業充實遠用比之佛陀無謬傳矣時又入洛將度有緣沙門慧光年立十二在天門街井欄上反踏蹀䤻一連五百衆人喧競異而觀之佛陀因見惟曰此小兒世戲有工道業亦應無昧意欲引度權以杖打頭聲響清徹既善聲論知堪法器乃問能出家不光曰固其本懷耳遂度之解冠終古具如別傳又令弟子道房度沙門僧稠教其定業自化行東夏惟此兩賢得道記之諒有深疑年漸遲暮不預僧倫委諸學徒自相成業躬移寺外別處零房感一善神常隨影護亦令設食而祠饗之後報欲終在房門之壁手畫神像于今尚存菩提達摩南天竺婆羅門種神慧疏朗聞皆曉悟志存大乘冥心虛寂通微徹數定學高之悲此邊隅以法相導初達宋境南越末又北度至魏隨其所止誨以禪教于時合國盛弘講授乍聞定法多生譏謗有道育慧可此二沙門年雖在後而鋭志高遠初逢法將知道有歸尋親事之經四五載給供咨接感其精誠誨以真法如是安心謂壁觀也如是發行謂四法也如是順物教護譏嫌如是方便教令不著然則入道多途要唯二種謂理行也藉教悟宗深信含生同一真性客塵障故令捨僞歸真疑住壁觀無自無他凡聖等一堅住不移不隨他教與道冥符寂然無為名理入也行入四行萬行同攝初報怨行者修道苦至當念往劫捨本逐末多起愛憎今雖無犯是我宿作甘心受之都無怨對經云逢苦不憂識達故也此心生時與道無違體怨進道故也二隨緣行者衆生無我苦樂隨緣縱得榮譽等事宿因所構今方得之緣盡還無何喜之有得失隨緣心無增減違順風靜冥順於法也三名無所求行世人長迷處處貪著名之為求道士悟真理與俗反安心無為形隨運轉三界皆苦誰而得安經曰有求皆苦無求乃樂也四名稱法行即性淨之理也摩以此法開化魏土識真之士從奉歸悟録其言誥卷流于世自言年一百五十餘歲遊化為務不測于終釋僧可一名慧可俗姓姬氏虎牢人外覽墳素內通藏典末懷道京輦默觀時尚獨蘊大照解悟絶群雖成道非新而物貴師受一時令望咸共非之但權道無謀顯會非遠自結斯要誰能繫之年登四十遇天竺沙門菩提達摩遊化嵩洛可懷寶知道一見悅之奉以為師畢命承旨從學六載精究一乘理事兼融苦樂無滯而解非方便慧出神心可乃就境陶研淨穢埏埴方知力用堅固不為緣陵達摩滅化洛濱可亦埋形河涘而昔懷嘉譽傳檄邦畿使夫道俗來儀請從師範可乃奮其奇辨呈其心要故得言滿天下意非建立玄籍遐覽未始經心後以天平之初北就新鄴盛開祕苑滯文之徒是非紛舉時有道恆禪師先有定學王宗鄴下徒侶千計承可說法情事無寄謂是魔語乃遣衆中通明者來殄可門既至聞法泰然心服悲感盈懷無心返告恆又重喚亦不聞命相從多使皆無返者他日遇恆恆曰我用爾許功夫開汝眼目何因致此諸使答曰眼本自正因師故邪耳恆遂深恨謗惱於可貨賕俗府非理屠害初無一恨幾其至死恆衆慶快遂使了本者絶學浮華謗黷者操刀自擬始悟一音所演欣怖交懷海迹蹄瀅淺深斯在可乃縱容順俗時惠清猷乍託吟謠或因情事澄汰恆抱寫割煩蕪故正道遠而難希封滯近而易結斯有由矣遂流離鄴衛亟展寒溫道竟幽而且玄故末緒卒無榮嗣有向居士者幽遁林野木食於天保之初道味相師致書通好曰影由形起響逐聲來弄影勞形不知形之是影揚聲止響不識聲是響根除煩惱而求涅槃者喻去形而覓影離衆生而求佛喻默聲而尋響故迷悟一途愚智非別無名作名因其名則是非生矣無理作理因其理則諍論起矣幻化非真誰是誰非虛妄無實何空何有將知得無所得失無所失未及造談聊伸此意想為答之可命筆述意曰說此真法皆如實與真幽理竟不殊本迷摩尼謂瓦礫豁然自覺是真珠無明智慧等無異當知萬法即皆如愍此二見之徒輩申詞措筆作斯書觀身與佛不差別何須更覓彼無餘其發言入理未加鉛墨時或纘之乃成部類具如別卷時復有化公廖公和禪師等各通冠玄奧吐言清逈托事寄懷聞諸口實而人世非遠碑記罕聞微言不傳清德誰序深可痛矣時有林法師在鄴盛講勝鬘并制文義每講人聚乃選通三部經者得七百人預在其席及周滅法與可同學共護經像初達摩禪師以四卷楞伽授可曰我觀漢地惟有此經仁者依行自得度世可專附玄理如前所陳遭賊斫臂以法御心不覺痛苦火燒斫處血斷帛裹乞食如故曾不告人後林又被賊斫其臂叫號通夕可為治裹乞食供林林怪可手不便怒之可曰餅食在前何不自裹林曰我無臂也可不知耶可曰我亦無臂復何可怒因相委問方知有功故世云無臂林矣每可說法竟曰此經四世之後變成名相一何可悲有那禪師者俗姓馬氏年二十一居東海講禮易行學四百南至相州遇可說法乃與學士十人出家受道諸門人於相州東設齊辭別哭聲動邑那自出俗手不執筆及俗書惟服一衣一𭽽一坐一食以可常行兼奉頭陀故其所往不參邑落有慧滿者滎陽人姓張舊住相州隆化寺遇那說法便受其道專務無著一衣一食但畜二針冬則乞補夏便通捨覆赤而已自述一生無有怯怖身無蚤虱睡而不夢住無再宿到寺則破柴造履常行乞食貞觀十六年於洛州南會善寺側宿柏墓中遇雪深三尺其旦入寺見曇曠法師怪所從來滿曰法友來耶遣尋坐處四邊五尺許雪自積聚不可測也故其聞有括訪諸僧逃隱滿便持衣𭽽周行聚落無可滯礙隨施隨散索爾虛間有請宿齊者告云天下無人方受爾請故滿每說法云諸佛說心令知心相是虛妄法今乃重加心相深違佛意又增論議殊乖大理故使那滿等師常齎四卷楞伽以為心要隨說隨行不爽遺委後於洛陶中無疾坐化年可七十斯徒並可之宗系故可別敘釋僧達俗姓李上谷人十五出家遊學北代聽習為業及受具後宗軌毗尼進止沈審非先祖習年登二夏為魏孝文所重邀延廟寺闡弘四分而形器異倫見者驚奉虎頭長耳雙齒過寸機論適變時其高美與徐州龍達各題稱謂尋復振錫洛都因遇勒那三藏奉其新誨不久值那遷化覆述地論聲駭伊穀令望歸信相次稱謁後聽光師十地發明幽旨遂從受菩薩戒焉因從請業有名學衆又南會徐部隨通地論梁武皇帝撥亂弘道銜聞欣然遂即濟江造宮請見敕駙馬殷均引入重雲殿自晝通夜傳所未聞連席七宵帝歎嘉瑞因從受戒誓為弟子下敕住同泰寺降禮供奉旬別入殿開示弘理年移一紀道懷有據請辭還魏乃經七啓方許背梁時兗州行臺侯景為造二寺山名天觀治曰丈六達念身為苦器難可維持乃試履裁約餌苓斷粒自此終報資用通生未為魏廢帝中王敕僕射高隆之召入鄴都受菩薩戒暨齊文宣特加殊禮前後六度歸崇十善達性愛林泉居間濟業帝為達於林慮山黃華嶺下立洪谷寺又捨神武舊廟造定寇寺兩以居之初達經營山寺將入谷口虎踞其前乃祝曰欲造一寺福被幽靈若相許者可為避道言訖尋去及造寺竟安衆綜業達反鄴京夜有神現身被黃服拜而跪曰弟子是載山神也王及三谷正備供養願不須還達曰在山利少在京利多貧道觀機而動幸無遮止又經靜夜有推戶者稱曰山神之妻白日無暇今故參拜并奉米糕一筐進而重曰僧無偏為禮佛之時請兼弟子名也達答糕可將還後當為禮因令通為之時一拜兼唱其含幽識明皆此類也達遣弟子道爽為山神讀金光明經月餘有虎來將狗去達聞之曰此必小道人懈怠不為檀越讀經具問之果云三日來別誦維摩耳乃燒香禮佛告曰昨雖誦餘經其福亦屬檀越若有靈鑒放狗還也至曉狗還看於項上有銜嚙處斯又接統神明殆不可測講華嚴四分十地地持雖無疏記而敷揚有據特善論議知名南北禪法一門開世殊廣曾遊梁境志公遇而告曰達禪師是大福德人也帝亦深敬常顧侍臣云北方鸞法師達禪師肉身菩薩恆向北遙禮其為時君所重無有加焉一時少覺微疾端坐繩床口誦波若形氣調靜遂終於洪谷山寺春秋八十有二即齊天保七年六月七日也宣帝聞之崩騰驚赴舉聲大哭六軍同號山林為動葬於谷中巖下立碑於後余以貞觀九年親往禮謁骸骨猶存寺宇遺迹宛然如在自達奉心玄道情無間然有識同親無聞嫌隙承先私憾倍加事之榮勝高流彌所謙退自季世佛法崇尚官榮僥幸之夫妄生朋翼而達為國都眇然無顧昭玄曹局曾不經臨斯乃聖達之所輕實世福之嘉相矣釋僧稠姓孫元出昌黎末居巨鹿之癭陶焉性度純懿孝信知名而勤學世典備通經史徵為太學博士講解墳索聲蓋朝廷將處器觀國羽儀廊廟而道機潛扣欻厭世煩一覽佛經渙然神解時年二十有八投巨鏕景明寺僧實法師而出家落髮甫爾便尋經論悲慶交并識神厲勇因發五願所謂財法通辨及以四大常敬三寶普福四恩初從道房禪師受行止觀房即跋陀之神足也既受禪法北遊定州嘉魚山斂念久之全無攝證便欲出山誦涅槃經忽遇一僧言從泰嶽來稠以情告彼遂苦勸修禪慎無他志由一切含靈皆有初地味禪要必繫緣無求不遂乃從之旬日攝心果然得定常依涅槃聖行四念處法乃至眠夢覺見都無欲想歲居五夏又詣趙州障供山道明禪師受十六特勝法鑽仰積序節食鞭心九旬一食米惟四升單敷石上不覺晨宵布縷入肉挽而不脫或煮食未熟攝心入定動移晷漏前食並為禽獸所噉又常修死想遭賊怖之了無畏色方為說諸業行皆摧其弓矢受戒而返嘗於鵲山靜處感神來嬈抱肩築腰氣噓項上稠以死要心因證深定九日不起後從定覺情想澄然究略世間全無樂者便詣少林寺祖師三藏呈己所證跋陀曰自葱嶺已東禪學之最汝其人矣乃更授深要即住嵩嶽寺僧有百人泉水才足忽見婦人弊衣挾帚却坐階上聽僧誦經衆不測為神人也便訶遣之婦有慍色以足踏泉立竭身亦不現衆以告稠稠呼優婆夷三呼乃出便謂神曰衆僧行道宜加擁護婦人以足撥於故泉水即上涌時共深異威感如此後詣懷州西王屋山修習前法聞兩虎交鬪咆響振巖乃以錫杖中解各散而去一時忽有仙經兩卷在于床上稠曰我本修佛道豈拘域中長生者乎言已須臾自失其感致幽現皆此類也後移止青羅山受諸厲疾供養情不憚其臭潰甘之如薺坐久疲頓舒腳床前有神輒扶之還令加坐因屢入定每以七日為期又移懷州馬頭山魏孝明帝夙承令德前後三召乃辭云普天之下莫非王土乞在山行道不爽大通帝遂許焉乃就山送供魏孝武永熙元年既召不出亦於尚書谷中為立禪室集徒供養又北轉常山定州刺史婁睿彭城王高攸等請至又默之大冥山創開歸戒奉信者殷焉燕趙之境道未通被略言血食衆侶奔赴禮貺填充時或名利所纏者稠為說偈止之聞者慚色而止便為陳修善偈預在息心之儔更新其器既道張山世望重天心齊文宣天保二年下詔曰久聞風德常思言遇今敕定州令師赴鄴教化群生義無獨善希即荷錫暫遊承明思欲弘宣至道濟斯苦壤至此之日脫須還山當任東西無所留縶稠居山積稔業濟一生聞有敕召絶無承命苦相敦喻方遂元請即日拂衣將出山闕兩岫忽然驚震響聲悲切駭擾人畜禽獸飛走如是三日稠顧曰慕道懷仁觸類斯在豈非愛情易守放蕩難持耶乃不約事留杖策漳滏帝躬舉大駕出郊迎之稠年過七十神宇清曠動發人心敬揖情物乘機無墜帝扶接入內為論正理因說三界本空國土亦爾榮華世相不可常保廣說四念處法帝聞之毛竪流汗即受禪道學周不久便證深定爾後彌承清誨篤敬殷重因從受菩薩戒法斷酒禁肉放捨鷹鷂去官畋漁鬱成仁國又斷天下屠殺月六年三敕民齊戒官園私菜葷辛悉除帝以他日告曰道由人弘誠不虛應願師安心道念弟子敢為外護檀越何如稠曰菩薩弘誓護法為心陛下應天順俗居宗設化棟梁三寶導引四民康濟既臨義無推寄即停止禁中四十餘日日垂明誨帝奉之無失後以道化須布思序山林便辭還本住帝以陵阜回互咨謁或難天保三年下敕於鄴城西南八十里龍山之陽為構精舍名雲門寺請以居之兼為石窟大寺主兩任綱位練衆將千供事繁委充諸山谷并敕國內諸州別置禪肆令達解念慧者就而教授時揚講誦事事豐厚帝曰佛法大宗靜心為本諸法師等徒傳法化猶接囂煩未曰闡揚可並除廢稠諫曰諸法師並紹繼四依弘通三藏使夫群有識邪正達幽微若非此人將何開導皆禪業之初宗趣理之弘教歸信之漸發蒙斯人帝大喜焉因曰今以國儲分為三分謂供國自用及以三寶自爾徹情歸向通古無倫佛化東流此焉盛矣具如別紀即敕送錢絹被褥接軫登山令於寺中置庫貯之以供常費稠以佛法要務志在修心財利動俗事乖道化乃致書返之帝深器其量也敕依前收納別置異庫須便依給未經王府爾後詔書手敕月別頻至寸尺小緣必親言及又敕侍御徐之才崔思和等送諸藥餌觀僧疾苦帝常率其羽衛故幸參覲稠處小房宴坐都不迎送弟子諫曰皇帝降駕今據道不迎衆情或阻稠曰昔賓頭盧迎王七步致七年失國吾誠德之不逮未敢自欺形相冀獲福於帝耳時亦美其敦慎大法得信於人黃門侍郎李獎與諸大德請出禪要因為撰止觀法兩卷味定之賓家藏本據以齊乾明元年四月十三日辰時絶無患惱端坐卒於山寺春秋八十有一五十夏矣當終之時異香滿寺聞者悚神敕遣襄樂王宣慰曰故大禪師志力精苦感果必然棲心寂默虛來實返業暢玄風事高緇素運往神遷實深嗟惘資崇有嘉用申悽敬可施物五百段送千僧供於雲門以崇追福至皇建二年五月弟子曇詢等奏請為起塔下詔曰故大禪師德業高逈三寶棟梁滅盡化終神遊物外可依中國之法闍毗起塔建千僧齊贈物千段標樹芳迹示諸後代敕右僕射魏收為製碑文其為時君所重前後皆此類也既而剋日准敕四部彌山人兼數萬香柴千計日正中時焚之以火莫不哀慟斷絶哭響流川登有白鳥數百徘徊煙上悲鳴相切移時乃逝仍於寺之西北建以磚塔每有靈景異香應于道俗初稠奉信出家知奇齊魏克志禪業冠絶後塵而歷履大行往還朝野鳴謙抱素能扇清風加又威稜群賊勢懾山魑解虓虎之鬪情禁利養之深毒大儒皇氏躬為負糧青羅獵客執刀剪髮或德感上玄澤流奉敬之苗幽誠所致粟滿信心之室樹神遮道隨器欲而法流文豹淨房銜穢幞而遙棄或猛虎馴狎即背垂衣頽山將陊召出存命若斯靈相振古罕儔具如雲門象圖所紀又初敕造寺面方十里令息心之士問道經行稠曰十里大廣損妨居民恐非遠濟請半減之敕乃以方五里為定使將作大匠紀伯雍締構伊始雍集諸鄉邑問此地名忽聞空中大聲答曰山林幽靜此處本號雲門重問所由了無一人知者帝聞異之因從空響焉今名光嚴寺是也又嘗有客僧負錫初至將欲安處問其本夏答云吾見此中三為伽藍言終而隱既而掘地為井果得鴟吻二焉又所住禪窟前有深淵見被毛之人偉而胡貌置釜燃火水將沸涌俄有大蟒從水中出欲入釜內稠以足撥之蟒遂入水毛人亦隱其夜因致男子神來頂拜稠云弟子有兒歲歲為惡神所噉兒子等惜命不敢當弟子衰老將死故自供食蒙師護故得免斯難稠索水潠之奄成雲霧時或讒稠於宣帝以倨傲無敬者帝大怒自來加害稠冥知之生來不至僧厨忽無何而到云明有大客至多作供設至夜五更先備牛輿獨往谷口去寺二十餘里孤立道側須臾帝至怪問其故稠曰恐身血不淨穢污伽藍在此候耳帝下馬拜伏愧悔無已謂尚書令楊遵彥曰如此真人何可毀謗也乃躬負稠身往寺稠磬折不受帝曰弟子負師遍天下未足謝愆云云因謂曰弟子前身曾作何等答曰作羅剎王是以今猶好殺即呪盆水令帝自視見其影如羅剎像焉每年元日常問一歲吉凶後至天保十年云今年不能好文宣不悅帝問師復何如答云貧道亦不久至十月帝崩明年夏首稠喪驗之果矣嘗以暇日帝謂曰弟子未見佛之靈異頗得覩不稠曰此非沙門所宜帝強之乃投袈裟于地帝使數十人舉之不能動稠命沙彌取之初無重焉因爾篤信兼常寺宇僧供勞賜優渥齊滅周廢以寺賜大夫柳務文文又令其親辛儉守當將家入住有神怒曰何敢凌犯須陀洹寺而儉未幾便卒隋初興復奄同初構六時禪懺著聲寰㝢大業之末賊所盤營房宇孑遺餘皆焚蕩余以貞觀初年陟茲勝地山林乃舊情事惟新觸處荒涼屢興生滅之歎周睇焚燼頻噎黍離之悲傳者親閲行圖故直敘之于後耳釋法聰姓梅南陽新野人八歲出家卓然神秀正性貞潔身形如玉蔬藿是甘無求滋饌及長成立風操逾厲淨施厚利相從歸給並回造經藏三千餘卷備窮記論有助弘贊者無不繕集年二十五東遊嵩嶽西涉武當所在通道惟居宴默因至襄陽傘蓋山白馬泉築室方丈以為栖心之宅入谷兩所置蘭若舍今巡山者尚識故基焉初梁晉安王來部襄雍承風來問將至禪室馬騎將從無故却退王慚而返夜感惡夢後更再往馬退如故王乃潔齊躬盡虔敬方得進見初至寺側但覩一谷猛火洞燃良久竚望忽變為水經停傾仰水滅堂現以事相詢乃知爾時入水火定也堂內所坐繩床兩邊各有一虎王不敢進聰乃以手按頭著地閉其兩目召王令前方得展禮因告境內多弊虎災請求救援聰即入定須臾有十七大虎來至便與受三歸戒敕勿犯暴百姓又命弟子以布繫諸虎頸滿七日已當來於此王至期日設齊衆集諸虎亦至便與食解布遂爾無害其日將王臨白馬泉內有白龜就聰手中取食謂王曰此是雄龍又臨靈泉有五色鯉亦就手食云此雌龍王與群吏嗟賞其事大施而旋有凶黨左右數十人夜來劫所施之物遇虎哮吼遮遏其道又見大人倚立禪室傍有松樹止至其膝執金剛杵將有守護竟夜回遑日午方返王怪其來方以事首遂表奏聞下敕為造禪居寺聰不往住度人安之又敕徐摛就所住處造靈泉寺周朝改為靜林隋又改為景空大唐仍於隋號初聰住禪堂每有白鹿白雀馴伏栖止行往所及慈救為先因見屠者驅猪百餘頭聰三告曰解脫首楞嚴猪遂繩解散去諸屠大怒將事加手並仡然不動便歸過悔罪因斷殺業又於漢水漁人牽網如前三告引網不得方復歸心空網而返又荊州苦旱長沙寺遣僧至聰所請雨使還大降陂池皆滿高祖遣廬陵王迎出都有事不遂及湘東王作牧荊峽於江陵造天宮寺迎以處之遂終此寺即梁太清年也其寺見有碑記廣敘徵異景空今寺猶有禪堂存焉釋智遠姓王族本太原寓居陝服幼而聰穎早悟非常居荊州長沙寺禪坊為法京沙門之弟子也卓然獨立靖記玄心至於戒年清潔逾厲而慧業未深遙想揚輦遂負沿波達于建業龍光僧綽一代英雄乃肆心仰旨專門受教學逾一紀解通三藏梁建安侯蕭正立務兼內外備弘孔釋造普明寺請遠居之以伸供養之志也有慧湛禪師定品惟深晚學宗領遂具受祕法咨質玄觀定水既澄慧門宜敞及研習大乘洞其根葉又歷名山養志弘道與沙門道會同集龍盤夙昔素心一期開決因住開善畢志山泉城闕不窺世華無涉守靜自怡年老無捨以陳太建三年十二月一日旦終于此寺禪坊時年七十有七遺旨不令哭奄如入定乃窆於獨龍之山新安寺沙門慧皓曰吾與伊人早同法門久稟戒道歎法橋之忽壞痛寶舟之已沈乃率庸才仰傳實德五兵尚書蕭濟鴻才碩學行潔名高為之銘頌釋法常高齊時人領徒講律有聲漳鄴後講涅盤并授禪數齊主崇為國師以處衆囂雜枯折由生無俱利功捐而至楚後聞追之變形革服一舉千里又達衡嶽多處林野布衣乞食又之荊硤有僧法隱者久住覆船山東嶺誦法花維摩思益以為常業而未間心觀後至松滋見常異操乃歸而問津遂默而不對乃經一夏涕泗滂沱方示心要如說行者方知其趣隱駐心自久繫念日新深悟寂定不思議也與故人胡君義別不值題壁剋月日當遠行至期果卒後當將終語諸僧曰吾今日作一覺長眠便入室右脅而臥明日怪眠不覺看之久終方悟長眠語矣釋法京姓孫太原人寓居江陵母將懷孕夢入蓮池捧一童子端正可喜因而有娠將誕又夢乘白師子遊戲虛空京七歲出家十三與同學智淵咸升高座說法無滯寺內長少俱夢聖僧告云京是寺元檀越願力生此方為棟梁所以凡所投造風從水漸財利山積福門大弘殿宇小大千五百間並京修造僧衆湊集千有餘人長沙大寺聖像所居天下稱最東華第一由是道力所致幽明被之後梁二主聞便敬重奉為僧正綱紀遺法晚抱危疾諸僧像前七日行道沙門法泰夢像至於京房淨人遠志親覩像從京房返於大殿爾日即愈是知育王瑞像感降在人專注祈求無往不應不久卒於寺春秋七十六矣釋法懍姓嚴枝江人十五出家玉泉山寺衆侶清淨懍依味道積有年載禪念為本依間誦經法華維摩及大論鈔普皆無昧不著繒纊大布為衣不食僧糧分衛一食不臥常坐勤勵莫儔荷錫遠遊言追勝友廬峰台嶺衡羅恆岱無遠不屆氣調清邈故山僧見者莫不挹高節而仰其奇趣也榛林猛獸之宅幽深魑魅之巖栖息無為如在邑里昔從岱嶽路出徐州遇一縣令問以公驗懍常齎法華一函乃答云此函中有行文檢覓不見令怒曰本無行文何言有邪答曰此經是諸佛所行之跡貧道履而行之還源返本即我之行文也令瞋不歇閉之七日不食誦經聲不輟令感惡夢便頂禮悔過後栖默山以禪靜為正業遂坐卒巖中年六十二異香紛紛旬日乃歇時陽山僧景者不詳何人晦迹塵外以道自處陽山中泉石松竹秀疏清曠嶺接桃源古稱名地卜居寂照感通鬼物有懷惡念不得進前前或值虎蛇驚怖失道若有問法安步無他曾有人求欻起惡念忽見大蛇繩床而出將欲吐毒懺謝得免時枝江惠璀禪師南嶽思公之神足也聞而造之杜口不答璀便雨淚啓請通夕翹立固請確然乃經多日方為披說璀出曰余遊名山上德多矣善友高尚者十有八人分得其門頗經趣入而牆仞高遠奇唱難階者斯人在斯至於年紀人所不測璀云曾問答云吾年三百歲不知所終釋惠成姓段澧陽人出家住十住寺誦法華維摩勝天王等大乘經二十餘卷進具後為荊南佛法希鮮承都下大弘法席有心遠慕遂因商船往造建業正值成實雲講學者肩聯一聽十年文理略盡將旋本邑至匡山寺顗師相見承南嶽思禪師匡化山中引衆波動試往看之既見欣仰欲學定業思曰卿一生學問與吾炙手猶不得暖虛喪功夫惜哉成素憑文疏依他生解忽今自檢茫若霧遊慨恨之甚不可得也乃唯曰承大師善知來意今試驗之見犀如意及手巾線履欲得之思命令送與成遂忽燒却章抄捐擲筆硯專志攻擊以必達為期當時造禪門者數十人皆先達者成以後至恐不相及乃以夜達晝開眼坐禪經十有五年思令入方等觀音法華般舟道場歷銷障三年依行魔業禪鬼頗因散絶乃示以正法專思玄寂久遂解衆生語言三昧精思通爽靜亂齊焉彼閉目者觀道雖明開眼便失與成比校天地懸殊思云智顗先發三昧後證於持法成反之二子寂照行解齊矣大師化往上至枝江造禪惠寺所營土木咸依俗有德行所招不久便說其地西望沙渚德鸞栖遁之地眺上明彌天立寺之所湘東王承風迎請為建禪衆仍構大殿闕梁不成六月江漲於一夜中成曰有木中梁可往江接尋語往看果如所示有清信士段弘者為精舍主忽然氣絶家人召成至宅弘乃穌曰初執至王所見禪師上殿曰與此人立功德未了願赦之王起禮足如言被放陳主聞而往召卓然不往又令江總等往迎若不允心不勞返也王人雨淚強引入船成乃奮身入水立於江上又請若不蒙下總等粉身無地從之至都受戒而返乃賜所住名禪慧寺不久市朝遷革有常律師者欲往南嶽遇成同宿夜中投蝨於地而密知之及明告別成曰昨夜一檀越被凍困苦常慚之永誡將終語門人曰急砌殿基吾當講涅槃也聞皆給手恰竟而智者玉泉寺至冥相符會共談玄理良久氣絶以年月坐亡於禪衆禪師在道場年七十三矣湘東王宮內立碑今見在城中釋法忍江陵人初投天皇寺出家受具已後受持法華維摩日常再遍衆聚多喧枯折由生西往覆舟巖下頭陀自靜觀理三十餘年木食麻衣破衲而已自得幽林無求外護升粒若盡繼以水果終不馳求或一食七日跏坐求志曾於一夏費米三斗必限自恣猶盈五升雖獨宿非入戒科而儉約一隅別行所止龕室才容膝頭伏夏嚴冬形不出戶故寒不加絮熱不減衣安然守道無為而已忽有一象無事至龕經于數日忍便現疾於寺北窟右脅而終春秋六十有七衣鉢塵朽衆無預焉評其估價不至於十云釋僧實俗姓程氏咸陽靈武人也幼懷雅亮清卓不倫嘗與諸僮共遊狡戲或摘葉獻香或聚砂成塔鄉閭敬焉知將能信奉之漸也親眷愛結不許出家喻以極言久而方遂年二十六乃得剃落有道原法師擅名魏代實乃歸焉隨見孝文便蒙降禮大和末從原至洛因遇勒那三藏授以禪法每處皇宮咨問禪祕那奇之曰自道流東夏味靜乃斯人乎於是尋師問道備經循涉雖三學通覽偏以九次調心故得定水清澄禪林榮蔚性少人事退迹為功所以高蓋駟馬未曾流目清流林竹顧便忘返加又口繞黑子欹若升形目有重瞳光明外射腋懷鳳卵七處俱平奇相超倫有聲京洛兼又道契生知化通關壤聽業未廣而無問不明能勤整四儀靜修三法可憲章於風俗足師表於天人周太祖文皇以魏大統中下詔曰師目麗重瞳偏同虞舜背隆傴僂分似周公德宇純懿軌量難模可昭玄三藏言為世寶篤志任持故有法相之宜興俗務之宜廢發談奏議事無不行至保定年太祖又曰師才深德大宜庇道俗以隆禮典乃躬致祈請為國三藏實當仁不讓默而受之是使棟梁斯在儀形攸寄周氏有國重仰玄風禮異前朝受於歸戒逮太祖平梁荊後益州大德五十餘人各懷經部送像至京以真諦妙宗條以問實既而慧心潛運南北疏通即為披決洞出情外並神而服之於是陶化京華久而逾盛忽一旦告僧曰急備香火修理法事誦觀世音以救江南某寺堂崩厄也當爾之時楊都講堂正論法集數百道俗充滿其中聞西北異香及空中妓樂合堂驚出同共聞聽堂欻摧壞大衆無損奏聞梁主乃移以問周果知實祐大送珍寶賜遺相續而實但取三衣什物而已餘隨散之由爾名振三國事參至聖以保定三年七月十八日卒於大追遠寺春秋八十有八朝野驚嗟人天變色帝哀慟泣之有敕圖寫形像仍置大福田寺即以其日窆於東郊門外滕公酈食綦塜南碑石尚存弟子曇相等傳燈不窮彌隆華實以業有從爰於墓所立寺還名福田用崇冥福并建碑于寺野二所大中興寺釋道安及義城公庾信製文今在苑內釋僧瑋姓潘汝南平輿人也器量沈深風神詳雅十三出家仍服以弊衣資以菜食致使口腹之纍漸以石帆水松寒暑之資稍以荷衣蕙帶故得結操貞於玉石清風拂於烟霞初誦金光明經進受具後下楊都於帝釋寺聽曇瑗律師講十誦淹于五載齊鏡持犯仍入攝山栖霞寺從鳳禪師所學觀息想味此情空究檢因緣乘持念慧頻蒙印指傳芳暢業遠承申息之國山名霧露巖洞幽深川香水美遂命楫西浮銷聲林藪終焉之志結此山焉聲問光徹被于周壤天子遵賢待德下車問道召至京師親奉清誨乃敕公卿近臣妃后外戚咸受十善因奉三歸天和五年以葬母東歸敕使為安州三藏綏理四衆備盡六和在任之日經始壽山梵雲二寺南望楚水東指隋城度軌程功輪奐成美僧瑋德播江淮帝王隆重爰有別敕於王城之內起天寶寺用以居之既被徵召身範僧倫納衣壞味任報資給靜緣潔操齊志林朝以建德二年九月十日遘疾少時終於所住春秋六十有一門人慟感士女驚奔即以三年二月歸葬於安陸之山僧瑋容止恭莊威儀整敕遊之者肅然清規見之者自生敬仰新野庾信載奉芳塵勒碑現集釋曇相姓梁氏雍州藍田人與僧實同房素非師保而敦敬之重禮逾和上相聰敏易悟目覽七行禪誦為心周給成務而慈悲誘接偏所留心因有行往見人弋繳網羅禽獸窮困者必以身代贖得脫方捨其仁濟之誠出于天性實每美云曇相福德人我不及也斯見禮如此實嘗夜詣相房恆預設座擬之相對無言自陳道合私有聽者了無音問常以為軌乃經積載有時大癘橫流或旱潦凶險人來問者相皆略提綱目教其治斷至時必有神效人並異之或問李順興強練何人耶相曰順興胎龍多欲強練遊行俗仙助佛揚化耳其幽記之明諒不可測也住大福田寺京華七衆師仰如神以周季末曆正法頽毀潛隱山中開皇之初率先出俗二年四月八日卒於渭陰故都圖像傳焉今在京師禪林寺其承緒禪學遺囑慧端具見別傳釋道正滄州渤海人稟質高亮言志清遠居無常處學非師授樂習禪行宗蘭若法無問冬夏栖息深林乞食於村餘惟常坐繫想繩床下帳獨靜道俗參訊略示綱猷令其住心緣向所授故使四遠造者各務靜緣衆聚雖多而外無囂撓正任性行藏都無名貫經論講會莫不登踐皆聽其深隱略其繁長周流兩河言議超邈偏以成實知名幽冀時有隸公貫者引正住寺為上簿書而志駭風雲曾無顧眄還返林薄嗣業相尋綜述憲法流之於世名為六行凡聖修法也包舉一化融接萬衢初曰凡夫罪行二曰凡夫福行三小乘人行四小菩薩行五大菩薩行六佛果證行都合六部極略一卷廣二十卷前半序分後半行體言非文質字爽詞費開皇七年齎來謁帝意以東夏釋種多沈名教歸宗罕附流滯忘返普欲捨筌檢理抱一知宗守道行禪通濟神爽具狀奏聞左僕射高頴素承道訓乃於禪林寺大集名德述上所奏時座中有僧曰帝京無人豈使海隅傳法正聞對曰本意伸明邪正不欲簡定中邊夫道在通方固須略於祖述衆無以抗也而其著詞言行衆又不願遵之於是僧徒無為而散正知澆季之難化也遂以行法並留京輦方禪師處即返東川不悉終所今驪山諸衆多承厥緒繫業傳云釋曇詢楊氏弘農華陰人後遷宅于河東郡焉弱年樂道久滯樊籠年二十二方捨俗事遠訪巖隱遊至白鹿山北霖落泉寺逢曇准禪師而蒙剃髮又經一載進受具戒謹攝自修宗稟心學而專志決烈同侶先之圓備戒律又誦法華初夏既登還師定業承僧稠據于蒼谷遂往問津稠亦定山郢匠前傳所敘詢以聲光所被遙相揖敬住既異林精融理極思展言造每因致隔但為路罕人蹤岡饒野獸栖幽既久性不狎塵來往質疑未由樵徑直望蒼谷以為行表荊棘砂礫披跨不難巖幽阻攀緣登陟志存正觀也故不以邪道自通又以旁垂利道由曲前而通滯吾今標指雖艱必直進以程業用斯徵意隨境附心不亦善乎每云與其失道而幸通寧合道不幸而窮耳故履踐重阻不難塗窮後經三夏移住鹿土谷修禪屬枯泉重出䴥麋繞院故得美水馴獸日濟道鄰從學之徒相慶茲瑞時因請法暫往雲門值徑陰霧昏便成失道賴山神示路方會本途此乃化感幽冥神明翊衛時有盜者來竊蔬菜將欲出園乃為群蜂所螫詢聞來救慈心將治得全餘命嘗有趙人遠至殷勤致禮陳云因病死蘇故蒙恩澤往見閻王詰問罪當就獄賴有曇詢禪師來為請命王因放免生來未委訪尋方究又山行值二虎相鬪纍時不歇詢乃執錫分之以身為翳語云同居林藪計無大乖幸各分路虎低頭受命便飲氣而散屢逢熊虎交諍事略同此而或廓居榛梗唯詢一蹤入鳥不亂獸見如偶斯又陰德感物顯用成仁何以嘉焉每入禪定七日為期白虎入房仍為窟宅獨處靜院不出十年自有禪蹤斯人罕擬自爾化流河朔盛闡禪門杖策裹糧鱗歸霧結隋文重其德音致誠虔敬敕儀同三司元壽親送璽書兼以香供以開皇末年風疾忽增卒於柏尖山寺春秋八十五五十夏矣初遘疾彌留忽有神光照燭香風拂扇又感異鳥白頸赤身繞院空飛聲唳哀切氣至大漸鳥住堂基自然狎附不畏人物或在房門至于臥席悲叫逾甚血沸眼中既爾往化鳥便飛出外空旋轉奄然翔逝又感猛虎繞院悲吼兩宵雲昏三日天地結慘又加山崩石墜林摧㵎塞驚發人畜栖遑失據其哀感靈祥未可殫記後以武德五年十二月弟子靜林道慧方等乃闍毗餘質建塔立碑沙門明則為文見于別集釋法充姓畢氏九江人常誦法華並讀大品其遍難紀兼繕造寺宇情在住持末住廬山半頂化城寺修定自非僧事未嘗妄履每勸僧衆無以女人入寺上損佛化下墜俗謠然世以基業事重有不從者充歎曰生不值佛已是罪緣正教不行義須早死何慮方土不奉戒乎遂於此山香爐峯上自投而下誓粉身骨用生淨土便於中虛頭忽倒上冉冉而下處于深谷不損一毛寺衆初不知也後有人上峯頂路望下千有餘仞聞人語聲就而尋之乃是充也身命猶存口誦如故迎還至寺僧感其死諫為斷女人經于六年方乃卒世時屬隆暑而尸不臭爛香如爛瓜即隋開皇之末年矣釋信行姓王氏魏郡人其母久而無子就佛祈誠夢神擎兒告云我今持以相與寤已覺異常日因即有娠及行之生也性殊恆准至年四歲路見牛車沒泥牽引因悲泣不止要轉乃離或值犢母分離或有侵欺之事生知平分不喜愛憎八歲既臨標據清敏悁慧奇拔嘗有書生問曰爾今何姓外家何姓答曰此王彼孫生因調曰何不氏飯乃姓孫行應聲曰飯能除飢不除渴孫能飢渴兩相除故氏孫而非飯也其隨機譎對皆此之類及履道弘謶識悟倫通博涉經論情理遐舉以時勘教以病驗人蘊獨見之明顯高蹈之跡先舊解義翻對不同未全聲聞兼揚菩薩而履涉言教附行為功且如據佛之宗敬無過習由見起慢怠即懷厭離便為邊地下賤之因今雖聞真告心無奉敬自知藥輕病重理加勤苦竭力治之所以隨遠近處凡有影塔皆周行禮拜繞旋翹仰因為來世敬佛之習用斯一行通例餘業其克核詳據率如此也後於相州法藏寺捨具足戒親執勞役供諸悲敬禮通道俗單衣節食挺出時倫冬夏所擬偏過恆習故四遠英達者皆造門而詰問之行隨事直陳曾無曲指諸聞信者莫不頂受其言通捨章疏從其化及稟為父師之禮也未拘之以法歲開皇之初被召入京僕射高頴邀延住真寂寺立院處之乃撰對根起行三階集録及山東所制衆事諸法合四十餘卷援引文據類敘顯然前後望風翕成其聚又於京師置寺五所即化度光明慈門慧日弘善等是也自爾餘寺贊承其度焉莫不六時禮旋乞食為業虔慕潔誠如不及也末病甚勉力佛堂日別觀像氣漸衰弱請像入房臥視至卒春秋五十有四即十四年正月四日也其月七日於化度寺送尸終南山鵄鳴之塠道俗號泣聲動京邑捨身收骨兩耳通焉樹塔立碑在于山足有居士逸民河東裴玄證製文證本出家住於化度信行至止固又師之凡所著述皆委證筆末從俗服尚絶驕豪自結徒侶更立科網返道之賓同所擊贊生自製碑具陳己德死方鐫勒樹于塔所即至相寺北巖之前三碑峙列是也初信行勃興異迹時成致譏通論所詳未須甄別但奉行剋峭偏薄不倫至於佛宗亦萬衢之一術耳所著集記並引正文然其表題立名無定准的雖曰對根起行幽隱指體標榜語事潛淪來哲儻詳幸知有據開皇末歲敕斷不行想同針勗之也別有本傳流世見費節三寶録釋慧意姓李臨原人聽大乘經論專習定行宇文廢法南投於梁與仙城山慧命同師尋討心要後住景空於聰師舊堂綜業常住不事燈燭晝夜常明有鄉人德廣郡守柳靜殊不信法乃請意於宅別立禪室百日行道靜息抑稟等四人每夜潛往舉家同見禪室大明意坐卓然方生信向鄉邑道俗率受歸戒開皇初卒將逝謂弟子慧興曰今日有多客來可多辦齊食及中意果端坐而化時襄陽開皇有法永禪師者南鄉人梁明帝常供養預知運絶苦辭還襄欲終七日七夜聞音樂異香滿寺因而坐終送傘蓋山上露坐有同寺全律師臨永尸曰願留神相待至七日滿至期全亡送尸永側永尸颯然摧變時岑闍梨者姓楊臨原人於寺西傘蓋山南泉立誦經堂常誦金光明感四天王來聽後讀藏經皆不忘計誦三千餘卷服布乞食鉢中之餘飼房內鼠百餘頭皆馴擾爭來就人鼠有病者岑以手摩捋之而不拘事檢或揭坩酒食或群小同戲呵叱僧侶或誦經書歌詠逆述來事晝則散亂夜則禮誦禪思與同衆沙門智曉交顧招集禪徒自行化俗供給定學自知終日急喚拔禪師付囑上佛殿禮辭遍寺衆僧咸乞歡喜於禪居寺大齊將散謂岑曰往兜率天聽般若去岑曰弟前去我七日即來其夜三更坐亡至四更識神往遍學寺寺相去十里至汰法師床前明如晝云曉欲遠逝故來相別不得久住汰送出三重門外別訖來入房中踞床忽然還暗呼弟子問云聞師與人語聲取火通照三門並閉方悟曉之神力出入無間即遣往問果云已逝岑後七日無何坐終其二體骨全成無縫又有昊純等禪師多有靈異相從坐化略不敘之
