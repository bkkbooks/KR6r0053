body:
  text: 大唐西明寺沙門釋道宣撰習禪五本傳十四附見五唐相州寒陵山寺釋道昂傳一靈智唐京師大莊嚴寺釋道哲傳二道成靜安唐潞州法住寺釋曇榮傳三唐京師弘法寺釋靜琳傳四唐京師弘福寺釋慧斌傳五唐汾州光嚴寺釋志超傳六唐蔚州五臺寺釋曇韻傳七唐箕州箕山沙門釋慧思傳八唐并州玄中寺釋道綽傳九道撫唐密州茂勝寺釋明淨傳十慧融唐益州空慧寺釋慧熙傳十一唐綿州大施寺釋世瑜傳十二唐𨳝州攝山栖霞寺釋智聰傳十三唐蒲州孤介山陷泉寺釋僧徹傳十四釋道昂未詳其氏魏郡人履信標宗風神清徹獨懷異操高尚世表慧解夙成殆非開悟初投于靈裕法師而出家焉裕神識剛簡氣岸雲霄審量觀能授其明訓昂飲沐清化愛敬親承歲積炎涼齋蹤上伍常於寒陵山寺陶融初教綱領玄宗日照高山此焉攸屬講華嚴地論稽洽博詣才辯天垂扣問連環思徹恒理而混斯聲迹撝謙藏用幽贊之功諒擬前傑化物餘景志結西方常願生安養履接成務故道扇漳河咸蒙惠澤後自知命極預告有緣至八月初當來取別時未測其言也期月既臨一無所患問齋時至未景次昆吾即昇高座身含奇相爐發異香援引四眾受菩薩戒詞理切要聽者寒心于時七眾圍遶飡承遺味昂舉目高視及見天眾繽紛絃管繁會中有清音遠亮告於眾曰兜率陀天樂音下迎昂曰天道乃生死根本由來非願常祈心淨土如何此誠不從遂耶言訖便覩天樂上騰須臾遠滅便見西方香花伎樂充塞如團雲飛涌而來旋環頂上舉眾皆見昂曰大眾好住今西方靈相來迎事須願往言訖但見香爐墜手便於高座端坐而終卒于報應寺中春秋六十有九即貞觀七年八月也道俗崩慟觀者如山接捧將殯撿足下有普光堂等文字生焉自非道會靈章行符隣聖者何能現斯嘉應哉于斯時也遐邇嗟詠氣結成陰坐既加趺掌文仰現預覩相迹悲慶相臨還送寒陵之山鑿窟處之經春不朽儼然如初自昂道素之聲被于東夏慈潤溫柔德光攸屬嘗養犬一頭兩耳患聾每將自逐減食而施及昂終後便失所在又登講之夜時屬陰暗素無燈燭昂舉掌高示便發異光朗照堂宇大眾覩瑞怪所從來昂曰此光手中恒有耳何可怪耶其栖業隆深幽明感應誠不可度也故是道勝高世之人矣時相州有靈智沙門亦裕公弟子也機務亮敏著名當世常為裕之都講辯唱明衷允愜望情加以明解經論每昇元席文義弘遠妙思霜霏難問銳指擅步漳鄴故使四海望塵俱敦聲教後便忽覺智涯難極法行須依徒設舟航終須艤棹即屏絕章疏更修定業步晷守心懷虛成務乞食頭陀用清靈爽垂行物範光德生焉貞觀八年終於鄴下春秋七十有五後諸學行儉約附其塵者眾焉釋道哲姓唐齊郡臨邑人初投潁川明及法師學十地地持為同聽者所揖具戒已後正奉行門又從魏郡希律師稟承四分希亦指南一時盱衡五眾受教博曉將經六載輕重筌宗究其文體但為戒慧雖通未懷定業有河內詢禪師眾推不測匠首當今嘉哲至誠傾襟為說一悟真諦霍然大通禪侶相謝解齊登室聞京邑道盛乃步從焉初至住仁覺寺沙門曇遷有知人之譽敬備師禮從受攝論研味至理曉悟其文標擬有方豈惟聲教遂厭辭人世潛于終南之駱谷也山粒難接授受須淨既闕使人遂虛腹累宵欣茲味定有清信士張暉陪從多年請益供奉因暫下山忽逢重雪懸路既擁七日方到哲以雖對食具為無人授守死正念暉披雪至菴彈指覺悟方從定起斯寔謹慎資持為此例矣京師大莊嚴寺以哲素有道聲延住華館初從眾意退居小室一食分衛不受僧利眾益重之盩厔縣民昔以隱居駱谷得信者多相率迎請乃往赴焉營構禪宇立徒策業山俗道侶相從屯赴教以正法訓以律儀野逸是憑聞諸京輔忽一旦謂門人曰無常及矣大眾難見冥目既至長恨何言遂東歸莊嚴訊問名德奄然卒於故房春秋七十二矣即貞觀九年正月也葬于京之西郊長城故人慕仰聲範遂發塚迎柩還歸盩厔行道設齋以從火葬收其餘燼為起塔於城西二里端正樹側龍岸鄉中列植楊柏行往揖拜然哲逈發天才學不師古撰百識觀門十卷智照自體論六卷大乘聞思論等行世弟子靜安道誠並承習厥宗匡務有敘安掩迹林泉念定存業誠行感玄解謙穆自修包括律部講道時接初住大莊嚴寺以傳業高今徵入瑤臺匡化於彼餘波潛被盛績京師釋曇榮俗姓張氏定州九門人源南鄧而分派因封而居高陽焉年十九時為書生刻意玄理寄心無地因靈裕法師講華嚴經試往聽之便悟宏範略其詮致乃投裕焉裕神厲氣清觀榮勤攝遂即度之及受具後專業律宗經餘六載崇履禁科滌暢開結乃更循講肆備聞異部偏行大業故以地持為學先屬周廢二教韜形俗壤雖外同其塵而內服道味及隋再弘佛教不務公名隨緣通化曾無執著年登四十務道西遊行至上黨潞城黎城諸山依巖結宇即永潛遁既懿德是充緇素歸仰便開拓柴障廣樹禪坊四遠聞風一期翕至榮形解雄邃稱病設方諸有飡飲咸歆至澤禮供日隆投告填委以隋末凌亂人百從軍預踐兵饑希全戒德榮欲澄汰先染要假明猷事在護持躬當法主每年春夏立方等般舟秋冬各興坐禪念誦僧尼別院故處有四焉致使五眾煙隨百供鱗集日增慶泰歡躍成諠自晉魏韓趙周鄭等邦釋種更新其戒者榮寔其功矣嘗往韓州鄉縣延聖寺立懺悔法刺史風同仁素奉釋門家傳供養送舍利三粒遺行道眾榮年垂八十親率道俗三千人步出野迎路由二十餘里儐從之盛譽滿當時既達寺中乃告眾曰舍利之德挺變無方若累業有銷請祈可遂乃人人前別置水鉢加以香爐通夜苦求至明鉢內總獲舍利四百餘粒聲名達于鄉邑縣令懼其聚眾有墜條章怖停其事當夕怪獸鳴其廳宇官民竟夜不安明旦陳悔方從榮法斯德被聖凡皆此之例武德九年夏於潞城交漳村立法行道所住堂舍忽自崩壞龕像舍利宛然挺出布在庭中一無所損又貞觀七年清信士常凝保等請榮於州治法住寺行方等悔法至七月十四日有本寺沙門僧定者戒行精固於道場內見大光明五色間起從上而下中有七佛相好非常語僧定云我是毘婆尸如來無所著至真等正覺以汝罪銷故來為證然非本師不與授記如是六佛皆同此詞最後一佛云我是汝本師釋迦牟尼也為汝罪銷故來授記曇榮是汝滅罪良緣於賢劫中名普寧佛汝身器清淨後當作佛名為普明若斯之應現感靈祥信難圖矣後臥疾於床眼中流淚弟子圓宗曰和上生來念慧必無不意何事悲泣答曰吾死將逼恨更不得為諸七眾洗濯罪累耳宗曰何必至此答曰吾縱不死亦是無用自佛法再興已來未省一度不聽說戒今既病困說欲斯必死矣以貞觀十三年十二月終於法住寺春秋八十有五旋殯于野外後門徒出其遺骨葬于寺南建塔表之自榮履歷重難而崇尚釋風形器瓌偉過於八尺詞吐溫贍風格遒遠年登不惑斷粒練形常餌守中用省煩累而奉教結淨希見斯人日到僧厨問其監膳必有事染親看翻穢並使食具清淨方始還房自覿名德罕聞斯類又於寺內諸房多結淨地用擬四藥溫煮之所故預沾門序散在諸方咸承風素免諸宿觸又每歲懺法必具兩儀二篇已下依律清之先使持衣說淨終形立誓然後羯磨隨治成人初聚正罪雅依大乘仍令心用理事無著有空身口威儀歸承律撿故自從訓勗奉法無虧皆終諸命報余因訪道藝行達潞城奉謁清儀具知明略故不敢墜其芳緒云釋靜琳俗姓張氏本族南陽後居京兆之華原焉幼齡背世清附緇門初誕之日有外國道人曰此兒當貴若出家者大弘佛法七歲投僧出家役以田疇無乖道訓不果本望深惟非法也自顧而言曰此而未捨與俗何殊更從一師服膺正化遭周滅法且附俗緣年在弱冠希期無怠會隋氏啟運即投曇猛法師乃以二事相攝經于五年猶事沙彌未敢受具慶蒙開法欲廣見聞辭其本師南遊樊鄧便於彼部奉進大戒既爰初受法未曉清規遠赴青齊聽於律禁後發前至為諸聽先又於覺法師所聽受十地迴趾鄴都炬法師所採聽華嚴楞伽思益皆通貫精理妙思英拔舊傳新解往往程器時即推令敷化講散幽旨並驚所未聞而胸臆所憶猶謂不足展轉周聽博遍東川蓄解尋師又至蒲晉有沙門道遜道順者聲名大德也留講十地經于涼燠雖復聽徒欣泰而志逾煩梗下坐處房撫膺審曰法本治病而今慢法更增且道貴虛通而今耽著彌固此不可也即捨講業專習禪門初學不淨念處等法又嫌其瑣小煩稽人慮乃學大乘諸無得觀離念唯識彌所開宗每習一解陶練十年精其昔知更新後習而弊食麁衣情欲斯絕後入白鹿山山糧罕繼便試以却粒之法孤放窮巖又經累載山中業定昏睡惑心乃臨峭絕懸崖下望千仞旁生一樹纔得勝人以草藉之加坐其上於中繫念動逾宵日怖死既重專深弘觀後聞泰岳特多靈異便往尋之既達彼山夜見火炬周環高曜峯巖即事追求累日方至乃見五六尼眾匡坐論道琳初通訊問共議唯識等理未盡言間忽然不見惆悵久悟法誠爾也後入關中遇曇遷禪師講開攝論一聞如舊慧不新聞仁壽四年下勅送舍利於華原石門山之神德寺琳即於此住居靜課業行解之盛名布京師大業三年有沙門還原等延請帝城在明輪妙象諸寺講揚攝論識者歸焉尋即降勅召入道場既達東都禪門更擁齊王暕情深理定每就諮欵請至本第從奉歸戒鴻臚蘇學高前古舉朝冠蓋稟宗師訓為舟為梁高陽道雄道體趙郡道獻明則等並釋門威鳳智海明珠咸承理味酌以華實襄陽洪哲德高楚望風力俊駭聞琳聲穆時彥故來相架乃致問云懷道者多專意何業琳見其詞骨難競聊以事徵告云山谷高深意定何在哲云山高谷深由來自爾琳曰若如來言餘處取土填谷齊山為定高不哲悟此一言致詞歎伏由是秀頴附津稽疑重沓故令譽風宣彌繁賞會琳以象教東漸法網雖嚴至於僧儀正度猶未光闡欲遍遊閻浮備殫靈迹以十三年內具表聞帝當蒙恩詔令使巡方并給使人傳國書信行達襄土方趣海南屬寇賊交侵中國背叛途路梗澁還返南陽義寧二年被召入京住大總持如常弘演光陰既積學者成林武德三年正平公李安遠奏造弘法素奉崇信別令召之琳立意離緣攝慮資道會隋末壅閉唐運開弘皂白歸依光隆是慶乃削繁就簡惟敷中論為宗餘則維摩起信權機屢展夜則勗以念慧每事徵研並使解出自心不從他授玄琬律師道王關河躬承令則自餘法侶歲獻奇倫任城王及太妃楚國太妃安平公主等皇家帝葉請戒第宅隆禮頻繁國子祭酒蕭璟工部尚書張亮詹事杜正倫司農李道裕等並誓為弟子備諸法物恒令服御久以徒侶義學爰缺律宗乃躬請智首律師敷弘四分一舉十遍身令眾先故使教法住持京輦稱最乃至沙彌淨人咸明律相誠其功矣忽以貞觀十四年秋初染疾至十月二十六日平旦疾甚有沙門法常者盛名帝宇素與周旋故來執別琳曰不戀此生未貪來報緣集則有緣散則無而神氣澄湛由來不亂曾病有問疾者答云以己之疾愍於彼疾因而流淚想諸苦趣故也便總集僧眾并諸門人告曰生死道長有心日促各宜自敬無累爾神即右脇而臥尋卒於本寺春秋七十有六餘處通冷惟頂極熱迄於焚日方始神散而形色鮮軟特異常比送於終南至相寺燒惟舌獨存再取燒之逾更明淨斯即正言之力矣弟子等四十餘人奉跪慈顏無由欽仰百日之內通告有緣共轉大乘總四萬餘卷并造千粒舍利木塔舉高五丈彫飾之美晃發中天廣布檀那用酬靈澤初琳居世化以實錄著名每述至理玄凝無不垂泣歎奉言無非涉事不徒行有通事舍人李好德者曾於雒邑受業於琳後歷官天門弊於俗務逃流山藪使弟子度之若准正勅罪當大辟後有嫉於德者罔以極刑及下獄徵琳初無拒諱監獄者深知情量取拔無由事從慮過釋然放免識者以實語天梯至死知量是莫加焉自爰初問法無憚夷險衣服壞則以紙補之床席暖則坐於簣上節之又節量力強羸名利不緣語默沈靜修攝威儀有異名稱涕涶莫顯於口鼻飲食未言於美惡敬慎之極夫又何加兼以行位難測蚤虱不歷於身縱輒投者尋便走散斯負既抵故所報類希焉嘗居山谷須粒有待患繁乃合守中丸一劑可有斗許得支一周琳服延之乃經三載便利之際收洗重服故能業定堅明專注難拔時值儉歲緣村投告隨得隨施安樂貧苦嘗在講會俗士三人謀害一怨兩人往殺其一中悔從琳受戒歲紀經久並從物故而受戒者忽死心煖後從醒寤備見昔怨及同謀者論告殺事其受戒人稱枉不伏引琳為證王即召追證便有告琳生他方金粟世界王既感證因放此人又琳一生所至伽藍撝謙自牧逮至名高福重䞋錫日增並委侍人口無再問及後為福方恨無財出以示之琳曰都不憶有此物也斯寔據道為務情無世涉可書季代足為師鏡自住弘法敷化四方學侶客僧來如闤闠招慰安撫隨事憂承而度雜公私憲章有敘故使外雖禁固內實通流山林望而有歸軌道立而垂則逮于歿後此法彌崇所以京室僧寺五十有餘至於敘接賓禮僧儀邕穆者莫高於弘法矣又寺居古墌惟一佛堂僧眾創停仄陋而已琳薰勵法侶共經始之今則堂房環合厨庫殷積客主混同去留隨意裕法師云以道通物物由道感惠由道來還供道眾故僧實由客深有冥功裕語有琳近之矣釋慧斌姓和氏兗州人也博覽經藝文義洞開偏曉字源尤明章曜年十九鄉黨所崇為州助教而情厭煩梗懷慕出世年二十三方預剪落尋即歷聽經律相沿兩載覩講席喧撓惟論聲勢便入臺山修諸靜慮一入八載備行觀法乃往泰山靈巖諸寺以行道為務先年三十四方隷官名住秦州梁父甑山存道寺更尋律部博聽經論而性狎禪林譽彰遐邇及獻后云背禪定攸興下勅徵延乃旋京邑于時名望盛德八表一期各擅英髦人程鱗翼而斌夏第最小聲稱彌隆衣鉢之外更無箱襆容質清素挺異恒倫緇素目屬莫不迴向斯亦象季清厲之僧也兼以布行純粹言無品藻每聞評論輒即默然防護戒儀慈救為慮每夏行履執帚先掃恐傷蟲蟻故也隨得利養密行檀濟或造漉囊或施道俗惟急者方乃行之仍復累屬勿泄人世及帝造寺前訪綱維京室同美勿高斌也乃下詔徵為弘福寺主緝諧上下無敢乖猷貞觀十九年十月六日遘疾終寺時年七十有二自斌之入道生常恒務多以行道呪業為心或誦釋迦觀音或行文殊悔法歲中八十一日六時行業前後通數八十道場身心悅懌所得法利未可知也至於教誡門學惟論煩惱須斷每有出罪露過無不為之流涕喜怒不形誦持無忘故羯磨之匠通僧仰屬道俗歸戒其徒弘矣故使魏王以下內外懿親及梁宋諸公皆承戒素初斌父朗有子七人家世儒宗斌第二也仁壽徵入愛敬無因朗齒迫期頤鍾鳴漏盡今古意絕生死路分乃於汶水之陰九逵之會建義井一區仍樹豐碑用裨其德其銘略云哀哀父母載生載育亦既弄璋我履我復一朝棄予山川滿目雲掩重關風驚大谷愛敬之道天倫在茲殷憂暮齒見子無期鑿井通給託事興詞百年幾日對此長悲玉檢之南嶧陽之北獲麟之野秉禮之國君有美政俗多儒墨玉井洞開高碑斯勒釋志超俗姓田同州憑翊人也遠祖流寓遂居并部之榆次焉少在童齓智量過人精厲不群雅度標遠厭世從道貫徹藏俞而二親恃超更無兄弟雖述其志常用抑之望嗣宗族遂從儒流遍覽流略年垂壯室私為娉妻超聞之避斯塵染乃逃竄林野親姻周覓藏影無方既被執身抑從伉儷初則合為蹤終亦同掩私室冀行婚禮也惟置一床超乃抽氈席地令妻坐上躬自處床儼思加坐勤為說法詞極明據妻便流淚禮謝辭以相累頻經宵夕事等金形屢被𧧷勸誠逾玉質既確乎難拔親乃捐而放之年二十有七投并州開化寺慧瓚禪師瓚志德澄明行成眾範未展度限歷試諸難志超潔正身心勤履眾務僧徒百數供雜五行兩食恒備六時無缺每有苦役必事身先瓚親閱驗其情守節度令受具自進戒品專修行儀即往定州尋採律藏括其精要刪其繁雜五夏不滿三教備圓乃返故鄉依巖綜習初入太原之西比干山栖引英秀創立禪林曉夕勤修定慧雙啟四儀託於戒節二行憑於法依學觀詵詵無威而肅致使聞風不遠而至大業初歲政網嚴明擁結寺門不許僧出超聞之慨而上諫被衣舉錫出詣郡城望有執送將陳所諫而官私弗顧乃達江都即以事聞內史以事非要害不為通引還遣并部至隋季多難寇賊交橫民流溝壑死者太半而超結徒勸聚餘糧不窮但恐盜竊相陵便欲奔散乃以法誡勸無變爾情鏡業既臨逃響何地眾感其言心期遂爽准式禪禮課時無輟嘗夜坐禪忽有群賊排門直進炬火亂舉白刃交臨合坐端然相同儀象賊乃投仗於地拜伏歸依超因隨宜誘引量權授法咸發心敬合掌而退其剛略攝御皆此類也高祖建義太原四遠咸萃超惟道在生靈義居乘福即率侶晉陽住凝定寺禪學數百清肅成規道俗欽承貴賤恭仰及皇旗南指三輔無塵義寧二年超率弟子二十餘人奉慶京邑武皇夙承嘉望待之若仙引登太極敘之殊禮左僕射魏國公裴寂挺生不世器璉宏深第中別院置僧住所邀延一眾用以居焉亟歷寒暑業新彌厲但為貴遊諠雜外進無因必附林薄方程慕遠時藍田山化感寺沙門靈閏智信智光等義解鉤玄妙崇心學同氣相求宛然若舊遂延住彼山栖志得矣攝緣聚結其赴如雲賢聖語默互相敦重而寺非幽阻隷以公途晦迹之賓卒難承業乃徇物關表意在度人還返晉川選求名地武德五年入于介山創聚禪侶巖名抱腹四方有㵎下望百尋上臨千仞泉石結韻於仙室風雨飄清於林端遂使觀者至止陶鑄塵心自強誨人無倦請益又於汾州介休縣治立光嚴寺殿宇房廊躬親締搆赫然宏壯有類神宮故行深者巖居道淺者城隱師資肅穆兢業其誠聆音察色惟若不足忽因遘疾便知不久誡累殷勤示以禍福以貞觀十五年三月十一日卒於城寺春秋七十有一山世同嗟賓主齊慟德仁既往學肆斯分葬於城南山阜自服膺釋種意在住持晝夜剋勤攝諸後學所以日別分功禮佛五百禪結四時身誡眾侶有虧殿罰而自執熏爐隨唱屈禮未嘗置地及以虧拜及坐禪眾也互相懲誡纔有昏睡親行勵率有來投造無不即度授以戒範進止威儀攝養將迎禮逾天屬時遭嚴勅度者極刑而曾無介懷如常剃落致陸海慕義避世逸僧憑若大山依而修道時講攝論維摩起信等並詳而後說深致適機嘗以武德七年止於抱腹僧徒僅百偏資大齋麥惟六石同置一倉日磨五斗用供常調從春至夏計費極多怪而檢覆止磨兩斛據量此事幽致可思又數感異僧乘虛來往雖無音問儀形可驗纔若墮者便蒙神警至於召眾鐘聲隨時自響石泉上涌隨人少多靈瑞屢興如此者非一而奉敬戒法罕見其儔護慎威儀終始無替自隋唐兩代親度出家者近一千人範師遺訓在所聞見傳者昔預末筵蒙諸惠誥既親承其績故即而敘焉釋曇韻不詳氏族高陽人初厭世出家誦法華經有餘兩卷時年十九仍投恒岳側蒲吾山就彼虛靜訖此經部值栖隱禪師曰誦經非不道緣常誦未即至道要在觀心離念方契正道耳韻初承此告謹即受而行之專精念慧深具舉捨又聞五臺山者即華嚴經清涼山也世傳文殊師利常所住處古來諸僧多入祈請有感見者具蒙示教昔元魏孝文嘗於中臺置大布寺帝曾遊止具奉聖儀前種華園地方二頃夏中發艶狀同鋪錦光彩昱耀亂人心目如是嘉聞數發蕩神悅耳遂舉足栖焉遍遊臺岳備見靈相初停北臺木瓜寺二十餘歲單身弔影處以瓦窯形覆弊衣地布草蓐食惟一受味不兼餘然此山寒厲林生㵎谷自外峯嶺坦然遐淨韻夜行晝坐思略昏情慶其晚逢也前所誦經心口不緣三十餘載會隙歷試一字無遺乃更誦殘文成其部帙至仁壽年內有瓚禪師者結集定學背負繩床在雁門川中蘭若為業韻居山日久思展往懷聞風附道便從瓚眾一沐清化載仰光猷隨依善友所謂全梵行也屬隋高造寺偏重禪門延瓚入京眾失其主人各其誠散歸林谷韻遂投于比干山又遊南部離石龍泉文成等郡七眾希向夷夏大同十善聿修緇素匡幸原此河濱無受戒法縱有志奉皆往太原夷夏情乖人皆怯往致有沙彌三十其歲者及韻化行即傳斯教山城兩眾皆蒙具足唐運伊始兵接定陽屢逢屯喪本業無毀以夜係晝攝心乖逸幽棲積久衣服故弊蚤虱聚結曾不棄捐任其𠲿噉寄以調伏曾以夏坐山饒土蚤既不屏除氈如血凝但自咎責願以相酬情無悋結如此行施四十餘年歲居耳順忽無蚤虱韻猶深自責曰計業不應即盡當履苦趣受其報耳又告門人曰吾見超禪師寄他房住素有壁虱不噉超公乃兩道流出向餘房內又見在蠱家食飯匙接蠱精置于疊下而快食如故又不為患蠱主懼焉吾德不及超何為致此每年於春秋二時依佛名法冬夏正業則減食坐禪甞願寫法華誓須潔淨數年已來不能可辦忽感書生無何而至告云善解抄經韻邀以法據並謂堪能遂乃安于石室立淨書之旦入暮出深怪其行未盈一旬七軸俱了將以禮䞋目前不見及遭賊抄藏經巖窟世靜往收乃委于林下箱襆久爛而卷色如初斯感驗奇異率此類也又常居別室自勤修業餘有眾侶難嗣其蹤每云吾年事如此何可放捨若坐昏悶即起禮佛甞策四儀以道量據自見勝達尠倫其德以貞觀十六年端坐終於西河之平遙山春秋八十餘矣自韻十九入山六十餘載不希名利不畜侍人不隷公籍不行己任凡有所述職皆推寄於他焉釋慧思姓郭氏汾州介休人也少學儒史宗尚虛玄文章書隷有聲鄉曲年二十五在并傳授初不知佛乘之深奧也會沙門道曄德盛當鋒處宗講揚攝大乘論試往潛聽冥漠難追累日詳受薄知希向因求度脫傳聞出家德業勿高禪定即而習焉三十許載師承靡絕又聞念慧相須譬諸輪翅遂周尋聖教備嘗弘旨冬夏業定春秋博採單衣節食見者發心道志之倫往往屯赴因而結眾於箕山之陰晝則斂容默念中夜昏塞為眾說法六時篤課不墜清猷時說死觀各言其志有云省約有志泰甚思曰出家之人生已從緣死當自任豈勞人事送此枯骸余必一期當自運耳時以為未經疾苦故得虛置其言後覺不悆財經兩日尋告眾曰余其死矣便起躡履案行空窟除屏殘屍入中加坐發遣徒侶累以正命處既森竦世號寒林眾不忍離經夜旁守至明往觀端拱如故就觸其身方知已卒春秋五十有五即貞觀十六年五月矣因即而殮焉釋道綽姓衛并州汶水人弱齡處俗閭里以恭讓知名十四出家宗師遺誥大涅槃部偏所弘傳講二十四遍晚事瓚禪師修涉空理亟沾徽績瓚清約雅素慧悟開天道振朔方升名晉土綽稟服神味彌積歲時承昔鸞師淨土諸業便甄簡權實搜酌經論會之通衢布以成化克念緣數想觀幽明故得靈相潛儀有情欣敬恒在汶水石壁谷玄中寺寺即齊時曇鸞法師之所立也中有鸞碑具陳嘉瑞事如別傳綽般舟方等歲序常弘九品十觀分時紹務嘗於行道際有僧念定之中見綽緣佛珠數相量如七寶大山又覩西方靈相繁縟難陳由此盛德日增榮譽遠及道俗子女赴者彌山恒講無量壽觀將二百遍導悟自他用為資神之宅也詞既明詣說其適緣比事引喻聽無遺抱人各掐珠口同佛號每時散席響彌林谷或邪見不信欲相抗毀者及覩綽之相善飲氣而歸其道感物情為若此也曾以貞觀二年四月八日綽知命將盡通告事相聞而赴者滿于山寺咸見鸞師在七寶船上告綽云汝淨土堂成但餘報未盡耳並見化佛住空天華下散男女等以裙襟承得薄滑可愛又以蓮花乾地而插者七日乃萎及餘善相不可殫紀自非行感備通詎能會此乎年登七十忽然齓齒新生如本全無歷異加以報力休健容色盛發談述淨業理味奔流詞吐包蘊氣霑醇醴并勸人念彌陀佛名或用麻豆等物而為數量每一稱名便度一粒如是率之乃積數百萬斛者並以事邀結令攝慮靜緣道俗響其綏導望風而成習矣又年常自業穿諸木欒子以為數法遺諸四眾教其稱念屢呈禎瑞具敘行圖著淨土論兩卷統談龍樹天親邇及僧鸞慧遠並遵崇淨土明示昌言文旨該要詳諸化範傳燈㝢縣歲積彌新傳者重其陶鎣風神研精學觀故又述其行相自綽宗淨業坐常面西晨宵一服鮮潔為體儀貌充偉并部推焉顧瞬風生舒顏引接六時篤敬初不缺行接唱承拜生來弗絕纔有餘暇口誦佛名日以七萬為限聲聲相注弘於淨業故得鎔鑄有識師訓觀門西行廣流斯其人矣沙門道撫名勝之僧京寺弘福逃名往赴既達玄中同其行業宣通淨土所在彌增今有惰夫口傳攝論惟心不念緣境又乖用此招生恐難繼相綽今年八十有四而神氣明爽宗紹存焉釋明淨密州人少出家味定為業潔志忠恪謹厚澄肅嘗居海畔蒙山宴坐經數十載人莫測之也後南遊東越天台諸山禪觀在懷無緣世習而衣服縷動止適時同侶禪徒未之弘仰山粒致絕日至村中每從乞食齎還中路值於群虎皆張口閉目若有饑相淨曰吾經行山澤多矣虎兕無心畏之今列于路旁豈非為食耶乃以匕抄飯內其口中餘者對而噉盡告曰知來食少輒濟自他殊不副懷深用多愧明日乞食虎又如前頻有此緣同伴乃異其度晚為山幽地濕形報苦之還返海隅住蒙山側內遵道觀外感潛通令問遠流靈祇叶應嘗值亢旱苗稼並枯淫祀之流妄祈邀請雖加懇惻終不能致淨曰可罷諸邪禱吾獨能降遂結齋靜室七日平旦雲布雨施高下滂注百姓利焉戴之若聖貞觀三年從去冬至來夏六月逈然無雨天子下詔釋李兩門岳瀆諸廟爰及淫祀普令雩祭於時萬里赫然全無有應朝野相顧慘愴無賴有潘侍郎者曾任密州知淨能感以狀奏聞勅召至京令住祈雨告以所須一無損費惟願靜念三寶慈濟四生七日之後必降甘澤若欲酬德可國內空寺并私度僧並施其名得弘聖道有勅許焉雖無供給而別賜香油於莊嚴寺靜房禪默至七日向曉問守衛者曰天之西北應有白虹可試觀之尋聲便見淨曰雨必至矣須臾雲合驟雨忽零比至日晡海內通洽百官表奏皇上之功淨之陰德全無稱述新雨初晴農作並務苗雖出隴更無雨嗣萎仆將死設計無所左僕射房玄齡躬造淨所請重祈雨淨曰雨之昇降出自帝臣淨有何德敢當誠寄前許無報幽顯同憂若循素請雨亦應致以事聞奏帝又許焉乃勅權停俗務合朝受齋淨乃依前靜坐七日之末又降前澤四民歡泰遂以有年勅乃總度三千僧用酬淨德其徵應難思厥相叵測也但以京輦諠雜性不狎之請還本鄉之茂勝寺山居係業竟不測其存沒云同寺僧慧融亦以禪業見稱山居服食呪水治病勅召入京亦住普光寺二宮敬重禮遺相接云釋慧熙益州成都人童稚出家善明篇韻文筆所趣宛而成章與綿州震響寺榮智齊名俱為沙彌卓異翹秀後與成都大石寺沙彌道微連韻賦詩微有言隙因即屏絕人事栖心禪業年登受具周聞經律摘採英華用為賞要攝論雜心精搜至理尤耽三論是所觀門嘗難基法師塵識義初問以小乘基以大乘通之熙笑曰大無不攝但失小宗晚住州南空慧寺立性孤貞不群諸偶弊於食息專想虛玄一坐掩關二十餘日眾以不食既久恐損身命假以餘詞曰國家搜訪藝能甚急今不食閉門世人謂聖願息流言可時處眾熙懼矯飾便開門進食由是迄今將三十載一身獨立不畜侍人一食而止不受人施有講便聽夜宿本房但坐床心兩頭塵合自餘房地惟有一蹤餘並莓苔青絮衣服弊惡僅免遮羞冬則加納夏則布衣以冬破納懸置梁上有聞熙名就房參拜迎逆接候累日方見時發幽問吐言高遠預有元席皆共憚之年九十卒今見在具諸聞覩釋世瑜姓陳氏住始州父母早亡庸作取濟身形偉壯長八尺三寸希向佛理無由自達大業十二年往綿州震響寺倫法師所出家一食頭陀勤苦相續又往利州入籍住寺後入益州綿竹縣響應山獨住多年四猿供給山果等食有信士母家生者負糧來送驚訝深山常燒熏陸沈水香等既還山半路見兩人形甚青色狀貌希世負蓮華蔗芋而上云我供給禪師去也然其山居三年之中食米一石七斗六時行道以猿鳴為候初惟一泉後有三泉又出流下貞觀元年夢有四龍來入心眼既覺大悟三論宗旨遂往靈睿法師講下所聞詞理宛若舊尋即而覆述便往綿州住大施寺至十九年四月八日往崇樂寺言話欲遊方去或有喻曰只此寺者是諸方也因還大施本房香氣滿室坐處之地涌三金錢合眾尋香從瑜房而出乃見加坐手尚執鑪刺史劉德威慶所未聞作龕坐之三年不倒春秋六十三矣釋智聰未詳何人昔住楊都白馬寺後住止觀專聽三論陳平後度江住楊州安樂寺大業既崩思歸無計隱江荻中誦法華經七日不饑恒有四虎遶之而已不食已來經今十日聰曰吾命須臾卿須可食虎曰造天立地無有此理忽有一翁年可八十掖下挾船曰師欲度江栖霞住者可即上船四虎一時目中淚出聰曰救危拔難正在今日可迎四虎於是利涉往達南岸船及老人不知何在聰領四虎同至栖霞舍利塔西經行坐禪誓不寢臥眾徒八十咸不出院若有凶事一虎入寺大聲告眾由此驚悟每以為式聰以山林幽遠糧粒艱阻乃合率楊州三百清信以為米社人別一石年一送之由此山糧供給道俗乃至禽獸通皆濟給至貞觀二十二年四月八日小食訖往止觀寺禮大師影像執鑪遍禮又往興皇墓所禮拜還歸本房安坐而卒異香充溢丹陽一郭受戒道俗三千餘人奔走山服哀慟林野時年九十九矣釋僧徹姓靳河東萬泉人性戒肅成專思出俗慈親鞠養未始遂之既丁荼蓼乃遵前志樂行蘭若索居蒲坂習平等觀行實言法四俗歸向承化連邑有孤山者一曰介山即介子推之故地也其山陽介村是也遂依而結業廕以石巖汲以下隰積歲崇道物莫不高之各捨財力共營圖搆地本高險古絕源泉念矜勞倦中宵軫結晨行巖險見如潤濕以刃導之應手泉涌道俗聞此驚歎歸依更廣其居重增檐宇秦州刺史房仁裕表陳其事請立伽藍下勅許之今之陷泉寺是也公私榮慶請徹以為寺主俯從物議遂乃從之四方慕義相顧依投門庭充𨶮及徐王部絳寺又屬焉軒蓋來尋請居州邑傾心盡禮厚供彌隆俄復還山却崇前業性在慈仁弘濟成務所以群鳥食於掌上宿雁翔於廡下年踰杖國未嘗痾瘵忽告眾曰吾將去矣食畢收衣結加趺坐顧命徒屬誡以清言並令出戶惟留一侍告曰夫識神託形寄之煖氣命盡身冷方可觸吾告已冥目若禪久而尋視方知已絕春秋七十有七初未終之前三朝山樹通變白色橫雲如帶絕望東西道俗奔赴制以心喪禮也遷靈山窟還依坐之府縣官庶子來咸會是日風清景亮降以白花六出淨榮如雪如氷衣以承之不久便散三載之後猶存初坐門人為之易簣而衣服一無霑污乃就加漆布弟子等懷雙林右脇之教抱兩楹負手之歌以為相好像設開含識之尊嚴法慧聲光寔超生之津濟遂就京邑奉建高碑高一丈五尺刻像書經兼敘言行引還本寺聚眾立之度支尚書唐臨昔住萬泉贊承俗務性行專信素奉歸依後仕華省常修供養顧惟德本便勒銘云論曰經不云乎禪智相遵念慧攸發神遊覺觀惑使交馳何以知其然耶但由欲界亂善性極六天色有定業體封八地通為世結愛味不殊莫非諦集重輕故得報居苦樂終是輪迴諸界未曰缺有超生且據亂靜二緣故略分斯兩位然則三乘賢聖及以六邪諸道將欲厭煩栖慮莫不依乎初定良以心殊麁妙慧開通局遂有總斯一地得延邪正之機自釋教道東心學惟尠逮于晉世方聞睿公故其序云慧理雖少足以開神達命禪法未傳至於攝緣繫想寄心無地時翻大論有涉禪門因以情求廣其行務童壽弘其博施乃為出禪法要解等經自斯厥後祖習逾繁曇影道融厲精於淮北智嚴慧觀勤志於江東山栖結眾則慧遠標宗獨往孤征則僧群顯異雖復攝心之傳時或漏言而茂績芳儀更開正級不可怪也逮于梁祖廣闢定門搜揚㝢內有心學者總集楊都校量深淺自為部類又於鍾陽上下雙建定林使夫息心之侶栖閑綜業于時佛化雖隆多遊辯慧詞鋒所指波涌相凌至於徵引蓋無所算可謂徒有揚舉之名終虧直心之實信矣或有問曰大聖垂教正象為初禪法廣行義當修習今非斯時固絕條緒其次不倫方稱末法乃遵戒之行斯為極也請為陳之因為敘曰原夫正象東設被在機緣至於務道無時不契然教中廣敘信法兩徒誠由利鈍等機所以就時分位若能返源體道深厭諸有學與佛世其德齊焉故初千年為正法也即謂會正成聖機悟不殊第二千年依教修學情投漸鈍會理叵階攝靜住持微通性旨然於慧釋未甚修明相似道流為象法也第三千年後末法初基乃至萬年定慧道離但弘世戒威儀攝護相等禪蹤而心用浮動全乖正受故並目之為末法也善見所述法住萬年護持紹世斯蹤可錄若依魔耶時度千年不修靜觀非通論也約相兩敘矛盾乖蹤就緣判教各有其致至如世情煩掉人顯鋒奇纔斆攝持皆耽昏漠良由習熏既遠宗匠難常即目易觀未遑誠教善見萬載亦是明規准法具修義無不獲故論敘云初五千年得三達智後五千但遵戒法前據道法理觀住持故云入聖諒有從也後在事亂相法住持何能入道故言是也若乃心水鼓浪則世業難成想寂離緣則理自清顯涅槃敘定豈不然哉故使聚落宴坐神仙致譏空林睡臥群聖同美誠以託靜求心則散心易攝由攝心故得解脫也成論明誥斯可師之世有定學妄傳風教同纏俗染混輕儀迹即色明空既談之於心口體亂為靜固形之於有累神用沒於詞令定相腐於脣吻排小捨大獨建一家攝濟住持居然乖僻智論所敘前傳具彰頃世已來宗斯者眾豈不以力劣兼忘之道神頓絕慮之鄉乎所以託靜栖心群籍皆傳其靈異處喧攝慮今古未章其感通信可依矣高齊河北獨盛僧稠周氏關中尊登僧實寶重之冠方駕澄安神道所通制伏強禦致令宣帝擔負傾府藏於雲門冢宰降階展歸心於福寺誠有圖矣故使中原定苑剖開綱領惟此二賢接踵傳燈流化靡歇而復委辭林野歸宴天門斯則挾大隱之前蹤捨無緣之高志耳終復宅身龍岫故是行藏有儀耶屬有菩提達摩者神化居宗闡導江洛大乘壁觀功業最高在世學流歸仰如市然而誦語難窮厲精蓋少審其慕則遣蕩之志存焉觀其立言則罪福之宗兩捨詳夫真俗雙翼空有二輪帝網之所不拘愛見莫之能引靜慮籌此故絕言乎然而觀彼兩宗即乘之二軌也稠懷念處清範可崇摩法虛宗玄旨幽賾可崇則情事易顯幽賾則理性難通所以物得其筌初同披洗至於心用壅滯惟繁云之儔羌難述矣義當經遠陶治方可會期十住羅縠抑當其位褊淺之識隳惰之流朝入禪門夕弘其術相與傳說謂各窮源神道冥昧孰明通塞是知慮之所及智之所圖無非妄境惑心斯是不能返照其識浪執境緣心靜波驚多生定障即謂功用定力所知外彰其說逞慢惑此則未閑治障我倒常行他力所持宗為正業真妄相迷卒難通曉若知惟心妄境不結返執前境非心所行如此胥徒安可論道有陳智璀師仰慧思思寔深解玄微行德難測璀亦頗懷親定聲聞于天致使陳氏帝宗咸承歸戒圖像榮供逸聽南都然而得在開弘失在對治宗仰之最世莫有加會謁衡岳方陳過隙未及斷除遂終身世隋祖創業偏宗定門下詔述之具廣如傳京邑西南置禪定寺四海徵引百司供給來儀名德咸悉暮年有終世者無非坐化具以聞奏帝倍歸依二世纘曆又同置寺初雖詔募終雜講徒故無取矣當朝智顗亦時禪望鋒辯所指靡不倒戈師匠天庭榮冠朝列不可輕矣至如慧越之捋虎鬚道舜之觀牛影智通之感奇相僧定之制強賊節操如鐵石志概等雲霄備彰後傳略為盡美又如慧瓚禪主嘉尚頭陀行化晉趙門庭擁盛威儀所擬無越律宗神解所通法依為詣故得理事符允有契常規道有窊隆固為時喪致延帝里沒齒亡歸頃有志超即承瓚胤匡讚之德乃跨先摸弘訓之規有淪其緒故使超亡其風頹矣觀夫慧定兩級各程其器皆同佛日無與抗衡然於祥瑞重沓預覿未然即世恬愉天仙叶衛誠歸定學蓋難奪矣頃世定士多削義門隨聞道聽即而依學未曾思擇扈背了經每緣極旨多虧聲望吐言來誚往往繁焉或復耽著世定謂習真空誦念西方志圖滅惑肩頸掛珠亂掐而稱禪數納衣乞食綜計以為心道又有倚託堂殿遶旋竭誠邪仰安形苟存曲計執以為是餘學並非氷想鏗然我倒誰識斯並戒見二取正使現行封附不除用增愚魯向若纔割世網始預法門博聽論經明閑慧戒然後歸神攝慮憑准聖言動則隨戒策修靜則不忘前智固當人法兩鏡真俗四依達智未知寧存妄識如斯習定非智不禪則衡嶺台崖扇其風也復有相迷同好聚結山門持犯蒙然動掛形網運斤揮刃無避種生炊爨飲噉寧慚宿觸或有立性剛猛志尚下流善友莫尋正經罕讀瞥聞一句即謂司南唱言五住久傾十地將滿法性早見佛智已明此並約境住心妄言澄靜還緣心住附相轉心不覺心移故懷虛託生心念淨豈得會真故經陳心相飄鼓不停蛇舌燈焰住山流水念念生滅變變常新不識亂念翻懷見網相命禪宗未閑禪字如斯般輩其量甚多致使講徒例輕此類故世諺曰無知之叟義指禪師亂識之夫共歸明德返迷皆有大照隨妄普翳真科不思此言互談名實考夫定慧之務諒在觀門諸論所陳良為明證通斯致也則離亂定學之功見惑慧明之業若雙輪之遠涉等真俗之同遊所以思遠振於清風稠實標於華望貽厥後寄其源可尋斯並古人之所同錄豈虛也哉續高僧傳卷第二十五唐釋道宣撰習禪六唐鄧州寧國寺釋惠祥傳一京師大莊嚴寺釋曇倫傳二蒲州仁壽寺釋普明傳三蒲州栢梯寺釋曇獻傳四秦州永寧寺釋無礙傳五江州東林寺釋道暀傳六荊州四層寺釋法顯傳七荊州神山寺釋玄爽傳八惠普蒲州救苦寺釋惠仙傳九益州淨惠寺釋惠寬傳十衛州霖落泉釋僧倫傳十一京師西明寺釋靜之傳十二丹陽沙門釋智巖傳十三釋惠祥姓周十五出家頭陀乞食默自禪誦不與眾同人不知其道觀淺深而高其遠度聽三論聞提婆護法之功莫辭開腹之患有心慕焉遊諸法肆見威儀不整者謂人曰祥受戒後住持此寺令入律行年十九染患三月救療無徵夜中宴坐歎曰大丈夫本欲以身從道於末法中摧伏非法如何此志未從為病所困將曉有一人長丈餘謂曰但誦涅槃無愁不差至旦即誦三日便瘳當年誦通卒其所望進具聽律鏡其文理住寧國寺常講四分及涅槃經所以護法維持不惜身命諸有虧違望風整肅大業末夏中因食口中得舍利不辯棄地輒還在口如是數四疑是真身砧槌不碎遂聲鐘告眾白黑咸集祥涕泣焚香願降威力須臾放五色光異香遍郭眾覩希有屠獵改業乃使市無肉肆因與四眾起浮圖九級高百餘尺今見在然其所食日止一餐不問多少頓受不益體貌肥白可長八尺有餘行路不識莫不怪仰刺史李昇明至寺怪異謂群官曰此道人膚容若此日可應噉一羊語訖覺手足不隨乘馬失御諸官以實告之便悔謝還復大使權茂行至鄧州又怪昇明曰此大德非凡具說往緣茂不信請將七日試以麁食而膚色更悅茂愧伏悔先不信之罪將終手執經胡跪謂弟子曰吾今逝矣汝好住持無令絕滅又感異香盈郭以大業末年八月卒春秋七十氣命雖絕而胡跪執經如初遠近奔赴見其卓然無不歎訝釋曇倫姓孫氏汴州浚儀人十三出家住修福寺依端禪師然端學次第觀便誡倫曰汝繫心鼻端可得靜也倫曰若見有心可繫鼻端本來不見心相不知何所繫也咸怪其言嗟其近學如何遠悟故在眾末禮悔之時隨即入定大眾彈指心恒加敬後送鉢上堂未至中路卓然入定持鉢不傾師大深賞異時告曰令汝學坐先淨昏情猶如剝葱一一重重剝却然後得淨倫曰若見有葱可有剝削本來無葱何所剝也師曰此大根大莖非吾所及不敢役使進具已後讀經禮佛都所不為但閉房不出行住坐臥唯離念心以終其志次知直歲守護僧物約勒家人曰犬有別食莫與僧粥家人以為常事不用倫言犬乃於前嘔出僧粥倫默不及之後又語令莫以僧粥與犬家人還妄答云不與群犬相將於僧前吐出粥以示之於時道俗咸伏其敬慎又有義學論士諍來問者隨言即遣無所罣礙仁壽二年獻后亡背興造禪室召而處之還即揜關依舊習業時人目之為臥倫也有興善粲法師者三國論首無學不長怪倫臥禪言問清遠遂入房與語探究是非倫笑曰隨意相審遂三日三夕法樂不眠倫述般若無底空華焰水無依無主不立正邪本性清淨粲乃投地敬之讚歎心路無滯不思議乃如此也倫在京師道俗請者相續而機緣不一悟迷亦多雖善巧方便令其醒悟然各自執見見我為是故此妙理罕得廣流有玄琬律師靜琳法師率門人僧伽淨等往來受法如此眾矣如魚子焉武德末年疾甚於莊嚴寺傍看寂然有問往生何處答無盡世界又便寂然僧伽以手尋其冷觸私報人曰冷觸到膝四大分離亦應生苦倫曰此苦亦空問曰捨報云何報曰我主四大鬪在已到屈膝死後籧篨裹棄之莫作餘事又曰打五更鐘未報曰未少時維那打鐘看之已絕年八十餘矣諸門學等依言送於南山露骸散於中野有鮑居士者名慈氏弱年背俗愛樂禪觀生不妻娶形無飾華親承德音調心養氣守閑抱素承倫餘業五十餘年七十五矣釋普明姓衛氏蒲州安邑人十三出家事外兄道愻法師愻道會晉川備如別傳又以明付廷興寺沙門童真為弟子明抗志住持以大法為己任性聰敏解冠儕流講聽相仍無法不學周游肆席曾無住房固使勤而有功經論滿抱十八講勝鬘起信夙素聽之知成大器進具已後專師涅槃四分攝論年二十四講涅槃三十解攝論凡所造言賓主兼善使夫妙義積散出言傳旨聲流遠近大業六年召入大禪定道場止十八夏名預上班學功所位四事既備不闕二嚴武德元年桑梓傾音欣其道洽以事聞上有旨令住蒲州仁壽寺鎮長弘道無憩寒暄晝談夜坐語默依教心神爽迅應對雲雨曾未聞經一披若誦斯則宿習博聞故能若此不可比擬也日常自勵戒本一遍般若金剛二十遍六時禮懺所有善根迴向淨土至終常爾凡造刻檀像數十龕寫金剛般若千餘部請他轉五千餘遍講涅槃八十餘遍攝論勝鬘諸經論等遍數難紀以年月終于住寺春秋八十有六有弟子義淹戒潔清嚴見知可領乃遷葬蒲坂東原鑿穴處之樹碑其側釋曇獻姓張京兆始平人少事昌律師昌虞鄉賈氏淨行無玷精誠有聞股肱之地咸所宗仰所居谷口素有伽藍因此谷名遂題寺目為靜林寺也昌師攝念經行常志斯所周武道喪隳壞仁祠昌與俗推移而律儀無缺隨文御㝢重啟法筵百二十僧釋門創首昌膺此選也仍僧別度侍者一人獻預其位住大興善昌後言歸故里悲瘞靈儀掘出莊嚴一佛興世博修院宇延緝殿堂緇素翹誠始欣有奉彫造未畢而昌遷逝族人百數仰慨尊容以為法儀雖歿神足猶在祈請續功便從來意遂移仁壽而經營之故得棟宇高華不日而就兩寺圍繞四部歸依州司以靜林仁壽已偃慈風栢梯淨土未霑甘露遂屈知栢梯寺任俯從物議又之斯位釋網斯張萬目咸舉仁洽開務有漏天舟眾侶弘之大小齊美以貞觀十五年正月微疾至十五日旦便曰須向靜林至卯時乃有非常雲霧遺形於栢梯山東南山頂其夜大放光明形如華蓋四照遠近迄于三夕經旬其屍為靜林寺側諸信士潛竊神柩寘于靜林南山之頂栢梯初不知也於彼山頂兩夜續放神光始詳其故兩處交競九載于茲緣州歷縣紛黷不息豈非通幽洞理致茲靈感深慈博惠戀結眾情者乎弟子等勒銘山阿敢告惟遠釋無礙姓陳氏有晉永嘉中原喪亂南移建業父曠梁元帝徵蕃學士以承聖元年礙生成都神姿特異知有濟器九歲便能應對十歲入學隨聞不忘入長安遇姚秦道安法師安與語怪其意致勸令出家即依言欣喜令誦太子瑞應經思尋聖跡哀泣無已天和三年周武皇后入朝投名出家先蒙得度雖有弱冠戒操逾嚴建德三年法門大壞隨緣陸沈乃值泥塗情逾氷王開皇開法即預搜揚便住永寧於齊大德超法師所聽智度論一聞教義神思豁然財食頓清形心俱遣又入長安學十地阿毘曇等時休法師於興善寺命講大論辯析分明義端無擁然於文句頗滯弘通因誦本文獲六十卷因抱心疾獎眾斯睽便還秦隴開皇十年總管河間王特屈寺任統御遺法大業二年召入洛陽於四方館刊定佛法後還永寧依前綱理大業五年煬帝西征躬受勞問賜綵二百段十三年州破入京住莊嚴寺眾以素知寺任識達機緣還欲請之任非所好以武德八年還返故寺以無相觀而自調伏貞觀十九年二月二十八日無疾而終春秋九十四道俗哀慟若喪厥親焉釋道暀姓周汝南人幼而精確希志尚聞古跡勝人心願齊之負笈金陵居高座寺聽阿毘曇心妙達關鍵非其好也欽匡山遺軌每逸言前隋開皇十二年依大將軍周羅侯遠屆廬岳止東林精舍心願匿迹無事音塵山寺法擁勸引非一遂不拒命弘道度人修建僧坊四時無絕隋季寇擾華戎薦臻獎撫門徒如初不替貞觀二年九月身示有疾曾未浹旬忽有大星天墮正在西閣大水池中照朗山谷逾千炬火二十三日僧正中食謂弟子曰僧食訖未答曰未竟又曰且喚上座來依言既至委以後事跏坐而卒諸殿閣門一時自開異香滿寺七日便歇年八十二矣釋法顯姓丁氏南郡江陵人十二出家四層寺寶冥法師服勤累戴諮詢經旨有聞欲界亂地素非道緣既已生中如何解網冥曰眾生並有初地味禪時來則發雖藏心種歷劫不亡有顗禪師者荊楚禪宗可往師學會顗隋煬徵下迴返上流於四層寺大開禪府徒侶四百蔚爾成林遂依座筵聞所未悟但夙有成惠通冠玄蹤霜鐘暫扣已傳秋駕顗師去後更求明智成彥習皓等諸師皆升堂覩奧盡斲磨之思及將冠具歸依皓師誨以出要之方示以降心之術因而返谷靜處閑居二翼之外一無受畜屬炎靈標季薦羅戎火餒殘相望眾侶波奔顯獨守大殿確乎卓爾旦資蔬水中後絕漿賊每搜求莫之能獲自非久入慈室已抽毒箭焉能忍茲疲苦漏此凶威自爾宴坐道安梅梁殿中三十餘載貞觀之末乃出別房斯則追善吉之息嫌蹈空生之祕行也此堂有彌勒像并光趺高四十尺八部圍繞彌天之所造也其寶冠華帳供具經臺並顯所營堂中五燈晝夜不絕忽一燈獨熾焰高丈餘又一夜著五色衣人持一金瓶來奉又夢見一僧威容出類曰可往蘄州見信禪師依言即往雙峯更清定水矣而一生染疾並信往業受而不治衣食節量柔順強識所住之寺五十餘年足不出戶永徽三年十二月八日夢身坐寶殿授四眾戒因覺漸疾至四年正月十一日午時遷化時年七十有七顯以昨日申時自能起止神彩了亮踞禪床盥浴剃髮就床跏坐儼然便絕其月十七日葬于大明寺之北原未終之前門人見室西壁大開白光遍滿夜有白雲亘屋南北二道堂中佛事並搖動明日方絕自終及葬嶷然匡坐合境道俗奔湊凄零荊州都督紀王夙傳歸戒欽仰清暉命右記室郭瑜銘之于彼釋玄爽姓劉南陽人早修聰行見稱鄉邑弱冠成婚妻少而美然爽貞誠清拔志高蹈視如革囊情逾厭離既無所偶棄而入道遊習肆道有空俱涉末聽龍泉寺璇法師欣然自得覃思遠詣頗震時譽又往蘄州信禪師所伏開請道亟發幽微後返本鄉唯存攝念長坐不臥繫念在前時本邑沙門藹明稜法等並禪府名宗往結投分以永徽三年十月九日遷神山谷時襄部法門寺沙門惠普者亦漢陰之僧傑也研精律藏二十餘年依而振績風霜屢結七眾齊肅屬城挹歸晚專入定門廓銷事惱紀王作鎮將修追聖廢寺綱總須人眾舉於普王深賞會又楚俗信巫殺為淫祀普因孚化比屋崇仁又修明因道場凡三十所皆盡輪奐之工仍彫金碧之飾以顯慶三年終於本寺春秋八十釋惠仙姓趙河東蒲坂人幼懷出俗緣故淹留年登不惑方果前願既出家後隨方問津雖多涉獵然以華嚴涅槃二部為始卒之極教也迄於暮齒耽味逾深謂人曰斯之二寶全如意珠無忽忘而暫捨也所以執卷自隨有若雙翼或有言晤披而廣之住處衝要九衢都會百疾相投萬禍憑救而仙慈善根力無假多方但令念佛無往不濟由是蒙祐遐邇傾心寺有大像製過十丈年載既久埃塵是生棟宇頹落珠璣披散遂控告士俗更締構之雖淹星律大造云就爾後年漸遲暮夢僧告曰卿次冬間必當遷化可早運行應得延期便如常業不以為慮至九月中微覺不愈知終在近告侍人曰吾出家有年屢受菩薩戒今者更欲受之召諸大德並不赴命乃曰大德但自調耳何名度人又曰但取戒本讀誦訖自慶潛然而止入夜有異天仙星布前後高談廣述乍隱乍顯合寺聞見或見佛像來入房者日次將午忽起坐合掌召眾人曰大限雖多小期一念並好住願與諸眾為歷劫因緣遂臥氣絕年七十五即永徽六年十一月十七日也道俗哀之雲布原野寺有亘禪師頴脫當時有聲京洛行彌勒願生在四天覩仙行業感徵告眾曰必見慈氏矣若乖斯者何能禎應若是乎釋惠寬姓楊氏益州綿竹孝水人父名瑋元是三洞先生五經博士崇信道法無敦釋教所以綿梓益三州諸俗每歲率送租米投於瑋令保一年安吉皆與章符而去而車馬擁門如市初時瑋妻懷孕心性改異辛鯹惡厭乃生一女名為信相性好閒靜無緣嗜慾後又懷姙身極安隱恒有異相及其生也母都不覺忽然自出都無惡露然有異香又不啼叫乃至有識未曾糞穢淋席父母抱持方乃便利即寬身也而臂垂過膝性恒香潔不近腥臊年五六歲與姊信相於靜處坐禪二親怪問答曰佛來為說般若聖智界入等法門共姊評論法相父是異道不解其言附口錄得二百餘紙有龍懷寺會師聞有奇相至其所父以示之會曰並合佛經無所參錯有異禪師不知何來於淨慧寺入火光三昧召彼女來及至不入云是火聚禪師曰何不以水滅之女即作水觀滅火而入禪師驗知深入諸定勸令出家父母受娉及婿家不許諸道俗官人為出財贖之因有度次姊與寬身俱時出家時隨蜀王秀在益請入城內妃為造精舍鎮恒供養嘗出於路人有疑者尼召來曰莫於三寶所生異心自受罪苦彼人悔過有造功德須物者燒香祈請掘地獲金無不充足斯事非一至於食飲欲食便食不食乃經歲序時人目之聖尼即今本寺猶號聖尼寺也寬年十三常樂獨坐面無怒相言常謙下依空慧寺胤禪師龍懷寺會闍梨所隨聞經律一覽無遺未聞之經曾不知義有難問者皆為通之初造龍懷寺會有徒屬二百餘人並令在役唯放於寬有怨及者會曰斯人是吾本師何得使作昔周滅法依相禪師隱于南山及隋興教辭師還蜀嘗受囑云汝還蜀土大有徒眾有名惠寬可將攝也我憶此事計師死日當寬受生無得致怪自爾在山依閑業定年三十還綿竹教化四遠聞名見形並捨邪歸正其俗信道父母皆道歸佛捨宅為寺于今見在綿竹諸村皆為立寺堂殿院宇百有餘所修營至今年常大齋道俗咸會正月令節成都寺七十縣競迎供待有大功德須得經營但請寬至施物山積貞觀中有僧名策持呪有驗於洛縣忽死見閻王曰比獄中罪人多應為誦呪并請寬師講地獄經從此得穌經月不作復更悶絕閻王大怒命牛頭使打鐘子百下我令誦呪講經為眾生故何不作策穌已即從洛縣往綿竹三十里未至疲臥忽有異旋風吹起須臾至寬所正集轉經告策曰昨所住處大為勞苦為眾生者不得辭苦即令策登坐誦呪大眾聞皆流汗寬仍集眾講地獄經貞觀二十年綿竹宋尉云我不信佛唯信周孔然我兩度得佛力一為人在門側小便置佛便止一為冬月落水燒木佛自炙寬聞之致書曉喻宋曰此道人徵異者當試有靈不取書名處用拭大便當即糞門裂脚起不得自唱我死即召寬來雖悔過造經像盈月便卒什邡縣陳家捨邪信佛以竹園為寺寬指授分齊爾許可為僧院中間一分堪立佛堂即斷一竹上竪標云此分齊處欲造佛寺當時生竹自乾佛堂斷竹泉水上涌尋掘數尺獲大石石下金瓶舍利七粒寬禮拜更請遂放光乃盛滿合四遠又集寺今見在永徽四年夏六月二十五日春秋七十卒於淨慧寺未終一月有五百神人長丈餘服天衣持華香及紫金華臺從西方來迎寬辭不堪發遣令去又於終日放羊從市向房悲數十聲至夜索水沐浴新衣跏坐執爐已命打無常鐘聲遍郭聞合郭咸集曰闍黎涅槃去空中哭聲寺內光明莫測其來道士等謂言燒守驚走來寺乃知其非自此入定氣盡乃知永逝寺內三橋一當寬房堂夜梁折聲震寺內明旦官人道士咸來慟哭寺中蓮池池水忽乾紅蓮變白寺中大豫樟樹三四人圍忽自流血血流入㵎㵎水皆赤月餘方息又十七級塼浮圖高數十丈裂開數寸又有雙鵝不知何來向靈鳴叫伏地不去葬時隨送出郭失之往無為山去寺二十里黑雲團空隨行注雨草木隨靡至山方散葬後縣內道俗七歲已上著服泣臨如是三年爾後至今凡設會家皆設兩座一擬聖僧一擬寬也今猶獲供送本寺靈相在山端坐如在自初至今竟無蟲血污穢朽腐之相斯則豈非不退菩薩身無萬戶蟲耶不然何以若此釋僧倫姓呂氏衛州汲人祖宗諸州刺史父詢隋初穆陵太守未孕之初二親對坐忽有梵僧秀眉皓首二侍持幡在其左右曰願為母子未審如何即禮拜之揮忽失所因爾有娠四月八日四更後生還見二幡翊其左右兼有異香產訖不見五歲已後迄於終亡恒自目見白光滿屋齊武平九年與父至雲門寺僧賢統師珉禪師所受法出家時年九歲二師問其相狀答以白光流臉二幡夾之歎曰子真可度因而剃落周武平齊時年十六與賢統等流離西東學四念處誦法華經至開皇初方興佛法雲門受具時年二十三又於武陽理律師所聽始半夏見五色光如車輪照倫心上眾並同見即於光中禮五十三佛猶未滅更禮三十五佛光乃收隱又與方願二師入黑山太行諸山行蘭若二十餘年大業末賊徒起領門人至衛州隆善寺仍為偽夏竇建德齊善行等請知僧事武德五年大統天下入太行抱犢山教徒學念處法由是四方負笈山路成蹊貞觀四年衛州刺史裴萬頃與諸官人請令下山日日受戒大有弘利以貞觀二十三年五月十三日四更忽告門人吾夜中於諸法得解脫謂成無學不謂天帝等迎言已而絕將殯於山而哀慟不止天極清朗無雲而降細雨眾咸異焉時年八十五矣釋靜之姓趙雍州高陵人父母念善絕無息胤祈求遍至而無所果遂念觀音旬內有娠能令母氏厭惡欲染辛腥永絕誕育之後年七八歲樂阿彌陀觀依文修學隨位並成行見美境骨觀明淨性樂出家既有一子誓而不許隨父任蜀不久崩亡意欲為父焚身報德有一賢人引金剛般若云捨身不如持經乃迴心剃剪用伸罔極一入法門翹誠逾厲隨聽經律而意在定門後從江禪師習觀而威容端雅見者發心貞觀初隱益部道江彭門山光化寺一十餘載常坐茅宇不居僧房四方集者二百餘人六時三業不負光景又別深隱入靈巖山大虫為偶無所驚擾利州道禪師素交既久請入劍閣北窮腹山徒侶十餘齎米四石恰至夏竟一石未盡小時鼻患肉塞百方無驗有僧令誦般若多心萬遍恰至五千肉鈴便落行至秦州被毒蛇螫苦楚叵言以觀行力便見善境自然除滅後遇疾苦依前得差乃撰諸家觀門以為一卷要約精最後學重之顯慶三年召入西明別立禪府利州本寺桂樹忽凋胡桃自拔佛殿無故北面仰地尊儀不損斯亦德動幽靈為若此也以顯慶五年春三月二十七日右脇而終於西明春秋五十七矣釋智巖丹陽曲阿人姓華氏在童丱日謂人曰世間但競耳目之前寧知死生之際鄉里異之知有遠度也及弱冠雄威武略智勇過人大業季年豺狼競逐大將軍黃國公張鎮州揖其聲節屈掌軍戎奏策為虎賁中郎將雖身任軍帥而慈弘在慮每於弓首挂漉囊所往之處漉水養蟲以為常事及偽鄭之在東都黃公龔行征伐相陣鬪將應募者多黃公曰非華郎將無以御之偽鄭大將人馬具全按轡揚鞭以槍剟地厲聲曰若能拔得方共決焉巖時跨馬徐來以腋挾槍而去次巖以槍剟地彼搖再三不動乃下馬交刃遂生擒之巖反刀截其頸曰吾誓不斷命且施君頸乃放之武德四年從鎮州南定淮海時年四十審榮官之若雲遂棄入舒州𡷗公山從寶月禪師披緇入道黃公眷戀追徵答曰以身訊道誓至薩雲願特捨恕無相撓擾既山藪幽隱蘭若而居豺虎交橫訓狎無恐忽見異僧身長丈餘姿容都雅言音清朗謂曰卿已八十一生出家宜加精進言訖不見蒙此幽屬精勵晨昏一切世間如幻如夢一時坐定正在谷中山水暴長形將欲沒熙怡端坐嶷然便退獵者問曰身命可重何不避耶答曰吾本無生安能避死獵者悟之所獲並放故山中飛走依託附焉昔同軍戎有睦州刺史嚴撰衢州刺史張綽麗州刺史閭丘胤威州刺史李詢聞巖出家在山修道乃尋之既矚山崖竦峻鳥獸鳴叫謂巖曰郎將癲邪何為住此答曰我癲欲醒君癲正發何由可救汝若不癲何為追逐聲已規度榮位至於清爽都不商量一旦死至荒忙何計此而不悟非癲如何唯佛不癡自除階漸貞觀十七年還歸建業依山結草性度果決不以形骸為累出處隨機請法僧眾百有餘人所在施化多以現事責覈竟之心周通故俗聞者毛竪零淚多在白馬寺後往石頭城癘人坊住為其說法吮膿洗濯無所不為永徽五年二月二十七日終於癘所顏色不變伸屈如恒室有異香經旬年七十八矣續高僧傳卷第二十五續高僧傳卷第二十六唐釋道宣撰習禪六之餘唐衡岳沙門釋善伏傳十四代州照果寺釋解脫傳十五普明僧潤州牛頭沙門釋法融傳十六衛州霖落泉釋惠方傳十七揚州海陵正見寺釋法嚮傳十八蘄州雙峯山釋道信傳十九江漢沙門釋惠明傳二十釋善伏一名等照姓蔣常州義興人生即白首性知遠離五歲於安國寺兄才法師邊出家布衣蔬食日誦經卷目覩七行一聞不忘貞觀三年竇刺史聞其聰敏追充州學因爾日聽俗講夕思佛義博士責之對曰豈不聞乎行有餘力所以博觀如不見信請問前聞乃試之一無所滯重為聯類佛教兩用疎通於是學館傾首何斯人之若斯也後逃隱出家志樂佛法欲罷不能忽逢山水淹留忘返斯因宿習非近學也至蘇州流水寺璧法師所聽四經三論又往越州敏法師所周流經教頗涉幽求至天台超禪師所示以西方淨土觀行因爾廣行交桂廣循諸州遇綜會諸名僧諮疑請決又上荊襄蘄部見信禪師示以入道方便又往廬山見遠公淨土觀堂還到潤州巖禪師所示以無生觀後共暉才二師入桑梓山行慈悲觀又為鬼神受戒莫噉肉神又降巫者令召伏受戒巫者殺生祀神神打之次死降語曰吾已於伏闍梨受戒誓不食肉如何為吾殺生愍爾愚癡且恕汝命後更爾者必加至死自後諸祀永絕羶腥常婺州二人同載績麻為貨至江神所一以蔬祭一欲殺生而未行其麻並濕前蔬祭麻並乾燥於是行人忌憚無敢肉祭故其授戒功驗人神敬仰有陵犯者立見禍害江淮間屠販魚肉鵝鴨鷄猪之屬受法開放市無行肆官人怪之有義興令素不信嫌伏動眾將加私度之罪伏昆季賂之其人忽即狗登繩床眾蛇惱患不久除名往常州筮之卦云由犯賢聖罪不可救其人得急就伏求免永徽二年被括還家然志好出俗見家如獄復往山居苦節翹勤人不堪其憂也眾又屯聚因為說法讚令行慈不殺者佛教之都門也不能行之若講禮而為倨傲耳又勸行六道供以先祖諸亡者無越此途又曰山有玉則草木潤泉有龍則水不竭住處有三寶則善根增長常在伏牛山以虎豹為同侶食蚊虻為私行視前六尺未曾顧眄經中要偈口無輟音大約十五觀四明論以為崖准顯慶五年行至衡岳意欲求靜返更屯結說法既久忽告曰一切無常氣息難保夜深各散緣盡當離時不測其言也便返閉而坐爾夜衡州諸寺鐘及笙管鳴聲徹曉道俗咸怪至房關掩乃破而開之見伏端坐久終便以奏聞釋解脫姓邢臺山夾川人七歲出家依投名匠志在出道唯在禪思遠近訪法無師不詣復住五臺縣照果寺隱五臺南佛光山寺四十餘年今猶故堂十餘見在山如佛光華彩甚盛至夏大發昱人眼口其側不遠有清涼山山下清涼即文殊師利遊處之地也有高行沙門曜者年百六歲自云我年五十時與解脫上人至中臺東南下三十里大孚靈鷲寺請見文殊行至花園北遇一大德形神慈遠徐行東去解脫頂禮發願我時精神欣喜不暇諮清解脫云已曾三度親見文殊誡語云汝自悔責若切至必悟道也便依言自咎晝夜剋責心便安靜又感諸佛見身說偈曰因問寂滅法何者是若為教人令解之諸佛即隱空中聲曰方便智為燈照見心境界欲究真實法一切無所見遂依此法化導有緣在山學者來往七八百人四遠欽風資給弘護四十餘年常在佛光永徽中卒今靈軀尚在嶷然坐定在山窟中又五臺南娑婆寺南五六里普明禪師獨靜坐禪求見文殊意欲請法有神人空中告曰汝無神習止可長生龕前取藥服之可得延壽明懷疑不決後又告曰藥名長松汝何不服此藥無毒明便依言服之又告同行諸僧已騰空而去厥處見在去恒岳目矚相接又有僧禪師者住欣州秀容建國寺恒於定襄來望人山南坐禪餌藥年將八十道俗尊仰不知志入何法而興歎者號不可思議人其山靈泉望迹石上見在祈福者眾永徽中有人無目不知何來彈琵琶誦法華一部向望人山手彈口誦以娛此山亦不測其然釋法融姓韋潤州延陵人年十九翰林墳典探索將盡而姿質都雅偉秀一期喟然嘆曰儒道俗文信同糠粃般若止觀實可舟航遂入茅山依炅法師剃除周羅服勤請道炅譽動江海德誘幾神妙理真筌無所遺隱融縱神挹酌情有所緣以為慧發亂縱定開心府如不凝想妄慮難摧乃凝心宴默於空靜林二十年中專精匪懈遂大入妙門百八總持樂說無盡趣言三一懸河不窮貞觀十七年於牛頭山幽栖寺北巖下別立茅茨禪室日夕思想無缺寸陰數年之中息心之眾百有餘人初構禪室四壁未周弟子道綦道憑於中攝念夜有一獸如羊而入騰倚揚聲脚蹴二人心見其無擾出庭宛轉而遊山有石室深可十步融於中坐忽有神蛇長丈餘目如星火舉頭揚威於室口經宿見融不動遂去因居百日山素多虎樵蘇絕人自融入後往還無阻又感群鹿依室聽伏曾無懼容有二大鹿直入通僧聽法三年而去故慈善根力禽獸來馴乃至集于手上而食都無驚恐所住食厨基臨大壑至於激水不可環階乃顧步徘徊指東嶺曰昔遠公拄錫則朽壞驚泉耿將整冠則枯甃還滿城感所及豈虛言哉若此可居會當清泉自溢經宿東嶺忽涌飛泉清白甘美冬溫夏冷即激引登峯趣釜經廊此水一斗輕餘將半又二十一年十一月巖下講法華經于時素雪滿階法流不絕於凝氷內獲花二莖狀如芙蓉璨同金色經于七日忽然失之眾咸歎仰永徽三年邑宰請出建初講揚大品僧眾千人至滅諍品融乃縱其天辯商搉理義地忽大動聽侶驚波鐘磬香床並皆搖蕩寺外道俗安然不覺顯慶元年司功蕭元善再三邀請出在建初融謂諸僧曰從今一去再踐無期離合之道此常規耳辭而不免遂出山門禽獸哀號逾月不止山㵎泉池擊石涌砂一時填滿房前大桐四株五月繁茂一朝凋盡至二年閏正月二十三日終於建初春秋六十四道俗哀慕宮僚軫結二十七日窆於雞籠山幢蓋笳簫雲浮震野會送者萬有餘人傳者重又聞之故又重緝初融以門族五百為延陵之望家為娉婚乃逃隱茅岫炅師三論之匠依志而業又往丹陽南牛頭山佛窟寺現有辟支佛窟因得名焉有七藏經畫一佛經二道書三佛經史四俗經史五醫方圖符昔宋初有劉司空造寺其家巨富用訪寫之永鎮山寺相傳守護達於貞觀十九年夏旱失火延燒五十餘里二十餘寺并此七藏並同煨燼嗟乎回祿事等建章道俗悼傷深懷惻愴初融住幽栖寺去佛窟十五里將事尋討值執藏顯法師者稽留日夕諮請經久許之乃問融所學并探材術遂寄詩達情方開藏給於即內外尋閱不謝昏曉因循八年抄略粗畢還隱幽栖閉關自靜房宇虛廓惟一坐敷自餘蔓草苔莓擁結坐床塵高二寸寒不加絮暑絕追涼藉草思微用畢形有然而吐言包富文藻綺錯須便引用動若珠聯無不對以宮商玄儒兼冠初出幽栖寺開講大集言詞博遠道俗咸欣永徽中江寧令李修本即右僕射靜之猶子生知信向崇重至乘欽融嘉德與諸士俗步往幽栖請出州講融不許乃至三返方遂之舊齒未之許後銳所商搉及登元座有光前傑答對若雲雨寫送等懸河皆曰聞所未聞可謂中興大法於斯人也聽眾道俗三千餘人講解大集時稱榮觀爾後乘茲雅聞相續法輪邑野相趨庭宇充𨶮時有前修負氣望日盱衡乍聞高價驚惶府俞來至席端昌言徵責融辭以寡薄不偶至人隨問答遺然猶謙挹告大眾曰昔如來說法其理猶存人雖凡聖義無二准何為一時一席受身之眾塵沙今雖開演領悟之賓絕減豈非如行如說心無累於八風如說如行情有薄於三毒不然將何自拔耶聞者撫心推測涯極故使聽眾傾耳莫不解形情醉初武德七年輔公託跨有江表未從王政王師薄伐吳越廓清僧眾五千晏然安堵左僕射房玄齡奏稱入賊諸州僧尼極廣可依關東舊格州別一寺置三十人餘者遣歸編戶融不勝枉酷入京陳理御史韋挺備覽表辭文理卓明詞彩英贍百有餘日韋挺經停房公伏其高致固執前迷告融云非謂事理不無但是曾經自奏何勞法衣出俗將可返道賓王五品之位俯若拾遺四千餘僧未勞傍及融確乎不拔知命運之有窮旋于本邑後方在度又弘護之誠喪形為本略出一兩示其化迹永徽之中睦州妖女陳碩真邪術惑人傍誤良善四方遠僧都會建業州搜縣討無一延之融時居在幽巖室猶懸磬寺眾貧煎相顧無聊日漸來奔數出三百舊侶將散新至無依雖欲歸投計無所往縣官下責不許停之融乃告曰諸來法侶無問舊新山寺蕭條自足依庇有無必失勿事羈離望剎知歸退飛何往並安伏業禍福同之何以然耶並是捨俗出家遠希正法業命必然安能避也近則五賊常逐遠則三獄恒纏心無離於倒迷事有障於塵境斯為巨蠧志異驅除安得瑣瑣公途繫懷封著並隨本志無得遠於幽林融以僧眾口給日別經須躬往丹陽四告士俗聞者割減不爽祈求融報力輕強無辭擔負一石八斗往送復來日或二三莫有勞倦百有餘日事方寧靜山眾恬然無何而散于時局情寡見者被官考責窮刻妖徒不能支任或有自縊而死者而融立志滔然風塵不涉客主相顧諧會琴瑟遂得釋然理通情洽豈非命代開士難擁知人寒木死灰英英間出寔斯人矣時有高座寺亘法師陳朝名德年過八十金陵僧望法事攸屬開悟當塗融在幽栖聞風造往以所疑義封而問曰經中明佛說法言下受悟無生論中分別名句文相不明獲益法師受佛遺寄敷轉法輪如融之徒未聞靜惑為是機器覆塞為是陶化無緣明昧迴遑用增虛仰必願開剖盤結伏志遵承亘良久憮然告曰吾昔在前陳年未冠肇有璀禪師王臣歸敬登座控引與子同之吾何人哉敢當遺寄遂爾而散融還建初寺潛結同倫亘重其道志策杖往尋既達建初寺有德善禪師者名稱之士喜亘遠來歡愉談謔而善與融同寺初未齒之亘曰吾為融來忽輕東魯乃召而問之令敘玄致即座控舉文理具揚三百餘對言無浮采於是二德嗟詠滿懷仍於山寺為立齋講然融儀表瓌異相越常人頭顱巨大五岳隆起眉目長廣顙頰濃張龜行鶴視聲氣深遠如從地出立雖等倫坐則超眾衣服單素纔得充軀肩肘絕綿動逾累紀嘗有遺者返而還之而心用柔軟慈悲為懷童稚之與耆艾敬齊如一屢經輕惱而情忘瑕不顧曾有同友聞人私憾加謗融身詈以非類乃就山說之融曰向之所傳總是風氣出口即滅不可追尋何為負此虛談遠傳山藪無住為本願不干心故其安忍刀劍情靈若此或登座罵辱對眾誹毀事等風行無思緣顧而顏貌熙怡倍增悅懌是知斥者故來呈拙光飾融德者乎傳者抑又聞之昔如來說化加謗沸騰或殺身以來誚或繫杅以生誹滅迹內以死蟲反說面欺大聖斯徒眾矣而佛府而隱之任其訕誹及後過咎還露或生投地穴或死入泥犁天人之所共輕幽顯為之悲慟而如來光明益顯金德彌昌垂範以示將來布教陳於陸海融嘗二十許載備覽群經仰習正覺之威容俯眄喋喋之聲說陀那之風審七觸之安有剎那之想達四選之無停固得體解時機信五滓之交貿覽其指要聊一觀之都融融實斯融斯言得矣釋惠方姓趙冀州信都來強人七八歲便思出俗年九歲投蘇門淋落泉寺居然靜志眾侶怪其特高遂授以九次十想隨聞斂念仍受此法亟涉炎涼隋文后崩西京立寺遠徵入住厚禮供焉而雅志不渝山林綴想雖遇匠石無緣運斤舊所禪徒虛懷鶴望大業六年辭還本寺門侶雲結請道如山隋季不靜巖穴丘陵移居汲郡之隆善寺及皇運大昌天下無事又與門人修緝舊所遂使松門石棟巖室風並得經綸更新雲構曾於廊下言及幽微沙彌伏階密聽空中聲曰何忽沙彌在此伏聽懼驚起又被打擊經宿乃甦其感靈祥如此例也以貞觀二十一年冬初終於所止春秋九十有三初未終前忽有異香縈於巖室氛氳三日眾不測恰終香歇以其月十七日葬州北十里圓岡之陽釋法嚮姓李揚州海陵葛岡人形長八尺儀貌魁傑眉目秀異立性威嚴言不妄發足下有黑子圓淨分明相者曰長為軍將仍有重名於天下也年十六辭親出家即事精苦與人卓異尼嫗參禮未嘗與言戒行清淨誦法華通攝山栖霞寺恭禪師住法後賢眾所歸仰承名延致於寺側立法華堂行智者法華懺嚮依法行三七專注大獲瑞應知而不言恭既入京嚮還江北海陵寧海二縣各延供養隋末海陵大寧寺僧智喜開房延入於中靜坐晝臥驚起曰火發喜四出顧視了無嚮曰吾患耳妄聞耶明日晝驚如此三度遂東還寧海去後李子通賊破縣燒寺如所告焉大蟲傷害日數十人乃設禳災大齋忽有一虎入堂搏一人將去嚮逐後喚住何造次今為檀越設齋可放此人依言即放諸虎大集以杖扣頭為說法於是相隨遠去又欲往天台尋智者古迹謂弟子曰吾雖欲至天台而不達在江南一山中西北望見一城及過江至江陰縣道俗留連於縣東南山起寺號曰定山便經年稔後天下漸安又還海陵鹽亭百姓留之有小孤山出地百仞四面無草木於前立寺名為正見處之貞觀四年冬初謂門人曰吾與汝別近夢惡將不起矣遂臥二十日忽起索湯盥浴剃髮自辰至酉面西而終年七十八將終謂弟子曰吾願以身施諸鳥獸此無林木食若不盡穢人眼目可埋山西南及依往埋掘便值石盤薄無由又更試掘遂得一處凹陷石上恰得容身因厝中置塔其上嚮生常日投陀林野馴伏猛獸觀想西方口唱南無佛不多說法隨緣一兩句有災祥者令避託以夢想所見貞觀二年有常洲人往幽洲見一女人問海陵嚮禪師健不又問識耶答不識女人以烏絲布頭巾用寄嚮師此人遇患經年不至嚮預知之每歎息那不至耶人至江陰附頭巾與海陵人將至其處乃令弟子逆之恰至門首相值以巾付還嚮得巾執玩咨嗟裂破付弟子人得一片有不得者貞觀三年天下大括義寧私度不出者斬聞此咸畏得頭巾者並依還俗其不得者現今出家其年大雪深數尺告弟子曰吾須新菜弟子曰雪深叵得曰上山求之可有如言上山數里至一樹下皆是青菜取之而返預知皆如此也釋道信姓司馬未詳何人初七歲時經事一師戒行不純信每陳諫以不見從密懷齋檢經於五載而師不知又有二僧莫知何來入舒州𡷗公山靜修禪業聞而往赴便蒙授法隨逐依學遂經十年師往羅浮不許相逐但於後住必大弘益國訪賢良許度出家因此附名住吉州寺被賊圍城七十餘日城中乏水人皆困弊信從外入井水還復刺史叩頭賊何時散信曰但念般若乃令合城同時合聲須臾外賊見城四角大人力士威猛絕倫思欲得見刺史告曰欲見大人可自入城群賊即散既見平定欲往衡岳路次江洲道俗留止廬山大林寺雖經賊盜又經十年蘄州道俗請度江北黃梅縣眾造寺依然山行遂見雙峯有好泉石即住終志當夜大有猛獸來繞並為授歸戒授已令去自入山來三十餘載諸州學道無遠不至刺史崔義玄聞而就禮臨終語弟子弘忍可為吾造塔命將不久又催急成又問中未答欲至中眾人曰和尚可不付囑耶曰生來付囑不少此語纔了奄爾便絕于時山中五百餘人並諸州道俗忽見天地闇冥遶住三里樹木葉白房側梧桐樹曲枝向房至今曲處皆枯即永徽二年閏九月四日也春秋七十有二至三年弟子弘忍等至塔開看端坐如舊即移往本處于今若存釋惠明姓王杭州人少出家遊道無定所時越州敏法師聚徒揚化遠近奔隨明於法席二十五年眾侶千僧解玄第一持衣大布二十餘載時共目之青布明也翹勇果敢策勤無偶後至蔣州巖禪師所一經十年諮請禪法在山禪念經雪路塞七日不食念言我聞不食七日便死今明知業也若業自在可試知之以繩自懸於高崖怳怳如人割斷因落崖底如人擎置一無所損復至荊州四望山頭陀二虎交鬪自往分解冬夏一服行止形俱所去無戀即經所謂如鳥凌空喻斯人矣誦思益經依經作業近龍朔年從南山出至京遊觀與其言論無得為先不久旋返云往江曲依閑修道莫知定所明律上正傳十五附見十二梁楊都天竺寺釋法超傳一梁鍾山雲居寺釋道禪傳二齊鄴下大覺寺釋慧光傳三道雲道暉馮居士齊鄴東大衍寺釋曇隱傳四洪理道樂陳楊都光宅寺釋曇瑗傳五陳楊都奉誠寺大律都釋智文傳六隋大興國寺釋法願傳七道龕道行隋京師大興善寺釋靈藏傳八隋西京延興寺釋通幽傳九隋蔣州奉誠寺釋道成傳十隋西京大興善寺釋洪遵傳十一道洪法勝洪淵隋西京大禪定道場釋覺朗傳十二海藏法鏘唐始州香林寺釋慧主傳十三唐京師勝光寺釋智保傳十四唐益州龍居寺釋慧詵傳十五釋法超姓孟氏晉陵無錫人也十一出家住靈根寺幼而聰頴篤學無倦從同寺僧護修習經論而雅有深思幽求討擊學論歸仰貧無衣食乞匃自資心性柔軟勞苦非慮晚從安樂寺智稱專攻十誦致名命家語其折衷者數過二百自稱公歿後獨步京邑中歲廢業頗失鴻緒後復綴講眾重殷矣帝謂律教乃是象運攸憑覺慧階漸治身滅罪之要三聖由之而歸必不得門如閉目夜行常懼蹈諸坑塹欲使僧尼於五篇七聚導意獎心以超律學之秀勅為都邑僧正庶其弘扇有徒儀表斯立武帝又以律部繁廣臨事難究聽覽餘隙遍尋戒檢附世結文撰為一十四卷號曰出要律儀以少許之詞網羅眾部通下梁境並依詳用普通六年遍集知事及於名解於平等殿勅超講律帝親臨座聽受成規以眾通道俗恐陷於愆目但略舉剛要宣示宏旨三旬將滿文言便竟所以導揚祕部弘悟當機遂得四眾移心朝宰胥悅至七年冬卒於天竺住寺春秋七十有一天子下勅流慰并令有司葬鍾山開善寺墓釋道禪交阯人早出世網立性方嚴修身守戒氷霜例德鄉族道俗咸貴其剋己而重其篤行仙洲山寺舊多虎害禪往居之此災遂遠聞齊竟陵王大開禪律盛張講肆千里引駕同造金陵皆是四海標領人雄道傑禪傳芳藉甚通夜不寐思參勝集簉奉真詮乃以永明之初遊歷京室住鍾山雲居下寺聽掇眾部偏以十誦知名經略道化僧尼信奉故有稜威振發以見聲名恬愉誘悟議于風采都邑受其戒範者數越千人常聽之徒眾不盈百兼樂滅覺觀亟留幽谷動踰宵景方尋顧步加復蔬食弊衣華無布口有濟芳美者便隨給貧病知足之富豈得過焉末居于寺舍屏迹山林不交榮世安苦立行人以為憂而禪不改其樂也以大通元年卒于山寺春秋七十矣釋慧光姓楊氏定州盧人也年十三隨父入洛四月八日往佛陀禪師所從受三歸陀異其眼光外射如焰深惟必有奇操也苦邀留之且令誦經光執卷覽文曾若昔習旁通博義窮諸幽理兼以劇談譎詭態新奇變動物情時談逸口至夏末度而出家所習經誥便為人說辭既清靡理亦高華時人號之聖沙彌也因獲利養受而還施師為掌之尋用復盡佛陀曰此誠大士之行也便縱而不禁諮請教誡敬而異之然其雅量弘方不拘小節讚毀得失聲色不渝眾益器之而美其遠度陀曰此沙彌非常人也若受大戒宜先聽律律是慧基非智不奉若初依經論必輕戒網邪見滅法障道之元由是因循多授律檢先是四分未廣宣通有道覆律師創開此部製疏六卷但是科文至於提舉宏宗無聞於世故光之所學惟據口傳及年登冠肇學行略周甞聞言不通華發戒便阻乃往本鄉進受具足博聽律部隨文奉行四夏將登講僧祇律初以唱高和寡詞理精玄漸染津流未遂聽徒雲合光知學功之所致也義須廣周群部乃從辯公參學經論聽說之美聲颺趙都後入洛京搜揚新異南北音字通貫幽微悉為心計之勞事須文記乃方事紙筆綴述所聞兼以意量參互銷釋陀以他日密覩文言乃呼而告曰吾之度子望傳果向於心耳何乃區區方事世語乎今觀神器已成可為高明法師矣道務非子分也如何自累因而流涕會佛陀任少林寺主勒那初譯十地至後合翻事在別傳光時預霑其席以素習方言通其兩諍取捨由悟綱領存焉自此地論流傳命章開釋四分一部草創基茲其華嚴涅槃維摩十地地持等並疏其奧旨而弘演導然文存風骨頗略章句故千載仰其清規眾師奉為宗轄矣司徒高傲曹僕射高隆之及朝臣司馬令狐子儒等齊代名賢重之如聖甞遇亢旱眾以聞光乃就嵩岳池邊燒香請雨尋即流霔原隰民皆利之又爾朱氏舉兵北伐徵稅僧尼用充軍實先立嚴刑敢諫者斬時光任僧官顧五眾屯塞以命直往語世隆曰若當行此稅國事不存言既克明事亦遂免其感致幽顯為若此也初在京洛任國僧都後召入鄴綏緝有功轉為國統將終前日乘車向曹行出寺門屋脊自裂即坐判事塊落筆前尋視無從知及終相因斯乖悆四旬有餘奄化於鄴城大覺寺春秋七十矣光常願生佛境而不定方隅及氣將欲絕大見天宮來下遂乃投誠安養溘從斯卒自光立志貞靜堅存戒業動止安詳衣裳附帖晝夜存道財無盈尺之貯滌除便穢誓以報盡為期偏重行宗四儀無妄其法潔己獨立七眾深崇其操自正道東指弘匠於世則以道安為言初緇素革風廣位聲教則慧光抑其次矣凡所撰勝鬘遺教溫室仁王般若等皆有注釋又再造四分律疏百二十紙後代引之為義節并羯磨戒本咸加刪定被於法侶今咸誦之又著玄宗論大乘義律義章仁王七誡及僧制十八條並文旨清肅見重時世學士道雲早依師稟奉光遺令專弘律部造疏九卷為眾所先成匠極多流衍彌遠加以威容嚴肅動止有儀談吐慈和言行相檢又光門人道暉者連衡雲席情智傲岸不守方隅略雲所製以為七卷間以意會揵度推焉故諺云雲公頭暉公尾洪理中間著所以是也並存亡有緒嘉績莫尋可為悲哉時光諸學士翹頴如林眾所推仰者十人揀選行解入室惟九有儒生憑袞光乃將入數中袞本冀人通解經史被貢入臺用擬觀國私自惟曰玄素兩教頗曾懷抱至於釋宗生未信重試往候光欲論名理正值上講因而就聽矚其威容聆其清辯文句所指遣滯為先即坐盡虔傷聞其晚頓足稽顙畢命歸依然攻擊病源深明要害我為有本偏所長驅每有名勝道俗來資法藥袞隨病立治信者銜泣故其言曰諸行者不得信此無明昏心覓長覓短聽經學問嚴飾我心須識詐賊覓他道惡不求其長則吾我漸歇特須分疎勿迷自他我過常起熾然法界他道少過便即瞋他常須看心自臣多過若思量者雖在世間無有滋味終無歡心以未喪我何由有樂此心將我上至非想還下地獄常誘誑我如怨家如愛奴豈可學問長養賊心巧作細作使覓名利造疽妬也故經云當為心師不師於心八歲能誦百歲不行不救急也時有私寫其言者世號捧心論焉亦有懷本於胸逢境終忘者無勤勵故耳袞在光門低頭斂氣常供厨隷日營飯粥奉僧既了蕩滌凝澱溫煮自資微有香美便留後供夜宿竈前取蒿一束半以藉背半以坐之明相纔動粥便以熟無問陰晴此事常爾午後擔食送彼獄囚往還所經識者開路或至綢人廣眾率先供給若水若火若掃若帚隨其要務莫不預焉口隨說法初不告倦遂卒光門釋曇隱姓史河內人少厭塵俗早遊佛寺崇奉戒約誦習群經凡三十萬言日夜通准以為常業及年滿受具歸宗道覆而聽律部精勵彌久穿鑿逾深後從光公更採精要陶染變通遂為光部之大弟子也乃超步京鄴北悟燕趙定州刺史侯景敬若神仙為之造寺延住供給末還漳濱闡揚斯教僕射高隆之加禮榮異行臺侯景又於鄴東為造大衍寺重引處之弘播戒宗五眾師仰隨問判決文義雅正時有持律沙門道樂者行解相兼物望同美氣調宏逸或擬連衡故鄴中語曰律宗明略唯有隱樂其為世重如此而隱性樂獨遊不畜弟子財無尺貯袒背終身衣鉢恒隨誠均鳥翼顧旋身轉取譬象迴通律持律時惟一人而已年六十有三終於鄴城大覺寺著鈔四卷門人成器者十餘皆宗其軌轍時有律師洪理者精氣獨架詞采嚴正預在論擊罕不喪輪著鈔兩卷時共同祕後為沙門智首開散詞義更張綱目合成四卷所在咸誦云釋曇瑗未詳氏族金陵人也才術縱橫子史周綜自幼及長以聽涉馳名數論時宗普經陶述而威嚴群小不妄登臨矜持有功頗以文華自處時或規諫之者瑗因擺撥前習專征鄙倍弦韋所誥驗于耳目由是名重京邑同例欽焉以戒律處世住持為要乃從諸講席專師十誦功績既著學觀斯張自爾恒當元宰鎮講相續有陳之世無與為隣使夫五眾揖其風猷七貴從其津濟瑗其有之矣常徒講眾二百餘人宣帝下詔國內初受戒者夏未滿五皆參律肆可於都邑大寺廣置聽場仍勅瑗總知監檢明示科舉有司准給衣食勿使經營形累致虧功績瑗既蒙恩詔通誨國僧四遠被徵萬里相屬時即搜擢明解詞義者二十餘人一時敷訓眾齊三百于斯時也京邑屯鬧行誦相諠國供豐華學人無弊不踰數載道器大增其有學成將還本邑瑗皆聚徒對問理事無疑者方乃遣之由是律學更新上聞天聽帝又下勅榮慰以瑗為國之僧正令住光宅苦辭以任勅特許之而栖託不競閉門自撿非夫眾集不妄經行慶弔齋會了無通預山泉林竹見便忘反每上鍾阜諸寺偱造道賢觸興賦詩覽物懷古洪偃法師傲岸泉石偏見朋從把臂郊坰同遊故苑瑗題樹為詩曰丹陵粉葉少白水黍苗多浸淫下客淚哀怨動人歌春蹊度旅葛秋浦沒長莎麋鹿自騰倚車騎絕經過蕭條肆野望惆悵將如何偃續題曰龍田留故苑汾水結餘波悵望傷遊目辛酸思緒多涼煙慘高樹濃露變輕蘿澤葵猶帶井池竹下侵荷秋風徒自急無復白雲歌瑗以太建年中卒于住寺春秋八十有二初微疾將現便告眾曰生死對法凡聖俱纏自非極位有心誰免今將就後世力不相由願生來講誨分有冥功彼我齊修用為來習不爾與世沈浮未成通濟幸諸梵行同思此言終事任量可依成教言訖端坐如定欻然已逝道俗悲泣歎其神志明正不偶緣業有勅依法焚之為立白塔建碑于寺著十誦疏十卷戒本羯磨疏各兩卷僧家書儀四卷別集八卷見行於世釋智文姓陶丹陽人母齊中書完韜女也懷文之始夢覩梵僧把松枝而授曰爾後誕男與為麈尾及文生也卓異恒倫志學之年依寶田智成以為師傅既受具後專講玄津以戒足分為五乘律檢開成七眾豈止通衢生死亦乃組轡道場義須先精方符佛意值奉誠僧辯威德冠眾解行高物傳業之盛獨步江表推其領袖則大明彖公文初依辯學後歸彖下十誦諸部罔弗通練以梁大同七年靈味凡官諸寺啟勅請文於光業寺首開律藏陳郡殷均為之檀越故使相趨常聽二百許人屬梁末禍難乃避地于閩下復光嶺表時僧宗法准知名後進皆執卷請益又與真諦同止晉安故得講譯都會交映法門邊俗信心於斯風革酒家毀其柞器漁者焚其罟網僧尼什物於是備焉有陳馭㝢江海廓清講授門徒彌繁梁季宣帝命旅剋有淮淝一戰不功千金日喪轉輸運力遂倩眾僧文深護正法不懼嚴誅乃格詞曰聖上誠異宇文廢滅三寶君子為國必在禮義豈宜以勝福田為胥下之役非止延敵輕漢亦恐致罪尤深有勅許焉事即停寢爾後凡所詳奏莫非允愜理眾擯罰咸符時要尚書令濟陽江總𡺍道造房無爽旬月是知學而有祿德必有隣法位宜昇眾望悅矣大隋革運別降綸言既屏僧司憲章律府大軍之後荊棘攸生十濫六群滋彰江表文又案法澄剪尋得無聲深可謂少壯免白髮之妖稊莠絕青田之薉矣前後州將甫及下車皆尊仰年德罕不修敬柱國武山公郭衍祇敬倍常躬携妻子到寺檀捨盛設法齋請敷律題抑揚剖析有克壯之姿聽侶千餘罔不嗟服以開皇十九年二月二十日遷于住寺春秋九十有一即窆寺之南山東壟與辯律師墓相望自文之據道也器宇剛物風範肅人戒品圓淨處斷明白然剖折章句詞省義富眾家修撰罕有能出其右者又金陵軍火遺燼莫留乃誓志葺治惟新舊趾講十誦八十五遍大小乘戒心羯磨等二十餘遍金光遺教等各有差焉著律義疏十二卷羯磨疏四卷菩薩戒疏兩卷學門傳貴以為口實僧尼從受戒者三千餘人學士分講者則寶定慧峙慧巘智昇慧覺等惟道志法成雙美竹箭擁徒建業文昔夢泛舟海釣獲二大魚心甚異之及於東安寺講麈尾纔振兩峯俱落深怪其事以詢建初瓊上乃曰斯告之先見必有二龍傳公講者其言果矣志名解最優大尉晉王家僧禮待以仁壽之歲志為樹碑內慧日道場釋法論為文釋法願姓任西河人也性警達頗自高上而拔致窮玄不偶儕侶東觀道化遂達鄴都形廁白衣言揚緇服齊昭玄大統法上嘉其神慧與語終朝深通志梗因攝而剃落日賜幽奧橫勵時倫乃恣其遊博願勇思風馳周行講席求法無怠問道新奇後乃仰蹤波離專經律部網羅佛治舟逕僧猷自東夏所傳四部律本並製義疏妙會異同當有齊之盛律徒飈舉法正一部各競前驅雲公創敘綱模暉上刪其纖芥法願霜情啟旦孤映群篇挫拉言初流威滅後所以履歷談對眾皆杜詞故得立破眾家百有餘計並莫敢當其鋒銳也時以其彭亨罕敵號之為律虎焉至於斷處事途多從文相商度結正僉義攸歸廼下勅召為大莊嚴石窟二寺上座皇隋受命又勅任并州大興國寺主頻登綱管善御大眾化移前政實濟濟焉以開皇七年六月二十二日終於所住春秋六十有四葬于并城之西建塔崇範所製律疏惟四分一本十卷是非鈔兩卷見存餘並零失有弟子道行者器局淹和親傳師授善機悟明控引談述疏旨不墜厥宗每至講散身導學徒遶於願塔致敬而返及春秋至節此例恒修今年八十有餘猶鋪疏旨摘示諸測隱時又有沙門道龕資學於願執教赴行學望最優成進初心弘持獨秀為時歎美而素尚兢肅遵若文宗纔有違忤即不參隷故說戒序引有言唱白之者既無正制號為非法雖初從眾侶後必重張乃出郭結界更說新本斯亦貞梗之嚴令也太為剋峭未是倫通至今此部猶多滯結云釋靈藏俗姓王氏雍州新豐人也年未登學志慕情遠依隨和上潁律師而出家焉藏承遵出要善達持犯僧祇一部世稱冠冕於智度論講解無遺妙尚沖虛兼崇綱務時屬周初佛法全盛國家年別大度僧尼以藏識解淹明銓品行業若講若誦卷部眾多隨有文義莫不周鏡時共測量通經了意最為第一藏之本師素鍾華望為太祖隋公所重道義斯洽得喪相符藏與高祖布衣知友情欵綢狎及龍飛茲始彌結深衷禮讓崇敦光價朝宰移都南阜任選形勝而置國寺藏以朝宰惟重佛法攸憑乃擇京都中會路均近遠於遵善坊天衢之左而置寺焉今之大興善是也自斯已後中使重沓禮遇轉隆厚味嘉肴密輿封送王人繼至接軫相趨又勅左右僕射兩日一參坐以鎮之與語而退時教網初張名德雲搆皆陳聲望莫與爭雄宮闈嚴衛來往難阻帝卒須見頻闕朝謁乃勅諸門不須安籍任藏往返及處內禁與帝等倫坐必同榻行必同輿經綸國務雅會天鑒有時住宿即邇寢殿䞋錫之費蓋無競矣開皇四年關輔亢旱帝引民眾就給洛州勅藏同行共通聖化既達所在歸投極多帝聞之告曰弟子是俗人天子律師為道人天子有樂離俗者任師度之遂依而度前後數萬晚以事聞帝大悅曰律師度人為善弟子禁人為惡言雖有異意則不殊至於隋運譯經勝緣貴集身先眾範言會時望未知寺任綱正有聲開皇六年卒於所住春秋六十有八葬于南郊釋通幽姓趙氏河東蒲坂人幼齡遺世早慕玄風弱冠加年遂霑僧仵而貞心苦節寒暑不𧇊尋師訪道夷嶮無變遇周齊淩亂遠涉江皐業架金陵素氣攸遠及大隋開運還歸渭陰味法泰其生平操行分其容止至於弘宣示教則以毘尼唱首調御心神仍用三昧遊適故戒定兩藏總萃胸襟學門再敞遠近斯赴晚貫籍延興時當草創土木瓦石工匠同舉而事歸天造形命未淪隨所運為無非損喪幽戒約內結仁洽外弘立四大井各施漉具凡有施用躬自詳觀馳赴百工曉夜無厭皆將送蟲豸得存性命故延興一寺獨免刑殘自餘締構焉難復敘而潔己自勵罕附斯倫每欲開經必盥手及腕齊肘已後猶從常淨舉經對目臂不下垂房宇覆處未甞澡漱涕唾反咽不棄寺中便利洗淨乃終其報又自生常不用巾幞手濕則任其自乾三衣則重被其體自外道具僅支時要每自嗟曰生不功一片之善死不酬一毫之累虛負靈神何期誤也遂誡弟子曰吾變常之後幸以殘身遺諸禽獸儻蒙少福冀滅餘殃忽以大業元年正月十五日端坐卒於延興寺房春秋五十有七弟子等從其先志林葬於終南之山至相前峯火燎餘骸立塔存矣釋道成字明範俗姓陶氏丹陽人也祖誕齊招遠將軍永嘉大守父僉梁貞威將軍上虞令成少而入道住永嘉崇玄寺事式法師為弟子儀貌瓌美奇姿拔眾群伍目曰神童具戒之後學超儕輩大同之初栖遊京輦受業奉誠寺大律都沙門智文十誦纔經兩遍年逾未立別肆開筵數論毘曇染神便悟無繁工倍聞一知十是以京邑耆老咸稱後生可畏講十誦律菩薩戒大品法華諸經律等一百四十遍又講觀音一日三遍著律大本羯磨諸經疏三十六卷至於意樹心花增暉旦曜析理質疑聽者忘倦學士慧藏法祥等並遊方講說法輪常轉傳茲後焰利益弘多咸蔬素潔己珠戒居心神解嚴明深禪在念兼六時虔懺三餘暇日獵文史欲令知無不為也然其性用安庠威儀合度天人摸揩罕有其儔軟語愛言不常忤物後現疾旬餘猶牽講演以開皇十九年五月五日遷神於興嚴寺春秋六十有八大漸之際惟稱念佛肢節軟暖合掌分明即以其月八日窆於奉誠寺之南山墓誌高坐寺僧慧嵸所作釋洪遵姓時氏相州人也八歲出家從師請業屢高聲駕及受具後專學律部心生重敬內自惟曰出家基趾其存戒乎住持萬載被于遺教諒非虛矣更辭師友遊方聽習履涉相京諮訪深義有所未喻決問罕通三夏將滿遂知大旨初住嵩高少林寺依資雲公開胸律要并及華嚴大論前後參聽並扣其關戶渙然大明承鄴下暉公盛弘四分因往從焉聽徒五百多以巧媚自通覆講堅論了無命及暉寔律學名匠而智或先圖遵固解冠時倫全不以曲私在慮後因盛集異學充堂遵乃束暉製疏捧入堂中曰伏膺有日都未見知是則師資兩亡敢以文疏仰及便置之坐上往覆雲所既屬捨見來降即命登座覆述吐納纖隱眾仰如山自後專預正時結徒畢業以戒律旁義有會他部者乃重聽大論毘曇開沃津奧又以心使未靜就諸禪林學調順法年踰十臘方歸律宗四遠望風堂盈千計時為榮大也齊主既敞教門言承付囑五眾有墜憲網者皆據內律治之以遵學聲早舉策授為斷事沙門時青齊諸眾連諍經久乃徹天聽無由息訟下勅令往遵以法和喻以律科懲曲感物情繁諍自弭由是更增時美法侶欣之及齊曆將季擅名逾遠而非類不交惟道同轍名儒大德見輒慕從常與慧遠等名僧通宵造盡周平齊日隱于白鹿巖中及宣政搜揚被舉住於嵩岳德不孤峙眾復屯歸大隋廓定招賢四海開皇七年下勅追詣京闕與五大德同時奉見特蒙勞引令住興善并十弟子四事供養十一年中又勅與天竺僧共譯梵文至十六年復勅請為講律眾主於崇敬寺聚徒成業先是關內素奉僧祇習俗生常惡聞異學乍講四分人聽全稀還是東川讚擊成務遵欲廣流法味理任權機乃旦剖法華晚揚法正來為開經說為通律屢停炎澳漸致附宗開導四分一人而已迄至于今僧祇絕唱遵為人形儀儒雅動據規猷而神辯如泉聲相鍾鼓預昇法位罕有昏漠開悟之勣寔難嗣焉仁壽二年勅送舍利于衛州之福聚寺將出示眾乃放紅赤二光晃發遠近照灼人目道俗同覩大生慶悅仁壽四年下詔曰朕祇受肇命撫育生民遵奉聖教重興象法而如來大慈覆護群品感見舍利開導含生朕已分布遠近皆起靈塔其間諸州猶有未遍今更請大德奉送舍利各往諸州依前造塔所請之僧必須德行可尊善解法相使能宣揚佛教感𥧝愚迷宜集諸寺三綱詳共推擇錄以奏聞當與一切蒼生同斯福業遵乃搜舉名解者用承上命登又下勅三十餘州一時同送遵又蒙使於博州起塔初至州西有白鵠數十頭當於輿上旋繞數匝久之而逝及至城東隆聖寺置塔之所夜有白光數十道道如車軸住于基上邊有鳥巢樹上及光之洞明眾鳥驚散又雨銀花委地光耀如雪掘基五尺獲粟半升夜降神仙八十四人持華遶塔久乃方隱又婦人李氏患目二十餘年及來禮拜兩目齊見後行道之夕又放赤光照寺東房見臥佛及坐佛說法之像復見梵僧對架讀經有一十四字皆是梵書時人不識及四月八日當下塔時感黑蜂無數銜香遶塔氣蔚且熏不同人世又見白蓮花在塔四角高數百丈花葉分布下垂於空時間五彩蓮花廁填其內又見天人燒香而左轉者於是總集而觀歎未曾有屬目不見者非無一二及下覆訖諸相皆止遵於京邑盛開律儀名駭昔人而傳敘玄宗其後蓋闕又著大純鈔五卷用通律典尋又下勅令知寺任弼諧僧眾亟光徽績以大業四年五月十九日卒於興善春秋七十有九隋初又有道洪法勝洪淵等並以律學著名洪據相州紹通雲胤容止沈正宣解有儀學門七百亟程弘量故諸經論之士將欲導世者皆停洪講席觀其風略採為軌躅勝博涉有功而言行無副神志高卓時共潛推但身令未廣故聽徒簡略淵學承遵統化被中山綱維正象有聲幽冀年代非遠並不測其終釋覺朗俗姓未詳河東人住大興善寺明四分律及大涅槃而氣骨陵人形聲動物遊諸街巷罕不顧之仁壽四年下勅令送舍利于絳州覺成寺初達治所出示道俗涌出金瓶分為七分光照徹外穿基二丈得粟半升又感黃雀一頭飛迫於人全無怖懼馴擾佛堂久便自失又石函蓋上見二菩薩踞坐寶座前有一尼斂手曲敬或見飛仙及三黃雀并及雙樹驎鳳等象將下三日常放光明乃迷晝夜朗過燈耀有掩堂滅炬者而光色逾盛溢于幽障玄素通感榮慶相諠朗具表聞廣如別傳大業之末有勅令知大禪定道場主鎮壓豪橫怗然向風漸潤道化頗懷欽重不久卒於所住時又有沙門海藏識信堅正宗仰律司屢講四分少有傳嗣唐運置十大德藏其一焉又有法鏘律師本住靜法末厭煩梗南栖太和幽居養志不塵僧眾孤行巖岫偃息松林服餌守中賞心唯識亦搔索之開士也及終沒後露骸山側至夜有燈照之道俗往觀失燈所在遠望還見動經兩月光照逾明釋慧主俗姓賈氏始州永歸縣人六歲出家為斌法師弟子後令誦遺教一夕便度以經驗師多有乖越便捨之而往姜律師所誦法華經寺東房中講於俗律試聽一遍性若曾聞乃問十關無能解者刺史以下合州白黑皆往諮問莫不歸伏始州一部祖宗道眾即為州內律主受菩薩戒既爾約束以佛為師尚不敬天況禮神道於是佛法方得開弘於黃安縣造寺七所梓潼縣造十寺武連縣造三寺從彼至今方將盛矣初主登冠欲受具足當境無人乃入京選德於甘露寺受戒惟聽四分餘義旁通夢見三日三夜天地闇冥眾生無眼過此忽明眼還明淨覺已汗流一百日後周毀經道方知徵應即返故鄉南山藏伏惟食松葉異類禽獸同集無聲或有山神送茯苓甘松香來獲此供養六時行道禽獸隨行禮佛誦經似如聽者仍為幽顯受菩薩戒後有獼猴群共治道主曰汝性躁擾作此何為曰時君異也佛日通也深怪此言尋爾更有異祥龍飛獸集香氣充山其類眾矣後有八人採弓材者甚大驚駭便慰主曰聖君出世時號開皇矣即將出山以事奏聞蒙預出家大業中勅還本州香林寺常弘四分為業武德之始陵陽公臨益州素少信心將百餘馱物行至始州令於寺內講堂佛殿僧房安置無敢違者主從莊還見斯穢雜即入房中取錫杖三衣出歎曰死活今日矣舉杖向諸驢騾一時倒仆如死兩手各擎一馱擲棄坑中州縣官人驚怖執主狀申陵陽大笑一無所怪書曰弟子數病不逢害鬼蒙得律師破慳貪袋深為大利今附沈香十斤紬綾十段仰贈後還京日從受菩薩戒焉貞觀三年寺有明禪師者清卓不群白日獨坐見無半身向眾述曰吾與律師建立此寺兩人同心忽失半身將不律師先去不者明其死矣明日食時俗人驚云寺家設會耶見有四路客僧數千人入寺今何所在尋爾午時主便無疾而逝春秋八十九矣釋智保河東人弱齡入道清慎居心而在性剛謇不軌流俗進受具後正業禁司擁節專制挺超群侶博聽異解貫練心神癈立文旨大觀掌內所以律部遐被寔賴斯人故能維攝自他言行相守至於流略墳素頗獲其宗談對玄儒不後其術筆記之工時揚大義緣情流采嗣接英華初住勝光末居禪定國供豐積受用多虧所以名僧大德日陳形器憑准神解可以言傳至於衣食資求未能清滌僧眾四百同食一堂新菜果瓜多選香美保低目仰手依法受之任得甘苦隨便進噉皆留子實恐傷種相由知法者少疑未詳檢其知量敬護皆若此也後返勝光厲業彌峻園蔬溉灌水雜細蟲直歲高視但論事辦保念此無辜交被刑害躬執漉具達送方還寺有草物堪為僧用者必拾掇鳩聚身送厨帳其雜行紛綸誠難備舉以武德末年遘疾將漸而正氣明爽告友人慧滿曰余其死矣而精神不得超勝如何有問意故答云觀其來蔭似作守寺之神耳而止于西院佛殿余頻以法遣之卒不能離言訖便絕自爾所陳殿宇人罕獨登時須開入無不㱇然毛動及後百日嘗有老姥內懷酒食將遺諸僧行至寺門忽被神害身死委地器物流離斯亦嚴厲之所致也故僧侶攝其風威有涉鄙悋者皆懅而悛正矣自保之據道卓秀出群一食充軀雖經病重不變前節不宿俗舍常止僧坊雖曾遠涉必栖林野三衣常被瓶鉢自隨不執俗器不觀音樂五兵六法誓不身經理會高僧聞便赴仰故每日再講必瓶鉢自隨肅然成風無累於教處眾而食曾無盈長殘水餘膩並以餅拭而噉之一滴無遺恐損施福故也甞遇重病每食有餘一兩匕者停貯多日可得升許親看溫煮命淨人食之有問其故答曰僧食難棄不可妄輕業耳傳者目驗生常景行故直筆書其弘護之相焉又嘗患瘧寒則水淋熱則火炙渴則急鹽塞其口痢則絕食取差斯徒眾矣釋智詵字慧成姓徐本徐州人炫法師之弟也少聰敏有志節在蜀遊學務勤律肆會周陵法因事入關不果所期遂隱南嶺終南太白形影相弔有隋革命光啟正法招賁碩德率先僧首即於長安敷揚律藏益州總管蜀王秀奏請還蜀王自出迎住法聚寺道俗歸崇寺設大齋無不來赴將食捉筯問炫法師曰此處護淨不答曰初還未得撿挍承道不護淨乃擲筯而起曰寧噉屠兒食此淨銅何得噉也諸僧數千一時都散其嚴忌若此故其在眾屏氣寂然性不受施不妄干物有僧道恢為人兇險遙見走避人曰卿從來不畏一人何故畏詵律師耶答曰此佛法中王那得不畏人曰以恢公膂力可敵律師百人耶答曰縱敵千人遙見百脈已沈四支不舉何敵之有乎後以人請戒禁行將諠擾乃辭入龍居山寺幽栖深阻軌迹不通延出辭疾意欲登劍閣廓清井絡與詵書令歸國化使略答云辱使至止并以誠言披閱循環一言三復文清淥水理破秋毫貧道戒行多闕化術無方宅身荒谷四十餘載狎魚鳥以樵歌習禪那思般若以此卒歲分填溝壑不謂耆年有幸運屬休明伏惟相王殿下德隆三古道振百王公攘臂而歸舊里衣錦而旋本邑百姓有再生之期萬物起息肩之望搢紳君子捧玉帛而來儀慷慨丈夫委干戈而伏道昔長卿返蜀徒擅清文鄧艾前來未能偃武公華陽甲族未絡名家捧日登朝懷金問道劍南長幼並俟來蘇豈藉微風自然草靡當勸諸首領越境參迎秀得書示軍眾先作禮曰人物爭歸律師之力也以武德元年十月一日平居而逝年八十矣
