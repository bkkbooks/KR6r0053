body:
  text: 大唐西明寺沙門釋道宣撰明律下正傳九附見七唐京師弘福寺釋智首傳一唐京師普光寺釋慧璡傳二滿德真懿善智敬道唐相州日光寺釋法礪傳三唐京師普光寺釋玄琬傳四唐蒲州仁壽寺釋慧蕭傳五唐京師普光寺釋慧滿傳六唐箕山沙門釋慧進傳七唐并州義興寺釋道亮傳八道胄唐蘇州通玄寺釋慧旻傳九釋智首姓皇甫氏其源即安定玄晏先生之後也家世丘園素居物表隨官流寓徙宅漳濱而幼抱貞亮夙標雄傑髫年離俗馳譽鄉邦初投相州雲門寺智旻而出家焉旻亦禪府龍驤心學翹望即稠公之神足也以首歲居學稚且略禁科權示五門擁其三業而神慧所指不慕下流覽屬遺教戒為師本定慧眾善自此而繁義理相符敢違先誥所以每值律徒潛聲諮問隨聞弘範如說修行由是五眾分騼莫不就而請謁俄而母氏辭世復入道門名為法施住於官寺深修八敬遵重五儀志欲預有制門誓願奉而承則然尼眾在道染附情深戒約是投率多輕毀而施割愛從道履正栖心威服尼流聲高魏土自玄化東被未有斯蹤以首膝下相親素鍾華望施欲早服道味濡沫戒宗乃啟旻授其具足而未之許也便內惟正檢外訊儕章恭附遵修緝諧倫伍旻察其儀軌默而識之知其風骨堅深乃許其受戒首以緣成之法事假明賢恐薄墜行門便有淪道器乃周訪鄭衛盛德勝人不累年期必邀登訃時過三載方遂素懷二十有二方稟大戒雖從師授而得否未知乃於古佛塔前請祈顯證蒙降佛摩頂身心安泰方知感戒有實自爾旦夕諮訪挺出恒標雖教所未聞而行儀先備及尋律部多會其文明若夙知更陶神府其有事義乖滯者皆汰澮相融冥逾合契後聽道洪律席同侶七百鋒穎如林至於尋文比義自言逈拔及玄思勵勇通冠群宗剛正嚴明風飈遺緒者莫尚於首矣故未至立年頻開律府懿德敏行咸共器之靈裕法師道振雄伯範超倫等親管緇屬預在下筵時共美之重增榮觀會隋高造寺遠召禪宗將欲廣振律詮流暉帝壤若不附定通戒行學無歸遂隨師入關止于禪定解既冥通聲光三輔初達天邑具覽篇章便更博觀新解潤以前聞有識悟其玄規更開講肆既副本願登即然之每日處眾敷弘餘時却掃尋閱於是三藏眾經四年考定其有詞旨與律相關者並對疎條會其前失自律部東闡六百許年傳度歸戒多迷體相五部混而未分二見紛其交雜海內受戒並誦法正之文至於行護隨相多委師資相襲緩急任其去取輕重互而裁斷首乃銜慨披栝往往發蒙商略古今具陳人世著五部區分鈔二十一卷所謂高墉崇映天網遐張再敞殊文統疎異術群律見翻四百餘卷因循講解由來一亂今並括其同異定其廢立本疏雲師所撰今纘兩倍過之故得諸部方駕於唐衢七眾周睇於貞觀者首之力矣但關中專尚素奉僧祇洪遵律師創開四分而兼經通誨道俗奔隨至於傳文律儀蓋蔑如也首乃播此幽求便即對開兩設沈文伏義亘通古而未弘碩難巨疑抑眾師之不解皆標宗控會釋然大觀是由理思淹融故能統詳決矣使夫持律之賓日填堂宇遵亦親於法座命眾師之相成之道不忘弘讚之功靡替遂得知歸秦土莫不宗猷法鏡始於隨文末紀終於大漸之前三十餘載獨步京輦無敢抗衡敷演所被成匠非一所以見迹行徒知名唐世者皆是首之汲引寔由匡弼之功而復每昇法宇規誡學徒微涉濫非者為停講坐或有墮學者皆召而誨喻聞者垂泣無不懲革大業之始又追住大禪定道場今所謂大總持寺是也供事轉厚彌所遺削顧以道穆帝里化移關表舊土凋喪流神靡依乃抽撤什物百有餘段於相州雲門故墟今名光嚴山寺於出家受戒二所雙建兩塔鎣以珠寶飾以丹青為列代之儀表亦行學之資據各銘景行樹于塔右貞觀元年有天竺三藏大齎梵本擬譯唐文乃詔所司搜揚英達僉議所及遂處翻傳其有義涉律宗皆諮而取正至于八年上以聖善早喪遠感難陳雖化滿天下而罔極之情未展奉為太穆皇后於宮城之西造弘福寺廣延德望咸萃其中恐僥倖時譽妄登位席以首道素嚴正不濫邀延百辟上聞召為弘福上座即總綱任採擢僧倫其有預在徵迎莫不諮而趣舍使夫眾侶雲會等嗅如蘭不肅成規流芳不絕自爰初開講誓窮百遍必得果心夕死可矣始於漳表終至渭濱隨方陶誘恰窮本願慶本所念未幾而終詳諸物議可為知命以貞觀九年四月二十二日宿疹再加卒于所住春秋六十有九皇上哀悼下勅令百司供給喪事所須務令周備自隋至唐僧無國葬創開摸揩時共重之僕射房玄齡詹事杜正倫並諸公卿並親盡哀訴崇戒範也至二十九日裝辦方具時惟炎夏而屍不腐臭眾共嗟之斯持戒力也諸寺門學競引素幢充諸街衖官給地十畝於京城西郊之龍首原縣夫三百築土墳之種柏千株于今茂矣慕義門學共立高碑勒于弘福寺門許敬宗為文初律師弘化終始有聞博見之舉通古罕例自講士交競救習昔傳讎勘群宗多乖名實非夫積因往世故得情啟天乘數百年來收宗始定兼勤於聽說重於行事隨務造儀皆施箴艾每於晦望說戒先具法物花香交飾鎣發堂中預在聽徒合掌跪坐一眾兢竦終於前事說欲陳淨偏所誡期每講出罪濯諸沈累故持律之士多往參焉自終世後此事便絕余嘗處末座向經十載具觀盛化不覺謂之生常初未之欽遇也乃發憤關表具覿異徒溢目者希將還京輔忽承即世行相自崩返望當時有逾天岸嗚呼可悲之深矣釋慧璡姓吳楊州江都人也母懷之時即祛嗜欲辛腥俗味眇然不顧識者以為兒之所致同身子矣及年七歲心慕緇徒道見沙門尋而忘返親欣其信仰也遂放依榮法師而出家焉孝謹天然罔由師訓隨從奉敬初無乖越每從榮遊履諸寺一無敢出離便於榮所臥床下席地而伏斯例非一聽榮攝論大悟時倫即而講說嗟賞者眾談吐清雅妙會物情於仁壽年中從榮被召入於禪定及具戒後專精律儀聽遵律師講凡二十遍又聽首律師數亦相及謙弱成治竪論不言講揚攝論方敷律相時以其寄大乘而弘行範也大業末曆郊壘多虞禪定一眾雅推璡善能御敵乃總集諸處人畜普在昆池一莊多設戰樓用以防擬璡獨號令莫敢當鋒時司竹群賊鼓行郊野所至摧殄無抗拒者兵臨莊次意在誅蕩璡登樓一望但見張旗十里乃收束弓刀反縛奴僕大設餚饍廣開倉廩身先入陣勞問軍主引至莊中命令就坐既見盛設相與開顏各執璡手健道人也飽噉而旋惟取牛十頭擬勞軍士牽至中道璡復從乞以銜前顧皆用還之所以義寧之初通莊並潰惟有禪定如舊無損即深明機要善達開遮一人而已加又偏工巧性無施不可或莊嚴彩飾或丹青輪奐或裁縫服翫或驅策人物眾兼四百通用推賢至於誦說戒經清音流靡由來怠墮者聞璡說戒皆來坐聽竦耳峻坐畏其聲止貞觀之初任雲花寺上座常弘攝論化開律部晚又下令徵入普光綱理僧倫大小清穆以八年冬終於此寺春秋五十餘矣時又有沙門滿德善智真懿敬道者同璡所學慕義朋從德慧悟天開談說弘暢智博解深奧情欣護法懿導說有功化行多阻道抱素自資性存經史多從物故懿獨存焉揚敷京輦釋法礪俗姓李氏趙人也因宦遂家于相焉生而牙齒全具迄于終老中無齓毀堅白逾常登年學位便欣大法初歸靈裕法師即度為弟子風素翔郁威容都雅言議博達欣尚玄奧受具已後敦慎戒科從靜洪律師諮學四分指撝刑網有歷年所振績徽猷譽騰時類功業既著更師異軌又從恒州淵公聽集大義乃周兩載統略支葉窮討根源當即簙引所聞開講律要詞吐簡詣攻難彌堅故得隣幾獨絕尤稱今古末又往江南遊覽十誦而盛專師授討擊未資還返鄴中適緣開導屬隋煬道銷岳瀆塵擾聽徒擁戢諮逮無因唐運初基法門重闢會臨漳令裴師遠夙承清訓預展法筵請礪在縣敷弘相續綿積累載開悟極多四方懷道霄興命駕解契昇堂行敦入室礪以初學舊習委訪莫歸若不流于文記是則通心無路乃開拓素業更委異聞旁訊經論為之本疏時慧休法師道聲遠被見重世猷讚擊神理文義相接故得符采相照律觀高邈休有功焉以貞觀九年十月卒于故鄴日光住寺春秋六十有七前後講律四十餘遍製四分疏十卷羯磨疏三卷捨懺儀輕重敘等各施卷部見重於時時衛州道爍律學所崇業駕於礪為時所重矣釋玄琬俗姓楊弘農華州人也遠祖因徙今居雍州之新豐焉青襟悟道履操沖明志在學年方遊法苑事沙門曇延法師延震嶺宏標遺教法主隋文欽重立寺處之具見別傳而琬位居入室恭恪據懷及進具後便隨洪遵律師伏膺四分冠冕遮性鎔汰持犯涉律三載便事敷演使於後進樂推前英歎美乃旋踵本師涅槃真體捃掇新異妙寫幽微又欲欽佩唯識包舉理性於曇遷禪師稟學攝論并尋閱眾鋒窮其心計法華大集楞伽勝鬘地論中百等並資承茂實研覈新聞環循彌討其際搜會擢其玄理然顧福智相導有若輪馳慧業略剖於終標樹創開於始永惟延師存日願造丈六釋迦經略未圓奄便物故誓志營復克遂先摸於仁壽二年提洽有緣便事鑪錘寺乃京臯衝要峙望歸心故使至感冥通控引咸遂當時空色清朗杲日流輝上天雨花狀如雲母滿空飄灑終墜像前僚庶嘉其罕逢法屬慶斯榮瑞及開摸之後雅相逾圓即為關輔棟梁金像之大有未過也今在本寺每於靜夜清朝飛流八音之響而不測其來至又造經四藏備盡莊嚴諸有繕寫皆資本據又以二月八日大聖誕沐之晨追惟舊緒敬崇浴具每年此旦建講設齋通召四眾供含悲敬辦羅七物普及僧儔又常慨運岠象末有虧歸禁至於授受遮難滋彰乃鎣飾道場尋諸懺法每春於受戒之首依二十五佛及千轉神呪潔齋行道使彼毀禁之流澄源返淨登壇納法明白無疑並傳嗣于今住持不絕從此而求可謂護法菩薩也而重法尊行晨夕相仍若值上德異人必揖對欣振諮承餘令雖聞同昔習而翹仰如新斯後已謙光罕有蹤矣逮貞觀初年以琬戒素成治朝野具瞻有勅召為皇太子及諸王等受菩薩戒故儲宮以下師禮崇焉有令造普光寺召而居之供事豐華廣霑會響又別勅延入為皇后六宮并妃主等受戒椒掖問德禁中授納法財日逾填委而欽若自守不顧有餘䞋施所資悉營功德尋有別勅於苑內德業寺為皇后寫現在藏經當即下令於延興寺更造藏經並委其監護琬以二宮所寄惟谷其誠祇奉不難義須弘選自周季滅法隋朝再興傳度法本但存卷秩至於尋檢文理取會多乖乃結義學沙門讎勘正則其有詞旨不通者並諮而取決故得法寶無濫於疑偽迷悟有分於本末綱領貞明自琬始也昔育王再集於周時今琬定宗於唐世彼此誠異厥致齊焉然其匠訓於世三藏含之偏以苦節自修德以律儀馳譽言為世範緇素攸歸華夷諸國僧尼從受具戒者三千餘人王公僚佐爰及皂隷從受歸戒者二十餘萬左僕射蕭瑀兄弟人倫藻鏡久厭時煩每諮法華會三之旨龍樹明中之教沈吟移景奉佩而旋右僕射杜如晦臨終委命召為歷劫師資大將軍薜萬徹昆季并及母氏並欽崇戒約蔬素形終普光道岳法師解洞幽關辯開慧府敬奉戒香行菩薩道而汲引亡疲弘務終日因之革勵修習者計非恒准故京輔士庶繼踵煙隨禮供相尋日盈厨庫時有巫覡者云每至授戒說法異類鬼神諸方屯聚如承受相自非至功冥被孰能致乎琬以戒勸之至物我同欽義等風行事符草偃乃致書皇太子曰元正告始景福惟新伏惟殿下膺時納祐罄無不宜但琬夙縈沈痾不獲奉慶蒙降逮問無任荷戢感顧恩隆罔知攸厝今略經中要務即可詳行者四條留意尋檢永綏寶祚初勸行慈引涅槃梵行之文令起含養之心存兼濟之救也二減殺者引儒禮無故不殺牛羊者皆重其生去其濫逸也又言王者修其教不易其俗齊其政不易其宜見其生不忍其死聞其聲不食其肉此即上帝悼損害之失樹止殺之漸也故佛經有恕己之喻誡之殺打諸事也琬聞東宮常膳日多烹宰審如所承誠有大損殿下以一身之料遍擬群僚及至斷命所由莫不皆推殿下所以長懷夕惕望崇慈恕自今以往請少殺生東宮內外咸減肉料則曆長命久仁育斯隆三順氣者如經不殺曰仁仁主肝肝者木也春陽之時萬物盡生宜育群品用答冥造如其有殺是不順氣殿下位處少陽福居春月行慈以和正氣施惠以保天齡請年別春季斷肉停殺愍彼含育順此陽和四奉齋者如經年三月六能潔六根便資五福伏願遵行受持齋戒何者今享此重位咸資往因復能進德崇善用成其美則善知識者是大因緣玄琬道德疏微曲蒙顧眄謹率聞見敢塵聽覽登即答曰辱師所示妙法四科循覽周環用深銘佩法師早祛塵累遊神物表闡鷲嶺之微言探龍宮之祕藏洞開靈府凝照玄門固以高步彌天隣幾初地遂能留情博施開導蒙心理實義周詞華致遠包括今古網羅內外訓誘之至審諭之方縱聖達立言師傅弘道亦未足髣髴要津擬儀高論但行慈減殺順氣奉齋斯乃仁人之心以成大慈之行謹當緘諸心府奉以周旋永籍勝因用期冥祐餘文不載其言令之行化及此類九年下詔斷殺起於三月盡於五月琬以仁育兼濟乃上啟更延帝又特聽盡于歲暮貞觀十年杪冬遘疾知歸後世又致啟東宮累以大法又上遺封表於帝曰玄琬聞真容晦迹像教凌遲無不假緇素以住持設內外而為護遂得法雲再潤慧日重輝光叶萬乘紹隆千載竊尋住持之理義有多門弘護之方教乃非一若不依佛取捨仍恐賞罰乖宗如其准教驗時是則簡敬當理伏以僧尼等不依戒律致犯刑章聞徹闕庭塵勞聽覽琬等僧徒無任慚懼但恐餘年昏朽疾苦相仍弱命不存洪恩未答遂於經中撰佛教後代國王賞罰三寶法及安養蒼生論并三德論各一卷伏願聖躬親降披覽陛下廣開上書之路冀納芻蕘之言謹獻祕要之經請詳金口之教但琬忝當傳法庶無匿教之𮘧扶劣署封以酬終後之事不勝戀仰謹奉經以聞又遺誡門人在於道檢言極詳切讀者垂淚又云餘廕施諸眾生餘骸依古焚棄制服喪臨一無預懷遂以臘月七日卒於延興寺房春秋七十有五道俗失依皇儲哀慟天子下詔曰玄琬律師戒行貞固學業清通方寄弘宣正法利益群品不幸沒世情深惻悼賜物如別齋𡒨所須事由天府春宮懿戚卿相重臣並捨金貝榮嘉賵贈營助追福暨于百日特進蕭瑀太府蕭璟宗正李百藥詹事杜正倫等並親奉戒約躬盡哀禮後旋𡒨山寺幢蓋相映香花亂空從者如雲眾盈數萬前儐達于終南後塵猶繼于城闕四十里間皂素充道皆云我師斯亡戒業誰保故為時宗如此也弟子等五百餘人奉遵遺旨爾時雲高風靜水淨油香七眾彌山一心悲結乃命下火依法闍維薪盡灰飛廓然歸本仍於焚所建佛塔一區用津靈識儀像存焉東宮洗馬蘭陵蕭鈞制銘宗正卿李伯藥製碑立于塔所時為冠絕初琬自始及終意存弘濟生善福智無不綴心武德之初時經剝喪粒食勇貴客僧無託乃自竭餘力行化魁豪隨得貨賄並充供給日到寺厨親問豐約故主客同慶焉又像季澆漓多輕戒律乃以身軌物引諸法屬親執經文依時附聽乃經十遍遠嗣先塵智首律師德光榮問於帝京者寔資成贊能扇芳風自見令達罕能推挹如此人矣故使唐運搜舉歲拔賢良多是律宗實由琬之篤課也而容範端肅聲氣朗峻預瞻敬者莫不懍然故圖象厥相猶令人畏者弟子僧伽俗姓元氏清悟寡嗜欲常隨琬導物而立志貞正機諫變適不犯顏色以味靜為宗又不希人世依閑業道是所謀焉臨終清嗽歛容明誨而卒豈非師資謙德能世其塵而恨其早卒清規未遠釋慧蕭俗姓劉本彭城人世家徙于許州之長葛故又為縣人焉奕葉以衣纓稱士大夫十八為書生聰悟敏達善說詩禮州郡以明經舉之非其所好遂入嵩高山求師出家強識前聞而以戒行見稱耆舊明達相謂曰若人如此必今代之優波離也開皇初遊學鄴城博綜經律乃貫練眾部偏宗四分聞泰山靈巖寺幽栖潔行之宅也乃往從焉後以和上年衰復還中嶽于時隋祖創業四海為家故得縱任往還無所拘礙時龍門沙門明朗河東持律之最承蕭道聲藉甚不遠從之朗雖年齒隆蕭而卑身禮事並深相悅服道合欣然淹留歲序請歸河曲蕭亦不滯物我相與同行住于龍門之定林寺歷緣山水居隨所好尋訪同志不憚危險馬頭山有僧善禪師聚徒結業從而習定時還朗寺弘暢毘尼仁壽中頻向黃頰山依巖夏坐有亡命者因事投焉不忍遣之留匿經久後以事發引蕭為侶所在督課追徵赴獄會朗善俱亡又兼匿罪便振錫徂南路經蒲坂時沙門道積神素道傑等晉川英彥素與周旋留連累載屬隋煬墜歷法令滋彰藏匿嚴科殊為峻刻蕭以許身為道隨務東西名貫久除栖遁幽阻自中條王屋巨壑深林無險不登若遊庭戶逮中原版蕩妖氣一亂河東郡丞丁榮敬服德音招住仁壽長弘律藏學者肩隨義寧中被擁西城不虧講業及後安靜彌崇法會蒲陝晉絳五眾師焉以貞觀十四年終于仁壽春秋七十有三自蕭服心戒業演導為宗友接朋勝時無與貳每念朗善遊好不覺涕之無從不能裁止便登眺而慟斯重交募善為如此也曾講涅槃僅十許遍猶恨大乘無功遂翫讀華嚴於數年間口不輟音文不釋手有請蕭為方廣講主乃止之曰吾尚未解經意安可講乎時以為貞而且諒又懼誤諸後學云釋慧滿姓梁氏雍州長安人也父粲曆仕隋唐為海疊諸州刺史滿生年素潔履正標宗慈濟含育殆非修學世俗餚饍見便寒悚僧儀道具覩即欣仰年甫七歲即樂出家二親素奉佛宗不違其志父臨海州有勅聽度便蒙剃髮隨父還京住大興善為仙法師弟子仙名望京邑識悟有從既道俗洽聞故父親付囑後携住仁壽宮之三善寺及大業之始又住大禪定焉進戒奉業於智首律師明慎威儀學門推揖思擇理味以達曙為恒而勤於政事樂行勸勉每值立界施則唱白科舉身先眾侶諮考疑議至於受戒緣集難遮多少教授獨斷成不眇然滿乃預令識相提撕抵掌致有臨機忘逸往往徵正時共重其詳審敬其成進也遊講四方不拘世累貞觀三年甞於鄜城魏兵曹家別院講羯磨法所居草室忽為火燒風焰俱盛將延西及滿索水潠之因即風迴火滅得無燒爇斯戒德之威頗難登繼至七年令造新寺通選大德以滿行績前聞引之令住其年奉勅令任弘濟寺上座專弘律訓獎導僧徒丞有成規旁流他寺有集仙寺尼素無慧解妄有師習鑄老子真人等像私自供養并廣召黃巾在堂慶度滿與諸僧同預齋集既屬此事公呵止之連告大德顯行擯罰又追取道像入太原寺改成佛相用誡餘習昔周趙王治蜀有道士造老君像而以菩薩俠侍僧以事聞王乃判曰菩薩已成不可壞天尊宜進一階官乃迎于寺中改同佛相例相似也又尼慧尚者僥倖一時宮禁還往會高祖昇遐離宮京置乃以尚之住寺擬設皇靈尚即取僧寺為尼所住事違正勅莫敢致詞滿遂搆集京室三綱大德等二百餘人行於擯黜云自佛法流世未有尼眾倚官勢力奪僧寺者既是非法宜出眾外不預四眾還往及諸法事若有與尚眾言論者亦同此罰制令既行是非自顯慧尚不勝其責連訴東宮并諸朝宰有令遣詹事杜正倫解其擯事僧眾既集多從情議滿曰殿下住持正法慧滿據法情理今則違理附情此則規模一亂擯本治罪罪仍未悛據此而詳未敢聞旨便捉坐具逡巡而退時眾懼加威權便同解擯滿聞之嘆曰余伴既少難可重治且不同解示知乖相耳尚後謝過滿終不顧及駕巡東部下勅李眾在前滿集京僧二百人詣闕陳諫各脫袈裟置於頂上擬調達之行五法舉朝目矚不敢通表乃至關首重勅方迴常安弘濟集徒講說成匠晚秀有隣聲釆又願生安養浴僧為業學安公之芳緒也焭焭惻惻兢兢自厲以貞觀十六年四月二十日遘疾知當後世勅出什物並屬三寶正坐繩床自加其膝召諸寺眾人各執別氣從下上漸至于心言晤答對初無昏昧煖氣至口奄爾而終春秋五十有四焚于終南龍池寺側餘骸並化惟舌不灰更足薪火經于累宿色逾鮮赤遂瘞于山隅京師淨住寺惠昂為之銘頌見于別集製四分律疏二十卷講四十餘遍釋慧進姓鮑氏潞州上黨人弱歲辭親慕從緇侶修習戒檢極用偏功將欲剪削父母留戀遂停俗里以仁孝見知年至三十鄉閭覿其精苦潔身斷愛無思妻累乃共白其所親委其元度方任出家住州治梵境寺既受具已聞說受淨衣毛㱇然重問持犯又闕諮悟承鄴下講律徒侶僅千欣喜滿懷以律假緣求非文不合因即閉關自讀八十餘遍行要耳目頗亦具瞻而義理由蹤必從師受便往相州洪律師所一坐伏聽不移其席乃經八遍中靜緣務相續而聽又經八年爾後栖遑隨師南北或山或世遊採經論用裨律宗略計前後四分一宗百二十遍并覆尋讀強三百遍自有同塵專志累功罕儔其匹隋文末曆有同寺僧弊進學業匹難齊競陰而嫉之進曰相與出家同遵律業潛加繩扇豈不以身名致嫌乎昔聞無諍行者惟在空生聖立芳規義非自結余雖不敏請從雅喻即日往謝擲棄公名揭襆而出眾有止之進曰余不滯於去留也為緣故耳因逖聽諸方勝徒名地五臺泰岳東川北部常山雁門隨逐禪蹤無遠必屆沙門慧瓚道王朔川又往投焉定師宗傅及瓚入關遂往箕山訪蹤巢許巖名便利有古寺焉掃以居之足不下溪三十餘載言行成範緇素尋焉舊本幽阻由之喧泰故其法屬常以禪律繼業以貞觀十九年正月十五日因疾跏坐終於山舍春秋八十有六時同鄉沙門道瓚者善宗四分心明清亮講解相仍具傳章鈔而形氣弘偉少共齊倫在法住寺御眾揚化韓潞沁澤四州從範末齡風疾頓增相乖儀節雖衣服頹陊而藥食無瑕余聞往焉欣然若舊敘悟猶正年八十餘矣釋道亮姓趙氏趙州欒城人十五厭於世網投州界莎坦禪坊備禪師出家焉備博達洽聞兩河稱德偏弘大論神見清遠十六登坐至於八十聲相動物詞味無變亮奉敬諮展望預聽徒乃令往飛龍山誦經為業山侶三十並是禪蹤素少淨人惟亮一已既當下位眾務同臻日別自課舂五斗粟將及六載一時不懈徒跣三年六時隨眾屢蒙放遣素心不從積至七年苦勸方遂聞并部瓚禪師結徒開化盛宣佛法行達箕山便進具戒漸次太原歸依慧瓚念定為務旁慕律宗有嚴律師者德範可歸便從受業因居無量壽寺焉即嚴之所住也自爾專攻四分無忘日夕又從嚴往石州聽地持論經停既久文旨大通覆述前解增其名實有員秀才者居幽綜習儒教有功從亮學於起信遂為披折開發慧悟抱信不移承龕律師引徒盛講據業呂州又往從焉聽溫本習後返住寺依時弘演唐運初開勅為滿師立義興寺以亮律行清顯延而止之因常講說鎮移世續貞觀之始出至本州欒城備公猶自在世欣亮遠覲為建律筵轉展相扇聲被東夏聽徒八百請益日隆爾後頻開律府計不在數成講學士四十餘人并部法興出自此矣至今貞觀十九年春秋七十有七見處義興當途御法有學士道胄者生自上黨僧貫太原聽涉有功偏能持忘披覽章疏即就敷揚今住京寺時時揚化釋慧旻字玄素河東人志用方直操行不群仁愛汎洽稟自天性道振三吳名流七澤情好幽居多處巖壑九歲出家勤精潔業誦法華經朞月便度十五聽法迴向寺新羅光法師成論率先問對秀逸玄賓命覆幽宗耆宿同悅年十七赴請還鄉海鹽之光興寺講法華經聽眾雲翔咸陳嘉瑞異香彈指屢結空中受具之後從竹園寺志律師稟承十誦文理精通傍訊諸部志公將漸學徒用委喪事云畢東入會稽至剡禮石佛天台遊講肆數年還吳止通玄寺結徒厲業一十七年不出寺門無窺別請元始要終布衣蔬食慶弔既絕談謔斯亡屬隋末崩離吳中飢饉道俗逃難避地東西乃守死不移禪誦無輟鳥集無擾獸群不亂蘇州總管聞嗣安迎請出山固辭不往重使再請不獲而赴時刺史李廉薛通王榮等深相器重永崇供覲而懷志栖隱終日慼慼聞公通鑒不可奪也乃送入華亭谷幹山立寺行道數年地惟下濕蚊虻甚多恐致損傷將事移止大唐開化法事廣流更入海虞山隱居二十餘載遠方請業常百餘人地宜梓樹勸勵裁植數十萬株通給將來三寶功德中年別於南㵎止一草菴兩兔一彪相親同止內外盤遊無相凌惱至於禽獸神祇請受歸戒敘其事績未可具也蘇州都督武陽公李世嘉遣書降使頻請不赴貞觀十九年刺史江王因國度人行道之次請令出山王欲受戒施衣傳諸香供並固讓諸德不授不納辭退山泉逍遙自翫凡講經律菩薩戒成實論數各有差古律舊疏有漏失者皆刪正而通暢焉著十誦私記十三卷僧尼行事二卷尼眾羯磨兩卷道俗菩薩戒義疏四卷受業學士傳化者二十餘人以貞觀末年八月十一日旦終於所遁春秋七十有七未終三日異香滿寺舉眾怪問曰吾後日當去矣生死人之常也寄世本若行雲慎無哭泣各念無常早求自度喪事殯葬律有恒儀碑誌飾詞一不須作能依此訣吾何言哉斯固臨終不撓可謂堅貞者矣試為論曰自法王之利見也將欲清澄二死翦除三障所以張大教網布諸有流雖復惑累增繁起惟三業隨業設教三學興焉戒本防非諒符身口定惟靜亂誡約心源慧取閑邪信明殄惑三法相假義刑聖量是故論云戒如捉賊定是縛賊慧如殺賊賊謂煩惑不可卒除功由漸降故立斯旨莫非戒具定修深知障惑明智觀察了見使纏我倒既銷諸業不集推其本也則淨戒為功舉其治也則正慧為德經美能生豈不然矣是使五乘方駕於戒道眾聖肩隨於行衢垂福祐於四生廣紹隆於萬載非夫戒德何以懋哉粵自金河累言爰始靈山集法時遵厚味道被淳源雖復設教不倫互裁輕重奉者無乖會聖體意兩不相非然夫上座大眾創分結集之場五部十八流宗百載之後備列前傳部執等陳自律藏久分初通東夏則薩婆多部十誦一本最廣弘持寔由青目律師敷揚晉世廬山慧遠讚擊成宗爾後璩頴分騼而命路祐瑗波騰於釋門澄一江淮無二奉矣而恨受遵四分隨依十誦可為商之其次傳本則曇無德部四分一律雖翻在姚秦而創敷元魏是由赤髭論主初乃誦傳未展談授尋還異域此方學侶竟絕維持逮及覆聰方開學肆有宋文世彌沙塞部五分一本開譯楊都覺壽所傳生嚴其筆文極鋪要深可弘通郢匠輟斤流味無日可為悲夫雖聞海濱披述汾願剖詞登往搜求名實乖爽可惜華典虛度神州迦葉遺部解脫一本梵葉久傳無人翻度惟出戒本在世流通等聚餘宗更無異轍世諺妄習偏備愚叢婆麁羅部律本未傳藏中見列僧祇部者乃是根本大眾所傳非是百載五宗生也統敘五部支分此方已獲其四若據攝末從本則二部是其所宗此方已獲其一自餘群部多是西域賢聖纘述行事其中聚類自分區別緣敘難裁略言之矣惟夫慧日已沈法流方被眾行之重無越斯經諒由附相束情心事易准動靜科據真契威容凡愚妄習覩相弘善故律緣制斯致罕乖試詳講導開士持奉明人見想紛馳互程神略部別廢立取捨難恒學觀未張易為開舉何以明耶至如受具一法三聖元基部各陳要具舒隨相異宗會受事類星張當受明隨同猶合契考夫行事之士則鄉壤部分窮其受戒之源宗歸四分今則隨學陳相不祖先模抑斷是投妄情斯託可謂師資訓缺教授無功亦是願行道殊機見互僻斯之糅雜二百餘年豈不以傳通失人故使頌聲流鄭今則混一唐統普行四分之宗故得終始受隨義難乖隔攝護雖廣其源可尋自初開律釋師號法聰元魏孝文北臺楊緒口以傳授時所榮之沙門道覆即紹聰緒纘疏六卷但是長科至於義舉未聞于世斯時釋侶道味猶淳言行相承隨聞奉用專務栖德不暇旁求魏末齊初慧光宅世宗匠跋陀師表弘理再造文疏廣分衢術學聲學望連布若雲峯行光德光榮曜齊日月每一披闡坐列千僧競鼓清言人分異辯勒成卷帙通號命家然光初稟定宗後師法律軌儀大聖徽猷具焉所以世美斯人行解相冠誠有徒矣有雲暉願三宗律師躡踵傳燈各題聲教雲則命初作疏九卷被時流演門人備高東夏暉次出疏略雲二軸要約誠美蹊徑少乖得在略文失於開授然雲勇於義宗談敘誠博暉則覈切詞相法聚推焉世諺首尾信探風骨汾陽法願眄視兩家更開甍穴製作抄疏不減於前彈糺覈於律文是非格於事相存乎專附頗滯幽通化行并塞故其然也其餘律匠理洪隱樂遵深誕等或陶冶鄭魏或開壃燕趙或導達周秦或揚塵齊魯莫不同師雲術齊駕當時雖出鈔記略可言矣而導開業關中盛宗帝里經律雙授其功可高于時世尚僧祇而能間行四分登座引決其從如流勍敵每臨銜箭而返然遵一其神志聲色不渝由是人法歸焉可謂行之及也智首律師承斯講授宗係盛廣探索彌深時屬雲雷接統傳化學門遠被製述全希豈非博贍百家共師一軌雖欲厝筆無詞可通屬有礪亮行判爍勝藏興或傳道於東川或稱言於南服其中高第無越魏都制疏乃行其緒誠少餘則名擅一方蓋無筆記而復化行難阻多翳時心豈不以制在篇初故陷者惡聞其失嗚呼律為法命弘則命全今不欲不弘正法斯滅又可悲之深矣觀夫定慧兩藏理在通明戒律宗中情纏事局事則紛披雜集前後異條開制適緣舉例寧准論餘兩藏義在潛通達解知微名為會正所以天仙小聖逗機明道互說精理開明慧務俱稱至教印定成經若據律宗惟遵佛誨大小諸聖不妄傳揚斯何故耶良由教限內眾軌躅常儀僧寶可欽非餘訓勗自非位極至聖誰敢厝心是以文云吾尚不以眾僧付於身子況餘人乎故所制重輕皆遵成教縱有疑問還委佛通雖著論詳述而不作是使遺言四命戒為大師三集法輪先弘斯典論稱法壽豈虛也哉昔鵠樹已前持律者眾其中高者牛王最初往業未夷徙居天室其次接緒號優波離五百獻功奉持為上致使四十餘載七眾憲章隨犯科要多因面結至於持犯通塞徵舉治儀皆命顯揚委其監護雖復二十四依通傳正軌揩摸後葉必祖斯文暨乃東川創開戒業曹魏嘉平方弘具戒爾前法眾同號息慈師弟乃聞纔移俗耳行羯磨也憑准法護之宗論布薩也翻誦僧祇之戒教網初啟隨得宗之奉可怪也西晉務法稍漸綱猷中原喪亂干戈競接雒邑凋殘渭陰荒燼竺護青門之眾可卷而懷康會黃武之徒未足收採重以孫皓苛虐元燾不仁擁寺列兵虔劉釋種平城之側高尚覆屍黃河之涘梵僧捐寶投骸靡厝法律寧通時會彌天恢張儀範僧眾常則皆約戒科兵飢交貿網制嚴密廣如前傳所敘故安舉三章且救時要攝緣成濟得其務焉但教缺未弘必假傳授鼻奈耶律初是安通文極疎略粗知大旨審其正則誠所未聞弘在人乎安當斯寄其後遠叡願翼咸習門風秦晉兩邦昌明法化誠其力矣自斯厥後南北兩分住持位別各程綱目互舉清徒故有𭗵嶺栖霞弘明淨地秦川靈隱建立戒壇應供列雁行之僧敘戒聞重受之夏即其事也若夫人法交映則行解相扶有昧則絕紐當時無得遂埋神於地故世中迷學其流四焉試略舉之想當迷責樂大乘者志尚浮虛情專貪附故有排委戒網捐縱威儀見奉律者輕為小乘毀淨戒者重為大道便引黃葉是真金之喻木馬非致遠之能訶折排拉如捐草土皆由行缺於身塵染綱領恥己不逮於清達慢己有累於嚴制遂即迴情學大開展心胸陵轢聲聞褒揚菩薩通情則恐投於坑阱取解則曲媚於門侶如斯懷挾未曰倫通以此求心心可知矣何不廣讀大乘開張慧路徵延聖意有附塵焉是以勝鬘所談女人之起行也猶知毘尼即大乘學也時所明初心之具修也尚識律儀即菩薩藏何況諳達理教體化知神解不謝於上賢行寧虧於下眾必行有乖解非解也得語而不詳義棄智而從諸識生死無涯之儔固難述矣流俗常事三省而加九思出世所詮四依之與八正降斯以往未足言哉是以大小兩教隨相攝修並在離著豈惟封執若存此計與外不殊半滿經論皆陳此過戒之受也但啟虛願之門戒之隨也須遵實行之務知受而不明隨修願而無其行可謂隻輪無轉於地折翮有墜於空信哉世有鄙斯戒者皆為煩累形神弊其持犯故同輕削指為小道小可捐也宜即捨之矜重情多緘言無報誠以攝御門學非戒不弘相善住持非戒不立其猶行必涉戶言必有由故名利將及爭位夏而斂容師授尊模趍壇場而整帶豈非貪決情勇攬戒奉以為師行絕綱猷委戒填諸溝壑專志在於本毒去取匠於方寸用斯弘濟誠未敢聞此則愛大憎小為迷一也若能關鍵身口附相攝持虛蕩慮知體道懷德則安遠光憑斯其人矣世學諸論詞數區分傍大乘而通小徑委本筌而尋章句時連界繫乍別色心一行六歷之相攝名教頻繁之包富聖列為存道行凡學止在聲譽於是讎討終身博綜詞義輕蔑戒誥陵犯色聲邪說富於脣吻邪求滿於胸臆謂捧鉢為鈍丁號持瓶為竪子半月說戒惟列麁言衣鉢受持極成煩碎遂即顛倒形服雷鼓言聲侮弄尊儀斜眄經律故使依藥受淨永絕其身戒約住持生緘其口斯豈不聞於本業也知業則不然乎但騰焰於舌端曾未圓為心約此則尊高矜伐賤委本基為迷二也若能深討使性妙識治能念動惟是我人事對但明塵識則未悉何賢當斯目也慧休論士樹以風聲然其專大深小騰實復光其美又有行福末凡稟素疎野廣讀多誦情見特隆偏略戒科謂講生例不如常飲淳乳飽我心神靜處幽閑何過相及斯皆靡聞教行動事疑遲不學無知隨念交集所以每講聽採坐列群僧就務鑽研其人無幾學猶不解況不學乎牛毛麟角頗為近實又有成樹塔寺繕造田園舉鍤牽材未思物命燎原溉隰豈避生靈惟恐福業不成實未懷諸慈惻是則不聞大聖之明誡也十誦三相正在斯人或謂為福行罪功過相補是又不聞律緣之初禁也緣修佛堂方制地戒意在隨念附相策心不惟事業無益之咎故世思微務靜之士招引寔希躁擾經營之夫騰擲者眾麁法易染妙理難弘為迷三也若能依准教行不越常刑賢聖所同寔當弘護至如澄寺九百神道映於趙都遠林不刊戒德流於晉世可龜鏡矣專門奉律之客立志貞梗之夫薄誦戒緣粗知文句時登元坐引眾闡揚慢水覆心更無依學是則不聞明律之清誡也法身成具方免師資今乃易從止足未思弘贍魚睨雲漢爵躍僧倫惟我律師餘皆師律顧諸經論事等石田斜𭿤高名約同稊稗知法世寡誰辯熏蕕任縱科治是非一亂輕重由其量處禍福自其心神出語成刑曾無再覆傳而不習孔門所輕習而不經釋宗所誡何異讀禮而存倨傲誦易而忽陰陽勗哉斯言令終宜始但以時遭像季法就澆漓律部邪緣宗仰繁矣並由本尋學語義指誦文搯紙籤行題鞭記掌有則依述闕則絕言縱有異徵取通無路便言律無正斷故是前聖開聽遂即冒世輕生漫行章句飲杏湯者為清齋畜錢寶者為小犯坐具無勞截淨鉢量未必姬周斯皆強於鉛刃易取思齊其迷四也若能廣尋群典備閱行藏挹酌四印昭融三制臨機剖斷則文理相循隱括舉例則物我同曉如斯御眾世有人哉尋夫戒律之筌筌於持犯定慧之學務在治能治則亂惑可銷能則神機清遠餘外浮遊章句等捐月而執指端矜誕教相同詠藥而迷愈疾論者試開四學終墜兩迷非言何以致詞列域心寧盡故經陳曰種種法喻咸存離著律又述云常爾一心念除諸蓋固復懷斯試敘微有箴銘將用體鏡如流且復昭彰于後耳續高僧傳卷第二十八唐釋道宣撰明律下唐京師弘福寺釋智首傳一京師普光寺釋慧璡傳二滿德真懿善智敬道相州日光寺釋法礪傳三京師普光寺釋玄琬傳四僧伽蒲州仁壽寺釋慧蕭傳五京師普光寺釋慧滿傳六續高僧傳卷第二十九唐釋道宣撰明律下之餘唐箕山沙門釋慧進傳七明瓚并州義興寺繹道亮傳八益州福勝寺釋道興傳九蘇州通玄寺釋惠旻傳十洛州天宮寺釋明導傳十一洛州敬愛寺釋曇光傳十二京師延興寺釋道胄傳十三無傳益州福緣寺釋曇逞傳十四無傳釋道胄姓輔京兆始平人祖任上黨太守遂居長子焉性聰敏樂遠離行年十四遭母憂興蓼莪志報恩難極為母出家志敦孝始年二十往并州請印法師為和上得爾也可年八十五歲也令送至城門見多人著赤衣多鬚來迎云是綿竹所放生者因即蘇自此廣化立放生池諸州凡造一百餘所今並見在又益州甘亭神威力嚴惡殃福立應祈禱血食牛羊難紀忽下巫語欲逞受戒乃將佛像在神下座于時神影自移本處向佛下坐逞為受戒自爾祀日齋食而已又往劉備先生受戒神亦隨從所以蜀川神所逞行至者皆為受戒至今不捨由此道俗歸依發言風靡又於綿竹𮠁縣造三百尺大像今並成就故所祈求為無不遂以顯慶四年終于本寺春秋八十五道俗哀慕送往放生池於路三度大雨雨皆白色恰至葬所天地清明釋道興姓劉本住秦州八九歲時常念出家私詣僧寺不肯還二親恐失年十九決意定詣大光寺求出家僧眾愍之二親苦求隱避不失眾為解喻便許剃落時天下大亂賊𡨥交橫死者山積興為沙彌語諸徒曰人身難得持戒第一母為賊掠將去離城六十里興沒命尋逐至已被傷未絕賊見曰此僧誠為至孝逐母至此便不盡命乃背負母還城城中咸怪賊路兇險何因得返避難投蜀至河池縣逢贊皇公蒙被安慰送至梁州興與一老僧相隨彼有金十兩謂興曰吾有金可為負至蜀共分興曰此危身物佛又不許不可將行若不信者善惡應驗逐捨而獨往彼持金者至三泉縣逢賊致死既至蜀川年滿進具常行蘭若頭陀乞食智舜律師當衢講匠依聽五遍便能覆述每有異見舜深奇之後至京師首律師下伸大義如別所引後還蜀川廣聽經論不爽光陰又於江禪師下稟受禪道以為徵心要術也自舜沒後接構律筵每年講席極為稽引三十二度來請者方許開宗每歎云佛法漸替輕慢日增余不敢輕所以為重法故爾即以慇懃鄭重為善法種子若無此種何由可遇所以每講律部及發菩提心以此勵眾聽者垂泣恩誨興待眾涕泣靜已久久方令唱文如此非一四遠來投無客主興知都維那于時官府急切不許客住諸寺無停者咸來即安撫寺主曰依官制不許何得停之興曰官不許容針私容車馬寺主豈不聞耶寺主大怒曰年少不用我語興曰此三寶也敬則見善嫌則感惡寺主憤恚還房眼看袈裟不見又往三門王家會受飯謂言是血食人喻之竟不食返寺向興懺悔尋終行蘭若時鬼來惱亂興出繩床鬼退為受三歸已為禮佛名鬼亦隨禮貞觀中青城戴令來慕欲與興同房宿夜中眠驚走出房外云見一赤衣僧執杖打背云何因在此宿以火照背如三指大隱軫赤色因求悔過興遇疾甚聞室中音樂聲自念我所求者本在佛果不願人天所願不虛諸有魔亂自應消滅言已聲滅自此便差常禮千佛日別一遍永徽三年玄奘法師送舍利令供養興獲已於房內立道場發正願曰若一生傳法并禮賢劫千佛如契聖心請放光明如語一室並為金色弟子咸見以顯慶四年月日終於福勝春秋六十有七興自在道行節在懷晝夜恒坐曾不偃亞未常詣市不受別利乞食之外不出寺門不乘畜生不服非法益部五象敬而重之釋明導姓姚氏本吳興人因官歙州遂家于彼幼叶雅調與眾不群隋末喪亂二親崩歿發心出家意存護法所在尋逐彌勒戒檢以貞觀初行達陳州逢勅簡僧唯留世導以德聲久被遂應斯舉雖蒙榮聞意所遺之乃歎曰出家弘濟務存許道豈以名貫拘滯一方乃翻然遠征棄擲寺宇至爍礪二師座下餐稟幽奧未盈涼暑聲聞超挺因令覆述縱達無遺學門義侶莫不推挹自諸寺結憾訟及道俗牽連不決皆請通之及導面往吐言愜伏皆歎其善達無諍權導不思之力也龍朔二年道行夙彰奉勅別住東都天宮寺麟德元年今上造老子像勅送芒山仍令洛下文物備列時長史韓孝威妄託天威黃巾扇惑私囑僧尼普令同送威遂勒州部二十二縣五眾通集洛州各事幢幡剋日齊舉導出眾對曰佛道二門由來天絕邪正位殊本自碩異如何合雜雷同將引既無別勅不敢聞命威大怒曰是何道人輒拒國命乃使人脫導袈裟將行禁劾導曰袈裟勅度所著非勅不可妄除無勅令僧送道所以不違國命威怒曰道人有不送天尊者出導即挺身獨立預是僧尼同時總往導所威怒曰道人欲反導應聲語六曹官人曰長吏總召僧尼唱反此則長吏自反眾僧不反須告御史導等一時崩出威大忙懼降階屈節慚謝而止以斯抗禦季代少之因僧大集簡試度人天宮餉食過中乃至僧有不量時景者取而進噉導曰諸大德並佛法遺寄天下楷模非時之食對俗而噉公違法律現法滅緣冒罔聖凡一至於此眾並愧之因索水清漱月餘不食悲慨正法凋淪相及道俗苦勸方乃進餅以斯量之故以護法之士不顧形有者代有人焉今年六十餘東夏英髦一期咸集導於清眾有高稱焉釋曇光姓張氏汴州人自幼及長潔志清範諸有勝徒莫不登踐於礪爍兩師聽受成教逮至立年盛明律藏命宗章義是所推崇礪歎曰使吾道流河右誠此人乎又往玉法師所聽法華地論高達勝乘玄理權實坦然又往嵩岳相禪師學修止觀因屏絕塵惱不羈名利會東都盛德須有住持以光有素德景行難擁遂勅召住天宮寺又以教受新成眾徒胥集綱管之任非人不傳因又召為寺之上座綏撫清眾不肅而成然而汎愛之誠終古罕類四方律學莫不諮詢故其房宇門人肩聯踵接成就所舉遠近遵承西明寺律師君度奕奕標舉一時俊烈亦光之所進也今麟德二年東都講說師資導達彌所欽羨焉護法上本傳六附見四魏洛都融覺寺釋曇無最傳一齊逸沙門釋曇顯傳二周終南山避世峯釋靜藹傳三慧宣周京師大中興寺釋道安傳四慧俊慧影寶貴周新州願果寺釋僧勔傳五隋京師雲花寺釋僧猛傳六釋曇無最姓董氏武安人也靈悟洞微飡寢玄祕少稟道化名垂朝野為三寶之良將即像法之金湯諷誦經論堅持律部偏愛禪那心虛靜謐時行汲引咸所推宗兼博貫玄儒尤明論道故使七眾望塵奄有繁鬧最厭世情重將捐四部行施獎誨多以戒禁為先亟動物機信用雲布曾於邯鄲崇尊寺說戒徒眾千餘並是常隨門學至四月三十日布薩行籌依位授受常計之外乃長六十最居坐端深怪其異既無外眾通夕懷疑明旦重推有人見從邯鄲城西而來者竝異倫大德衣服正帖翔步閑雅亦有見從鼓山東面而來或於中路逢者皆云往赴崇尊聽僧說戒如是數般節級勘其年齒相扶人數多少恰滿六十焉故知道會聖心是幽靈遐降竹林群隱明非妄承最德洽釋宗屢當時望後勅住洛都融覺寺寺即清河文獻懌所立廊宇充溢周于三里最善弘敷導妙達涅槃華嚴僧徒千人常業無怠天竺沙門菩提留支見而禮之號為東土菩薩嘗讀最之所撰大乘義章每彈指唱善飜為梵字寄傳大夏彼方讀者皆東向禮之為聖人矣然其常以弘法為任元魏正光元年明帝加朝服大赦請釋李兩宗上殿齋訖侍中劉騰宣勅請諸法師等與道士論義時清道館道士姜斌與最對論帝問佛與老子同時不姜斌曰老子西入化胡佛時以為侍者文出老子開天經據此明是同時最問曰老子周何王而生何年西入斌曰當周定王三年在楚國陳郡苦縣厲鄉曲人里九月十四日夜生簡王四年為守藏吏敬王元年年八十五見周德陵遲遂與散關令尹喜西入化胡約斯明矣最曰佛當周昭王二十四年四月八日生穆王五十二年二月十五日滅度計入涅槃經三百四十五年始到定王三年老子方生生已年八十五至敬王元年凡經四百三十年乃與尹喜西遁此乃年載懸殊無乃謬乎斌曰若如來言出何文紀最曰周書異記漢法本內傳並有明文斌曰孔子制法聖人當時於佛逈無文志何耶最曰孔氏三備卜經佛之文言出在中備仁者識同管窺覽不弘遠何能自達帝遣尚書令元又宣勅道士姜斌論無宗旨宜令下席又議開天經是誰所說中書侍郎魏收尚書郎祖瑩就觀取經大尉蕭綜太傅李寔衛尉許伯桃吏部尚書邢欒散騎常侍溫子昇等一百七十人讀訖奏云老子止著五千文餘無言說臣等所議姜斌罪當惑眾帝時加斌極刑西國三藏法師菩提留支苦諫乃止配徙馬邑最學優程舉繼乎魏史藉甚騰聲移肆通國遂使達儒朝士降階設敬接足歸依佛法中興惟其開務後不測其終釋曇顯不知何人元魏季序遊止鄴中栖泊僧寺的無定所每有法會必涉其塵皆通諮了義隱文自餘長唱散說便捨而就餘講及後解至密理顯便輒已在聽時以此奇之而覩其儀服猥濫名相非潔頻復輕削故初並不顧錄惟上統法師深知其遠識也私惠其財賄以資飲噉之調或因昏醉臥于道邊時復清卓整其神器及文宣受禪齊祚大興天保年中釋李二門交競優劣屬道士陸修靜妄加穿鑿廣制齋儀縻費極繁意在王者遵奉會梁武啟運天監三年下勅捨道帝手制疏文極周盡修靜不勝其憤遂與門人及邊境亡命叛入北齊又傾散金玉贈諸貴遊託以襟期冀興道法帝惑之也乃出勅召諸沙門與道士對挍道術爾時道士呪諸沙門衣鉢或舉或轉或呪諸方梁橫竪於地者沙門曾不學方術默無一對士女擁閙貴賤移心並以靜徒為勝也靜迺高談自伐矜衒道術唱言曰神通權設抑挫強侮沙門現一我當現二今薄示微術並辭屈退事亦可見帝命上統令與靜捔試上曰方術小伎俗儒恥之況出世也雖然天命相拒豈得無言可令最下座僧對之時顯位居末席酒醉酣盛扶舉登座因立而笑眾皆憚焉而是上統所遣不敢有諫顯語李宗云向誇現術一之與二者深有致矣即於座上翹足而立曰吾已現一矣卿可現二各無言對顯曰向呪諸衣物飛舉者試卿術耳命取稠禪師衣鉢呪之皆無動搖帝勅十人舉之不動如故乃以衣置諸梁木帖然無驗諸道士等相顧無顏猶以言辯為勝乃曰佛家自號為內內則小也詺道家為外外則大也顯應聲曰若然則天子處內定小庶人矣靜與其眾緘口無言文宣處座目驗臧否其徒爾日皆捨邪從正求哀濟度未發心者勅令染剃故斬首者非一自號神仙者並上三爵臺令其投身飛逝悉委尸于地偽妄斯伏乃下詔曰法門不二真宗在一求之正路寂泊為本祭酒道者世中假妄俗人未悟仍有祇崇麴糵是味清虛焉在瞿晡斯甜慈悲永隔上異仁祠下乖祭典宜皆禁絕不復遵事頒勒遠近咸使知聞其道士歸伏者並付昭玄大統上法師度聽出家廣如別傳所載于時齊境一心奉佛國無兩事迄于隋運方漸開宗至今東川此𧜟猶少傳者曰達化護持融尚馳名秦世小以致遠顯公著績高齊知人難哉上統揣其骨則千里駿足異世同駕以貌取人失之自古則徒飾玄黃矣復何能抗禦之哉顯竟以放達流俗潛遁人世不知所之釋靜藹姓鄭氏滎陽人也夙標俗譽以溫潤知名而神器夷簡卓然物表甫為書生博志經史諸鄭魁岸者咸賞異之謂興吾宗黨其此兒矣與同伍遊寺觀地獄圖變顧諸生曰異哉審業理之必然誰有免斯酷者便強違切諫二親不能奪志鄭宗固留藹決烈愛縛情分若石遂獨往百官寺依和禪師而出家時年十七具戒已後承仰律儀護持明練時所戴重又從景法師聽大智度論一聞神悟謂敞重幽更習先解便知濫述周行齊境顧問知津講席論堂亟陳往復詞令詳雅理趣清新皆略無承導終于世累乃撫心曰余生年不幸會五濁交亂失於物議得在可鄙進退惟谷高蹈可乎遂心口相弔擯影嵩岳尋括經論用忘寤寐然於大智中百十二門等四論最為投心所崇餘則旁纘異宗成其通照言必藻繢珠連書亦草行相貫高為世重罕不華之後自悟曰綺文爽理華寔亂真豈流宕忘返不思懲艾乎自爾誓而斷之惟以釋道東騖並味前聞恐涉邪津悔於晚學又入白鹿山逖觀黃老廣攝受之途莊惠詭駁標寓言之論未之尚也聞有天竺梵僧碩學高行世之不測西達咸陽藹求道情猛欣所聞見私度關塞載離寒暑既至渭陰未及洗足即申謁敬昔聞今見見累於聞大鼓徒揚資訪無指乃潛形倫伍陶甄舊解蕪沒遜遁知我者希掩抑十年達窮通之數體因緣之理附節終南有終焉之志煙霞風月用祛亡反峯名避世依而味靜惟一繩床廓無庵屋露火調食絕諸所營召彼癘徒誨示至理令其致供日就噉之雖屬膿潰橫流對泣而無厭惡由是息心之眾往結林中授以義方欝為學市山本無水須便飲㵎嘗於昏夕學人侍立忽降虎來前掊地而去及明觀之漸見潤濕乃使洮淈飛泉通注從是遂省下㵎須便挹酌今錫谷避世堡虎掊泉是也藹立身嚴恪達解超倫據林引眾講前四論意之所傳樂相弘利其說法之規尊而乃演必令學侶袒立合掌慇懃鄭重經時方遂乃勅取繩床周繞安設致敬坐訖藹徐取論文手自指摘一偈一句披釋取悟顧問聽者所解云何令其得意方進後偈旁有未喻者更重述之每日垂講此法無怠常自陳曰余厭法慢法生不值佛世縱聞遺教心無信奉恒懷怏怏終須練此身心有時試縱惟欲誠心造惡有時攝念惟願假修相善如此不名安身如此不名清心故約己制他誠非正檢然末世根緣多相似耳必厭煩屈者須住不辭具儀者離此其開蒙敦勵皆此類也有沙門智藏者身相雄勇智達有名負糧二石造山問道因見橫枝格樹戲自稱身遇為藹見初不呵止三日已後方召責云腹中他食何得輒戲如此自養名為兩足狗也藏銜泣謝過終不再納遂遣出山沙門曇延道安者世號玄門二傑當時頂蓋名德相勝及論教體紛諍由生諮藹取決讓謝良久方為開散兩情通悅不覺致禮各嗚一足跪而啟曰大師解達天鑒應處世攝導今則獨善其身喪德泉石未見其可藹曰道貴行用不即在言余觀時進退故且隱居求志耳爾後事故入城還歸林野屬周武之世道士張賓譎詐罔上冒增榮寵潛進李氏欲廢釋宗既縱倖紫宸蠅飛黃屋與前僧衛元嵩脣齒相副帝精悟朗鑒內烈外溫召僧入內七霄禮懺欲親覩僣犯冀申殿黜時既密知各加懇到帝亦七夕同僧不眠為僧讚唄並諸法事經聲七囀莫不清靡事訖設會公陳本意有猛法師者氣調高拔躬抗帝旨言頗激切眾恐禍及其身帝但述懷曾無𧹞退藹聞之嘆曰朱紫雜糅狂哲交侵至矣可使五眾流離四民倒惑哉又曰飡周之粟飲周之水食椹懷音寧無酬德又為佛弟子豈可見此淪湑坐此形骸晏然自靜寧大造於像末分爼醢於盜跖耳徑詣闕上表理訴引見登殿舉手唱言曰來意有二所謂報三寶慈恩酬檀越厚德援引經論子史傳記談敘正義據證顯然從旦至午言無不詣明不可滅之理交言支任抗對如流梗詞厲色鏗然無撓百僚近臣代之戰慄而神氣自若不阻素風帝雖愜其詞理而滅毀之情已決既不納諫又不見遣藹又進曰釋李邪正人法混并即可事求未煩聖慮陛下必情無私隱涇渭須分請索油鑊殿庭取兩宗人法俱煮之不害者立可知矣帝怯其言乃遣引出時宜州沙門道積者次又出諫俱不用言乃與同友七人於彌勒像前禮懺七日既不食已一時同逝藹知大法必滅不勝其虐乃携其門人三十有餘入終南山東西造二十七寺依巖附險使逃逸之僧得存深信及法滅之後帝遂破前代關東西數百年來官私佛法掃地並盡融刮聖容焚燒經典禹貢八州見成寺廟出四十千並賜王公充為第宅三方釋子減三百萬皆復軍民還歸編戶三寶福財其貲無數簿錄入官登即賞費分散蕩盡初於建德三年五月行虐關中其禍既畢至六月十五日罷朝有金城公任氏部於所治府與諸左右彷徉天望忽見五六段物飛騰虛空在於鳥路大者上摩青霄大如十斛囷許漸漸微沒自餘數段小復低下其色黃白卷舒空際類幡無脚爾日天清氣靜纖塵不動但增炎曦而已因往冬官府道經圓土北見重牆上有黃書橫拖棘上及往取之乃是摩訶般若經第十九卷問其所由答云從天而下飛揚墜此于時三寶初滅刑法嚴峻略示連席之官乃藏諸衣袖還緘篋笥屬隋興運轉牧冀州爰命所部從事趙絢敘之曰有清信大士具官身嬰俗累恕崇法理精感明靈神化斯應遂使群經騰翥等扶搖之上昇隻卷飄返若丹烏之下降其去也明惡世之不居其來也知善人之可集應瑞乎如彼聖著乎如此我皇出震乘乾更張琴瑟親臨九服躬總八荒知三寶之可崇體四生之不固遂頒海內修淨伽藍是使像法氤氳同諸舍衛僧尼隱軫還類提河特以此經像明靈著自非積善焉能致斯敢事旌表傳芳後葉初武帝知藹志烈欣欲見之乃勅三衛二十餘人巡山訪覓氈衣道人朕將位以上卿共治天下藹居山幽隱追蹤不獲後於太一山錫谷潛遁覩大法淪廢道俗無依身被執纏無力毘贊告弟子曰吾無益於世即事捨身故先相告眾初不許慕從聞法便開覽大小諸乘撰三寶集二十卷假興賓主會遣疑情抑揚飛伏廣羅文義弘讚大乘光揚像代并錄見事指掌可尋冀藏諸巖洞庶後代之再興耳自藹入法行大慈門繒纊皮革一無踐服惟履毳布終于報盡後厭身情迫獨據別巖勅侍者下山明當早至藹加坐盤石留一內衣自條身肉段段布於石上引腸掛于松枝五藏都皆外見自餘筋肉手足頭面剮折都盡並惟骨現以刀割心捧之而卒侍人心驚通夜失寐明晨走赴猶見合掌捧心身面西向加坐如初所傷餘骸一無遺血但見白乳滂流凝于石上遂累石封外就而殮焉即周宣政元年七月十六日也春秋四十有五弟子等有聞當世具諸別傳親侍沙門慧宣者內外博通奇有志力痛山頹之莫仰悲梁壞之無依爰述芳猷樹碑塔所後有訪道思賢者入山禮敬循諸崖險乃見藹書遺偈在于石壁題云初欲血書本意不謂變為白色即是魔業不遂所以墨書其文曰諸有緣者在家出家若男若女皆悉好住於佛法中莫生退轉若退轉者即失善利吾以三因緣捨此身命一見身多過二不能護法三欲速見佛輒同古聖列偈敘之釋道安俗姓姚憑翊胡城人也識悟玄理早附法門性無常師聞道而至兼以恬虛靜泊凝心勝境謙肅為用動止施度凡厥禪侶莫不推服後隱于太白山栖遁林泉擁志經論思拔深定慧業斯舉旁觀子史粗涉大綱而神氣高朗挾操清遠進具已後崇尚涅槃以為遺訣之教博通智論用資弘道之基故周世渭濱盛揚二部更互談誨無替四時住大陟岵寺常以弘法為任京師士子咸附清塵安內外既明特善文藻動言命筆並會才華而風韻疎通雅調翔簡執禮居尊仁被朝貴故榮達儒宰知名道士日來請論咸發信心故得義流天下草偃從之周武廓清天步中外禔福頻御彫輦躬禮安焉安道為物宗坐鎮崇敬令帝席地而止安則如常敷化高談正法詞無涉世公卿側目觀者榮慶時及中食安命供設帝將舉筯曰弟子聞俗人不合僧食法師如何以罪累人安曰佛教權實律制開遮王賊惡臣並通供給貧道據法相擬理非徒爾帝曰審如來言非佛意也但恐損道眾耳又與賊臣同席誠無預焉即勅將去更論餘法曾不以介意斯即季代之高量也後勅住大中興寺別加殊禮帝往南郊文物大備勅諸道俗同覩通衢勅別及安令觀天子鹵簿儀具安答曰陛下為民故出貧道為法不出帝聞彈指嘆善久之安鑒悟絕倫德風遠扇立形平准守道自遵皆此類也與同學慧俊知名周壤俊姓朱氏京兆三原人生不學書而耳飡取悟一聞不忘藏諸胸臆流略儒釋談如泉涌攻擊關責鋒鍔叢萃曾於一日安公正講涅槃俊命章設問遂往還迄暮竟不消文明旦又問講難精拔安雖隨言即遣而聽者謂無繼難俊終援引文理徵並相詶遂連三日止論一義後兩捨其致方事解文故使驚唱前修預聞高揖俊後歷尋華土縱學名師凡所霑耳皆義通旨得安與同室三十餘年言晤飛玄誠逾目擊因疾而卒安撫屍慟哭曰宣尼有言信不虛矣至天和四年歲在己丑三月十五日勅召有德眾僧名儒道士文武百官二千餘人於正殿帝昇御座親量三教優劣廢立眾議紛紜各隨情見較其大抵無與相抗者至其月二十日又依前集眾論乖咎是非滋生並莫簡帝心索然而退至四月初勅又廣召道俗令極言陳理又勅司隷大夫甄鸞詳佛道二教定其先後淺深同異鸞乃上笑道論三卷合三十六條用笑三洞之名及笑經稱三十六部文極詳據事多揚激至五月十日帝又大集群臣詳鸞上論以為傷蠧道士即於殿庭焚之道安慨時俗之混并悼史藉之沈網乃作二教論取擬武帝詳三教之極文成一卷篇分十二初歸宗顯本篇有客問曰僕聞風流傾墜六經所以緝修誇尚滋彰二篇所以述作故優柔弘潤於物必濟曰儒用之不匱於物必通曰道斯皆孔老之神功可得而詳矣近覽釋教文博義豐觀其汲引則恂恂善誘要其旨趣則亹亹茲始良然三教雖殊勸善一途教迹誠異理會則同至如老嗟身患孔嘆逝川固欲後外以致存生感往以知物化何異釋典之厭身無常之說哉但拘滯之流未馳高觀不能齊天地於一指均是非於一氣致令談論之際每有不同此所謂匿摩尼於胎㲉掩大明於重夜傷莫二之淳風塞洞一之玄旨祈之彌劫奚可值哉主人答曰子之窮辯未盡理也夫萬化本於生生三才兆於始始然則無生無始物之性也有化有生人之聚也聚雖一體而形神兩異散雖質別而心數弗亡故救形之教教稱為外濟神之教教稱為內是以智論有內外兩經仁王辯內外兩論大等明內外兩律百論言內外二道若通論內外則該彼華夷若局命此方則可云儒釋釋教為內儒教為外備彰聖典非為誕謬詳覽載藉尋討源流教惟有二寧得有三何者昔玄古樸素墳典之誥未弘淳風稍離丘索之文乃著故包論七典統括九流咸為治國之謨並是修身之術若派而別之則應為九教總而合之則同屬儒宗論其官也各王朝之一職談其藉也普皇家之一書子欲於一化之內令九流爭川大道之世使小成競辯豈不上傷皇極莫二之風下開拘放鄙蕩之弊真所謂巨蠧鴻猷眩曜朝野矣佛教者窮理盡性之格言出世入真之正轍論其文則部分十二語其旨則四種悉檀理妙域中固非名號所及化擅繫表又非情智所尋至於遣累落筌陶神盡照近超生死遠證泥洹播闡五乘接群機之深淺該明六道辯善惡之昇沈敻期出世而理無不周邇毘王化而事無不盡能博能要不質不文自非天下之至慮孰能與斯教哉雖復儒道千家農墨百氏取捨驅馳未及其度者也惟釋氏之教理富權實有餘不了稱之曰權無餘了義號之為實通言善誘何名妙賞子謂三教雖殊勸善義一余謂善有精麁優劣宜異精者超百化而高昇麁者循九居而未息安可同年而語其勝負哉又云教迹誠異理會則同爰引世訓以符玄教此蓋悠悠之所昧未暨其本矣教者何耶筌理之謂理者何耶教之所詮教若果異理豈得同理若必同教寧得異筌不期魚蹄不為兔將為名乎理同安在夫厚生情篤身患之誡遂興不悟遷流逝川之歎乃作並是域內之至談非踰方之巨唱何者推色盡於極微老氏之所未辨究心窮於生滅宣尼又所未言可謂瞻之似盡而察之未極者也經曰分別色心有無量相非諸二乘所知且二乘之與大行俱越妄想之鄉菩薩則慧兼九道聲聞則獨善一身其猶露潤之比巨微塵之比須彌況凡夫識想何得齊乎故經曰無以日光等彼螢火若夫以齊而齊不齊者未齊矣以齊而齊於齊者未齊焉余聞善齊天下者以不齊而齊天下者也何須夷岳實淵然後方平續鳧截鶴於焉始等此蓋狷夫之野議豈達士之貞觀乎故諺曰紫實昧朱狂斯濫哲請廣其類上至天子下至庶人莫不資色心以成軀稟陰陽而化體不可以色心是等而便混以智愚陰陽義齊則同之於貴賤此之不可至理晈然雖強齊之其義安在帝為張賓搆譖意遣釋宗初覽安論通問僚宰文據卓然莫敢排斥當時廢立遂寢誠有所推至建德三年歲在甲午五月十七日乃普滅佛道二宗別置通道觀簡釋李有名者並著衣冠為學士焉事在別傳安削迹潛聲逃于林澤帝下勅搜訪執詣王庭親致勞接賜牙笏綵帛并位以朝列竟並不就卒于周世初安之住中興携母相近每旦出覲手為煮食然後上講雖足侍人不許兼助乃至折薪汲水必自運其身手告人曰母能生養於我非我不名供養卒于母世初無一息斯准大聖擔棺之像布化澆夫矣及其即世也乃作遺誡九章以訓門人其詞曰敬謝諸弟子夫出家為道至重至難不可自輕不可自易所謂重者荷道佩德縈仁負義奉持淨戒死而有已所謂難者絕世離俗永割親愛迴情易性不同於眾行人所不能行割人所不能割忍苦受辱捐棄軀命謂之難者名曰道人道人者行道人也行必可履言必可法被服出家動為法則不貪不諍不讒不匿學問高遠志存玄默是為名稱參位三尊出賢入聖滌除精魂故得君王不望其報父母不望其力普天之人莫不歸揖捐妻減養供奉衣食屈身俯仰不辭勞役者以其志行清潔通於神明淡泊虛白可奇可貴故自頃荒流道法遂替新學之人未體法則棄正著邪忘其真實以小黠為智以小供為足飽食終日無所用心退自推觀良亦可悲計今出家或有年歲經業未通文字不決徒喪一世無所成名如此之事不可深思無常之限非旦則夕三塗苦痛無強無弱師徒義深故以申示有情之流可為永誡其一曰卿已出家永違所生剃髮毀容法服加形辭親之日上下涕零割愛崇道意陵太清當遵此志經道修明如何無心故在色聲悠悠竟日經業不成德行日損穢迹遂盈師友慚恥凡俗所輕如是出家徒自辱名今故誨勵宜當專精其二曰卿已出家棄俗辭君應自誨勵志果清雲財色不顧與世不群金玉不貴惟道為珍約己守節甘苦樂貧進德自度又能度人如何改操趨走風塵坐不暖席馳務東西劇如徭役縣官所牽經道不通戒德不全朋友蚩弄同學棄捐如是出家徒喪天年今故誨勵宜各自憐其三曰卿已出家永辭宗族無親無疎清淨無欲吉則不歡凶則不慼超然從容豁然離俗志在玄妙軌真守撲得度廣濟普蒙福祿如何無心仍著染濁空爭長短銖兩斗斛與世同利何異僮僕經道不明德行不足如是出家徒自毀辱今故誨示宜自洗沐其四曰卿已出家號曰道人父母不敬世帝不臣普天同奉事之如神稽首致敬不計富貧尚其清修自利利人減割之重一米七斤如何怠慢不能報恩倚縱遊逸身意虛煩無戒食施死入太山燒鐵為食融銅灌咽如斯之痛法句所陳今故誨約宜改自新其五曰卿已出家號曰息心穢雜不著惟道是欽志參清潔如玉如氷當修經戒以濟精神眾生蒙祐并度所親如何無心隨俗浮沈縱其四大恣其五根道德遂淺世事更深如是出家與世同塵今故誡約幸自開神其六曰卿已出家捐世形軀當務竭情泥洹合符如何擾動不樂閑居經道損耗世事有餘清白不履反入泥塗過影之命或在須臾地獄之痛難可具書今故戒勵宜崇典謨其七曰卿已出家不可自寬形雖鄙陋使行可觀衣服雖麁坐起令端飲食雖疎出言可飡夏則忍飢冬則忍寒能自守節不飲盜泉不肖之供足不妄前久處私室如臨至尊學雖不多可齊上賢如是出家足報二親宗族知識一切蒙恩今故戒汝各宜自敦其八曰卿已出家性有昏明學無多少要在修精上士坐禪中士誦經下士堪能塔寺經營豈可終日一無所成立身無聞可謂徒生今故誨汝宜自端情其九曰卿已出家永違二親道法革性俗服離身辭親之日乍悲乍欣邈爾絕俗超出埃塵當修經道制己履真如何無心更染俗因經道已薄行無毛分言非可貴德非可珍師友致累恚恨日殷如是出家損法辱身思之念之好自將身安有弟子慧影寶貴並列名隋世影傳燈大論繼踵法輪汎迹人間情多野外著傷學存廢厭修等三論傷學除謗法之愆存廢防奸求之意厭修令改過服道並藻逸霞爛煥然可遵後卒開皇末歲貴翫閱群典講律為務見晉世支敏度合五家首楞嚴為一本八卷又合三家維摩經為一本五卷隋沙門僧就合四家大集為一本六十卷貴乃合三家金光明為一本八卷復請崛多三藏譯銀主陀羅尼及屬累品以之成部沙門彥琮重覆梵本品部斯具焉釋僧勔未詳氏族住新州願果寺周武季世將喪釋門崇上老氏受其符錄凡有大醮帝必具其巾褐同其拜伏而道經誕妄言無本據國雖奉事未詳讎校遂不遠鄉關躬聞帝闕面陳至理以邪正相參澆情趨競未辨真偽更遞毀譽乃著論十有八條難道本宗又以三科釋其前執賢聖既序凡位晈然其詞略云勔以世之濫述云老子尹喜西度化胡出家老子為說經戒令尹喜作佛教化胡人又稱是鬼谷先生撰南山四皓注未善尋者莫不信從以為口實異哉此傳君子尚不可誷況貶大聖者乎今具陳此說非真人世差錯假託名字亦乃言不及義飜辱老子意者勝人達士不出此言將是無識異道誇競佛法假託鬼谷四皓之名附尹喜傳後作此異論用迷昏俗竊聞傳而不習夫子不許妄作者凶老君所誡此之巨患增長三塗宜應糺正救其此失然教有內外用生疑假人有賢聖多述本迹故班固漢書品人九等孔丘之徒為上上類例皆是聖李老之儔為中上類例皆是賢何晏王弼云老未及聖此則賢聖天分優劣自顯故魏文之博悟也黃初三年下勅云告豫州刺史老聃賢人未宜先孔子不知魯郡為孔子立廟成未漢桓帝不師聖法正以嬖臣而事老子欲以求福良足笑也此祠之興由桓帝武皇帝以老子賢人不毀其屋朕亦以此亭當路行來者輒往瞻視而樓屋傾頹儻能壓人故令修整昨過視之殊未整頓恐小人謂此為神妄往禱祀違犯常禁宜宣告吏民咸使知聞據斯以言程露久矣世多愚人不尋前達故有此弊耳今考據年月群達誠言區別人世并內經外典並對條例覽詳卷首邪正自顯雖復著論周世垂名朝野通人罕遇終以事迷竟不行用及後法毀逃難不測所終釋僧猛俗姓段氏京兆涇陽人姿蔭都雅神情俊拔童孺出家素知希奉聰慧利根幽思通遠數十年間躬事講說凡有解悟靡不通練昔魏文西位勅猛在右寢殿闡揚般若貴宰咸仰味其道訓周明嗣曆詔下屈住天宮永弘十地又勅於紫極文昌二殿更互說法當時旨延問對酬答無窮黃巾之徒紛然搆聚猛乃徐搖談柄引敵深渦方就邪宗一一窮破故使三生四見之語並屈當時元始真文之經粉碎曩日天師徒侶瓦解乖張道俗肅然更新耳目初帝始齊三教猛分為九十五門後退一乘更進三十有生之善詞甚崇粹學觀所歸既不預帝覽遂淪俗侶猛退屏人事幽栖待旦隨文作相佛日將明以猛年德俱重玄儒湊集追訪至京令崇法宇於大象二年勅住大興善寺講揚十地寺即前陟岵寺也聲望尤著殊悅天心尋振為隋國大統三藏法師委以佛法令其弘護未足以長威權固亦光輝釋種移都南頓寺亦同遷於遵善里今之興善是也名雖居隷而恒住雲花勗徒課業以開皇八年四月四日卒于住寺春秋八十有二初將大漸深照苦空話言盈耳翕然欲絕語眾曰吾其去也遂即神遷時貴其置心不亂葬于城東馬頭穴刻石立銘于雲花寺今猶存矣釋道臻姓牛氏長安城南人出家清貞不郡非類謙虛寡交顧唯讀經博聞為業諸法師於經義有所迷忘者皆往問之西魏文帝聞而敬重尊為師傅遂於京師立大中興寺尊為魏國大統于時東西初亂宇文太祖始纂帝圖挾魏西奔萬途草創僧徒相聚綴旒而已既位僧統大立科條佛法載興誠其人矣爾後大乘陟岵相次而立並由淘漸德化所流又於昆池之南置中興寺莊池之內外稻田百頃並以給之梨棗雜果望若雲合及卒帝哀之廢朝喪事所資並歸天府送於園南為立高墳塋封之地一頃今所謂統師墓是也近貞觀中猶存古樹釋智炫者益州城都人也俗姓徐氏初生室有異光少小出家入京聽學數年遂擅名京洛學眾推崇請令覆講若瀉瓶無遺會周武帝廢佛法欲存道教乃下詔集諸僧道士試取優長者留庸淺者廢於是詔華野高僧方岳道士千里外有妖術者大集京師於太極殿陳設高座帝自躬臨勅道士先登時有道士張賓最為首長登高唱言曰原夫大道清虛淳一無雜祈恩請福上通天曹白日昇仙壽與天地同畢風教先被中夏無始無終含生賴之以得長生洪恩厚利不可校量豈如佛法虛幻言過其實不容本土客寓中華百姓無知信其詭說今日欲定臧否可出頭來看襄城公何妥自行如意座首少林寺等行禪師發憤而起諸僧止之曰今日事大天帝在此不可造次知禪師為佛法大海然應對之間復須機辯眾共謀議若非蜀炫無以對揚共推如意以將付炫炫既為眾所推又忿張賓浪語安庠而起徐昇論座坐定執如意謂張賓曰先生向者所陳大道清虛淳一無雜又云風教先被中夏者未知風教之起起自何時所說之教於何處說又言佛法不容本土客寓中華可辯道是何時生佛是何時出賓曰聖人出世有何定時說教興行有何定處道教舊來本有佛法近自西來炫曰若言無時亦應無出若無定處亦應無說舊來本有非復清虛上請天曹豈得無雜壽與天地同畢豈得無始無終賓曰道人浪語為前王無識留汝等輩得至于今今日聖帝盡須殺却帝惡其理屈令舍人謂之曰賓師且下賓既退帝自昇高座言曰佛法中有三種不淨納耶輸陀羅生羅睺羅此主不淨一也經律中許僧受食三種淨肉此教不淨二也僧多造罪過好行婬泆佛在世時徒眾不和遞相攻伐此眾不淨三也主法眾俱不淨朕意將除之以息虛幻道法中無此事朕將留之以助國化顧謂炫法師曰能解此三難真是好人炫應聲謂曰陛下所陳並引經論誠非謬言但見道法之中三種不淨又甚於此按天尊處紫微宮恒侍五百童女此主不淨甚於耶輸陀羅之一人道士教中章醮請福之時必須鹿脯百柈清酒十斛此教不淨又甚於三種淨肉道士罪過代代皆有千古亂常姜斌犯法此又甚於眾僧僧眾自造罪過乃言佛法可除猶如至尊享國嚴設科條不妨逆子叛臣相繼而出豈以臣逆子叛遂欲空於大寶之位耶大寶之位固不可以臣子叛逆而空佛法正真豈得以眾僧犯罪而廢炫雅調抑揚言音朗潤雖處大節曾無懼顏帝愕然良久謂炫曰所言天尊侍五百童女出何經炫曰出道三皇經帝曰三皇經何曾有此語炫曰陛下自不見非是經上無文今欲廢佛存道猶如以庶代嫡帝動色而下因入內群臣僧眾皆驚曰語觸天帝何以自保以周武非嫡故炫曰主辱臣死就戮如歸有何可懼乍可早亡遊神淨土豈與無道之君同生於世乎眾皆壯其言明旦出勅二教俱廢仍相器重許以婚姻期以共政法師志操逾厲與同學三人走赴齊都時周齊之界皆被槍布棘彼有富姥姓張鋪氈三十里令炫得過至齊盛為三藏名振東國武帝破鄴先遣追求帝弟越王宿與法師厚善恐帝肆怒橫加異責乃鞭背成痕俗服將見越王先為言曰臣恨其逃命已杖六十令脫衣見帝帝變色曰恐其懷慚遠逝以至死亡所以急追元無害意責越王曰大丈夫何得以杖捶相辱待遇彌厚與還京師武帝崩隋文作相大弘佛法兩都歸趣一人而已歲景將秋懷土興念又以蜀川逈遠奧義未宣援首西歸心存敷暢蜀王秀未之知也時長史周宣明入朝赴考隋文帝謂之曰炫法師安和耶宣明驚惶莫知所對文帝曰一國名僧卿遂不識何成檢校宣明稽首陳謝死罪及還先往寺參禮寺舊在東逼於苑囿又是鄱陽王葬母之所王既至孝故名孝愛寺宣明移就今處供養無闕至大鄴改為福勝寺法師宣揚覺倦入隱三學山觸目多感遂遊山詩曰秀嶺接重煙嶔岑上半天絕巖低更舉危峯斷復連側石傾斜㵎迴流寫曲泉野紅知草凍春來鳥自傳樹錦無機織𤠔鳴詎假弦葉密風難度枝疎影易穿抱帙依閑沼策杖戲荒田遊心清漢表置想白雲邊榮名非我顧息意且蕭然年一百二歲不病而卒護法下正傳五附見五唐終南山智炬寺釋明贍傳一唐京師勝光寺釋慧乘傳二道璋唐京師大總持寺釋智實傳三普應法行唐終南山龍田寺釋法琳傳四慧序唐新羅國大僧統釋慈藏傳五圓勝釋明贍姓杜氏恒州石邑人也少有異操所住龍貴村二千餘家同共高之傳于口實十四通經十七明史州縣乃舉為俊士性慕超方不從辟命投飛龍山應覺寺而出家焉師密異其度乃致書與鄴下大集寺道場法師令其依攝專學大論尋值法滅潛形東郡隋初出法追住相州法藏寺而立志貞明不干非類正業之暇了無他涉內通大小外綜丘墳子史書素情所欣狎將事觀國移步上京開皇三年勅召翻譯住大興善眾覩德望可宗舉知寺任辭而不免便綱管之大業二年帝還京室在於南郊盛陳軍旅時有濫僧染朝憲者事以聞上帝大怒召諸僧徒並列御前峙然抗禮下勅責曰條制久頒義須致敬于時黃老士女初聞即拜惟釋一門儼然莫屈時以贍為道望眾所推宗乃答曰陛下必欲遵崇佛教僧等義無設敬若准制返道則法服不合敬俗勅云若以法服不合宋武為何致拜贍曰宋氏無道之君不拜交招顯戮陛下有治存正不陷無罪故不敢拜帝不屈其言直遣舍人語僧何為不拜如此者五黃巾之族連拜不已惟贍及僧長揖如故兼抗聲對敘曾無憚懾帝乃問向答勅僧是誰錄名奏聞便令視被戮諸僧合眾安然而退明旦有司募敢死者至闕陳謝贍又先登雖達申遜之詞帝夷然不述但下勅於兩禪定各設盡京僧齋再遺束帛特隆常准後迴蹕西郊顧京邑語朝宰曰我謂國內無僧今驗一人可矣自爾頻參元選僉議斯屬下勅令住禪定用崇上德故也眾以贍正色執斷不避強禦又舉為知事上座整理僧務備列當時大唐御世爰置僧官銓擬明哲允折無滯貞觀之初以贍善識治方有聞朝府召入內殿躬昇御床食訖對詔廣列自古以來明君昏主制御之術兼陳釋門大拯以慈救為宗帝大悅因即下勅年三月六普斷屠殺行陣之所皆置佛寺登即一時七處同建如豳州昭仁晉州慈雲呂州普濟汾州弘濟洺州昭福鄭州等慈洛州昭覺並官給匠石京送奴隷皆因贍之開發也又私以每年施物常飯千僧大乘經論須者為寫歲恒不絕為報母恩及暮齒將臨山栖是造遂入太一山智炬寺而隱焉京輦歸信遠趣於林問道奉戒又繁常昔乃自惟曰攝心歸靜猶自煩乎試縱餘齡更還京邑少時遇疾猶堪療治乃曰吾命極矣可懸一月枯骸累人乃延諸大德就興善寺設齋辭訣房杜僕射舉朝畢集具齎助供䞋錫山積贍通大捨懺辭告別即日力杖出京返于智炬竭誠勤注想觀西方心通明利告侍者曰阿彌陀佛來也須臾又云二大菩薩亦至吾於觀經成就十二餘者不了既具諸善相顏貌怡然奄爾而逝春秋七十即貞觀二年十月二十七日也時以預記之驗知命存乎初未終前遺令焚身及闍維訖乃見骸骨圓全都無縫道當其頂上紫色曄然遂瘞于巖下釋慧乘俗姓劉氏徐州彭城人也其先炎漢之緒祖欣梁真前將軍瑯瑘太守父雅陳兵部郎中叔祖智強少出家陳任廣陵大僧正善閑成論及大涅槃乘年十二發心入道仍事強為師服膺論席備探精理十六啟強曰離家千里猶名在家沙門也請廣遊都郡疏諸耳目強從之便下楊都聽莊嚴寺智㬭法師成實爰始具戒即預陳武帝仁王齋席對御論義詞辯絕倫數千人中獨迴天睠至四月八日陳主於莊嚴寺總令義集乘當時竪佛果出二諦外義有一法師英俠自居擅名江左舊住開泰後入祇洹乃問曰為佛果出二諦外二諦出佛果外乘質云為法師出開泰為開泰出法師彼曰如鴛鴦鳥不住圊廁乘應聲曰釋提桓因不與鬼住彼曰鳩翅羅鳥不栖枯樹乘折云譬如大海不宿死屍于時㬭公處座嘆曰辯才無礙其鋒難當者也躬於帝前賞天柱納袈裟由是令響通振隣國斯傳陳桂陽王尚書毛喜僕射江總等並申久敬咸慕德音屬陳季道離隋風遠扇太尉晉王於江都建慧日道場遍詢碩德乘奉旨延住仍號家僧後從王入朝頻蒙內見時淨影慧遠道聲揚播由來不面因過值講即申言論義高詞麗聲駭聽徒遠顧曰何處吳僧脣舌陵人復豈逾此王聞之彌敬其詞辯時慧日創立搜楊一化並號龍象咸問義門既爰初盛集法輪肇駕王乃請乘盡心言論不有見尊致結既承資蓄縱辯無前折關陳欵皆傾巢穴甚稱王望別賞帛百段暨高祖東巡岱宗鑾駕伊洛勅遣江南吳僧與關東大德昇殿竪義乘應旨首登命章對論巧問勃興切並紛集縱橫駱驛罔弗喪律亡圖高祖目屬稱揚群英嘆異開皇十七年於楊州永福寺建香臺一所莊飾金玉絕世罕儔及晉王即位彌相崇重隨駕行幸無處不經大業六年有勅郡別簡三大德入東都於四方舘仁王行道別勅乘為大講主三日三夜興諸論道皆為折暢靡不冷然從駕張掖蕃王畢至奉勅為高昌王麴氏講金光明吐言清奇聞者嘆咽麴布髮於地屈乘踐焉至八年帝在東都於西京奉為二皇雙建兩塔七層木浮圖又勅乘送舍利瘞于塔所時四方道俗百辟諸侯各出名珍於興善寺北天門道南樹列勝場三十餘所高幢華蓋接影浮空寶樹香煙望同雲霧迎延靈骨至于禪定僉共請乘開仁王經華俗士庶正道日登咸嘉賞讚十二年於東都圖寫龜茲國檀像舉高丈六即是後秦羅什所負來者屢感禎瑞故用傳持今在洛州淨土寺會隋室分崩唐皇御曆武德四年掃定東夏有勅偽亂地僧是非難識州別一寺留三十僧餘者從俗上以洛陽大集名望者多奏請二百許僧住同華寺乘等五人勅住京室于時乘從偽鄭詞被牽連主上素承風問偏所顧屬特蒙慰撫命住勝光秦國功德咸歸此寺武德八年歲居協洽駕幸國學將行釋奠堂置三坐擬敘三宗眾復樂推乘為導首時五都才學三教通人星布義筵雲羅綺席天子下詔曰老教孔教此土先宗釋教後興宜崇客禮令老先次孔末後釋宗當爾之時相顧無色乘雖登坐情慮莫安今上時為秦王躬臨位席直視乘面目未曾迴頻降中使十數教云但述佛宗光敷帝德一無所慮既最末陳唱諦徹前通乃命宗云上天下地榮貴所資緣業有由必宗佛聖今將敘大致理具禮儀並合掌虔跪使師資有據聲告纔竟皇儲以下爰逮群僚各下席䠒跪竚聆逸辯乘前宣帝德云陛下巍巍堂堂若星中之月云云次述釋宗後以二難雙徵兩教玄梯廣布義網高張莫不躡嚮風馳應機雲涌既而天子迴光敬美其道群公拜手請從弘業黃巾李仲卿結舌無報博士祭酒等束體轅門慧日更明法雲還布當又下詔問乘曰道士潘誕奏悉達太子不能得佛六年求道方得成佛是則道能生佛佛由道成道是佛之父師佛乃道之子弟故佛經云求於無上正真之道又云體解大道發無上意外國語云阿耨菩提晉音翻之無上大道若以此驗道大佛小於事可知乘報略云震旦之與天竺猶環海之比麟洲聃乃周末始興佛是周初前出計其相去二十許王論其所經三百餘載豈有昭王世佛而退求敬王時道乎句虛驗實足可知也仲卿向敘道者有太上大道先天地生欝勃洞虛之中煒燁玉清之上是佛之師不言周時之老聃也且五帝之前未聞有道三王之季始有聃名漢景已來方興道學窮今討古道者為誰案七藉九流經國之典宗師周易五運相生既闢兩儀陰陽是判故曰一陰一陽之謂道陰陽不測謂之神天地於事可明陰陽在生有驗此理數然也不云有道先天地生道既莫測從何能生佛故車胤云在己為德及物為道殷仲文云德者得也道者由也言得孝在心由之而成也論衡云立身之謂德成名之謂道道德也者為若此矣卿所言道寧異是乎若異斯者不足歸信豈有頭戴金冠身被黃褐鬢垂素髮手把玉璋別號天尊居大羅之上獨名大道治玉京之中山海之所未詳經史之所不載大羅既焉有之說玉京本亡是之談言畢下座舉朝屬目此時獨據詞宗餘術無為而退一席楊扇萬代舟航可尚可師立功立事近假叨幸之力遠庇護念之恩也貞觀元年乘以銜荷特命義須崇善奉為聖上於勝光寺起舍利寶塔像設莊嚴備諸神變并建方等道場日夜六時行坐三業以貞觀四年十月二十日終于舊房春秋七十有六門人道璋先奉遺旨於南山谷口焚之私斂餘灰還於勝光起塔沙門法琳為製碑文見于別集惟乘釋蒙據道護法為心撫物䘏窮彌留情曲而詞辯無滯文義俱揚寫送若流有逾宿誦此之一術歿後絕蹤而身歷三朝政移六帝頻昇中殿面對天顏神氣消散映徹牆仞自見英德莫不推焉又卿士王公妃嬪庶族皆稟塗香申明供禮所講涅槃般若金鼓維摩地持成實等各數十遍璋即乘之猶子也少所恭奉立性誠慤偏能唄讚清囀婉約有勢於時每為都講亦隷倫則京邑後附多嚮其塵云釋智實俗姓邵氏雍州萬年人也童稚兒叢譎詭超異預有談論必以佛理為言先十一出家住大總持寺聽敘玄奧登共器之隨以小緣而能通暢宏遠自涅槃攝論俱舍毘曇皆鏡其深義開其關鑰兼以思力堅明才氣雄雅武德之歲初平鄭國三大法師慧乘道宗辯相等西赴京師主上時為秦王威明㝢內志奉釋門乃請前三德并京邑能論之士二十餘僧在弘義宮通霄法集實年十三最居下座上命令對論發言清卓驚絕前聞新至諸僧無敢繼響上及諸王異聲同嘆曰此小師最俊烈後必紹隆三寶矣實眉間白毫可數寸光映顏顙沙門吉藏摩其頂捋其毫曰子有異相當躡跡能仁恨吾老矣不見成德武德七年獫狁孔熾屢舉烽爟前屆北地官軍相拒有僧法雅夙昔見知武皇通重給其妻媵任其愆溢僧眾惘然無敢陳者奏請京寺驍捍千僧用充軍伍有勅可之雅即通聚簡練別立團隊既迫王威寂無抗拒實時年二十有一深究雅懷恐興異度事或彰陳必累大法乃致書於雅曰與子同生像季共屬陵遲悲六道之紛然愍四生之未悟子每遊鳳闕恒遇龍顏理應洒甘露於帝心廕慈雲於含識何乃起善星之勃見鼓調達之惡心令善響沒於當時醜迹揚於後代豈不以朝含安忍省納蒭蕘恣此愚情述斯頑見嗟乎可悲寔傷其類且自多羅既斷終不更生折石已分義無還合急持衣鉢早出伽藍使清濁異流蘭艾殊別使群臣息於譏論梵志寂於謗聲定水噎而更通慧燈晦而還照此言至矣想見如流雅得書逾怒科督轉切備辦軍器剋日將發實騰入其眾大哭述斯乖逆壞大法輪即是魔事預是千僧同時號叫聽者寒心下淚實遂擒撮法雅毆擊數拳告云我今降魔使邪正有據雅以事聞帝云此道人大麁付法推刻即被枷禁初無怖色將欲加罪僕射蕭瑀等奏稱精進有聞勅乃罷令還俗所選千人並停復寺實雖處俗壤而兵役得停欣泰其心曾無憾結貞觀元年勅遣治書侍御史杜正倫撿挍佛法清肅非濫實恐法雅猶乘先計濫及清徒乃致書於使曰沈俗僧智實白實懷橘之歲陟清信之名採李之年染息慈之位雖淺智褊能然感希先達竊見化度寺僧法雅善因曩世受果今生如安上之遊秦似遠公之入晉理應守護鵝之行持結草之心思報皇王之恩奉酬覆載之德乃於支提靜院恒為宰殺之坊精舍林中鎮作妻孥之室脫千僧之服四海愴動地之悲謗七佛之經萬國嗟訴天之怨自漢明感夢摩滕入洛已來無數名人頗曾聞也皇帝受禪撫育萬方欲使王道惟清法海無穢公策名奉節許道亡身除甘蔗之災拔空腹之樹使禪林欝映慧苑扶踈茂實嘉聲振于邦國寧可忍斯邪佞仍捧鉢於祇桓棄我貞廉絕經行於靈塔龍門深濬奉見無由天意高懸流問何日惟公鑒同水鏡智察幽微仰願拯驚翼於華箱濟涸鱗於窮轍輕以忓陳但增悚懼後法雅竟以狂狷被誅倫以事聞乃下勅云智實往經論告法雅預知麁勃自還俗已來又不虧戒行宜依舊出家因返寺房綜括前業捃討幽致有譽京室十一年駕往洛州下詔云老君垂範義在清虛釋迦貽則理存因果求其教也汲引之迹殊塗求其宗也弘益之風齊致然大道之行肇於遂古源出無名之始事高有形之外邁兩儀而運行包萬物而亭育故能經邦致治反樸還淳至如佛教之興基於西域逮於後漢方被中土神變之理多方報應之緣匪一洎乎近世崇信滋深人冀當年之福家懼來生之禍由是滯俗者聞玄宗而大笑好異者望真諦而爭歸始波涌於閭里終風靡於朝廷遂使殊俗之典欝為眾妙之先諸華之教翻居一乘之後流遁忘返于茲累代今鼎祚克昌既憑上德之慶天下大定亦賴無為之功宜有解張闡茲玄化自今已後齋供行立至於稱謂道士女道士可在僧尼之前庶敦反本之俗暢於九有貽諸萬葉時京邑僧徒各陳極諫語在別紀實惟像運湮沈開明是屬乃携大德法常等十人隨駕至闕上表曰法常等言法常等年迫桑榆始逢太平之世貌同蒲柳方值聖明之君竊聞父有諍子君有諍臣法常等雖預出家仍在臣子之例有犯無隱敢不陳之伏見詔書國家本系出自柱下尊祖之風形于前典頒告天下無德而稱令道士等處僧之上奉以周旋豈敢拒詔尋老君垂範治國治家所佩服章亦無改異不立觀宇不領門徒處柱下以真全隱龍德而養性智者見之謂之智愚者見之謂之愚非魯司寇莫之能識今之道士不遵其法所著衣服並是黃巾之餘本非老君之裔行三張之穢術棄五千之妙門反同張禹漫行章句從漢魏已來常以鬼道化於浮俗妄託老君之後實是左道之苗若位在僧之上誠恐真偽同流有損國化如不陳奏何以表臣子之情謹錄道經及漢魏諸史佛先道後之事如前伏願天慈曲垂聽覽勅遣中書侍郎岑文本宣勅語僧等明詔久行不伏者與杖諸大德等咸思命難飲氣吞聲實乃勇身先見口云不伏此理萬刃之下甘心受罪遂杖之放還抱思旋京晦迹華邑處于渭陽之三原焉信心之侶敬奉如雲情計莫因遂感氣疾知命非久欲與故人相別而生不騎乘乃令弟子四人各執床角輿至本寺精爽不雜召諸知友執手訣云實以虛薄妄廁僧儔一期既至知復何述但恨此身虛死未曾為法以為慨然近夢阿私陀仙見及云常得出家想非徒說少時卒於大總持寺春秋三十有八即貞觀十二年正月也實自生能不入市𮠔不執錢寶不求利涉三衣瓶鉢常不離身雖當日往還而始無輒離志行嚴肅殊有軌度攝誘多方故四遠道俗逃放之僧多依附之親侍沙門七人皆供承有敘通共嘉焉總持故塔修奉者希實香燈供養以為己業病轉就篤渧水不通已經旬日侍人非時進漿實曰大聖垂誡其可欺乎吾見臨終犯戒者多矣豈使累劫之誠而陷於一咽者哉遂閉氣而止又問以終事答云譬如彎弓放矢隨處即落觀于山水未有親疎之心任時量處省事為要乃葬南郊僧墓中斯亦達性之一方矣終後三原信士方三十餘里皆為立靈廟夜別四五百人聚臨如喪厥親迄于百日眾方分散初總持寺有僧普應者亦烈亮之士也通涅槃攝論有涯略之致以傅奕上事群僧蒙然無敢諫者應乃入祕書太史局公集郎監命奕對論無言酬賞但云禿丁妖語不勞敘接應曰妖孽之作有國同誅如何賢聖俱崇卿獨侮慢奕不答應退造破邪論兩卷皆負籧篨徑詣朝堂以陳所述時執事者以聖上開治通諫蒭蕘雖納奕表未將理當不為程達應乃多寫論本日往朝省卿相郎暑鼓言奕表牽挽奕手與談正理素本淺學假詞於人杜口不對斯亦彭享強捍僧傑不可抑也應之所師法行者亦貞素之僧也俱住總持眾首之最立操孤拔與物不群每日六時常立參像自問自答入進殿中乃至勞遣應聲如在精慤特立眾難加焉故又目之為高行也行見塔廟必加治護飾以朱粉搖動物敬京寺諸殿有未畫者皆圖繪之銘其相氏即勝光褒義等寺是也武德之始猶未有年諸寺飢餒烟火不續總持名勝普應為先結會僧倫誓開糧路人料一勺主客咸然時來投者日恒僅百夙少欣欣曾不告倦而行微念起厭怠懷即悔告人大開鬼業如何自累惜他食乎每旦出門延頓客旅歡笑先言顧問將接多辦鉢履安處布置乃達時豐初不休舍後住楚國講遺教論以畢終矣釋法琳姓陳氏頴川人遠祖隨宦寓居襄陽少出家遊獵儒釋博綜詞義金陵楚郢從道問津自文苑才林靡不尋造而意存綱梗不營浮綺野栖木食於青溪等山晝則承誨佛經夜則吟覽俗典故於內外詞旨經緯遺文精會所歸咸肆其抱而風韻閑雅韜德潛形氣揚采飛方陳神略隋季承亂入關觀化流離八水顧步三秦每以槐里仙宗互陳名實昔在荊楚梗概其文而祕法奇章猶未探括自非同其形服塵其本情方可體彼宗師靜茲紛結乃權捨法服長髮多年外統儒門內希聃術遂以義寧初歲假被巾褐從其居館琳素通莊老談吐清奇道侶服其精華膜拜而從遊處情契莫二共敘金蘭故彼所禁文詞並用諮琳取決致令李宗奉釋之典包舉具舒張偽葛妄之言銓題品錄武德初運還蒞釋宗擁帙延光栖惶問道以帝壤同歸名教是則鼓言鄭衛易可箴規乃住京師濟法寺至武德四年有太史令傅奕先是黃巾深忌佛法上廢佛法事十有一條云釋經誕妄言妖事隱損國破家未聞益世請胡佛邪教退還天竺凡是沙門放歸桑梓則家國昌大李孔之教行焉武皇容其小辯朝輔未能抗也時謂遵其邪逕通廢宏衢莫不懼焉乃下詔問曰棄父母之鬚髮去君臣之章服利在何門之中益在何情之外損益二宜請動妙適琳憤激傅詞側聽明勅承有斯問即陳對曰琳聞至道絕言豈九流能辯法身無象非十翼所詮但四趣茫茫漂淪欲海三界蠢蠢顛墜邪山諸子迷以自焚凡夫溺而不出大聖為之興世至人所以降靈遂開解脫之門示以安隱之路於是中天王種辭恩愛而出家東夏貴遊厭榮華而入道誓出二種生死志求一妙涅槃弘善以報四恩立德以資三有此其利益也毀形以成其志故棄鬚髮美容變俗以會其道故去君臣華服雖形闕奉親而內懷其孝禮乖事主而心戢其恩澤被怨親以成大順祐怙幽顯豈拘小違上智之人依佛語故為益下凡之類虧聖教故為損懲惡則濫者自新進善則通人感化此其大略也而傅氏所奏在司猶未施行奕乃多寫表狀遠近公然流布京室閭里咸傳禿丁之誚劇談酒席昌言胡鬼之謠佛日翳而不明僧威阻而無勢于時達量道俗勳豪成論者非一各疏佛理具引梵文委示業緣曲垂邪正但經是奕之所廢豈有引廢證成雖曰破邪終歸邪破琳情正玄機獨覺千載器局天授博悟生知睹作者之無功信乘權之有據乃著破邪論其詞曰莊周云六合之內聖人論而不議六合之外聖人存而不論老子云域中有四大而道居其一考詩書禮樂之致忠烈孝慈之先但欲攸序彜倫意存敬事君父至德惟是安上治民要道不出移風易俗自衛返魯詎述解脫之言六府九疇未宣究竟之旨案前漢藝文志所紀眾書一萬三千二百六十九卷莫不功在近益俱未暢遠途誠自局於一生之內非逈拔於三世之表者矣遂使當見因果理涉旦而猶昏業報吉凶義經丘而未曉斯並六合之寰塊五常之俗謨詎免四流浩汗為煩惱之場六趣諠譁造塵勞之業者也原夫實相杳冥逾要道之道法身凝寂出玄之又玄惟我大師體斯妙覺二邊頓遣萬德斯融不可以境智求不可以形名取故能量法界而興悲揆虛空而立誓所以見生穢土誕聖王宮示金色之身吐玉毫之相布慈雲於鷲嶺則火宅焰銷扇惠風於雞峯則幽途霧卷行則金蓮捧足坐則寶座承軀出則天主導前入則梵王從後聲聞菩薩儼若朝儀八部萬神森然翊衛演涅槃則地現六動說般若則天雨四花百福莊嚴狀滿月之臨滄海千光照曜如聚日之映寶山師子一吼則外道摧鋒法鼓暫鳴則天魔稽首是故號佛為法王也豈與衰周李耳比德爭衡末世孔丘輒相聯類者矣是以天上天下獨稱調御之尊三千大千咸仰慈悲之澤然而理深趣遠假筌蹄而後悟教門善巧憑師友而方通統其教也則八萬四千之藏二諦十地之文海殿龍宮之旨古諜今書之量莫不流甘露於萬葉垂至道於百王近則安國利民遠則超凡證聖但以時運未融致令漢梵殊感故西方先音形之奉東國後見聞之益及慈雲卷潤慧日收光迺夢金人於永平之年覩靈骨於赤烏之歲於是漢魏齊梁之政像教勃興燕秦晉宋已來名僧間出或神力救世或異迹發人或慧解開神或通感適化及白足臨刃不傷遺法為之更始志上分身員戶帝王以之加信具諸史籍其可詳乎並使功被將來傳燈永劫議者僉曰僧惟紹隆佛種佛則冥衛國家福廕皇基必無廢退之理我大唐之有天下也應四七之辰安九五之位方欲興上皇之風開正覺之道治致太平永隆淳化但傅氏所述酷毒穢詞並天地之所不容人倫之所同棄恐塵黷聖覽不可具觀伏惟陛下布含弘之恩垂鞠育之惠審其逆順議以真虛佛以正法遠委國王陛下君臨斯當付囑謹上破邪論一卷用擬傅詞文有三十餘紙自琳之綴釆貫絕群篇野無遁賢朝無遺士家藏一本咸誦在心並流略之菁華文章之冠冕茂譽於是乎騰廣昏情由之而開尚矣琳又以論卷初出意在弘通自非廣露其情則皂隷不塵其道乃上啟儲后諸王及公卿侯伯等並文理弘被庶績咸嘉其博詣焉故奕奏狀因之致寢遂得釋門重敞琳寔其功東宮庶子虞世南詳琳著論乃為之序胤而傅氏不愜其情重施密譖搆扇黃巾用為黨類各造邪論貶量佛聖昏冒生靈衒曜朝野薰蕕既雜時所疑焉武德九年春下詔京置三寺惟立千僧餘寺給賜王公僧等並放還桑梓嚴勅既下莫敢致詞五眾哀號於槁街四民顧嘆於城市于時道俗蒙然投骸無措賴由震方出帝氛祲廓清素襲啟聞範究宗領登即大赦還返神居故佛日重朗於唐世又由琳矣琳頻逢黜陟誓結維持道挫世情良資寡學乃探索典籍隱括玄奧撰辯正論一部八卷頴川陳子良注之并製序曰昔宣尼入夢十翼之理克彰伯陽出關二篇之義爰著或鉤深系象或探賾希夷名言之所不宣陰陽之所不測猶能彌綸天地包括鬼神道無洽於大千言未超於域內況乎法身圓寂妙出有無至理凝玄迹泯真俗體絕三相累盡七生無心即心非色為色筌蹄之外豈可言乎若夫西伯拘羑遂顯精微子長蠶室卒成先志故易曰古之作易者其有憂乎論之興焉良有以矣道士李仲卿劉進喜等並作庸文謗毀正法在俗人士或生邪信法師愍其盲瞽遂著斯論可謂鼓茲法海振彼詞鋒碧鷄之銳競馳黃馬之峻爭騖莫不葉墜柯摧雲銷霧卷但此論窮釋老之教源極品藻之名理恐好事後生意有未喻弟子近申頂禮從而問津爛然溢目若日月之入懷寂乎應機譬寶珠之燭物既悟四衢之幻便息百城之遊於是啟所未聞為之注解良以文學雄伯群儒奉戴誘勸成則其從如雲貞觀初年帝於南山大和宮舊宅置龍田寺琳性欣幽靜就而住之眾所推美舉知寺任從容山服詠歌林野至十三年冬有黃巾秦世英者挾方術以邀榮遂程器於儲貳素嫉釋種陰陳琳論謗訕皇宗罪當誷上帝勃然下勅沙汰僧尼見有眾侶乃依遺教仍訪琳身據法推勘琳扼腕奮發不待追徵獨詣公庭輕生徇理乃縶以縲紲下詔問曰周之宗盟異姓為後尊祖重親寔由先古何為追逐其短首鼠兩端廣引形似之言備陳不遜之喻把毀我祖禰謗黷我先人如此要君罪有不恕琳答曰文王大聖周公大賢追遠慎終昊天靡答孝悌之至通於神明雖有宗周義不爭長何者皇天無親竟由輔德古人黨理而不黨親不自我先不自我後雖親有罪必罰雖讎有功必賞賞罰理當故天下和平老子習訓道宗德教加於百姓恕己謙光仁風形于四海又云吾師名佛佛者覺一切人也乾竺古皇西昇逝矣討尋老教始末可追日授中經示誨子弟言吾師者善入泥洹綿綿常存吾今逝矣今劉李所迹謗滅老氏之師世莫能知著茲辯正論有八卷略對道士六十餘條並陳史籍前言實非謗毀家國自後辯對二十餘列並據琳詞具狀聞奏勅云所著辯正論信毀交報篇曰有念觀音者臨刃不傷且赦七日令爾自念試及刑決能無傷不琳外纏桎梏內迫刑期水火交懷訴仰無路乃緣生來所聞經教及三聖尊名銘誦心府擬為顯應至于限滿忽神思彯勇橫逸胸懷歡慶相尋頓忘死畏立待對問須臾勅至云今赦期已滿當至臨刑有何所念念有靈不琳援筆答曰自隋季擾攘四海沸騰役毒流行干戈競起興師相伐舍檀兵威臣佞君荒不為正治遏絕王路固執一隅自皇王弔伐載清陸海斯寔觀音之力咸資勢至之因比德連蹤道齊上聖救橫死於帝庭免淫刑於都市琳於七日已來不念觀音惟念陛下勅治書侍御史韋悰問琳有詔令念觀音何因不念乃云惟念陛下琳答伏承觀音聖鑒塵形六道上天下地皆為師範然大唐光宅四海九夷奉職八表刑清君聖臣賢不為抂濫今陛下子育恒品如經即是觀音既其靈鑒相符所以惟念陛下但琳所著正論爰與書史倫同一句參差任從斧鉞陛下若順忠順正琳則不損一毛陛下若刑濫無辜琳則有伏屍之痛具以事聞遂不加罪有勅徙于益部僧寺行至百牢關菩提寺因疾而卒時年六十九沙門慧序經理所苦情結斷金曉夕同衾慰撫承接及命將盡在序膝上序慟哭崩摧淚如駛雨乃召諸關旁道俗葬於東山之頂高樹白塔勒銘誌之行路望者知便下淚序本雍州武功人善經籍通佛理明攝論以為敷化之訓體道開俗言無品藻將護遊僧用為家操本住京輦後移梁益以百牢衝會四方所歸道俗栖投往還莫寄序乃宅寺關口用接遠賓故行侶賴之詠歌盈耳于時治書侍御史韋悰審英飾詐乃奏彈曰竊以大道欝興沖虛之迹斯闡玄風既播無為之教寔隆未有身預黃冠志同凡素者也道士秦英頗學醫方薄閑呪禁親戚寄命羸疾投身姦婬其妻禽狩不異若情違正教心類豺狼逞貪競之懷恣邪穢之行家藏妻子門有姬童乘肥衣輕出入衢路楊眉奮袂無憚憲網健羨未忘觀繳在慮斯原不殄至教式虧請寘嚴科以懲婬侈乃入大理竟以狂匿被誅公私怪其死晚琳所著詩賦啟頌碑表章誄大乘教法并諸論記傳合三十餘卷並金石擊其風韻縟錦繢其文思流靡雅便騰焰彌穆又善應機說導即事騁詞言會宮商義符玄籍斯亦希世罕嗣矣釋慈藏姓金氏新羅國人其先三韓之後也中古之時辰韓馬韓卞韓率其部屬各有魁長案梁貢職圖其新羅國魏曰斯盧宋曰新羅本東夷辰韓之國矣藏父名武林官至蘇判異以本王族比唐一品既嚮高位籌議攸歸而絕無後嗣幽憂每積素仰佛理乃求加護廣請大捨祈心佛法并造千部觀音希生一息後若成長願發道心度諸生類冥祥顯應夢星墜入懷因即有娠以四月八日誕載良晨道俗銜慶希有瑞也年過小學神叡澄蘭獨拔恒心而於世數史籍略皆周覽情意漠漠無心染趣會二親俱喪轉厭世華深體無常終歸空寂乃捐捨妻子第宅田園隨須便給行悲敬業子爾隻身投於林麁服草屩用卒餘報遂登陗隒獨靜行禪不避虎兕常思難施時或弊睡心行將徵遂居小室周障棘刺露身直坐動便刺肉懸髮在梁用祛昏漠修白骨觀轉向明利而冥行顯被物望所歸位當宰相頻徵不就王大怒勅往山所將加手刃藏曰吾寧持戒一日而死不願一生破戒而生使者見之不敢加刃以事上聞王愧服焉放令出家任修道業即又深隱外絕來往糧粒固窮以死為命便感異鳥各銜諸果就手送與鳥於藏手就而共食時至必爾初無乖候斯行感玄徵罕有聯者而常懷慼慼慈哀含識作何方便令免生死遂於眠寐見二丈夫曰卿在幽隱欲為何利藏曰惟為利益眾生乃授藏五戒訖曰可將此五戒利益眾生又告藏曰吾從忉利天來故授汝戒因騰空滅於是出山一月之間國中士女咸受五戒又深惟曰生在邊壤佛法未弘自非目驗無由承奉乃啟本王西觀大化以貞觀十二年將領門人僧實等十有餘人東辭至京蒙勅慰撫勝光別院厚禮殊供人物繁擁財事既積便來外盜賊者將取心戰自驚返來露過便授其戒有患生盲詣藏陳懺後還得眼由斯祥應從受戒者日有千計性樂栖靜啟勅入山於終南雲際寺東懸崿之上架室居焉旦夕人神歸戒又集時染少疹見受戒神為摩所苦尋即除愈往還三夏常在此山將事東蕃辭下雲際見大鬼神其眾無數帶甲持仗云將此金輿迎取慈藏復見大神與之共鬪拒不許迎藏聞臭氣塞谷蓬勃即就繩床通告訣別其一弟子又被鬼打躄死乃蘇藏即捨諸衣財行僧德施又聞香氣遍滿身心神語藏曰今者不死八十餘矣既而入京蒙勅慰問賜絹二百匹用充衣服貞觀十七年本國請還啟勅蒙許引藏入宮賜納一領雜綵五百段東宮賜二百段仍於弘福寺為國設大齋大德法集并度八人又勅太常九部供養藏以本朝經像彫落未全遂得藏經一部并諸妙像幡花蓋具堪為福利者齎還本國既達鄉壤傾國來迎一代佛法於斯興顯王以藏景仰大國弘持正教非夫綱理無以肅清乃勅藏為大國統住王芬寺寺即王之所造又別築精院別度十人恒充給侍又請入宮一夏講攝大乘論晚又於皇龍寺講菩薩戒本七日七夜天降甘露雲霧奄藹覆所講堂四部興嗟聲望彌遠及散席日從受戒者其量雲從因之革厲十室而九藏屬斯嘉運勇銳由來所有衣資並充檀捨惟事頭陀蘭若綜業正以青丘佛法東漸百齡至於住持修奉蓋闕乃與諸宰伯祥評紀正時王臣上下僉議攸歸一切佛法須有規猷並委僧統藏令僧尼五部各增舊習更置綱管監察維持半月說戒依律懺除春冬總試令知持犯又置巡使遍歷諸寺誡勵說法嚴飾佛像營理眾業鎮以為常據斯以言護法菩薩即斯人矣又別造寺塔十有餘所每一興建合國俱崇藏乃發願曰若所造有靈希現異相便感舍利在諸巾鉢大眾悲慶積施如山便為受戒行善遂廣又以習俗服章中華有革藏惟歸崇正朔義豈貳心以事商量舉國咸遂通改邊服一准唐儀所以每年朝集位在上蕃任官遊踐並同華夏據事以量通古難例撰諸經戒疏十餘卷出觀行法一卷盛流彼國有沙門圓勝者本族辰韓清慎僧也以貞觀初年來儀京輦遍陶法肆聞持鏡曉志存定攝護法為心與藏齊襟秉維城塹及同返國大敞行途講開律部惟其光肇自昔東蕃有來西學經術雖聞無行戒檢緣搆既重今則三學備焉是知通法護法代有斯人中濁邊清於斯驗矣論曰觀夫至人之降時也或三輪御世或六通導物人依法依本護法而陳教適權適道寔兼濟而成津是以三藏設位拯溺喪於未然護法一科樹已崩之正網然弘誘之相條緒稍多時顯知微乍揚神武騁奇辯於邪眾暢決蒙心顯大義於當時昌明玄理假威權而助道有德獨擅其聲藉傳授而潛通遍告常行其務遂有撾揵搥於靈岳聲告但為任持重結法於剡洲教旨惟尊弘理入大乘論則九億無學住法萬年經律所詮賓頭羅睺未取泥曰斯皆助揚道化通悟未聞靜倒惑於即生紹正法于來世故使湮殘屢染尋復還興豈惟凡謀蓋其力矣況乎迦葉尊者凝神鷄足之峯堅慧菩薩端拱修羅之窟斯並引生趣善為物持身致及慈氏降靈遞相弘育或摧裂愛網或傾覆慢幢或通決深疑或開揚道務為業應接若雲雨之相投為功惟重等大地之弘博所以身子策名顯法輪之大將毱多徽號標無相之後佛五百門學通號任持行德相高皆稱第一至於乘時御化通法開宗弘救之極勿高身子良由闢樹園之福地蕩邪𡨥之高鋒偃目連之神力覆富那之辯慧此即護法之緣蓋惟斯矣自道風東扇爰始滕蘭前傳重於開宗故入譯經之目然則傳譯在乎歸信未信不可弘文護持存乎正邪邪正方開信本經陳如是豈虛也哉道元德母信其實矣所以發蒙啟化應接時心重空顯其德明大眾駭其耳目致使拜首受道飲沐法流不虛設也費才感終於壇側褚信剃頂於場中顯宗悟理知歸侍中捐俗入道一期盛事萬代舟航佛日於是流暉法雲由斯不絕茲德可紀茲言可詳而閩越隱其高例附譯稱述竊比則事業懸殊遠化則乘權難擬計功編次宜先譯傳稍非經務故後三學及姚秦迷外道融折其是非元魏重邪曇始制其強禦前傳顯然其宗可錄施乎齊周兩治厥政殊風齊高獨盛釋門周武偏弘李眾然其邪逼匿正邪偽而正通妄作亂真真澄而妄隱故使齊氏一統民無兩情釋侶闐邦寺塔充國二百萬眾綱猷上統之言四十千寺咸列釋門之剎約指剡洲化境通括像正任持梯航之大未可相擬豈法之力惟人謂乎弘斯在人則顯公據其首也掩抑華飾揚耀塵埃眾皆輕而不思可謂激通其道及法上引衣之赴難也則醒醉相兼醒則領上之累詞醉則示虛於邪敵雖復金櫃玉韜之祕術未可與言孫武吳起之奇謀曾何足道所以登席之始搖動物心異眾等山丘鼓論同雲物致使纔撝刃辯載戢妖氛定方術於面前樹微言於即世故有談仙者投骸於臺檻宗虛者深剃於王庭明詔遂頒國無兩信雖稠公標於定道賢上統於義門一時之慶固不同年而語矣周氏秦壤世號武鄉豺狼之諺想不虛託懷文斯寡習勇彌隆酌緯候之讖詞納譎誑之佞術衛嵩本我之胤張賓乃彼之餘異嚮同心脣齒相副競列封表曲引遊言冒誷帝心覆絕仁祀時未思其禍始也禍作萌漸百辟之所不知及望夷之福終也潰發滂流天無方改前政呼嗟何及僧傑道安名殊衛氏風格峻逸比景彌天二論既陳異見將弭而狙詐蠅巧終墜前修靜藹上賢當斯頹運奮發拒諫守素窮巖慨正道之遂荒誠護法之無力也乃解形松石殉命西方于時同軌遺形亦有十數自非懷大濟於末俗覩法滅而增哀何能捨所重於幽林為依救而終世誠可美矣誠可悲夫詳觀列代數賢則紹隆之迹可見藻鏡則日月同仰清範則高山是欽具彰本紀其續昌矣有隋御㝢深信釋門兼陳李館為收恒俗二世纘曆同政前朝悼像化之徽猷襲宋桓之致敬于時緇素相望慘然明贍法師屈起臨對夙未強術眾或漏言及覿其厲色格詞抗楊嚴詔皆謂禍碎其身首也助慄不安其足而贍逞怡顏色欣勇綽然帝後乃述釋門之有人焉眾乃悟其脫頴也知人其難人實難知知其難者千載其一乎信不虛矣皇唐啟運代有斯人普應佩席於天門慧滿載衣於朝伍智實剛烈抵訶於時重法琳慷慨極言於明詔異世同風不屑古也莫不言行同時死生齊日故得名流萬代紹先聖之宏猷乎惟夫經論道業務在清心弘護法網寔敦遐志志遠則不思患辱心清則罔懼嚴誅達三相之若馳識九有之非宅未曾為法徒喪餘齡豈惟往生乃窮來陰於是挾福智而面諸佛覩形骸若委遺塵騰神略而直前鼓通博之橫辯但令法住投鼎鑊其如歸既屬慧明處濁世其如夢故能不負遺寄斯傳之有蹤乎已矣夫誰有見斯而不勉厲志於重霄哉釋曇選姓崔高陽人神慧譎詭不偶時俗雖博通經術而以涅槃著名不存文句護法為慮本晚住并部興國寺川邑奉之以為師傅每有眾集居于座元酬問往還以繫節為要吐言開令宏放終古僧侶乃多莫敢摧挫時人目為豹選者也及楊諒逆節中外相叛招募軍兵繕造牟甲以興國寺為甲坊以武德寺為食坊後於武南置陣楊素敗之官軍入郭搜求逆黨總集諸僧責供反者僧等辭曰王力嚴切不敢遮約素曰有幾僧諫王被殺而云王力嚴切此並同反不勞分疎可依軍法選時在眾不忍斯禍乃出對曰比佛法陵遲特由僧無有德可以動俗致有亂階結聚不能誨以忠信此誠如公所教今被理責陷身無地素乃舒顏曰僧等且還留向對僧擬論機務自爾晝參軍將開散僧誅晚還寺宿不久煬帝下勅通被放免故合眾獲安誠其功也及大業末歲兵饑交接四方僧遊寄食無地興國雖富儉嗇者多每食時禁門自守客僧擁結終不之前選不勝滅法憤激身心每日拄杖在門驅趁防者携引羇僧供給鉢器送至食堂眾多是其子弟不敢違逆由是眾開僧制許選停客自餘不得然其慈濟之深感激府俞房內廓然財什不積唯置大鉢一口每日引諸乞兒所得食調總鉢中選請食分亦和其內雜為饘粥便行坐乞人手自斟酌見其縷皴錯形容癯瘦流淚盈臉不能自勝選亦依行受粥而食日別如此遂及有年皇運伊始人情安泰義興新寺法綱大張沙門智滿當塗眾主一川鄉望王臣傾重創開諸宇嚴位道場三百餘僧受其制約夏中方等清眾肅然風聲洋溢流潤遐邇選聞之乃詣其寺庭滿徒聞來崩騰下赴告曰卿等結聚作何物在依何經誥不有冒罔後生乎滿曰依方等經行方等懺選曰經在何處將來對讀遂將一卷來選曰經有四卷何不一時讀之沙門道綽曰經文次第識不俱聞選曰吾識可共爾識同耶但四卷齊讀文言未了便曰依呪滅罪耳可罷之又曰自佛法東流矯詐非少前代大乘之賊近時彌勒之妖詿誤無識其徒不一聞爾結眾恐壞吾法故力疾來問雖爾手把瓶子倚傍猶可遂杖策而返武德八年遘疾淹積問疾者充牣房宇乃尸臥引衣申脚曰吾命將盡何處生乎名行僧道綽曰阿闍黎西方樂土名為安養可願生彼選曰咄為身求樂吾非爾儔綽曰若爾可無生耶答曰須見我者而為生乎乃潛息久之不覺已逝時年九十有五道俗哀慘送于西山之陰傳者親往其寺不及其人觀其行事遺績庶可澡雪形心頓祛鄙悋叔緒護法開士抑斯人乎釋法通龍泉石樓人初在隰鄉未染正法眾僧行往不達村閭如有造者以灰灑面通雖處俗情厭恒俗以開皇末年獨懷異概超出意表剃二男二女并妻之髮被以法衣陟道詣州委僧尼寺時有問者通便答曰我捨枷鎖志欲通法既達州寺如前付囑便求通化寺明法師度出家於即遊化稽湖南自龍門北至勝部嵐石汾隰無不從化多置邑義月別建齋但有沙門皆延村邑或有住宿明旦解齋家別一槃以為通供此儀不絕至今流行河右諸州聞風服義有僧投造直詣堂中承接顏色譬若親識故通之率導其德難倫曾行本邑縣令逢之問是何僧答云山客令乃禁守不許遊從通即絕粒竭誠遶獄行道其夜聽事野狐鳴叫怪相既集通夕不安及明放遣通曰我遶獄行道正得道理如何見放經日不食夜又狐鳴宮庶以下莫不震懼苦勸引挽方從其請爾後巡行無時寧舍曾投人宿犬咋其脛尋被霹死風聲逾顯後卒於龍泉余以貞觀初年承其素迹遂往尋之息名僧綱住隰州寺親說往行高聞可觀欣其餘論試後披敘夫以高世之量隨務不倫統其大歸莫非通道所以九十六部兼邪正之津途一十七群現機緣之化迹故能光開佛日弘導塵蒙攝迷沒之鄙夫接戒濁之澆首並得開智清悟通聖革凡弘道利生於是乎在今有不達之者同世相輕覩其家業叢雜閱其形骸塵弊遂則雷同輕毀曾不大觀由之自陷備于成教故文云不觀法師種姓形有但受其法開我精靈斯言可歸通有之矣釋弘智姓萬氏始平槐里鄉人隋大業十一年德盛鄉閭權為道士因入終南山絕粒服氣期神羽化形骸枯悴心用飛動乃入京至靜法寺遇惠法師問以喻道之方惠曰有生之本以食為命假糧粒以資形託津通以適道所以古有繫風捕影之論仙虛藥誤之談語事信然幸無惑也乃示以安心之要遣累之方義寧元年委擲黃冠入山修業武德之始天下大同佛道二門峙然雙列智乃詣省申訴請隷釋門並陳理例朝宰咸穆遂得貫入緇伍隨情住寺而性樂幽栖乃於南山至相寺而居焉周歷講會亟經炎燠神用通簡莫不精詣然而性立虛融慈矜在務陶甄士俗延納山賓巖隱匱乏之流飛走飢虛之類咸贍資糇粒錫以貝泉雖公格嚴斷寺制深約而能携引房宇同之窟穴泰斯亦叔代匡護之開士也滅後遂絕此蹤惜哉故其所獲法利積散不窮弘誘博愛為而不恃加之以忍邦行事音聲厥初開務通識非斯莫曉故凡有福會必以簫鼓為先致令其從如雲真俗不爽於緣悟矣講華嚴攝論等以永徽六年五月九日終於山寺春秋六十有一露骸林下攸骨焚散遵餘令也門人散住諸寺者咸謹卓正行不墜遺風重誨誘之劬勞顧復之永沒乃共寫八部般若用崇屺岵之恩又建碑一區陳於至相寺山外二丈四尺寶德寺莊所釋道會姓史犍為武陽人初出家住益州嚴遠寺器宇高簡雅調逸群四方道俗日夕參候猶以蜀門小陜聞見非廣乃入京詢訪經十餘年經論史籍博究宗領還蜀欲大開釋教導引後銳時屬亂離不果心術會皇運初興率先招撫詹俊李袞首途巴蜀會上疏曰會弟性不肖家風失墜封爵雖除詔勅猶在門生故吏子孫成列並奮臂切齒思効力用即日劍門雖啟巫峽負固會請躬率徒隷振錫啟途折簡宣威開懷納款軍無矢石之勞主有待成之逸此亦一時之利也惟公圖之為使淹留遂不行于時國初僧尼道士所在多度有道士宋冀是彼梁棟於隆山縣下新立道觀屋宇成就置三十人會經總管段倫陳牒改觀為寺其郭內住者並是道宗不伏移改囑安撫大使李襲譽巡察州縣會以事達乃引兵過城四面鳴鼓一時驅出舉宗怨訴噂𠴲街衢會曰未能令天下改觀為寺此之一所終不可奪遂依立寺至今不毀武皇登遐入京朝觀因與琳師同修辨正有安州暠師在蜀弘講人有嫉者表奏云反又述法會覘候消息遂被拘執身雖在獄言笑如常為諸在獄講釋經論經春至冬諸僧十數衣服縷不勝寒酷京師有無盡藏恒施為事會致書曰自如來潛影西國千有餘年正法東流五百許載雖復赤髭青眼大開方便之門白脚漆身廣示歸依之路猶未出於苦海尚陸沈於險道況五眾名僧四禪教首頭陀聚落唯事一餐宴坐林中但披三納加以無緣之慈想升錘以代鴿履不輕之行思振錫以避蟲今有精勤法子清淨沙門橫被囚拘實非其罪遂使重關早落覩獄吏而魂飛清室晚開見刑官而思盡嚴風旦灑穿襟與中露俱飄繁霜夜零寒心與死灰同殪若竟不免溝壑抑亦仁者所恥書達即送裘鞋給之及事釋還鄉三輔名僧送出郭門會與諸遠僧別詩曰去住俱為客分悲損性情共作無期別時能訪死生道俗聞者皆墮淚時益州法曹裴希仁自矜門學會與相見輕有譏誚會曰蜀川雖小賢德如林漢朝八俊同出唯張綱埋輪東雒難曰豺狠當路安問狐狸奏誅梁冀威攝四海者揵為武陽人也漢時有問楊子雲曰李仲堪何如人答曰隱不違親貞不絕俗天子不臣諸侯不友者資中人也巴西閬中百王之仰戢益州郫縣名振於華夷明公庶可虛心待國士豈得以土地拘於人哉言訖而出希仁愧謝既返謂人曰江漢多靈其斯人也以貞觀末卒年七十矣釋智勤俗姓朱隋仁壽因舍利州別置大興國寺度少小以匡護為心每處眾發言無不允睦精誠勇猛事皆冥祐初母患委頓為念觀音宅中樹葉之上皆現化佛合家並見母疾遂除又屬隋末荒亂諸賊競起勤獨守此寺賊不敢凌故得寺宇經像一無所損諸寺湮滅不可目見又一時權著俗衣以避兵刃被賊圍遶而欲殺之忽聞空中聲告師可去俗衣遂除外服賊見頂禮請將供養經於數月後投於蜀聽暠法師講眾至三千法師皆委令檢校遂得安怗內外無事一人力也又至唐初還歸鄧州講維摩三論十餘遍後隱於北山倚立十餘年所居三所即今見存恒聞谷中鐘聲後尋巖嶺忽見一寺宛麗奇常入中禮拜似有人住如是數度後更尋覓莫知所在又居山內糧食將盡其行道之處土自發起遂除棄之明日復爾如是再三遂有穀現因即深掘得粟二十餘碩其粟粒大色赤稍異凡穀時鄧州佛法陵遲合州道俗就山禮請願出住持遂感夢而出其夢不詳子細後時負像出山中途忽闇莫知其路不得前進俄有異火兩炬照路極明因得見道送至村中火方迴滅村人並見無不驚異因出住大興國前後諸王刺史並就寺頂禮請受歸戒恒以僧尼之事委令檢校佛法光顯吳蜀遠聞又至永徽年初以見時事繁雜守房不出向淹三載讀一切經兩遍每讀經時恒見有神來聽初中後夜常聞彈指謦欬之聲至顯慶四年省符召入慈恩不就至其年五月欲終之前所有功德不周之處曉夜經構使畢人問何故如此怱速答曰無常之法何可保耶至十五日寺中樹木枝葉萎枯自然分析禽鳥悲鳴遍於寺內僧各驚問莫知所由至十六日旦忽見昔聽經神來禮拜而語云莫禮傍人無有見者於是剃髮披衣在繩床內手執香鑪跏趺而坐告諸弟子汝可取大品經讀誦至往生品訖遂合掌坐而卒停經數日顏色如舊恒有異香聞於寺內合州道俗悲慟難勝州縣官人並送至野春秋七十四矣感通上正傳三十三附見三魏洛京永寧寺天竺僧勒那漫提傳一魏滎陽沙門釋超達傳二魏文成沙門釋慧達傳三魏常山衡唐精舍釋道泰傳四梁九江東林寺釋僧融傳五魏末魯郡沙門釋法力傳六梁蜀土青城山寺釋植相傳七梁蜀土潼州沙門釋僧林傳八梁荊州沙門釋慧簡傳九魏涼州沙門釋僧朗傳十魏太山朗公谷山寺釋僧意傳十一魏太山丹嶺寺釋僧照傳十二齊相州鼓山釋道豐傳十三齊鄴下大莊嚴寺釋圓通傳十四齊太原沙門釋慧寶傳十五齊鄴下寶明寺釋僧雲傳十六齊梁州薛寺釋僧遠傳十七周上黨元開府寺釋慧瑱傳十八隋相州大慈寺釋洪獻傳十九隋東川沙門釋慧雲傳二十傅大士隋鄂州沙門釋法朗傳二十一隋蜀部灌口山竹林寺釋道仙傳二十二陳攝山栖霞寺釋慧峯傳二十三隋蘇州重玄寺釋慧巖傳二十四隋東都寶楊道場釋法安傳二十五法濟隋蔣州大歸善寺釋慧偘傳二十六唐京化度寺釋轉明傳二十七唐安州沙門賈逸傳二十八唐雍州義善寺釋法順傳二十九智儼唐蒲州普濟寺釋道英傳三十唐雍州梁山沙門釋又德傳三十一唐京師辯才寺釋智則傳三十二唐京師律藏寺釋通達傳三十三勒那漫提天竺僧也住元魏洛京永寧寺善五明工道術時信州刺史綦母懷文巧思多知天情博識每國家營宮室器械無所不關利益公私一時之最又勅令修理永寧寺見提有異術常送餉祇承冀有聞見而提視之平平初無敘接文心恨之時洛南玄武館有一蠕蠕客曾與提西域舊交乘馬衣皮時來造寺二人相得言笑抵掌彌日不懈文旁見夷言不曉往復乃謂提曰弟子好事人也比來供承望師降意而全不賜一言此北狄耳獸心人面殺生血食何足可尚不期對面遂成彼此提曰爾勿輕他縱使讀萬卷書用未必相過也懷文曰此所知當與捔技賭馬提曰爾有何耶曰算術之能無問望山臨水懸測高深圍圌蹋窖不舛升合提笑而言曰此小兒戲耳庭前有一棗樹極大子實繁滿時七月初悉已成就提仰視樹曰爾知其上可有幾許子乎文怪而笑曰算者所知必依鉤股標候則天文地理亦可推測草木繁耗有何形兆計斯寔漫言也提指蠕蠕曰此即知之文憤氣不信即立契賭馬寺僧老宿咸來同看具立旁證提具告蠕蠕彼笑而承之文復要云必能知者幾許成核幾許菸死無核斷許既了蠕蠕腰間皮袋裏出一物似今秤衡穿五色線線別貫白珠以此約樹或上或下或旁或側抽線䀹眼周迴良久向提撼頭而笑述其數焉乃遣人撲子實下盡一一看閱疑者文自剖看校量子數成不卒無欠䞉因獲馬而歸提每見洛下人遠向嵩高少室取薪者自云百姓如許地擔負辛苦我欲暫牽取二山枕洛水頭待人伐足乃還放去不以為難此但數術耳但無知者誣我為聖所以不敢提臨欲終語弟子曰我更停五三日往一處行汝等念修正道勿懷眷戀便寢疾閉戶臥弟子竊於門隙視之見提身不著床在虛仰臥相告同視一僧忽欬提還床如舊遙謂曰門外是誰何不來入我以床熱故取涼爾勿怪也是後數日便捨命矣釋超達未詳其氏元魏中行業僧也多學問有知解帝禁圖讖尤急所在搜訪有人誣達有之乃收付滎陽獄時魏博陵公檢勘窮劾達以實告大怒以車輪繫頸嚴防衛之自知無活路專念觀世音至夜四更忽不見車輪所在見守防者皆大昏睡因走出外將欲遠避以久繫獄脚遂𮜭急不能及遠行至天曉虜騎四出追之達惟逃必不免因伏草中騎來蹋草並靡雖從邊過對而不見仰看虜面悉以牛皮障目達一心服死至誠稱念夜中虜去尋即得脫又僧明道人為北臺石窟寺主魏氏之王天下也每疑沙門為賊收數百僧互繫縛之僧明為魁首以繩急纏從頭至足剋期斬決明大怖一心念觀音至半夜覺纏小寬私心欣幸精到彌切及曉索然都斷既因得脫逃逸奔山明旦獄監來覓不見惟有斷繩在地知為神力所加也即以奏聞帝信道人不反遂一時釋放釋慧達姓劉名窣蘇骨反和本咸陽東北三城定陽稽胡也先不事佛目不識字為人兇頑勇健多力樂行獵射為梁城突騎守於襄陽父母兄弟三人並存居家大富豪侈鄉閭縱橫不理後因酒會遇疾命終備覩地獄眾苦之相廣有別傳具詳聖迹達後出家住于文成郡今慈州東南高平原即其生地矣見有廟像戎夏禮敬處于治下安民寺中曾往吳越備如前傳至元魏太武大延元年流化將訖便事西返行及涼州番禾郡東北望御谷而遙禮之人莫有曉者乃問其故達云此崖當有像現若靈相圓備則世樂時康如其有闕則世亂民苦達行至肅州酒泉縣城西七里石㵎中死其骨並碎如葵子大可穿之今在城西古寺中塑像手上寺有碑云吾非大聖遊化為業文不具矣爾後八十七年至正光初忽大風雨雷震山裂挺出石像舉身丈八形相端嚴惟無有首登即選石命工彫鐫別頭安訖還落因遂任之魏道陵遲其言驗矣逮周元年治涼州城東七里㵎忽有光現徹照幽顯觀者異之乃像首也便奉至山巖安之宛然符會儀容彫缺四十餘年身首異所二百餘里相好還備太平斯在保定元年置為瑞像寺焉乃有燈光流照鍾聲飛嚮相續不斷莫測其由建德初年像首頻落大冢宰及齊王躬往看之乃令安處夜落如故乃經數十更以餘物為頭終墜於地後周滅佛法僅得四年隣國殄喪識者察之方知先鑒雖遭廢除像猶特立開皇之始經像大弘莊飾尊儀更崇寺宇大業五年煬帝躬往禮敬厚施重增榮麗因改舊額為感通寺焉故令模寫傳形量不可測約指丈八臨度終異致令發信彌增日新余以貞觀之初歷遊關表故謁達之本廟圖像儼肅日有隆敬自石隰慈丹延綏威嵐等州並圖寫其形所在供養號為劉師佛焉因之懲革胡性奉行戒約者殷矣見姚道安制像碑釋道泰元魏末人住常山衡唐精舍夢人謂曰若至某年當終於四十二矣泰彌惡之及至期年遇重病甚憂悉以身資為福友人曰余聞供養六十二億菩薩與一稱觀世音同君何不至心歸依可必增壽泰乃感悟遂於四日四夜專精不絕所坐帷下忽見光明從戶外而入見觀音足趺踝間金色朗照語泰曰念觀世音耶比泰褰帷頃便不復見悲喜流汗便覺輕所患遂愈年四十四方為同意說之泰後終於天命更有一僧其緣同泰故不疏耳釋僧融梁初人住九江東林寺篤志汎博遊化己任曾於江陵勸一家受戒奉佛為業先有神廟不復宗事悉用給施融便撤取送寺因留設福至七日後主人母見一鬼持赤索欲縛之母甚遑懼乃更請僧讀經行道鬼怪遂息融晚還廬山獨宿逆旅時天雨雪中夜始眠見有鬼兵其類甚眾中有鬼將帶甲挾刃形奇壯偉有持胡床者乃對融前踞之便厲色揚聲曰君何謂鬼神無靈耶速曳下地諸鬼將欲加手融默稱觀世音聲未絕即見所住床後有一天將可長丈餘著黃皮袴褶手捉金剛杵擬之鬼便驚散甲冑之屬碎為塵粉融甞於江陵勸夫妻二人俱受五戒後為劫賊引夫遂逃走執妻繫獄遇融於路求哀請救融曰惟至心念觀世音更無信餘道婦入獄後稱念不輟因夢沙門立其前足蹴令去忽覺身貫三木自然解脫見門猶閉閽司數重守之計無出理還更眠夢見向僧曰何不早出門自開也既聞即起重門洞開便越席而出東南數里將值民村天夜闇冥其夫先逃夜行晝伏二忽相遇皆大驚駭草間審問乃其夫也遂共投商者遠避竟得免難釋法力未詳何人精苦有志德欲於魯郡立精舍而財不足與沙彌明琛往上谷乞麻一載將事返寺行空澤中忽遇野火車在下風無得免理于時法力倦眠比覺而火勢已及因舉聲稱觀未逮世音應聲風轉火焰尋滅安隱而還又沙門法智者本為白衣獨行大澤猛火四面一時同至自知必死乃合面於地稱觀世音怪無火燒舉頭看之一澤之草纖毫並盡惟智所伏僅容身耳因此感悟出家為道厲精翹勇眾所先之又沙門道集於壽陽西山遊行為二劫所得縛繫於樹將欲殺之惟念觀世音守死而已劫引刀屢斫皆無傷損自怖而走集因得脫廣傳此事又沙門法禪等山行逢賊惟念觀音挽弓射之欲放不得賊遂歸誠投弓於地又不能得知是神人捨而逃走禪等免脫所在通傳並魏末人別有觀音感應傳文事包廣不具敘之釋植相姓郝氏梓橦涪人當任巴西郡吏太守鄭貞令相齎獻物下楊都見梁祖王公崇敬三寶便願出家及還上蜀決誓家屬并其妻子既同相志一時剪落自出家後梁大同中專習苦行一食常坐正心佛理以命自期時南武都今孝水縣有法愛道人高衒道術相往觀之愛於夕中自以呪力現一大神身著衣冠容相璝偉來舉繩床離地四五尺相便誦戒神即馳去斯須復來舉床僅動一角如前復去俄爾又來在相前立相正意貞白初無微動尋爾復去於屋頭現面舍棟破裂其聲甚大相亦無懼神見不動便來禮拜求哀懺謝至旦語愛曰汝所重者此是邪術非正法也可捨之相後往益聽講以生在邊鄙玄頗涉俗雖遭輕誚亡懷在道都不忤意又因行路寄宿道館道士有素聞相名恐化徒屬拒不延之其夜群虎遶院相吼道士等通夕不安及明追之從受菩薩戒焉又曾行弘農水側見人垂釣相勸止之不從其言即唾水中忽有大蛇擎頭四顧來趣釣者因即歸命投相出家時梁道漸衰而涪土軍動與彖法師分飛異域彖入靜林山相入青城山聚徒集業梁王蕭撝素相欽重供給獠民以為營理未暇經始便感重疾知命不救謂弟子曰常願生淨土而無勝業雖不生三途亦不生天堂還生涪土作沙門也汝等努力行道方與吾會加坐儼然奄便遷化時年四十有四其山四面獠民見其坐亡皆來嘆異禮拜供養改俗行善弟子銜命露屍松下初相置足於綿州城西柏林寺院成就於堂頭植梧桐一株極為繁茂忽以四月十五日無故葉落又維那此日打鍾初不發聲大小疑怪不測所以上坐僧超謂有大變執錫逃避須臾信報相已終卒樹枯鍾噎表其遷化之晨也此寺去青城四百餘里而潛運之感殆非人謀梁初又有道香僧朗並有神異其迹略同誌公之類矣釋僧林吳人深有德素行能動物梁大同中上蜀至潼州城西北百四十里有豆圌山上有神祠土民敬之每往祭謁林往居之禪默累日忽有大蟒縈繩床前舉頭如揖讓者林為授三歸受已便去因爾安怗卒無災異其山北涪水之陽素來無猿自林栖託已來便有兩頭依林而住有初見者云度水來及後林出山門猿還洄度如此非一年月淹久孚乳產生乃有數十有時送林至龍門口竚望而返後往赤水巖故寺中屋宇並摧止有叢林便即露坐有虎蹲於林前低目視林乃為說法良久便去爾後孤遊雄悍不避惡狩常行仁濟感化極多末卒于潼部釋慧簡不知何許人梁初在道戒業弘峻殊奇膽勇荊州廳事東先有三間別齋由來屢多鬼怪時王建武臨治猶無有能住者惟簡是王君門師專任居之自住一間餘安經像俄見一人黑衣無目從壁中出便倚簡門上時簡目開心了但口不得語意念觀世音良久鬼曰承君精進故來相試今神色不動豈復逼耶欻然還入壁中簡徐起澡漱禮誦訖還如常眠寐夢向人曰僕以漢末居此數百年為性剛直多所不堪君誠淨行好人特相容耳於此遂絕簡住積載安隱如初若經他行猶無有人能住之者釋僧朗涼州人魏虜攻涼城民素少乃逼斥道人用充軍旅隊別兼之及轒䡴所擬舉城同陷收登城僧三千人至軍將見魏主所謂曰道人當坐禪行道乃復作賊深當顯戮明日斬之至期食時赤氣數丈貫日直度天師寇謙之為帝所信奏曰上天降異正為道人實非本心願不須殺帝弟赤竪王亦同謙請乃下勅止之猶虜掠散配役徒唯朗等數僧別付帳下及魏軍東還朗與同學中路共叛陣防嚴設更無走處東西絕壁莫測淺深上有大樹旁垂崖側遂以鼓旗竿繩繫樹懸下時夜大闇崖底純棘無安足處欲上岸頭復恐軍覺投計慞遑捉繩懸住勢非支久共相謂曰今厄至矣惟念觀世音耳便以頭扣石一心專注須臾光明從日處出通照天地乃見棘中有得下處因光至地還忽暗冥知是神也相慶感遇便就以眠良久方曉始聞軍眾警覺將發而山谷萬重不知出路惟望日行值一大虎出在其前相謂曰雖脫虜難復入虎口朗曰不如君言正以我等有感所以現光今遇此虎將非聖人示路也於是二人徑詣虎即前行若朗小遲虎亦暫住至曉遂得出路而失虎所在便隨道自進七日達于仇池又至梁漢出于荊州不測其終釋僧意不知何人貞確有思力每登座講說輒天花下散在于法座元魏中住太山朗公谷山寺聚徒教授迄於暮齒精誠不倦寺有高驪像相國像胡國像女國像吳國像崑崙像岱京像如此七像並是金銅俱陳寺堂堂門常開而鳥狩無敢入者至今猶爾故靈裕像讚云應感而來誠無指屬豈神通冥著理隔尋常之議乎意奉法自資束躬供養將終前夕有一沙彌死來已久見拜云違奉已來常為天帝驅使栖遑無暇癈修道業不久天帝請師講經願因一言得免形苦意便洗浴燒香端坐靜室候待時至及期果有天來入寺及房冠服羽從偉麗殊特眾僧初見但謂是何世貴入山參謁不生驚異及意爾日無疾而逝方知靈感其都講住在光州自餘香火唄匿散在他邑後試檢勘皆同日而終焉有說云僧意志湛即朗公同侶前傳闕之故今緝綴湛得初果其塔見存在泰山靈巖寺側見別傳釋僧照未詳氏族住泰山丹嶺寺性虛放喜追奇每聞靈迹譎詭無不登踐承瀑布之下多諸洞穴仙聖攸止以魏普泰年行至榮山見飛流下有穴因穴隨入行可五六里便出穴外逐微逕東北上數里得石渠闊兩三步水西流清而且徹帶渠藥草延蔓委地渠北有瓦舍三口形甚古陋庭前穀穗縱橫鳥雀殘食東頭屋裏有數架黃帙中間有鐵臼兩具亦有釜器並附遊塵都無炊爨之迹西頭屋內有一沙門端坐儼然飛塵沒膝四望惟見茂林懸㵎非復人居須臾逢一神僧年可六十眉長丈餘槃掛耳上相見欣然如舊問所從來自云我同學三人來此避世一人外行未返一人死來極久似入滅定今在西屋內汝見之未今日何姓為主答是魏家僧云魏家享國已久不姓曹耶照云姓元僧曰我不知遂取穀穗擣之作粥又往林中葉下取梨棗與之令噉僧云汝但食我不噉此又問誦何經照云誦法華神僧頷頭曰大好精進業今東屋格上如許經並自誦之欲得聞不照合掌曰惟敢聞命彼遂部別誦之聲氣朗徹乃至通夜照苦睡僧曰但睡我自恒業耳達日不眠更為造食照謝曰幸得奉謁今且暫歸尋來接事僧亦不留但言我同學行去汝若值者大有開悟恨不見之既言須歸好去照尋路得還結侶重往瀑布與穴莫測其處今終南諸山亦有斯事既多餘涉不無其理云釋道豐未詳氏族世稱得道之流與弟子三人居相州鼓山中不求利養或云練丹黃白醫療占相世之術藝無所不解齊高往來并鄴常過問之應對不思隨事標舉帝曾命酒并蒸肫勅置豐前令遣食之豐聊無辭讓極意飽噉帝大笑亦不與言駕去後謂弟子曰除却床頭物及發撤床見向者蒸肫猶在都不似噉嚼處時石窟寺有一坐禪僧每日至西則東望山巔有丈八金像現此僧私喜謂覩靈瑞日日禮拜如此可經兩月後在房臥忽聞枕間有語謂之曰天下更何處有佛汝今道成即是佛也爾當好作佛身莫自輕脫此僧聞已便起特重傍視群僧猶如草芥於大眾前側手指胸云爾輩頗識真佛不泥龕畫像語不能出脣智慮何如爾見真佛不知禮敬猶作本日欺我悉墮阿鼻又眼精己赤叫呼無常合寺知是驚禪及未發前輿詣豐所徑即謂曰汝兩月已來常見東山上現金像耶答曰實見又曰汝聞枕間遣作佛耶答曰實然豐曰此風動失心耳若不早治或狂走難制便以針針三處因即不發及豐臨終謂弟子曰吾在山久令汝等有谷汲之勞今去無以相遺當留一泉與汝既無陟降辛苦努力勤修道業便指竈旁去一方石遂有玄泉澄映不盈不減於今見存釋圓通不知氏族少出家汎愛通博以溫敏見稱住鄴都大莊嚴寺研諷涅槃文旨詳覈以高齊武平四年夏中講下有一客僧形服疎素履操弘雅因疾乃投諸寺中僧侶以其所患纏附臭氣熏勃皆惡之無敢停者通觀其量識宏遠深異其度乃延之房中雖有穢污初無輕憚日積情欵薄通其意問何所學答曰涅槃通以素業相沿宛然若舊乃以經中深要及先德積迷未曾解者並敘而談之客僧亦同其所引更為章句判釋冷然雅有其致通欣於道合更倍由來經理湯藥曉夕相守曾於夜中持春酒一盞云客人寄患服此為佳客遂嚬眉飲之一咽便止夏了病愈便辭通去通曰今授衣將逼官寺例得衣賜可待三五日間當贈一襲寒服客云藉亂不少何容更煩通固留之作衣遺已臨別執通手誡曰修道不欺暗室法師前以酒見及恐傷來意非正理也從今已往此事宜斷頗曾往鼓山石窟寺不小僧住下舍小寺正在石窟北五里當繞㵎驛東有一小谷東即竹林寺有緣之次念相訪也通敬謝前誡當必往展於是而別至明年夏初以石窟山寺僧往者希遂減莊嚴定國興聖總持等官寺百餘僧為一番通時爾夏預居石窟意訪竹林乃大集客主問寺所在眾皆大笑誡通勿傳此妖言竹林竟無適莫乃流俗之恒傳耳通惟客僧見投非常欵遇言及斯事計非虛指眾亦異焉乃各齎香花與通俱行至寺北五里小谷東出少通人逕行可五里昇于山阜見一老公手巾袜額布裩短褐執钁開荒二十餘畝遙見群僧放馬而前曰何處道人不依徑路僧云住在石窟欲向竹林公大怒曰去年官寺放馬噉我生苗我兒遮護被打幾死今復將此面目來耶曳钁來逐群僧十餘望谷馳走獨不逐通語通曰是爾干健不返放使入山餧虎通即東出數里值一曲㵎淺而森茂尋㵎又東但聞南嶺上有諷詠之聲通問竹林所在應聲答曰從何處來豈非圓通法師乎通曰是矣遂披林踰險就通略敘離闊喜滿言情曰下山小寺僧徒烏合心性動止多不稱具瞻雖然已能降重終須到寺相進數里忽見雙闕高門長廊複院修竹干雲青松蔽日門外黑漆槽長百餘尺凡有十行皆鋪首銜環金銅綺飾貯以粟豆旁有馬跡而掃洒清淨乃立通門左告云須前諮大和上須臾引入至講堂西軒廊下和上坐高床侍列童吏五六十人和上年可九十許眉面峯秀狀類梵僧憑案理文書旁有過事者通禮謁却立和上命曰既住官寺厚供難捨何能自屈此寺誠無可觀通具述意故乃令安置將通巡房禮訊見兩房僧各坐寶帳交絡眾飾映奪日光語引僧云彼是何人輒敢來入振手遣去僧有慚色顧謂通曰情意不同令人阻望且就小僧住房可以消息乃將入室具敘昔緣并設中食食如鄴中常味食後引觀圖像莊嚴園池臺閣周遊歷覽不可得遍通因自陳曰儻得廁迹風塵常供掃洒生願畢矣僧曰相逢即以為意但須諮和上未知果不夜與通宿曉為諮白和上曰甚知來意不惜一房凡受官請為報不淺依如僧法不得兩處生名今且還去除官名訖來必相容勿以為恨即遣送出至馬槽側顧慕流淚自傷罪重不蒙留住執僧手別西行百步迴望猶見門闕儼然步步返望更行數里許欻見峯㟧巉巖非復寺宇悵望尋路行達開荒之地了無蹤緒但有榛木耳識者評云前者舉钁驅僧假為神怪令通獨進示現有緣耳言大和上者將不是賓頭盧耶入大乘論尊者賓頭盧羅睺羅等十六諸大聲聞散在諸山渚中又於餘經亦說九十九億大阿羅漢皆於佛前取籌住壽於世並在三方諸山海中守護正法今石窟寺僧每聞異鍾唄響洞發山林故知神宮仙寺不無其實余往相部尋鼓山焉在故鄴之西北也望見橫石狀若鼓形俗諺云石鼓若鳴則方隅不靜隋末屢聞其聲四海沸騰斯固非妄左思魏都云神鉦迢遞於高巒靈響時警於四表是也自神武遷鄴之後因山上下並建伽藍或樵採陵夷工匠窮鑿神人厭其諠擾捐捨者多故近代登臨罕逢靈跡而傳說竹林往往殊異良由業有精浮故感見多矣近有從鼓山東面而上遙見山巔大道列樹青松尋路達宮綺華難紀珍木美女相次歡娛問其丈夫皆云適往少室逼暮當還更進數里並是竹林尋徑西行乃得其寺眾僧見客歡遇承迎供給食飲指其歸路乃從山西北下去武安縣不過十數里也暨周武平齊例無別服鄴東夏坊有給事郭彌者謝病歸家養素閭巷洽聞內外慈濟在懷先廢老僧悉通收養宅居讀誦忽聞有扣門者令婢看之見一沙門執錫擎鉢云貧道住鼓山竹林寺逼時乞食彌近門聲接乃遙應曰眾僧但言乞食何須詐聖身自往觀四尋不見方知非常人也悔以輕肆其口故致聖者潛焉近武德初年介山抱腹巖有沙門慧休者高潔僧也獨靜修禪忽見神僧三人在佛堂側休怪之謂尋山僧也入房取坐具將往禮謁及後往詣神僧中小者抱函在前大者在後乘虛冉冉南趣高嶺白雲北迎藹不見後經少時又見一僧東趣巖壁休追作禮遂入石中此巖數有鍾鳴依時而扣雖蒙聲相不及言令斯亦感見參差不可一准大略為言巖穴靈異要惟虛靜必事喧雜希聞奇相矣釋慧寶氏族未詳誦經二百餘卷德優先達時共知名以齊武平三年從并向鄴行達艾陵川失道尋徑入山暮宿巖下室似人居逈無所見寶端坐室前上觀松樹見有橫枝懸磬去地丈餘夜至二更有人身服草衣自外而至口云此中何為有俗氣寶即具述設敬與共言議問寶即今何姓統國答曰姓高氏號齊國寶問曰尊師山居早晚曰後漢時來長老得何經業寶恃己誦博頗以自矜山僧曰修道者未應如此欲聞何經為誦之寶曰樂聞花嚴僧即少時誦之便度聲韻諧暢非世所聞更令誦餘率皆如此寶驚歎曰何因大部經文倏然即度報曰汝是有作心我是無作心夫忘懷於萬物者彼我自得矣寶知為神異也求哀乞住山僧曰國中利養召汝何能自安且汝情累未遣住亦無補至曉便捨去寶遂返尋行迹達鄴敘之釋僧雲不知何人也辯聰詞令備明大小崇附齋講恒以常住齊鄴盛昌三寶雲著名焉住寶明寺襟帶眾理以四月十五日臨說戒時眾並集堂雲居上首乃白眾曰戒本防非人人誦得何勞煩眾數數聞之可令一僧竪義令後生開悟雲氣格當時無敢抗者咸從之訖於夏末常廢說戒至七月十五日旦將昇草坐失雲所在大眾以新歲未受交廢自恣一時崩騰四出追覓乃於寺側三里許於古塚內得之遍體血流如刀割處借問其故云有一丈夫執三尺大刀厲色瞋云改變布薩妄充竪義刀膾身形痛毒難忍因接還寺竭情懺悔乃經十載說戒布薩讀誦眾經以為常業臨終之日異香迎之神色無亂欣然而卒時感嘉其即世懲革不墜彝倫云釋僧遠不知何人住梁州薛寺為性疎誕不修細行好追隨流蕩歡醼為任以齊武平三年夢見大人切齒責之曰汝是出家人面目如此猶縱造惡何不取鏡自照遠忽覺悸流汗至曉以盆水自映乃見眼邊烏黯謂是垢汗便洗拭之眉毛一時隨手落盡因自咎責奈遭此譴遂改革常習反形易性弊衣破履一食長齋遵奉律儀昏曉行悔悲淚交注經一月餘日又夢前人含笑謂曰知過能改是謂智乎赦汝前愆勿復相續忽驚喜而覺流汗遍身面目津潤眉毛漸出遠頻感兩報信知三世自後竭精奉法中不暫怠卒為練行僧也鄉川所歸終於本土釋慧瑱上黨人奉律齊真貞確難拔住郡內元開府寺獨靜一房禪懺為業會周建德六年國滅三寶瑱抱持經像隱于深山遇賊欲劫之初未覺也忽見一人形長丈餘美鬚面著紗帽衣青袍九環金帶吉莫皮靴乘白馬朱鬉自山頂徑至瑱前下馬而謂曰今夜賊至師可急避瑱居懸崖之下絕無餘道疑是山神乃曰今佛法毀滅貧道容身無地故來依投檀越今有賊來正可於此取死更何逃竄神曰師既遠投弟子弟子亦能護師正爾住此遂失所在當夜忽降大雪可深丈許遂免賊難後群賊更往神遂告山下諸村曰賊欲劫瑱師急往共救乃各持器仗入山路中相遇拒擊驚散從此每日瑱恒憑之安業山阜不測其卒釋洪獻鄴人少履道門早明律檢聽涉勞頓遂兩目俱暗住相州大慈寺既無前導常處房中禮誦為先不輟晨夕開皇十四年忽感一神自稱般若檀越來從受戒數致談話同房僧綱禪師上堂中食般若乃將綱一襆衣來嚫獻云勞陳法事利益不少輒奉衣物願必受之獻納于櫃中後綱食還怪失衣襆搜求寺內乃於獻所得之具以告語綱終不信神遂發撤綱房衣物被案狼藉滿庭竿扇秤尺摧折數段神於空中語曰僧綱不好設齋會供養三寶我會禍汝未央獻雖目冥乃與般若言及事同目覩神語獻曰伴眾極多悉在紫陌河上惟三十人相隨可令寺家設食眾僧便於西院會之神曰大好飲食勞費師等雖然僧綱不赴齋供後會使知綱無奈之何恐迫不已便私費財物營諸齋福般若乃曰既能行福今相放矣仍以絹兩匹付獻云當以一匹施大眾一匹贈綱師獻對眾受得具皆聞見仍依付領於後彌勤本業遂卒於所住釋慧雲范陽人十二出家遊聽為務年十八乘驢止于叔家叔覩其驢快將規害之適持刀往見東牆下黃衣人揚拳逆叱曰此道人方為通法大士何敢害也叔懼告婦婦曰君心無剛正眼花所致耳聞已復往又見西牆下黃衣人云勿殺道人若殺大禍交及叔怖乃止明旦辭往姊家叔又持刀送之告雲曰此路幽險故送度難雲在前行正在深阻叔在其後揮刀欲斫忽見姊夫在旁竟免加害雲都不知也開皇中周流飡挹具瞻經論名高東夏榮冠一時後領徒五百來過叔氏敘見當衢闡化深惟昔釁乃奉絹十匹夫妻發露雲始知之乃為說法治斷安然無恨常以此事戒諸門人曰吾昔不乘好物何事累人自預學徒必無華飾且得支身成誦於口也後不測其終陳宣帝時東陽郡烏傷縣雙林大士傅弘者體權應道躡嗣維摩時或分身濟度為任依止雙林導化法俗或金色表於胸臆異香流於掌內或見身長丈餘臂過於膝脚長二尺指長六寸兩目明亮重瞳外耀色貌端峙有大人之相梁高撥亂弘道偏意釋門貞心感被來儀賢聖沙門寶誌發迹金陵然斯傅公雙林明道時俗唱言莫知其位乃遣使齎書贈梁武曰雙林樹下當來解脫善慧大士敬白國主救世菩薩今條上中下善希能受持其上善者略以虛懷為本不著為宗亡相為因涅槃為果其中善略以持身為本治國為宗天上人間果報安樂其下善略以護養眾生帝聞之延住建業乃居鍾山下定林寺坐蔭高松臥依盤石四澈六旬天花甘露恒流於地帝後於華林園重雲殿開般若題獨設一榻擬與天旨對楊及玉輦昇殿而公晏然箕坐憲司譏問但云法地無動若動則一切不安且知梁運將盡救愍兵災乃然臂為炬冀攘來禍至陳太建元年夏中於本州右脇而臥奄就昇遐于時隆暑赫曦而身體溫暖色貌敷愉光采鮮潔香氣充滿屈申如恒觀者發心莫不驚嘆遂合殮於巖中數旬之間香花散積後忽失其所在往者不見號慕轉深悲戀之聲慟噎山谷陳僕射徐陵為碑銘見類文釋僧朗一名法朗俗姓許氏南陽人年二十餘欣欲出家尋預剃落栖止無定多住鄂州形貌與世而殊有奇相飲噉同俗為時共輕常養一猴一犬其狀偉大皆黃赤色不狎餘人惟附於朗日夕相隨未曾捨離若至食時以木盂受食朗噉飽已餘者用餧同器食訖猴便取盂戴之騎犬背上先朗而行人有奪者輒為所咋朗任犬盤遊略無常度陳末隋初行於江嶺之表章服麁弊威儀越序杖策徒行護養生命時復讀誦諸經偏以法花為志素乏聲哢清靡不豐乃潔誓誦之一坐七遍如是不久聲如雷動知福力之可階也其誦必以七數為期乃至七十七百七千逮于七萬聲韻諧暢任縱而起其類箏笛隨發明了故所誦經時旁人觀者視聽皆失朗脣吻不動而囀起咽喉遠近亮澈因以著名然臂脚及手申縮任懷有若龜藏時同肉聚或往酒席同諸醼飲而嚼㗱猪肉不測其來故世語曰法華朗五處俱時縮猪肉滿口顙或復巡江洄泝拱手舟中猴犬在旁都無艤棹隨意所往雖凌犯風波眴息之間便達所在有比丘尼為鬼所著超悟玄解統辯經文居宗講導聽採雲合皆不測也莫不讚其聰悟朗聞曰此邪鬼所加何有正理須後撿挍他日清旦猴犬前行徑至尼寺朗隨往到禮佛遶塔至講堂前尼猶講說朗乃厲聲呵曰小婢吾今既來何不下座此尼承聲崩下走出堂前立對於朗從卯至申卓不移處通汗流地默無言說問其慧解奄若聾癡百日已後方服本性其降行通感皆此類也大業末歲猶未塵飛而朗口惟唱賊朝夕不息官人懼以惑眾遂幽而殺之襄陽法琳素與交遊奉其遠度因事而述故即而敘之釋道仙一名僧仙本康居國人以遊賈為業往來吳蜀江海上下集積珠寶故其所獲貲貨乃滿兩船時或計者云直錢數十萬貫既瓌寶填委貪附彌深惟恨不多取驗吞海行賈達于梓州新城郡牛頭山值僧達禪師說法曰生死長久無愛不離自身尚爾況復財物仙初聞之欣勇內發深思惟曰吾在生多貪志慕積聚向聞正法此說極乎若失若離要必當爾不如沈寶江中出家離著索然無擾豈不樂哉即沈一船深江之中又欲更沈眾共止之令修福業仙曰終為紛擾勞苦自他即又沈之便辭妻子又見達房凝水滉瀁知入水定信心更重投灌口山竹林寺而出家焉初落髮日對眾誓曰不得道者終不出山即逈絕人蹤結宇巖曲禪學之侶相次屯焉每覽經卷始開見佛在其處無不哽咽我何不值但見遺文而仙挺卓不群野栖禽狩或有造問學方者皆答對善權冥符正則自初入定一坐則以四五日為恒唯客到其門潛然即覺起共接語若無人往端坐靜室寂若虛空有時預告明當有客至或及百千皆如其說曾無欠長梁始興王澹褰帷三蜀禮以師敬携至陝服沮曲以天監十六年至青溪山有終焉志也便薙草止容繩床于時道館崇敞巾褐紛盛屢相呵斥甚寄憂心焉仙乃宴如曾無屑意一夕道士忽見東崗火發恐野火焚害仙也各執水器來救見仙方坐大火猛焰洞然咸歎火光神德道士李學祖等捨田造像寺塔欻成遠近歸信十室而九州刺史鄱陽王恢躬禮受法天監末始興王冥感於梁泰寺造四天王每六齋辰常設淨供仙後赴會四王頂上放五色光仙所執爐自然煙發太尉陸法和昔微賤日數載在山供仙給使僧有肆責者仙曰此乃三台貴公何緣罵辱時不測其後貴也和果遂昇袞服仙或勞疾見縹衣童子從青溪水出椀盛妙藥跪而進服無幾便愈居山二十八年復遊井絡化道大行時遭酷旱百姓請祈仙即往龍穴以杖扣門數曰眾生憂苦何為嗜睡如此語已登即玄雲四合大雨滂注民賴斯澤咸來禱賽欽若天神有須舍利即為祈請應念即至如其所須隋蜀王秀作鎮岷絡有聞王者尋遣追召全不承命王勃然動色親領兵仗往彼擒之必若固蹤可即加刃仙聞兵至都無畏懼索僧伽梨被已端坐念佛王達山足忽雲雨雜流雹雪崩下水涌滿川藏軍無計事既窘迫乃遙歸懺禮因又天明雨霽山路清夷得至仙所王躬盡敬便為說法重發信心乃邀還成都之靜眾寺厚禮崇仰舉郭恭敬號為仙闍梨焉開皇年中返于山寺道路自淨山神前掃一夜客僧止房仙往曳出房因即倒年百餘歲端坐而卒仍葬彼山益州今猶有木景白疊尚存云是聖人仙闍梨許釋慧峯不知何人住栖霞寺聽詮公三論深悟其旨最為得意名價遐布眾所推美詮每云峯之達解思力吾不及也以吾年老且復相依峯遊心正理身範律儀攝靜松林日惟一食衣服麁素略無寸積顧步鏘鏘雅有風彩未出都偏弘十誦讚誘前修聽者如市有問云今學大乘如何講律峯云此致非汝所知豈學正法而大小相乖乎以陳天嘉年卒春秋六十臨終告弟智琨曰吾去處懸遠非汝所知終後屈一指將之雖伸還屈時議謂證初果釋慧巖住蘇州重玄寺相狀如狂不修戒檢時人不齒多坐房中不同物議忽獨歡笑戲於寺中以物指撝曰此處為殿此處為堂乃至廊廡厨庫無不畢備經可月餘因告僧曰欲知巖者浮圖鈴落則亡沒矣至期果然乃返鎖其房搥戶開之端坐已卒遠近聞之屯赴闐𨶮各捨金帛遂成大聚依言締構欝成名寺事皆符焉自終至今四十餘載猶如存在見處佛堂用通禮謁云釋法安姓彭安定鶉孤人少出家在太白山九隴精舍慕禪為業麁食弊衣卒于終老開皇中來至江都令通晉王時以其形質矬陋言笑輕舉並不為通日別門首喻遣不去試為通之王聞召入相見如舊便住慧日王所遊履必齎隨從及駕幸泰山時遇渴乏四顧惟巖無由致水安以刀刺石引水崩注用給帝王時大嗟之問何力耶答王力也及從王入磧達于泥海中應遭變皆預避之得無損敗後往泰山神通寺僧來請檀越安為達之王乃手書寺壁為弘護也初與王入谷安見一僧著弊衣乘白驢而來王問何人安曰斯朗公也即創造神通故來迎引及至寺中又見一神狀甚偉大在講堂上手憑鴟吻下觀人眾王又問之答曰此太白山神從王者也爾後諸奇不可廣錄大業之始帝彌重之威轢王公見皆屈膝常侍三衛奉之若神又往名山召諸隱逸郭智辯釋誌公證公杯度一時總萃慧日道藝二千餘人四事供給資安而立又於東都為立寶楊道場惟安一眾居中樹業至十一年奏四方多難無疾而終所住春秋九十八矣初將終前告帝後事安其亡後百日火起出於內宮彌須慎之及至寒食油沸上焚夜中門閉三院宮人一時火死帝時不以為怪送柩太白資俸官給然安德潛於內外同諸侶惟眠不施枕頸無委曲延頸床邊口流涎溜每至升許為異時有釋法濟者通微知異僧也發迹陳世及隋二主皆宿禁中妃后雜住精進寡慾人罕登者文帝長安為造香臺寺後至東都造龍天道場帝給白馬常乘在宮如有疹患呪水飲之無不必愈又能見鬼物預覩未然大業四年忽辭上曰天命不常復須後世惟願弘護荷負含生便爾坐卒剃髮將殮須臾髮生長半寸許帝曰禪師滅定何得理之索大鍾打之一月餘日既不出定身相如生天子廢朝百官素服勅送于蔣州吏力官給行到設齋物出所在東都王公以下為造大幡四十萬口日齋百僧至于七七人別日䞋二十五段通計十餘萬匹斯並荷其福力故各傾散家珍云釋慧偘姓湯晉陵曲阿人也少受學於和闍梨和靈通幽顯世莫識其淺深而翹敬尊像事同真佛每見立像不敢前坐勸人造像惟作坐者道行遇諸困厄無不救濟或見被縛之猪和曰解脫首楞嚴猪尋解縛主因放之自爾偏以慈救為業大眾集處輒為說法皆隨事讚引即物成務眾無不悟而歸於道末往鄴下大弘正法歸向之徒至今流詠臨終在鄴人問其所獲云得善根成熟耳侃奉其神化積有年稔眾知靈異初不廣之後往嶺南歸心真諦因授禪法專精不久大有深悟末住栖霞安志靈靜往還自任不拘山世時往楊都偲法師所偲素知道行異禮接之將還山寺請現神力侃云許復何難即從窓中出臂長數十丈解齊熙寺佛殿上額將還房中語偲云世人無遠識見多驚異故吾所不為耳以大業元年終於蔣州大歸善寺春秋八十有二初侃終日以三衣襆遙𢱍堂中自云三衣還眾僧吾今死去便還房內大眾驚起追之乃見白骨一具跏坐床上就而撼之鏗然不散釋轉明俗姓鹿氏未詳何許人形服僧儀貌非弘偉容止淡然色無喜慍以隋大業八年無何而來居住雒邑告有賊起及至覆檢宗緒莫從帝時惑之未能加罪權令收禁初不測其然也至明年六月果逢梟感作逆驅逼凶醜充斥東都誅戮極甚方委其言有據下勅放之而明雖被拘散情計如常與諸言議曾無所及會帝往江都行達偃師時獄中死囚數有五十剋時斬決明日吾當放此死厄即往獄所假為餉遺面見諸囚告曰明日車駕當從此過爾等一時大呼云有賊至若問所由云吾所委當免死矣及至期會便如所告勅乃總放諸囚收明入禁便大笑而受之都無憂懼于斯時也四方草竊人不聊生如明語矣大業末歲猶被拘縶越王踐祚方蒙釋放雖往還自在而恒居乾陽門內別院供擬恐其潛逸密遣三衛私防護之及皇泰建議軍國謀猷恒預帷幄籌計利害偽鄭世充倍加信奉守衛嚴設又兼恒度至開明二年即唐武德三年也明從洛宮安然而出周圍五重初不見迹審偽都之將敗也西達京師太武皇帝夙奉音問深知神異隆禮敬之勅住化度寺數引禁中具陳徵應及後事會咸同合契以其年八月忽然不見衣資什物儼在房中尋下追徵合國周訪了無所獲尋明在道行涉冥祥有問學者乃云常以平等一法志而奉之顧其遊步四朝貴賤通屬以明道冠幽極皆往師之而情一榮枯寔遵平等而言調譎詭不倫和韻或云某法師者見謗大乘生報無擇某法師者從羊中來如此授記其例不一行至總持顧僧眾曰不久此等當流血矣宜共慎之時以為卓異共怪輕誕及遭法該等事尋被簿錄戮之都市方悔前失隋末有鮑子明者未詳何人煬帝遠召藝僧遂霑慧日而歷遊寺院不止房堂隨夜即宿略無定所既請官供曾不臨赴不著三衣而服裙帔或驚叫漫走言無准度大業九年以緋裹額唱賊而走時人以為徵兆也及梟起逆諸軍並著屯項袹額如其相焉咸圍東都召問通塞遂惡罵曰賊害天下何有國乎帝時在涿郡聞之大悅召而勞遣明又以箕盛土當風揚之後覆梟感逆黨並被誅剪長夏門外日別幾千遠應斯舉大業十年無故卒于雒邑賈逸者不知何人隋仁壽初遊于安陸言戲出沒有逾符讖形服變改時或緇素後於一時分身諸縣及至推驗方敬其德行迹不經而為無識所恥有方等寺沙門慧暠者學行通博逸因過之以紙五十幅施云法師由此得解耳初不測其所因也後有諍起暠被引禁官司責問引辯而答紙盡事了如其語焉故徵應所指例如此也末至一家云承卿有女欲為婚媾因往市中唱令告乞云他與我婦須得禮贈廣索錢米剋日成就數往彼門揚聲陳述女家羞恥遂密殺之埋在糞下經停三日行遊市上逢人言告被殺之事大業五年天下清晏逸與諸群小戲於水側或騎橋檻手挵之云拗羊頭捩羊頭眾人倚看笑其所作及江都禍亂咸契前言不知所終時蜀郡又有揚祐師者佯狂岷絡古老百歲者云初見至今貌常不改可年四十著故黃衫食噉同俗栖止無定每有大集身必在先言笑應變不傷物議預記來驗時共稱美迄于唐初猶見彼土後失其所在釋法順姓杜氏雍州萬年人稟性柔和未思沿惡辭親遠戌無憚艱辛十八棄俗出家事因聖寺僧珍禪師受持定業珍姓魏氏志存儉約野居成性京室東阜地號馬頭空岸重邃堪為靈窟珍草創伊基勸俗修理端坐指撝示其儀則忽感一犬不知何來足白身黃自然馴擾徑入窟內口銜土出須臾往返勞而不倦食則同僧過中不飲即有斯異四遠響歸乃以聞上隋高重之日賜米三升用供常限乃至龕成無為而死今所謂因聖寺是也順時躬覩斯事更倍歸依力助締構隨便請業末行化慶州勸民設會供限五百及臨齋食更倍人來供主懼焉順曰無所畏也但通周給而莫委供所由來千人皆足嘗有清河張弘暢者家畜牛馬性本弊惡人皆患之賣無取者順示語慈善如有聞從自後更無觝嚙其導發異類為如此也常引眾驪山夏中栖靜地多虫蟻無因種菜順恐有損害就地示之令虫移徙不久往視如其分齊恰無虫焉順時患腫膿潰外流人有敬而𠲿者或有以帛拭者尋即差愈餘膿發香流氣難比拭帛猶在香氣不歇三原縣民田薩埵者生來患聾又張蘇者亦患生瘂順聞命來與共言議遂如常日永即痊復武功縣僧毒龍所魅眾以投之順端拱對坐龍遂託病僧言曰禪師既來義無久住極相勞嬈尋即釋然故使遠近瘴癘淫邪所惱者無不投造順不施餘術但坐而對之識者謂有陰德所感故幽靈偏敬致其言教所設多抑浮詞顯言正理神樹鬼廟見即焚除巫覡所事躬為併儅禎祥屢見絕無障礙其奉正也如此而篤性綿密情兼汎愛道俗貴賤皆事邀延而一其言問胸懷莫二或復重痼難治深願未果者皆隨時指示普得遂心時有讚毀二途聞達於耳相似不知翻作餘語因行南野將度黃渠其水汎溢厲涉而度岸既峻滑雖登還墮水忽斷流便墮陸度及順上岸水尋還復門徒目覩而不測其然也所以感通幽顯聲聞朝野多有鄙夫利其財食順言不涉世全不留心隨有任用情志虛遠但服麁弊卒無兼副雖聞異議仍大笑之其不競物情又若此也今上奉其德仰其神引入內禁隆禮崇敬儲宮王族懿慼重臣戒約是投無爽歸禁以貞觀十四年都無疾苦告累門人生來行法令使承用言訖如常坐定於南郊義善寺春秋八十有四臨終雙鳥投房悲驚哀切因即坐送于樊川之北原鑿穴處之京邑同嗟制服亘野肉色不變經月逾鮮安坐三周枯骸不散自終至今恒有異香流氣屍所學侶等恐有外侵乃藏于龕內四眾良辰赴供彌滿弟子智儼名貫至相幼年奉敬雅遵餘度而神用清越振績京臯華嚴攝論尋常講說至龕所化導鄉川故斯塵不終矣釋道英姓陳氏蒲州猗氏人也年十八叔休律師引令出家而二親重之便為取婦五年同床誓不相觸素在市販與人同財乃使妻執燭分判文疏付囑留累遂逃而剃落至并州炬法師下聽花嚴等經學成返邑其妻尚在開皇十年方預大度乃深惟曰法相可知心惑須曉開皇十九年遂入解縣太行山栢梯寺修行止觀忽然大解南埵悟人北嶺悟法二空深鏡坐處樹枝下映四表於今見在因爾營理僧役以事考心後在京師住勝光寺從曇遷禪師聽採攝論講悟既新眾盈五百多採名教尠能如理而英簡時問義惟陳止觀無相思塵諸要槃節深會大旨遷彌重之語諸屬曰爾雖日考通文義無擇昏明得其妙者惟道英乎自爾儀服飲噉未守篇章頗為時目作達者也聽講之暇常供僧役有慕道者從其所為因事呈理調伏心行寄以弘法常云余冥目坐禪窮尋理性如有所詣及開目後還合常識故於事務遊觀役心使有薰習然其常坐開目如線動逾信宿初無頓𥇒後入禪定稍程異迹大業九年嘗任直歲與俗爭地遽鬪不息便語彼云吾其死矣忽然倒仆如死之僵諸俗同評道人多詐以針刺甲雖深不動氣絕色變將欲洪膖傍有智者令其歸命誓不敢諍願還生也尋言起坐語笑如常又行龍臺澤池側見魚之遊乃曰吾與汝共諍何者為勝汝不及我我可不及汝耶即脫衣入水弟子持衣守之經于六宿比出告曰雖在水中惟弊土坌我耳又屬嚴冬氷厚雪壯乃曰如此平淨之處何得不眠遂脫衣仰臥經于三宿乃起而曰幾被火炙殺我如是隨事以法對之縱任自在誠難偶者晚還蒲州住普濟寺置莊三所麻麥粟田皆在夏縣東山深隱之所不與俗爭用接羇遠故使八方四部其歸若林晝則厲眾僧務躬事擔運難險緣者必先登踐夜則跏坐為說禪觀時或弊其勞者聞法不覺其疲一日說起信論至真實門奄然不語怪往觀之氣絕身冷眾知滅想即而任之經于累宿方從定起時河東道遜高世名僧祖習心道素同學也初在解縣領徒盛講及遜捨命去英百五十里未及相報終夕便知告其眾曰遜公已逝相與送乎人問其故答曰此乃俗事心轉即是及行中路乃逢告使其知微通感類皆如此及終前夕集眾告曰急須收積明日間多聚人畜損食穀草眾不測其言英亦自運催促甚急至夜都了索水剃洗還本坐處被以大衣告曰人謂余為英禪師禪師之相不可違世語門人志褒曰禪師知英氣息可有幾耶褒以事答自言如是因說法要又曰無常常也不可自欺不可空死令誦華嚴賢首偈至臨終勸念善處明相既現奄然申逝近人以手循從下而冷即貞觀十年九月中也春秋七十有七初將終日眾問後事英曰佛有明教但依行之則無累矣英何言哉時感群鳥集房數盈萬計悲鳴相切及其終夕褒公侍側見有青衣二童執花而入紫氣如光從英身出騰焰屋棟及明霧結周二十里人物失光三日方歇蒲晉一川化行之所聞哀屯赴如喪重親遠驗英言不有損失又感僧牛吼叫聲徹數里流淚嗚咽不食水草經于七日將欲藏殮道俗爭之僉曰英不樂喧譁但存道業便即莊南夏禹城東延年陵東鑿土龕之才下一钁地忽大震人各攬草臨臥地驚懾周十五里皆大動怖又感白虹兩道連龕柩所白鳥二頭翔鳴柩上至于龕所迴旋而逝詳英道開物悟慧解入神故得靈相氤氳存亡總萃不負身世誠斯人乎釋叉德姓徐雍州醴泉人形質長偉秀眉骨面立履清白服麁素衣而放言來事多所弘獎年有凶暴毒勵流者必先勸四民令奉三寶其所施設或禮佛設齋或稱名念誦用其言者皆攘災禍有不信者莫不殃終預記未然略如對目時遭亢旱懼而問焉叉以手指撝某日當雨但齊某處約時雨至必如其言或蝗暴廣狹澤潤淺深事符明鏡不漏纖失且執志清慎不濫刑科力所未行不受其法故壯年在道惟遵十戒而於篇聚雜相多所承修末於九峻山南造阿耨達池并鐫石鉢即於池側用濟眾生以貞觀十二年卒於山舍百姓感焉為起白塔苕然上表釋智則姓憑雍州長安人二十出家止辯才寺聽凝法師攝論四十餘遍性度掉舉僅絕觀採恒披敗納裙垂膝上有問其故則云衣長多立耳遊浪坊市宿止寺中銷聲京邑將五十載財法食息一同僧伍房施單床上加以薦瓦椀木匙餘無一物或見其縷為經營者隨得服用言終不及則雖同僧住形有往來門無開閉同房僧不知靈異號為狂者則聞之仰面笑曰道他狂者不知自狂出家離俗只為衣食往往遮障鎖門鎖櫃費時亂業種種聚斂役役不安此而非狂更無狂者乃撫掌大笑則性嗜餺飥寺北有王摩訶家恒令辦之須便輒往因事伺候兩處俱見方委分身而言行相投片無瑕謬自貞觀來恒獨房宿竟夜端坐嘅嗽達曙余親目見故略述其相云釋通達雍州人三十出家栖止無定初辭世壤遍訪明師委問道方皆無稱悅乃入太白山不齎糧粒不擇林巖飢則食草息則依樹端坐思玄動逾晦序意用漠漠投解無歸經跨五年栖遑靡息因以木打塊塊破形銷既覩斯緣廓然大悟晚住京師律藏寺遊聽大乘情量虛蕩一裙一帔布納重縫所著麻鞋經三十載繒帛雜飾未曾冠體冬夏一服不蔽氷炎常於講席評敘玄奧而不肖之夫言行矛楯及至飲噉無異俗人達曰大乘之學豈其爾耶若指聖懷斯寔凡庶余不同也左僕射房玄齡聞而異焉迎至第中父事隆重而達體道為功性不拘檢或單裙露腹或放達餘言玄齡以風表處之不以形言致隔其見貴如此也常以飲水噉菜任性遊縱或攬折蒿藋生宛而食至於桃杏瓜果必生吞皮核人問所由云信施難棄也貞觀已來稍顯神異往至人家歡笑則吉愁懆必凶或索財賄或索功力隨命多少即須依送若違其語後失過前有人騎驢歷寺遊觀達往就乞惜而不施其驢尋死斯例不一也故京室貴賤咸宗事之禍福由其一言說導唯存離著所得財利並營寺宇大將軍薛萬均初聞異行迎宅供養百有餘日不違正軌忽於一夜索食欲噉初不與之苦求不已試與遂食從爾已後稍改前迹專顯變應其行多僻欲往入內宿將軍兄弟大怒打之幾死仰而告曰卿已打我身肉都毀血污不淨可作湯洗待沸涌已脫衣入鑊狀如冷水旁人怖之猶索加火遂合宅驚奉恣其寢處曾負人錢百有餘貫後既辦得無人可送乃將錢寺門伺覓行人隨負多少償達西市眾皆止之而達付而不禁及往勘儅不失一文斯達量虛懷定難准也時逢米貴欲設大齋乃命寺家多令疏請及至明旦來赴數千而供度閴然不知何擬大眾咎之達曰他許送供計非妄語臨至齋時僧徒欲散忽見熟食美膳連車接輿充道而來即用施設乃大餘長並供僧庫都不委其所從來食訖須臾人車不見今盛業京輦朝野具瞻敘事而舒故不曲盡釋明琛齊人少遊學兩河以通鑒知譽然經論雖富而以徵難為心當魏明代釋門云盛琛有學識遊肆而已故其雅量頗非鴻業時有智翼沙門道聲載穆遠近望塵學門若市琛不勝幽情深忌聲略私結密交廣搜論道初為屋子論議法立圖著經外施名教內搆言引牽引出入罔冒聲說聽言可領及述茫然勇意之徒相從雲集觀圖望經怳若雲夢一從指授渙若氷消故來學者先辦泉帛此屋子法入學遂多餘有獲者不能隱祕故琛聲望少歇於前乃更撰蛇勢法其勢若葛亮陣圖常山蛇勢擊頭尾至大約若斯還以法數傍蛇比擬乍度乍却前後參差余曾見圖極是可畏畫作一蛇可長三尺時屈時伸傍加道品大業之季大有學之今則不行想應絕滅初琛行蛇論遍於東川有道行者深相諫喻決意已行博為道藝潞州上邑思弘法華乃往巖州林慮縣洪谷寺請僧忘其名往講琛素與知識聞便往造其人聞至中心戰灼知琛論道不可相抗乃以情告曰此邑初信事須歸伏諸士俗等已有傾心願法師不遺故舊共相成贊今有少衣裁輒用相奉琛體此懷乃投絹十匹琛曰本來於此可有陵架意耶幸息此心然不肯去欲聽一上此僧彌怖事不獲已如常上講琛最後入堂齎絹束掇在眾中曰高座法師昨夜以絹相遺請不須論議然佛法宏曠是非須分脫以邪法化人幾許誤諸士俗高座聞此懾怖無聊依常唱文如疏所解琛即喚住欲論至理高座爾時神意奔勇泰然待問琛便設問隨問便解重疊雖多無不通義琛精神擾攘思難無從即從座起曰高座法師猶來闇塞如何今日頓解若斯當是山中神鬼助其念力不爾何能至耶高座合堂一時大笑琛即出邑共伴二人投家乞食既得氣滿噎而不下餘解喻何所諍耶論議不來天常大理何因頓起如許煩惱琛不應相隨東出步步歎吒登嶺困極止一樹下語二伴曰我今煩惱熱不可言意恐作蛇便解剔衣裳赤露而臥翻覆不定長展兩足須臾之間兩足忽合而為蛇尾翹翹上舉仍自動轉語伴曰我作蛇勢論今報至矣卿可上樹蛇心若至則有吞噬之緣可急急上樹心猶未變伴便上樹仍共交語每作蛇論果至如何言語之間奄便全身作蛇唯頭未變亦不復語宛轉在地舉頭自打打仍不止遂至於碎欻作蟒頭身形忽變長五丈許舉首四視目如火星于時四面無量諸蛇一時總至此蟒舉頭去地五六尺許趣谷而下諸蛇相隨而去其伴目驗斯報至鄴說之續高僧傳卷第三十五唐釋道宣撰感通篇中齊趙州頭陀沙門釋僧安傳一周益州青城山飛赴寺香闍梨傳二益州多寶寺猷禪師傳三益州沙門釋僧度傳四益州野安寺衛元嵩傳五前梁益州沙門釋尚圓傳六後梁荊州玉泉山釋法行傳七荊州神山釋道穆傳八隋初荊州四望山開聖寺釋智曠傳九涪州相思寺釋無相傳十濾州等行寺釋童進傳十一益州沙門釋富上傳十二鄭州會善寺釋明恭傳十三益州長陽山釋法進傳十四代州耆闍寺釋道幽傳十五襄州禪居寺岑闍梨傳十六丹陽天保寺通闍梨傳十七京師凝觀寺釋法慶傳十八單道琮益州天勅山釋德山傳十九旭上荊州青溪山釋道悅傳二十荊州內華寺釋慧耀傳二十一東嶽沙門釋道辯傳二十二神辯益州建明寺釋慧琳傳二十三京師救度寺釋洪滿傳二十四唐益州福化寺釋慧聰傳二十五京師法海寺釋法通傳二十六荊州開聖寺釋慧因傳二十七巴陵顯安寺釋法施傳二十八初蜀川沙門釋慧岸傳二十九初荊州開聖寺釋法運傳三十幽州北狄帝示階沙門傳三十一箕州護明寺釋智顯傳三十二蘇州常樂寺釋法聰傳三十三代州昭果寺釋僧明傳三十四代州五臺山釋明隱傳三十五代州五臺山釋法空傳三十六京師定水寺釋明𤀹傳三十七京師普光寺釋明解傳三十八宋尚禮兗州法集寺釋法沖傳三十九釋僧安不知何人戒業精苦坐禪講解時號多能齊文宣時在王屋山聚徒二十許人講涅槃始發題有雌雉來座側伏聽僧若食時出外飲啄日晚上講依時赴集三卷未了遂絕不至眾咸怪之安曰雉今生人道不須怪也武平四年安領徒至越州行頭陀忽云往年雌雉應生在此徑至一家遙喚雌雉一女走出如舊相識禮拜歌喜女父母異之引入設食安曰此女何故名雌雉耶答曰見其初生髮如雉毛既是女故名雌雉也安大笑為述本緣女聞涕泣苦求出家二親欣然許之為講涅槃聞便領解一無遺漏至後三卷茫然不解于時始年十四便就講說遠近咸聽歎其宿習因斯躬勸從學者眾矣香闍梨者莫測其來以梁初至益州青城山飛赴寺欣然有終志時俗每至三月三日必往山遊賞多將酒肉共相酣樂前後勸喻曾未能斷後年三月又如前集例坐已了香令人於座穿坑方丈人莫知意謂人曰檀越等恒自飲噉未曾與香今日為眾須飡一頓諸人爭奉肴酒隨得隨盡若填巨壑識者怪之至晚曰我大醉飽扶我就坑不爾污地及至坑所張口大吐雞肉自口出即能飛鳴羊肉自口出即馳走酒食亂出將欲滿坑魚䱉鵝鴨游泳交錯眾咸驚嗟誓斷辛殺迄今酒肉永絕上山此香之風德也益州別駕羅研朝梁誌公謂曰益州香貴賤答曰甚賤初不謂是人也誌曰既為人所賤何為久留研亦不測此語為有識者說之或曰將不指青城香闍梨乎遂往山具述香曰檀越遠來固非虛說其夜便化弟子等營墓將殯怪棺太輕及開止見几杖而已益州多寶寺猷禪師者𣕾道人姓楊氏勤讀誦四十餘年日夕不捨房後院壁圖九想變露置繩床椶被覆上晝依僧例夜則寢中亘一日方出一食如是漸增七日方食僧以為常弗之怪也如此又經二十餘年忽經一月而不出者不畜侍人僉議不出秖是入定不勞看之忽一夜風雨盛畫壁廊倒旦共往視試撥椶被一無所見唯繩床坐褥存焉釋僧度不知何人去來邑野略無定所言語出沒時有預知號為狂人周趙王在益州有郫人與王厚便欲反時有告者王未信之至旦郫兵果至王厚者為主在城西大街方床大坐時僧度乃戴皮靴一隻從城西遺糞而走至盤陀塔棄靴而迴眾怪之而莫測也又復將反者將紙筆請度定吉凶便操筆作州度兩字反者喜曰州度與我斯為吉也擇曰往亡我往彼亡重必剋之時趙王據西門樓令精兵三千騎往始交即退隨後殺之至盤陀斬郫兵千餘為京觀今塔東特高者是於後方驗度戴皮相皮郫聲同遺糞而走散於塔地所言州度徒各切反即斫頭目前取驗定後人聞於王遣人四追遂失所在釋衛元嵩益州成都人少出家為亡名法師弟子聰頴不偶嘗以夜靜侍傍曰世人洶洶貴耳賤目即知皁白其可得哉名曰汝欲名聲若不佯狂不可得也嵩心然之遂佯狂漫走人逐成群觸物擒詠周歷二十餘年亡名入關移住野安自制琴聲為天女怨心風弄亦有傳其聲者嘗謂兄曰蜀土狹小不足展懷欲遊上京與國士抗對兄意如何兄曰當今王褒庾信名振四海汝何所知自取折辱答曰彼多讀書自為文什至於天才大略非其分也兄但聽看即輕爾造關為無過所乃著俗服關中却迴防者執之嵩詐曰我是長安于長公家人欲逃往蜀耳關家迭送至京于公曾在蜀忽得相見與之交遊貴勝名士靡所不詣即上廢佛法事自此還俗周祖納其言又與道士張賓密加扇惑帝信而不猜便行屏削嵩又制千字詩即龍首青煙起長安一代丘是也並符讖緯事後曉之隋開皇八年京兆杜祈死三日而穌云見閻羅王問曰卿父曾作何官曰臣父在周為司命上士王曰若然錯追可速放去然卿識周武帝不答曰曾任左武侯司法恒在階陛甚識王曰可往看汝武帝去一吏引至一處門窓椽瓦並是鐵作於鐵窓中見一人極瘦身作鐵色著鐵枷鎖祈見泣曰大家何因苦困乃爾答曰我大遭苦困汝不見耳今得至此大是快樂祈曰作何罪業受此苦困答曰汝不知耶我以信衛元嵩言毀廢佛法故受此苦祈曰大家何不注引衛元嵩來帝曰我尋注之然曹司處處搜求乃遍三界云無不見若其朝來我暮得脫何所更論卿還語世間人為元嵩作福早來相救如其不至解脫無期祈穌不忘冥事勸起福助云釋尚圓姓陳廣漢洛人出家以呪術救物梁武陵王蕭紀宮中鬼怪魅諸婇女或歌或哭紛然亂舉王乃令善射者控弦擬之鬼乃現形即放箭射鬼便遙接還返擲人久而不已聞圓持呪請入宮中諸鬼競前作諸變現龍蛇百獸倏忽前後在空在地怪變多端圓安坐告曰汝小家鬼何因敢入王宮能變我身則可自變萬種秖是小鬼可住聽我一言諸鬼合掌住立圓始發云南無佛陀鬼皆失所自爾安靜武帝聞召大蒙賞遇值梁覆擾圓行至蜀所有痛惱因之護衛年八十一終所住治城今已摩滅釋法行者不知何人即論法師之神足也論本住玉泉煬帝隆重見於別傳行性素不倫言多卓異或居山谷時入市𮠔每往清溪路由覆船頂見泉流茂木乃顧曰十年之後當有大福慧人營搆伽藍及智者來儀果成先告又嘗往當陽城執竹弓射之後有山賊圍城如所前相然每出異言云梁休咎宣帝惡之令追將戮隨使至焉抗不前曰吾償命於此地尋有使至隨致命盡遂斬之而無有血臨終說眾要偈辭理切附不可具載皆述業報不可逃避及戮訖逡巡間屍靈遂失僕射蕭瑀行至四望山因禪師所為宣帝懺曰先人殺聖人罪者禮悔之餘願為及也傳曰以為後梁纘曆勢不超挺孤守一城傍被禦衛有何榮荷隨妄造愆故斬聖人望延厚祚所謂前望失於後途不久追入流離關壤無辜之責誠不可欺釋道穆松滋人性愛山林初入荊州神山將事巖隱感迅雷烈風震山折木神蛇繞床群虎縱吼穆心安泰然都無外想七日一定蛇虎方隱方登山遠眺其山東依浚壑西顧深流有終焉之志山神變形謝過云是田伯玉也來請受戒及施法式諸毒潛亡祭祀絕於羶辛祈澤應時雲雨如此衛候不一例可知也居山三十餘載名聲及遠遊遁之賓咸歸向請沙門則僧展僧安高士則劉虬車綴敘言命的無爽風聲梁湘東王蕭繹欽德經過於挂錫之所建臺一區立碑敘胤簡文為頌立碑在於山頂及穆將終欣於觀遠乃行至山峯而卒春秋七十矣釋智曠姓王本族太原中居徐部厥考後住荊州新豐縣母初將孕夢入流浴童子乘寶船來投便覺有娠及生長敏而重行梁太清初喪亂無像元帝當辟曠少勇壯招募壯士隨軍東行未幾淪陷深悟虛假遂不婚娶專求離俗初值巾褐誘以神仙先受符籙次陳章醮便問此術能致道乎答曰籙既護身章亦招貨曠曰斯乃保茲苦器便名道耶又請度世法乃示斷粒必到玉清七日便飛至期不應道士曰爾猶飲水致無有赴次更七日口絕水飲道士又曰爾夜尚眠致無感耳又更七日常坐不臥三期屢滿靡剋昇天而氣力休強遠近驚異後值高僧授戒為佛弟子德行動人漸示潛迹江陵張詮者二世眼盲曠曰爾家塜內棺枕古井移墳開甃必獲禳焉因即隨言瞽者見道請求剃落眾咸憚之便伐薪施僧空閑靜慮又言㵎有古鐘可掘出懸寺仁州刺史謂為詭惑鞭背百下無慘無破便送出臺拘在尚方有力者試以八尺械懸來捶膝傍觀謂言糜碎而曠容既無撓肉亦無痕獄吏云承居士能忍飢便絕食七日身色如故市衢見行驗獄猶有方委分身梁宣大定三年從人乞草屩今夜當急行及三更合城火發四門出人不泄燒殺七千曠在獄引囚二百安步而出年將不惑始蒙剃落進戒以後頭陀州北四望山去此地福德方安天子去城六十猛獸所屯初止以後馳弭床側每夕山隅四燈同照士俗雲赴奄成華寺後宣明二年平顯二陵皆在寺前驗於往矣至於梁元覆敗王琳上迫後梁國移並預表莂有一宰鴨而為齋者鴨神夜告便曰何有殺牲而充淨供自爾便斷曾度夏水徒侶數十欲住不可欲去無從前岸兩船無人將至曠笑而舉聲呼之船自截流直到遂因濟水誡以勿傳又於咸陽造佛迹寺有牛產犢出首還隱已過信次母將離弋僧告曠無惻答曰此犢是寺居士侵用僧物今來償債其羞不出牛母無他因執爐呵誡犢子疾當償報何恥生乎應言便出故神異冥徵不可備載以開皇二十年九月二十四日終於四望開聖寺春秋七十有五自剋終期天香滿室合寺音樂西南而去未亡二年預云終事示如脾痛問律師曰阿那含人亦有疾不未答間自云報身法然及遷神後手屈三指仁壽元年永濟寺僧法貴死而又穌見閻羅王放還正值曠乘宮殿自空直下罪人喜曰三果聖僧來救我等所造八寺咸有靈奇或涌飛泉時降佛跡隨慧日道場法論備見若人為之碑頌廣彰德行涪州相思寺無相禪師者非巴蜀人不知何來忽至山寺隨眾而已不異恒人其寺在涪州上流大江水北崖側有銘方五尺許字如掌大都不可識下有佛迹相去九尺長三尺許蹈石如泥道俗敬重相以一時渡水齊返還無船乃鉢安水中曰何為常擎汝汝可自渡水便取芭蕉葉搭水立上而渡鉢隨後來須臾達岸時採樵者見之相語覺知已便辭去徒眾苦留不住至水入船諸人禮請不與篙檝乃捉船舷直爾渡水不顧而去即令尋逐莫測所往釋童進姓李綿州人昔周出家不拘禮度唯樂飲酒謂人曰此可以灌等身也來去酣醉遺尿臭穢眾共非之有遠識者曰此賢愚難識會周武東征云須毒藥勅瀘州營造置監吏力科獠採藥蝮頭鐵猩𩰿根大蜂野葛鴆羽等數十種釀以鐵瓮藥成著皮衣琉璃障眼方得近之不爾氣衝成瘡致死藥著人畜肉穿便死童進聞之往彼監所官人弄曰能飲一盃豈非酒士進曰得一升解酲亦要官曰任飲多少何論一升便取鐵杓於藥瓮中取一杓飲之言謔自若都不為患道士等聞皆來看進又舉一杓以勸之皆遠走避或曰此乃故殺人何得無罪進曰無所苦藥進自飲有誰相勸乃噫曰今日得一醉臥方石上俄爾遺尿所著石皆碎良久睡覺精爽如常爾後飲酒更多食亦逾倍隋初得度配等行寺抱疾月餘而終年九十餘弟子檀越等終後檢校衣服床褥皆香絕無酒氣富上者莫測何人恒依益州淨德寺宿埋一大笠在路晝日坐下讀經人雖去來不喚令施有擲錢者亦不呪願每於靜路不入閙中狀如五十雖在多年過無所獲有信心者曰城西城北人稠施多在此何為答曰一錢兩錢足養身命復用多為陵州刺史趙仲舒者三代之酷吏也甚無信敬聞故往試騎馬直過佯墮貫錢富但讀經目未曾顧去遠舒令取錢富亦不顧舒乃返來曰爾見我錢墮地以不曰見問曰錢今何在曰見一人拾將去舒曰爾終日在路唯乞一錢豈有貫錢在地而不取者見人將去何不止之答曰非貧道物何為浪認仲舒曰我欲須爾身上袈裟富曰欲相試耳公能將去復有與者可謂得失一種即疊授與仲舒下馬禮謝曰弟子周朝人官歷三代大與眾僧往還少不貪者聞名故謁本非惡意請往陵州富曰大善然貧道廣欲結緣願公助國安撫即是長相見受供養也舒辭歎曰毛中有人不可輕慢爾後不見益州人薊相者從揚州還見之亦埋笠路側顏狀如常釋明恭住鄭州會善寺昔在俗是隋高下騎與伴三人膂力相似而時所忌帝深慮以事除之作兩裹餅啗一餅裹一具生鹿角一餅裹五升鹽俱賜食之並盡其噉鹽者出至朝堂腹裂而死恭噉鹿角全無所覺厭俗出家住會善寺其力若神不可當者曾與超化寺爭地彼多召無賴者百餘人來奪會善秋苗眾咸憂惱恭曰勿愁獨詣超化脫其大鐘塞孔以乾飯六升投中水和可噉一手承底一手取噉須臾並盡仍取大石可三十人轉者恭獨拈之如小土塊遠擲于地超化既見一時驚走又隋末賊起周行抄掠先告寺曰明當兵至可辦食具并大猪一頭寺無力制隨言為辦至時列坐鋪奠食具恭不忍斯負拄杖會所與賊言議賊先讓食恭乃鋪餅數十安猪裹之從頭咬拉須臾並盡賊眾驚伏恭召為護寺檀趣群賊然之故會善一寺隋唐交軍絕賊往來恭之力也又曾山行虎猪交鬪猪漸不如恭語虎曰可放令去虎不肯便一手捉頭一手撮尾拋之深谷斯氣力也說多難信而實有之恭戒潔貞嚴常依眾食所噉如恒人一食有值機候便噉二百人料眾但深訝莫知其所由武德五年終於本寺春秋八十五時會善有客遊沙彌口作吳語厨下然火乾竹大如臂兩指折而燒之恭時怪訝亦以指折而不得沙彌出後恭抱厨柱起以沙彌衣置磉上柱壓之沙彌來求衣不得見在柱下欲取不得恭笑為捧柱取衣此亦難可思者釋法進蜀中新繁人在俗精進不噉辛腥在田農作以鏵刃為鍾磬步影而齋有送食晚便飲水而已所犁田地不損蟲蟻一時空中聲曰進闍梨出家時到如是四五聲合家同聞進因詣洛口山出家行頭陀不居寺舍時隋蜀王秀聞名知難邀請遣參軍郁九閭長卿往便將左右十人辭王曰承有道德如請不來當申俗法王曰不須威逼但以理延明當達此長卿出郭門顧曰今日將爾輩往兜率天請彌勒佛亦望得何況山中道人有何不來初至吉陽山下日暮見虎道蹲命人射之馬皆退走欲投村恐違王命俄見一僧負襆上山長卿命住為伴餘從並留步至寺所召入至床又見虎在床下怖不自安進遣虎出具述王意雖有答對而怖形于相狀進曰檀越初出郭門一何雄勇今來至此一何怯憚長卿頂禮默然因宿至旦令先往益貧道後來行至望鄉臺顧視進行已及即與同見王入內受戒即日辭出所獲嚫施一無所受令往法聚寺停王顧諸佐曰見此僧令寡人毛竪戒神所護也後更召入城王遙見即禮進曰王自安樂進自安樂何為苦相惱亂作無益之事耶諸僧諫曰王為地主應善問訊何為訶責進曰大德畏死須求王意眼見惡事都不諫勉何名弘教進不畏死責過何嗛乎雖盛飾床筵厚味重結而但坐繩床麁餅而已乃至妃姬受戒但責放逸不念無常又辭入山重延三日限滿便返諸清信等咸設食而邀之至時諸家各稱進到總集計會乃分身數十處焉有時與僧出山赴食欻爾而笑人問其故曰山寺淨人穿壁盜蜜耳及還果如所說斯事非一旦述之耳初王門師慈藏者為州僧官立政嚴猛瓶衣香花少闕加捶僧眾苦之而為王所重無敢諫者以事白進請為救濟答曰其威力如此豈能受語耶苦請不已進造藏房門藏走出謂曰法門未可如是爾亦大力也還返入房蜀人以大甚為大力自此藏便息言僧由此安以開皇中卒山年九十六釋道幽代州耆闍寺僧善解經論仁壽中於寺講婆伽般若并論聽眾百餘人日午坐繩床如睡見一天人殊為偉異自云我是釋提桓因故來奉請在天講經初聞介介情不許之以畏死答云為造佛堂未成事有不可眠覺向侍者如法師述之如曰此事罕逢人生終死死時不知何道今得生天則勝人也開通法利天解勝人何得不往佛堂事中功德不足及言幽從之不久又如前夢依如天請天帝乃以少香注幽手中剋時來迎及覺見掌中有香氣熏一寺自後如前說法下講至廊下床上諸僧遙見香煙充滿床側驚怪來看幽執香爐正念蟬蛻而去于時寺外道俗望見雲氣從寺而出如一段雲騰空直上飄飄而沒襄州禪居寺岑闍梨者未詳何人住寺禪念為業有先見之明而寺居山藪資給素少粒食不繼岑每日將坩入郭乞酒而飲又乞滿坩可三斗許將還在道行飲達寺坩亦空竭明日復爾在寺解齋將篤坩就厨請粥三升仍挂杖頭入眾以杖打僧頭從上至下人別一擊日日如是人以其卓越異常或疑打已災散不辭受之岑將粥入房舊養黧犬一頭并一寺內鼠乃有數千每旦來集犬鼠同食庭中堛滿道俗共觀一時失一鼠岑悲惋無聊必是犬殺便告責犬犬便銜來岑見懊惱以杖捶犬將鼠埋已悲哀慟哭寺僧被鼠囓衣及箱以告於岑岑總召諸鼠各令相保一鼠無保岑曰汝何囓人衣杖捶之鼠不敢動今為寺貧便於講堂東北白馬泉下濼中遷記某處為厨庫某處為倉稟人並笑之經宿水縮地出如語便作遂令豐渥又遙記云却後十六年當有愚人於寺南立重閣者然寺基業不虧鬪訟不可住耳永徽中恰有人立重閣由此相訟如其語焉丹陽通闍梨者住天保寺唐貞觀末年已八十氣力休健儀容率素常服納衣衣厚一寸線如指大以用紩納極清潔誦法華經市中乞食所得不異流俗得錢財修補寺舍其寺大堂梁時所立朱砂污灑塗之極厚唐初善禪師鍍大銅像須水銀就梁刮取所用充足餘趾猶赤是知昔人為福竭於所貴不以為辭如不用者昔物何在其寺基郭補修所須云有古鎮國金可取治護乃於寺北四十步依言掘得十斤用盡得三十斤便曰地下大有更取殺人於是便止後輒自營土窟於寺北擬終事時未之驗也不久告僧云尋常命終須有付囑引諸財物指訂囑授極有分明經三日而神氣爽健而云將去忽不知所在便就窟視之門已塞開一小孔在土撮臥氣已終矣年九十餘京師西北有廢凝觀寺有夾紵立釋迦舉高丈六儀相超異屢放光明隋開皇三年寺僧法慶所造捻塑纔了未加漆布而慶忽終同日寶昌寺僧大智又終經三日穌說云初去飄飄若乘風雨可行百里乃見宮殿人物華綺非常又見一人似若王者左右儀仗甚有威雄頃間見慶來而面有憂色又見大像謂殿上人曰慶造我未了何為令死其人遽而下殿拜訖呼階下人曰慶合死未答云命未盡而食盡彼曰可給荷葉而終其福壽言已失像及慶所在時即問凝觀寺僧云慶公死來三日所造丈六一夕亦失達曙方見時共嗟怪言詳未訖人報云慶穌活眾咸往問與大智說同自爾旦旦解齋進荷葉六枚中食八枚凡欲食時先以煖水沃令耎濕方食之周流遠近率諸士女以成其像依像懺禮無爽晨昏以大業初卒春秋七十六近如雍州渭南人單道琮者云永徽五年因患風儀容改異差後味諸飲食咸臭唯噉土飲水時俗命為人蟺今周行告乞可年四十餘釋德山姓山氏莫測何人忽棄妻子入山修道鬚髮不暇削衣食不暇給唯息緣靜念為得性也人莫知其觀行視其相狀如得定者時遊化竹林龍池開悟道俗以清簡為本每云煩亂之法道俗同弊故政煩則國亂心煩則意亂水清則魚石可見神清則想倒可識學清簡者尚自諠煩況在亂使焉可道哉後入馬鞍山每多毒蛇噬人必死然山來往都不為害諸餘僮侍晨夕所行一無所懼曾蹋被嚙山以水洗之尋爾還復後還天勅山夏坐樹下人來山所逢虎迫逐便入繩床下虎蹲床前山曰床下佛子肉味可勝貧道耶即脫衣以施虎屈起而永去後其小子於山訪獲山曰爾來何為曰久不奉見生死不知故來定省山曰汝去各自覓活更來與杖去後數年又來山取杖欲捶之兒却住曰闍梨遇兒如他人他人可受打耶山大笑曰吾不打爾者必更來敗我道意遂長去山年九十餘終於山谷舍時益州草堂寺旭上者不知何許人少居草堂唯以禪誦為業餘無所營蜀土尤尚二月八日四月八日每至二時四方大集馳騁遊遨諸僧忙遽無一閑者而旭端坐竹林泊然寂想瓶水自溢爐香自然諸人城西看了相從參之旭儼然不動等同金石三日之後方復如常四眾敬而異之故覩如朝日之初出同共目之為旭上也年九十八釋道悅姓張荊州昭丘人十二於玉泉寺出家受戒安貧苦節尤能持念大品法華常誦為業隨有經戒日誦一卷人並異之初智者入於玉泉未有鐘磬於泉源所獲怪石一片懸而擊之聲響清徹悅於此寺每誦卷通扣磬一下聞者肅然且其誦聲如清流激韻聽者忘疲所以幽明往者屢有祥感一時患水腹脹如鼓更無餘求唯念般若一夜正誦經次腹忽如裂水出滂流及試手尋洪腫頓消病忽失所斯所謂轉障輕受者也昔朱粲賊擾唯悅守山盜來求減以惠給餘更重取煮而不熟慚而返之他日又來將加害命悅坐地不動曰害吾止此吾欲自見寺舍取盡遂放令引路行數步又坐曰吾沙門也非引路之人浮幻形骸任從白刃賊奇其高尚也送還本寺悅一生不衣蠶衣唯服麻布漢陽王至山覩悅風儀秀眉蘊服請受戒品又遺厚供一無所受王作大布三衣一襲以奉之因問何不著繒帛耶答曰蠶衣損命乖忍辱之名布服儉素表慈悲之相王曰仲由不恥夫子見稱沙門慈忍固其然也悅步影而食少差虛嗽食留一分以資飛走沈泳之屬故慈善所熏或飛來肩上或浮泊手中雖衣弊服而絕無蚤虱時又巡村乞虱養之誡勿令殺悅居山五十餘年春秋七十二矣終於巖所永徽中有人於青溪見一僧擎錫跣足自云般若師言已不見然生存常誦般若故人咸號焉釋慧耀姓岐襄陽人少沈密訥言敏行人共重之受具後歷遊訪道至鄭川命師所又往衡岳思師所咸伏膺請益觀用清明思公於眾曰公於實相觀善有玄趣居山數年值思長往欲絕迹武當以希素尚行至巴丘曰此地禪律罕聞可隨行化有江陵導因道懿法師聞志焉相携西上居導因寺積十四年不出戶庭惟味禪靜及智顗返鄉歎為故鄉不乏賢友足為模楷遺法也因是道俗稍來禮謁耀杜門密行不偶時俗以仁壽二年暮告人曰吾不願惱此眾僧欲往內華寺可以閑放眾固留不許至三年二月有疾見思命二師來迎至三月六日跏坐直身而卒年七十九遂葬於內華未終前寺中三十餘人咸夢寶剎傾倒及明異口同音而說之昔日導因今天皇寺是也見有栢殿五間兩廈梁右軍將軍張僧瑤自筆圖畫殿其工正北盧舍那相好威嚴光明時發殿前五級亦放光明祥徵休咎故不備述由此奇感聊附此焉釋道辯齊人住泰山靈巖寺居無常所遊行為任經史洞達偏解數術以大業年中來遊襄部年過七十又與同邑僧神辯相隨杖策登臨眺望山水多所表詣如曾聞見行至禪居寺南嶺望云此寺達者所營極盡山勢眾侶繁盛清肅有餘如何後銳於前起閣寺僧非唯寡少更增諠諍相接曾未經涉恰如其言於是盤遊諸寺備陳勝負莫不幽通前識鑒徹精靈又至諸墓亦陳休咎有士俗忘姓名去者請為圖其墳塋巡歷峴原示其一所曰此中安墓足食豐財入地三尺獲粟一升又深一丈獲石二片五彩交映斯曰財緣依言掘鑿果獲粟石遂行卜葬至今殷有襄州有袁山松者博覽經誥時號儒宗聞辯學廣故來尋造以楊子太玄王弼易道用相探瞋辯曰楊王道術未足研尋可賜愚徒無聞智者松勃然變色笑辯抑揚辯曰公學未周信其前述可除我固當為指歸便引太玄經云又於玄象偏所留心曾不寢臥夜便露視審宿度之所次察孛彗之光景便告人云吾昔於裕法師所學觀七曜告余云晉朝道安妙於此術人雖化往遺文在焉其所注素女之經最為要舉恨失其本如何得之時有一僧偶然獲本請為披決辯得欣然即為銷摘此僧茫味情猶夢海遂以惠之辯曰安目彌天誠非虛稱學統彌綸數術窮盡此雖四紙文綜無遺要約包富靈臺所盡于時月臨井宿便云事在西楚可告道俗宜營水備不盈兩夕漢江大漲汛溢襄邑城隍將沒預見之明其類若此所得財物並用市金將事合丹擬延其壽人告來盜不可行之便云盜假遁甲六丁吾明此術常以月朔加氣何得相欺吾不畏也以義寧年與神辯南遊嶺表不知所往釋慧琳姓薛綿州神泉人以隋初隱於建明寺清虛守靜與物不群寺有塑像常在供養像為生鬚三十六枚大業末年掃一古墳竪二竹竿云是天眼後忽拔一云弘農揚為魔所拔也不久義寧嗣曆有時著複衣夏坐墳上日雖炎赫身無熱狀口雖涉道形同於俗言談之次以理居先雒縣先有育王浮圖琳忽一時歷村借車三百乘云欲向雒縣迎浮圖於此安置未經旬日遂被火燒武德年中潛伏草野人莫知也彼有楊祜師不測何人直往草中相見曾生未面宛若舊朋各云別來八百年矣曾為人呪病得差病者令女齎裙以施女遂留衣送直琳遙見謂曰但將裙來我不須錢女驚其聖以貞觀四年示從物故釋洪滿姓梁安定人在俗年十五遇時患雙足攣躄常念觀音經三年忽有僧執澡罐在前立不言問曰師從何來答曰以檀越常喚所以來滿扣頭問曰弟子往何罪報今施此攣躄僧曰汝前身拘縛物命餘殃致爾汝但閉目吾為汝療之滿隨言冥目但覺兩膝上各如拔六七寸丁却既了開目將欲謝恩失僧所在起行如故滿乃悟是觀音因爾精誠誓不妻娶後忽自通禪觀安坐不動乃經三日七日者開皇初元變俗從道住救度寺大業融併入居法海貞觀十三年卒春秋八十三矣釋慧聰姓王出家已後遊行齋講手不釋卷尋經旨趣心自欣躍苦形節食行知足行自云法華經常不輕菩薩不專讀誦經典但行禮拜四眾尚得六根清淨我何為不禮諸佛世尊即於別院閉門常禮萬五千佛依經自唱一一禮之寺僧怪其所作於壁隙伺之見禮拜頭下天龍八部等亦頭下數數非一諸人來其院者無不心戰走出恒聞異香蔚蔚爾及死在貞觀年中院絕人往每夜常聞彈指禮拜行道等相釋法通姓關京兆鄠人小出家極尫弱隨風偃什似任羅綺由是同侶頗輕之通輒流淚一朝對觀音像慨慷曰通聞菩薩聖鑒所願剋從乞垂提誘免斯輕侮因斯誦觀音經晝夜不捨後歲餘歸本生覲母旦食訖假寐於庭樹下少間口中涎沫流液向有三升母以為物忤遽呼覺問何事如此通曰向見有人遺三驢馱䈥通噉始一驢孃呼遂覺餘二失之自爾覺身力雄勇肌膚堅䩕密舉大木石不以為重寺有僧戡者膂力之最通竊取袈裟安在柱下戡初不見謂是神鬼所為通笑為舉梁抽取戡大駭服有大石臼重五百餘斤通於南山負來供僧用今見在貯水施禽鳥隋高祖重之有西蕃貢一人云大壯在北門試相撲無得者帝頗恧之云大隋國無有健者召通來令相撲通曰何處出家人為此事必知氣力把手即知便喚彼來通任其把捉其人努力把捉通都不以為懷至通後捉總攬兩手急搦一時血出外灒彼即蟠臥在地乞命通放之曰我不敢殺捉恐爾手碎去於是大伏舉朝稱慶京邑弄力者聞而造之通為把豆麥便碎倒曳車牛却行當時壯士命為天力士也煬帝末避亂隱南山乃負一具磑并犢子大神通也未幾丁母憂出山歸葬事了返山雖力兼百夫未曾忤物精誠節約時輩推之以武德初卒春秋五十六釋慧因姓張清河武城人昔依賢法師後以雅志卓然眾所推伏欲屈知寺任遂巡於蜀川詢求禪律訪無夷險必往參請唐運大通自蜀而返于時州別一寺但三十僧因即其一持維志節終始無忘後為開聖本寺去荊五十餘里山藪曠逈阻絕風烟乃獨止此山草菴蘭若二十餘載四遠咸依昔智者遺言今宛符會貞觀十九年大旱而寺石泉獨無有竭乃自負水外給飛走由斯獲濟江陵令盧行餘承聞往之索水飲馬因負而給之行餘謂少頗出恚言便遣馬就寺俄值群猪來路人無敢犯後有二人寺北竊食辛肉虎來擁遶哮吼將噉其人得急逃竄無方因聞往救虎乃潛退斯戒德慈明為若此也法華一部毘尼戒本行往常誦未忘心口年七十五卒於本寺釋法施姓江武當人少而弘直神智難測形無定方出處不滯遊巴陵顯安寺娑羅樹下宴默而人亦莫之顧也依荊南記云晉永康元年僧房床下忽生一樹隨伐隨生如是非一樹生逾疾咸共異之置而不剪旬日之間植柯極棟遂移房避之自爾已後樹長便遲但極晚秀夏中方有花葉秋落與眾木不殊多歷年稔人莫識也後外國僧見攀而流涕曰此娑羅樹也佛處其下涅槃吾思本事所以泣耳而花開細白不足觀採元嘉十一年忽生一花形色如芙蓉樹今見在此亦一方之奇迹也隋末喪亂稱兵非一蕭銑時為羅縣令施拊背指巴陵城曰此天子城也後果王之米極平賤施誡深藏人不測其言於後米斗直萬五千飢餒者眾如此記授來事若指諸掌趙郡王伐偽梁銑問今事如何施遺雙銅筋銑曰令我同矣遂舉眾歸化百姓咸賴其德弘矣嘗於江陵北頭陀虎來床側人來語虎曰佛子閉目虎即低頭閉目斯遇猛獸如家犬者斯人在斯誦勝天王一部靜念出觀誦而美之而精進牢強越於常伍後潛形高邁釋慧岸者未詳何人面鼻似胡言同蜀漢往來市里默言無准人不之異武德三年科租至岷州程期甚促蜀人初不聞謂在天外人有僦購科索萬錢轉更驚急謂往鬼國被去者皆為死計散費資糧為不行之計岸於新繁市大笑曰但去必見歡喜捉負租拗折數枚眾人去至鹿頭道逢勅停此前言之驗也武德六年輒復悲泣不能自禁曰誰能見煩惱因沒水求死眾人爭入水接之乃端坐水底已卒卒後其年亢旱不收疫死眾矣釋法運姓鄧荊州長林人姿容挺秀有拔群之美至於算曆五行洞其幽致傳述楚二晦星以運為一也後值智曠禪師誨以出俗之資便削除俗玩剃髮入道修學禪要志樂閑寂別於開聖西北起一道場如常觀行不隔昏曉嘗誦七佛呪等救濟無不輒應隋末虎暴摩頂曰天下正亂百姓遑遑汝可遠藏莫為他厭及八營賊主楊道生承名迎接安置供給蕭銑次立又加奉敬所獲施物即入悲敬二田又於州內別置道場號為龍歸精舍銑乃請問興亡答曰貧道薄德不得久為善友時不測其言也不久趙郡王恭泝游兵至又加頂謁兵又東下圖像隨身又留一影令運慈屬允所謂道德之感動也嘗有信心士女晨夕供施妖邪鬼怪見必迴心社廟神祇悉參歸戒以武德中化往春秋六十葬於開聖寺智曠禪師塔側貞觀年中遼西柳城靺鞨名帝示階者年十八時逃入高麗拾得二寸許銅像不知何神明安皮袋中每有飲噉酒肉拔出祭之逢高麗捉獲具說我是北邊靺鞨不信謂是細作斫之三刀不傷皮肉疑是神人問有何道術答曰無也唯供養神明而已乃出示之曰此我國中佛也因說本末看像背上有三刀痕遂放之令往唐國彼大有佛事可諮問也其人得信在懷深厭俗網今在幽州出家大聰明有儀止巡講採聽隨聞便解有疑錄出以問者皆深隱遠思者難之釋智顯住遼州護明寺少出家戒操貞峻立操耿介勇銳居懷聞川聞見莫不高賞專務坐禪人不知其所詣隋末賊起川原交陣相推不已動經旬朔顯於兩陣以道和通往返彌時俱隨和散合郡同嘉敬而重之後與道俗十餘行值突厥并被驅掠顯遂隱身不見後訪得問云我念觀音不值賊有同學在箕山守靜獵者奪糧頓盡顯遠知之使人送米其通幽解網非可究也而任吹虛舟無所拘礙每有苦處輒往救拔是知大悲攝濟隨方利生雖行位殊倫而心焉靡異不測其終釋法聰姓陳住蘇州常樂寺初負帙周游法席參詣隨聞雖曉然未本意意在息言然言為理詮事須博覽不著為本無得虛延如灰除垢灰亦須淨後往金陵攝山栖霞寺觀顧泉石僧眾清嚴一見發心思從解髮時遇善友依言度脫遂誦大品不久便通又往會稽聽一音慧敏法師講得自於心蕩然無累貞觀十五年還杭蘇等州開導集眾受道者三百餘人自爾華嚴涅槃相續二十餘遍貞觀十九年嘉興縣高王神降其祝曰為我請聰法師受菩薩戒依言為授又降祝曰自今以往酒肉五辛一切悉斷後若祈福可請眾僧在廟設齋行道又二十一年海鹽縣鄱陽府君神因常祭會降祝曰為我請聰法師講涅槃經道俗奉迎幡花相接遂往就講餘數紙在又降祝曰蒙法師講說得稟法言神道業障多有苦惱自聽法來身鱗甲內細蟲噉苦已得輕昇願道俗為我稽請法師更講大品一遍乃不違之顯慶元年冬謂弟子曰吾不久捨報可施諸禽鳥而恒講不輟後講於高座上麈尾忽墮而終春秋七十一矣釋僧明者不知何人在五臺娑婆古寺所營屋宇二十餘間守一切經禪誦為業自云年十七時從師上五臺東禮花林山訪文殊師利至一石谷漸深見有石臼木杵又見兩人形大無影眉長披髮眼瞼上掩師便頂禮請救其人曰汝穀臭小遠從何來答昭果寺僧習禪樂道隱在娑婆已數十年然食五穀願真人救苦報曰待共眾議須臾更一人來長大著樹皮衣云汝來已久可遂我至寺行大石側忽見山谷異常廊院周遶狀若天宮有十四五人同坐談笑問所來方言議久之送出後重尋失路還舊業定以貞觀十六年卒八十一矣今娑婆寺二甎塔存釋明隱者少習禪學次第觀十一切入在中臺北木瓜谷寺三十年唯以定業餘無所懷又往佛光山寺七年又住大孚寺九年志道之徒相從不絕道俗供事填委山林永徽二年代州都督以昭果寺僧徒事須綱領追還寺任辭不獲免龍朔元年十月卒於此寺端坐熙怡如在久定其五臺山有故宕昌寺甘泉美岫往而忘返有僧服水得仙身如羅縠明見藏府骨髓武德年末行於山澤今村中父老目者十餘人說之五臺山者斯為神聖所憩中臺最高所望諸山並下上有大泉名曰太華傍有二塔後諸小石塔動有百千云是孝文從北恒安至此所立石上人馬大跡儼然如初從中臺東南三十里至大孚靈鷲寺南有花園前後遇聖多於此地有東西二道場中含一谷西北上八里許有王子燒身塔寺元是齊帝第三子性樂佛法思見文殊故來山尋如其所願燒身供養因而起塔所將內侍劉謙之於此寺中七日行道祈請文殊既遇聖者掩復丈夫曉悟華嚴經義乃造華嚴論六百卷今五臺諸寺收束猶有三百許卷近龍朔中主人令會昌寺僧會賾兩度將功德物往彼修補塔尊儀與五臺縣官同往備見聖迹異香鐘聲相續不絕釋法空者不知何人隋末任雁門郡府鷹擊郎將時年四十欻自生厭離見妻子家宅如牢獄桎梏志慕佛法情無已已總召家屬曰吾為爾沈日久矣旦夕區區止是供給可各自取計吾自決矣便裹糧負襆獨詣臺山飢則餐松皮柏末寒則入穴苫覆專思經中要偈亦無所參問時賊寇交起追擊攸歸府司郡官所在追掩將至禁所正念不語志逾慷慨跏坐不動不食不息已經五日守令以下莫不鷺愕因放之任其所往一坐三十餘載禽獸以為親隣妻子尋獲欲致糧粒空曰吾厭俗為道以解脫為先自今以往願為善知識非爾纏縛吾何解之更不須相見於是遂絕幽居日久每有清聲召曰空禪如是非一空知是自心境界以法遣之後遂安靜初學九次以禪用乃明終為對礙遂學大乘離相有從學者並以此誨之不知所終釋明濬姓孫齊人善章草常以金剛般若為業永徽元年二月十二日夜暴死心上暖周時方蘇說云初有二青衣童子將至王所問一生作何業濬答但誦金剛般若經王曰不可言師可更誦滿十萬遍明年必生淨土弟子不見師也還令二青衣送至寺濬自爾精苦倍百逾厲至二年三月卒寺眾咸聞異香云釋明解者姓姚住京師普光寺有神明薄知才學琴詩書畫京邑有聲然調情敞怳頗以知解自傲於諸長少無重敬心至於飲噉不異恒俗會龍朔之中徵諸三教有能觀國者策第賓王解因此際往赴東都策第及之行次將仕乃脫袈裟吾今脫此驢皮預在人矣遂置酒集諸士俗賦詩曰一乘本非有三空何所歸云云不久病卒與友僧夢曰解以不信故今生惡道甚患飢渴如何不以故情致一食耶及覺遂列食於野祭之又夢極慚愧云云又下夢於畫工先來同役者曰我以不信敬生處極惡思得功德無由可辦卿舊與相知何為不能書一兩卷經耶又遺其詩曰握手不能別撫膺聊自傷痛矣時陰短悲哉泉路長野風驚晚吹荒隧落寒霜留情何所贈惟斯內典章畫工不識書令誦十八遍已便去遂覺向諸僧俗說之嗟乎明解可惜一生妄存耶我自陷千載斯謂徒生徒死大聖豈虛言哉貞觀中洺州宋尚禮者薄學有神明好為譎詭詩賦罷縣還貧無食好乞貸至鄴戒德寺貸粟數與不還又從重貸不與之因發憤造慳伽斗賦可有十紙許加飾莊嚴慳態時俗常誦以為口實見僧輒弄亦為黃巾所笑及禮將死謗毀自當兩目圓赤見者咸畏吁嗟擾攘少時而絕釋法沖字孝敦姓李氏隴西成紀人父祖歷仕魏齊故又生於兗部沖幼而秀異傲岸時俗弱冠與僕射房玄齡善相謂曰丈夫年不登五品者則共不仕為逸人矣冲年二十四果為鷹揚郎將遭母憂讀涅槃經見居家迫迮之文遂發出家心聽涅槃三十餘遍又至安州暠法師下聽大品三論楞伽經即入武都山修業年三十行至冀州貞觀初年下勅有私度者處以極刑沖誓亡身便即剃落時嶧陽山多有逃僧避難資給告窮便造詣州宰曰如有死事沖身當之但施道糧終獲福祐守宰等嘉其烈亮昌網周濟乃分僧兩處各置米倉可十斛許一所徒眾四十餘人純學大乘并修禪業經年食米如本不減一所有五六十人纔經兩日食米便盡由不修禪兼作外學沖告曰不足怪也能行道者白毫之惠耳蓋利由道感還供道眾行殊道業理固屢空于時逃難轉多復弊霖雨無處投止山有大巖猛獸所居沖往詣巖穴告曰今窮客相投可見容不虎乃相携而去遂咸依之仍聽華嚴等經及難解重至安州有道士蔡子晃者閑習內外欵狎僧倫道俗盛集僧寺乃令晃開佛經沖曰汝形同外道邪述纏懷苟講佛經終歸名利我道俗無名要惟釋子身既在此畢不得行早可識機無悔於後晃聞默然逡巡而退爾時大眾歎曰護法菩薩斯其人哉沖以楞伽奧典沈淪日久所在追訪無憚夷險會可師後裔盛習此經即依師學屢擊大節便捨徒眾任沖轉教即相續講三十餘遍又遇可師親傳授者依南天竺一乘宗講之又得百遍其經本是宋代求那跋陀羅三藏翻慧觀法師筆受故其文理克諧行質相貫專唯念惠不在話言於後達磨禪師傳之南北忘言忘念無得正觀為宗後行中原惠可禪師創得綱紐魏境文學多不齒之領宗得意者時能啟悟今以人代轉遠紕繆後學可公別傳略以詳之今敘師承以為承嗣所學歷然有據達磨禪師後有惠可惠育二人育師受道心行口未曾說可禪師後粲禪師惠禪師盛禪師那老師端禪師長藏師真法師玉法師已上並口說玄理不出文記可師後善師出抄四卷豐禪師出疏五卷明禪師出疏五卷胡明師出疏五卷遠承可師後大聰師出疏五卷道蔭師抄四卷沖法師疏五卷岸法師疏五卷寵法師疏八卷大明師疏十卷不承可師自依攝論者遷禪師出疏四卷尚德律師出入楞伽疏十卷那老師後實禪師惠禪師曠法師弘智師名住京師西明身亡法絕明禪師後伽法師寶瑜師寶迎師道瑩師並次第傳燈于今揚化沖公自從經術專以楞伽命家前後敷弘將二百遍須便為引曾未涉文而通變適緣寄勢陶誘得意如一隨言便異師學者苦請出義乃告曰義者道理也言說已麁況舒在紙麁中之麁矣事不獲已作疏五卷題為私記今盛行之初沖周行東川不任官貫頻有度次高讓不受年將知命有勅度人兗州度抑令入度隸州部法集寺雖名預公貫而栖泉石撫接遺逸為心房公位居台輔作書召入沖得題背曰我於三界無所須卿至三槐位亦極公又重延不守恒度翻翔都邑即弘大法晟動英髦冠蓋雲蒸歎未曾有中書杜正倫親位法席詳評玄義弘福潤法師初未相識曰何處老大德答兗州老小僧耳又問何為遠至答曰聞此少一乘欲宣一乘教網漉信地魚龍故至潤曰斯實大心開士也因行至大興善寺萬年令鄭欽泰於寺打人沖止之曰公勿於寺打人泰曰打人罪我自當沖曰道不自當可遣他受然國家立寺本欲安寧社稷唯善行之公今於寺打人豈名為國祈福泰即禮謝又三藏玄奘不許講舊所翻經沖曰君依舊經出家若不許弘舊經者君可還俗更依新翻經出家方許君此意奘聞遂止斯亦命代弘經護法強禦之士不可及也然沖一生遊道為務曾無栖泊僕射于志寧曰此法師乃法界頭陀僧也不可名實拘之顯慶年言旋東夏至今麟德年七十九矣續高僧傳卷第三十五感通下正傳四十五附見二人隋京師大興善寺釋道密傳一隋京師經藏寺釋智隱傳二隋中天竺國沙門闍提斯那傳三隋京師勝光寺釋明誕傳四隋京師大興善寺釋明璨傳五隋京師大興善寺釋慧重傳六隋京師勝光寺釋寶積傳七隋京師仁法寺釋道端傳八隋京師勝光寺釋道粲傳九隋京師大興善寺釋明芬傳十隋京師大興善寺釋僧蓋傳十一隋京師日嚴寺釋曇瑎傳十二隋京師隨法寺釋道貴傳十三隋京師玄法寺釋僧順傳十四隋京師沙門寺釋法顯傳十五隋京師大興善寺釋僧世傳十六隋京師靜覺寺釋法周傳十七景暉隋京師延興寺釋慧誕傳十八隋京師大興善寺釋智光傳十九隋京師弘善寺釋智教傳二十隋京師沙門釋圓超傳二十一隋京師光明寺釋慧藏傳二十二法順隋京師大興善寺釋寶憲傳二十三隋京師勝光寺釋法朗傳二十四隋京師真寂寺釋曇遂傳二十五隋京師大興善寺釋曇觀傳二十六隋京師延興寺釋靈達傳二十七隋京師大興善寺釋僧昕傳二十八隋京師空觀寺釋玄鏡傳二十九隋京師弘濟寺釋智揆傳三十隋京師勝光寺釋僧範傳三十一隋京師淨影寺釋寶安傳三十二隋京師仁覺寺釋寶巖傳三十三隋京師無漏寺釋明馭傳三十四隋京師大興善寺釋道生傳三十五隋京師勝光寺釋法性傳三十六隋京師沙門釋辯寂傳三十七隋京師大興善寺釋靜凝傳三十八隋京師揚化寺釋法楷傳三十九隋京師轉輪寺釋智能傳四十隋京師真寂寺釋曇良傳四十一隋京師靜法寺釋智嶷傳四十二隋京師沙門釋道嵩傳四十三隋京師淨影寺釋道顏傳四十四隋京師淨影寺釋淨辯傳四十五釋道密姓周氏相州人初投耶舍三藏師習方藝又從鄴下博聽大乘神思既開理致通衍至於西梵文言繼迹前烈異術勝能聞諸齊世隋運興法翻譯為初勅召入京住大興善師資道成復弘梵語因循法本留意傳持會仁壽塔興銓衡德望尋下勅召送舍利于同州大興國寺寺即文帝所生之地其處本基般若尼寺也帝以後魏大統七年六月十三日生於此寺中于時赤光照室流溢外戶紫氣滿庭狀如樓闕色染人衣內外驚禁嬭母以時炎熱就而扇之寒甚幾絕困不能啼有神尼者名曰智仙河東蒲坂劉氏女也少出家有戒行和上失之恐其墮井見在佛屋儼然坐定時年七歲遂以禪觀為業及帝誕日無因而至語太祖曰兒天佛所祐勿憂也尼遂名帝為那羅延言如金剛不可壞也又曰此兒來處異倫俗家穢雜自為養之太祖乃割宅為寺內通小門以兒委尼不敢名問後皇妣來抱忽見化而為龍驚遑墮地尼曰何因妄觸我兒遂令晚得天下及年七歲告帝曰兒當大貴從東國來佛法當滅由兒興之而尼沈靜寡言時道成敗吉凶莫不符驗初在寺養帝年十三方始還家積三十餘歲略不出門及周滅二教尼隱皇家內著法衣戒行不改帝後果自山東入為天子重興佛法皆如尼言及登祚後每顧群臣追念阿闍梨以為口實又云我興由佛法而好食麻豆前身似從道人裏來由小時在寺至今樂聞鍾聲乃命史官王劭為尼作傳其龍潛所經四十五州皆悉同時為大興國寺因改般若為其一焉仁壽元年帝及后宮同感舍利並放光明砧磓試之宛然無損遂散於州部前後建塔百有餘所隨有塔下皆圖神尼多有靈相故其銘云維年月菩薩戒佛弟子大隋皇帝堅敬白十方三世一切三寶弟子蒙三寶福祐為蒼生君父思與民庶共建菩提今故分布舍利諸州供養欲使普修善業同登妙果仍為弟子法界幽顯三塗八難懺悔行道奉請十方常住三寶願起慈悲受弟子等請降赴道場證明弟子為諸眾生發露懺悔文多不載密以洽聞之譽送此寺中初下塔時一院之內光明充塞黃白相間兼赤班氣旋遶朗徹久而乃滅道俗內外咸同一見寺有四門門立一碑殿塔廊廡及以生地莊嚴綺麗晃發城邑仁壽之末又勅送于鄭州黃鵠山晉安寺掘基至水獲金像一軀高尺許儀制特異正下塔時野鳥群飛旋繞塔上事了便散又見金花三枚騰空久之下沒基內又放螢光後遂廣大遶塔三匝寺本高顯素無泉水洎便下汲一夕之間去塔五步飛泉自涌有同浪井廣如王劭所紀及大業伊始從治雒陽上林園中置翻經館因以傳譯遂卒於彼所出諸經如費氏錄釋智隱姓李氏貝州人即華嚴藏公之弟子也自少及長遵弘道義慧解所傳受無再請而神氣俊卓雅尚清虛時復談吐聽者忘倦開皇七年勅召大德與藏入京住大興善通練智論阿毘曇心及金剛般若論明其窟穴至十六年以解兼倫例須有紹隆下勅補充講論眾主於經藏寺還揚前部仁壽創福勅送舍利于益州之法聚寺寺即蜀王秀之所造也道適卭蜀開化彌昌傾其金貝尋即成就晚又奉送置塔莘州天雨異花人得半合又放紫光變為五色盲者來懺欻獲雙目捨杖而歸風躄等病其例皆爾及將下瘞天雨銀花放白色光前後非一正入塔時感五色雲下覆函上重圓如蓋大鳥六頭旋遶雲間閉訖俱散隱以事聞帝大悅付於著作卒於京室闍提斯那住中天竺摩竭提國學兼群藏藝術異能通練於世以本國忽然大地震裂所開之處極深無底於其坼側獲一石碑文云東方震旦國名大隋城名大興王名堅意建立三寶起舍利塔彼國君臣欣感嘉瑞相慶希有乃募道俗五十餘人尋斯靈相初發祖送並出王府路遠賊掠所遺蕩盡惟餘數人逃竄達此以仁壽二年至仁壽宮計初地裂獲碑之時即此土開皇十四年也行途九載方達東夏正逢天子感得舍利諸州起塔天祥下降地瑞上騰前後靈感將有數百闔國稱慶佛法再隆有司以事奏聞帝以事符大夏陳迹東華美其遠度疑是證聖引入大寶殿躬屈四指顧問群僚解朕意不僉皆莫委因問斯那又解意不答曰檀越意謂貧道為第四果人耶實非是也帝甚異之乃置于別館供給華重膳夫以酒酵和麵擬為調候時不起因以問那答曰此不合食便用水溲煮之與常酵者不異上問今造靈塔遍於諸州曹陝二州特多祥瑞誰所致耶答曰陝州現樹地藏菩薩曹州光花虛空藏也又問天花何似答曰似薄雲母或飛不委地雖委地而光明奇勝帝密以好雲母及所獻天花各一箱用示諸人無有別者恰以問那那識天花而退雲母及獻后云崩空發樂音并感異香具以問由答曰西方淨土名阿彌陀皇后往生故致諸天迎彼生也帝奇其識鑒賜綿絹二千餘段辭而不受因強之乃用散諸福地見感應傳釋明誕姓史衛州汲人律儀行務履顧前賢通十地地持赴機講解攝大乘論彌見弘演後入京住勝光寺溫柔敦厚性無迫暴有勅召送舍利于襄州上鳳林寺基趾梁代雕飾隋初顯敞高林跨谷連院松竹交映泉石相喧邑屋相望索然閑舉有遊覽者皆忘返焉文帝龍潛之日因往禮拜乞願弘護及踐寶位追惟往福歲常就寺廣設供養仍又改為大興國寺及誕之至彼安厝塔基寺之東院鑿地數尺獲琉璃瓶內有舍利八枚聚散呈祥形質不定或現全碎顯發神奇即與今送同處起塔又下穿掘得石銘云大同卅六年已後開仁壽之化依檢梁歷有號大同至今歲紀髣髴符會誕欣感嘉瑞乃表奏聞寺有金像一軀舉高丈六面部圓滿相儀充備峙于堂內眾鳥無敢踐足庭前樹碑庾信文蕭雲書世稱冠絕誕歷覽徽猷講授相接終于本寺釋明璨姓韋莒州沂水人十歲出家二十受具中途尋閱備通經史稟性調柔初不陳怒未及三夏頻揚成論及涅槃經值廢教隱倫避世林澤還資故業重研幽極周宣創開陟岵慧遠率侶登之璨時投足歸師諸部未久深悟遂演於世講徒百數心計明白開隱析疑善通問難精慮勃興未曾沈息加又福德所被聞見欣然勅召入京住大興善仁壽初歲召送舍利于蔣州之栖霞寺今之攝山寺也本基靈異前傳具詳而璨情存傳法所在追訪乃於江表獲經一百餘卷並是前錄所遺及諸闕本隨得福利處處傳寫末住大禪定寺弘法為務春秋良序頻往藍田登山臨水欣其得性唐初卒釋慧重姓郭雍州人志幹威稜不怯邪障鬼神林屋聞有栖止無往不降淨持戒地明解攝論履遊名教清逈不群住大興善博綜機要榮達敘顧辯章言令寫送有法仁壽置塔勅召送舍利于泰山之岱岳寺初至放光乃至入塔相續流照岳上白氣三道下流至于基所岳神廟門無故自開如是者三識者以為神靈歸敬故也四年建塔又送于隆州禪寂寺初至設齋忽有野鹿從南山下度嘉陵江直趣塔所人以手摩自然依附乃至下訖其鹿方去夜放大光在佛堂上焰高數丈青赤流集眾人同見三日打剎合州喜捨紫雲覆塔雨金銀花遍於城邑其收得者乃有五色相鏤又獲舍利五枚於天花上浮汎旋轉合散隨心州內修梵寺先為文帝造塔有一分舍利欲與今塔同日下基其夜兩塔雙放光明朗照幽顯至曉方滅同覩此瑞無數千人將下之晨又雨銀花變轉非一重還京室改革前度專修禪悔晝夜十有二時禮五十三佛餘則加坐正念畢世終業釋寶積姓朱冀州條人割略愛網訪道為任浮遊靡定不存住止齊亡法毀潛隱太山迴互魯兗乃經年稔開皇十四年隋高東巡候駕請謁一見便悅下勅入京住勝光寺講揚智論及攝大乘而體量虛廓不計仇隙曾有屏毀達其耳者解衣遺之曰卿見吾過真吾師友仁壽初年勅送舍利於華岳思覺寺寺即左僕射楊素之所立也初下之晨雲垂四布雪滿山邑天地奄暗逼目無見及期當午忽爾天清日朗現五色雲於塔基上去地五丈圓如輪蓋遙有見者望其蓋上朱光赫奕團團直上遠連天際暨于覆了雲合光收還如晨旦積後卒於京室釋道端潞州人出家受具聽覽律藏至於重輕開制銓定綱猷雅為宗匠晚入京都住仁法寺講散毘尼神用無歇時程俊舉後學欽之加復體尚方言梵文書語披葉洞識了其深趣勤心護法匡攝有功仁壽中年勅送舍利于本州梵境寺初入州界山多無水忽有神泉涌頂流者非一舊痾夙痼飲無不愈別有一泉病飲尋差若咽酒肉必重發動審量持戒永除休健端以事聞後還京寺常樂弘演終于本寺釋道璨恒州人慧學如神鑽求攝論華嚴十地深疑伏旨解其由緒志尚幽靜不務奢華重義輕財自小之大後入關輦便住勝光訪道求賢栖遑靡託仁壽起塔勅召送舍利于許州辯行寺初至塔寺堂中佛像素無靈異忽放大光通爥院宇舍利上踊金瓶之表又放光明遶瓶旋轉既屬炎熱將入塔時感雲承日覆訖方滅又於塔側造池供養因獲古井水深且清輕軟甜美舉州齊調一從此井而無竭濁莫不嗟嘆璨後不測其終釋明芬相州人齊三藏耶舍之神足也通解方俗妙識梵言傳度幽旨莫匪喉舌開皇之譯下勅追延令與梵僧對傳法本而意專撿失好住空閑味詠十地言輒引據問論清巧通滯罕倫仁壽下勅令置塔于慈州之石窟寺寺即齊文宣之所立也大窟像背文宣陵藏中諸雕刻駭動人鬼芬引舍利去州三十許里白雲欝起從寺至輿長引不絕耿耿橫空中有天仙飛騰往返竟日方滅明旦將曉還有白雲長引來迎雲中天仙如昨無異人眾同見傾目叵論識者以為石窟之與鼓山連接密爾竹林仙聖響應之乎既至山塔東面有泉眾生飲皆病愈芬後卒于興善所著眾經如費氏錄釋僧蓋恒州人曾遊太原專聽涅槃晚至洛下還綜前業蓋聞經陳念慧攝慮為先遂廢聽業專思定學陶思既久彌呈心過遂終斯習後入京師周訪禪侶住大興善垂帷斂足不務世談近局異乘略不霑口吐言清遠尠不高之仁壽二年勅送舍利于滄州四年又勅送于浙州之法相寺初營石函本惟青色及磨治了變為鮮錦布彩鋪發又見僧形但有半身及曉往觀僧變為佛光焰神儀都皆明著又現三字云人王子也佛前又現雄鷄之象冠尾圓具或現仙鳳天人諸相甚眾南鄉縣民多業屠獵因瑞發心受戒永斷後於他日有採柴者於法相寺南見有樸樹乃生奇異果僅有百顆其色紅赤如蓮欲開折取二枚來用供塔官庶道俗千有餘人同往折取味如蒲桃并果表奏帝驚訝其瑞蓋後住禪定寺唐初即世九十餘矣釋曇瑎江都人少學成實兼諸經論涅槃大品包蘊心目雖講道時缺而以慧解馳名每往法筵亟陳論決徵據文旨學者憚焉常讀經盈箱滿𭪠記注幽隱追問老耄皆揖其精府反啟其志瑎乃為斟酌通問盤梗自江左右歷覽多年傳譽不爽實鍾華望煬帝昔為晉王造寺京室諸方搜選延瑎入住內史令蕭琮合門昆季祖尋義學屈禮歸心奉以家僧携現大小常處第內晨夕歡娛講論正理惟其開悟仁壽之末勅送舍利于熙州環谷山山谷寺古傳云昔有齊人郭智辯數遊環山之陽世俗重之因以名焉此寺即蕭齊高帝之所立也林崖重映松竹交參前帶環川北背峻嶺江流縈繞寔為清勝瑎巡此地仍搆塔焉初正月內當擬基處屢放金光如一綖許十餘日中然後方息舍利恰到如即置基先不相謀若同合契皆大慶也又初到治天本亢陽人物燋渴夜降大雨高下皆足無不賴幸又放赤光流矚如火行道七夕又放大光被諸山也五千餘人咸蒙斯瑞及懺罪營福不可勝言晚承故業迄于隋運後住弘善以疾而終春秋八十有三武德初矣釋道貴并州人華嚴為業詞義性度寬雅為能而於經中深意每發精彩有譽當時加以閑居放志不涉煩擾市肆俳優未曾遊目名利貴賤故自絕言精潔守素清真士也晚在京師住隨法寺擁其道德閑守形心及建塔之初下勅流問令送舍利于德州會通寺至治之日放赤光明如大甕許久之方滅有一婦人躄疾多載聞舍利至輿來塔所苦心發願乞蒙杖步依言立愈疾走而歸將下塔時忽有大鳥十二形相希世不識名目次第行列旋遶空中正當塔上覆訖方逝貴後鎮業京輦不測其終釋僧順貝州人習學涅槃文疏精覈志勤策立堪勝艱苦常樂弘法於囹圄中無緣拘縶假訴良善文書既効方便雪他投身桎梏情志欣泰監獄者愍斯厄苦將欲解免方取經疏鋪舒詳讀旁為囚隷說法勸化事本無蹤還蒙放釋出獄之日猶恨太早有問其故答曰吾聞諸聖地獄化生雖不逮彼且事微轍開皇隆法杖步入關採訪經術住玄法寺及後造塔勅召送舍利于宋州初到宋城市中古井由來醎苦水色又赤無敢甞者及舍利至色忽變白味如甜蜜至造塔所初放赤光又放白光通照寺內七日辰時天雨白花如雪不落紛紛滿空及下塔時白鶴九頭飛翔塔上下函既了方乃北逝順後還京遊尋行業唐運初興巡栖山世年既遲暮欲事終心行至川驪山南足遇見古寺龕窟崩壞形像縱橫即住修理先有主護乃具表請武皇特聽遂得安復今之津梁寺是也僕射蕭瑀為大檀越福事所資咸從宋國僧眾濟濟有倫理焉順後卒於住寺春秋八十餘矣釋法顯雍州扶風人厥姓寗氏生平志尚禪寂為宗文字紙筆性不遊履沈默寡欲不為世累其師法開定門幽祕殆是不測元魏之末住京兆王寺與實禪師齊駕朝野兼以簡約清素華貴傾屬顯遇斯明匠承奉累年傳習師宗頗接微緒住日嚴寺仁壽末歲置塔隴州下勅令送顯發自帝京奉輿至彼藥王寺內然寺去州一十餘里褊狹邪仄殊非形望乃移近州北三王山下背崖臨水高勝博敞仍構大塔放大光明闔境同觀欣其罪滅顯因其所利即而利之廣說法要傾其心惱當斯一會榮嘆成諠晚還入京聚徒綜業每年歲首受具者多顯為開發戒緣鼓行壇懺引聚清眾即而惠之後終時也將八十矣釋僧世青州人負帙問道無擇夷險觀其遊履略周方岳而雄氣所指鋒刃難當時地論是長偏愛喉舌豐詞疊難名聞齊魯開皇入京住興善寺長遊講會必存論決仁壽下勅召送舍利于萊州之弘藏寺四年又勅送密州茂勝寺行達青州停道藏寺夜放赤光從房而出直指東南爾夜密州城內又見光明從西北來相如火炬叢焰非一遶城內外朗徹如日預有目者無不同覩後乃勘究方知先告既至治所兩夜放光如前遶城朗徹無異及世舉瓶欲示大眾忽然不見後至寺塔復放大光通照寺宇行道初日打剎教化舍利二粒見于瓶內及造石函忽變為金如棗如豆間錯函底餘處並變為青琉璃因具圖表帝大悅也後還京不久尋卒釋法周不知何許人狀相長偉言語高大涅槃攝論是所留神稠會勝集每預登踐身相孤拔多或顧問由是振名者復繫於德矣初住曲池之靜覺寺林竹叢萃蓮沼槃遊縱達一方用為自得京華時偶形相義舉如周者可有十人同氣相求數來歡聚偃仰茂林賦詠風月時即號之為曲池十智也仁壽建塔下勅送舍利于韓州修寂寺初造石函忽有一鴿飛入函內自然馴狎經久乃去寺有塼塔四枚形狀高偉各有四塔鎮以角隅青瓷作之上圖本事舍利到夜各放光明如焰上衝四方眾皆一時同見數數放光至于未入空中如絳長三丈許諸佛聖僧眾相非一皆列其中周後復往大禪定寺唐運初基為僧景暉於仁壽坊置勝業寺召周經始勅知寺任又改坊名還符寺號初暉同諸僧侶住在長安晚又變改常度形同俗服栖泊寺宇不捨戒業言語隱伏時符讖記高祖昔任岐州登有前識既承大寶追憶往言圖像立廟爰彰徽號自周積年處任不事奢華房宇趣充僧事僅足貞觀之始以疾而終八十餘矣釋慧誕雍州人學究涅槃及通攝論每登講席有名京室即曇延法師之學士也住延興寺仁壽下勅召起塔于杭州天竺寺住在靈隱山林石岑竦實來仙聖初搆塔基多逢伏石掘得一所是古石函傍推其際眇不可測因用今造置古函中大小和可宛如昔契誕還本寺講授尋常雖非卓犖亦例能色貞觀初年卒于本寺七十餘矣臨終清言安話神色無異顧諸法屬深累住持通告好住怗然神逝釋智光江州人尼論師之學士也少聽攝論大成其器言論清華聲勢明穆志度輕健鮮忤言諍謙牧推下為時所重開皇十年勅召尼公相從入京住大興善寺仁壽創塔召送循州途經許部行出城南人眾同送舍利於輿忽放光明高出丈餘傾眾榮慶北至番州寄停寺內其夜銅鍾洪洪自鳴連霄至旦驚駭人畜及至食時其聲乃止既達循州道場塔寺當下舍利天降甘露塔邊樹上色類凝蘇光白曜日光還京室以法自娛頻開攝論有名秦壤晚厭談說歸靜林泉尋還廬阜屏絕人事安禪自節卒于山舍釋智教雍州人習誦眾經意存禪觀晝則尋讀夜便坐默蕭散無為不存世累住弘善寺閑居綜業仁壽中年起塔秦州之永寧寺下勅令送既至塔所夜逢布薩異香如霧屯結入門合眾同怪欣所聞見又於塔上剎柱之前見大人跡長尺二寸蹈深二分十指螺文圓相周備推無蹤緒蓋神瑞也又降異雲屯聚塔上又雨天花狀如金寶又聞空中讚歎佛聲官民道俗相慶騰踊教還本寺綜業終年釋圓超觀州阜城人十地涅槃是其經略言行所表必詢猷焉晚住京寺策名臺省仁壽末歲下勅造塔於廉州化城寺初達州西四十餘里道俗導引競列長幡南風勁利樹林北靡惟有幡脚南北相分雖為風吹都不移亂及初行道設二佛盤忽有蜻蛉二枚各在盤上相當而住形極麁大長五寸許色麗青綠大如人指七日相續如前停住行道既散欻然飛去比後下塔還復飛來填埋都了絕而不見當下正中塔基上空五色慶雲狀如傘蓋方直齊正如人所為雲下見一白鵠翔飛旋轉事了俱散超還京室不測其終釋慧藏冀州人初學涅槃後專講解禁守貪競絕迹譏嫌安詳詞令不形顏色入京訪道住光明寺仁壽中年勅召置塔于歡州初至塔寺行道設齋當其塔上景雲出見彩含五色有若花蓋綺繡錦繢無以加焉從午至酉方始隱滅又延興寺僧法順者聽習涅槃善守根禁退讓自節負德無傲勅住江州廬山東林寺置舍利塔初至其地耕者見光尋而掘之獲金銅彌勒像一軀形質瓌異即而供養並不測其終釋寶憲鄭州人寶鎮律師之學士也童稚依止即奉科條審量觀能具承大法受具之日但奉文言至於行模並先具委有師資焉有弘業焉開皇之始與鎮同來住大興善威儀調順言無涉俗仁壽奉勅置塔洪州即豫章之故地初向彼州路由江阻既失正溜泥濘不通人力殆盡無前進理程期又逼道俗遑懼憲乃憑心舍利請垂通涉忽降白鳥船前緩飛乍來乍去如有引導即遣隨逐遂逢水脈通夕汎舟安達無障憲還京室尋事卒也釋法朗蒲州人學涉三藏偏鏡毘尼開割篇聚不阻名問加復器用平直無受輕陵決斷剛正未私強禦後住勝光披究律典經其房戶莫不懍然仁壽二年勅召送舍利於陝州大興國寺寺即皇考武元本生處也故置寺建塔仰謝昔緣初達州境大通善法演業三寺夜各放光不知何來而通照寺內朗徹無障善法寺中見三花樹形色分明四月二日靈勝寺中夜忽放光五色彩雲合成一蓋通變為紫比靈輿入城雲蓋方散又有五色彩雲從乾巽二處纏糺而來至於塔上相合而住及掘塔基下深五尺獲一異鳥狀如鸜鵒色甚青黃巡行基趾人捉無畏唯食黃花三日而死又青石為函忽生光影表裏洞徹現諸靈異東西兩面俱現雙樹樹下悉有水文生焉函內西面現二菩薩南邊金色北邊銀色相對而立又二菩薩坐花臺上各長一尺並放紅紫光明函內南面現神尼像合掌向西函脣西面又見臥佛右脇而偃首北面西函外東面雙樹間現前死鳥傾臥須臾起立鳥上有三金花其鳥西南而行至臥佛下住立不動凡此光相從已至未形狀儼然命人圖寫上紙素訖方漸歇滅及將下日忽然雲起如煙如霧團圓翳日又如車輪雲色條別又如車輻輪輻雲色皆如紅紫人皆仰視其相歎怪希遇藏瘞既了天還明淨失雲所在當斯時也寺院牆外咸見幡蓋圍遶謂言他處助來供養事了追問一無蹤緒朗慶斯神瑞登即奏聞晚還京師以疾而卒釋曇遂雍州人初學大論後味唯識研精攝論選其幽理每言三界虛妄但是一心追求外境未悟難息故得名稱高遠有通美焉然復慎守根門勤修戒檢住真寂寺掩關勵業仁壽中年下勅送舍利于晉州法吼寺初停公館放大光明照精舍門朗如金色又放黃白二光從道場出久久乃滅又從舍利輿所至於塔基而放瑞光三道虹飛色如朝霞耿然空望下塔之內又放光明隱顯時現大都為言七日之內瑞靈雜沓相仍不絕還京服業迄于唐運八十餘卒矣釋曇觀莒州人七歲出家慕欣法宇及進具後尋討義門偏宗成實祛析玄滯後以慧解亂神本也乃返駕澄源攝慮巖十六特勝彌所留心神呪廣被銷殄邪障高問周遠及于天闕開皇之始下勅徵召延入京室住大興善供事隆厚日問起居屢上紫庭坐以華褥帝親供侍欽德受法觀寬厚敦裕言無浮侈深得法忍苦樂虛心故使名利日增而素氣常在所獲信施並入僧中房宇索然衣鉢而已時俗流湎之夫雅尚之也仁壽中歲奉勅送舍利於本州定林寺初停公館即放大光掘基八尺獲銅浮圖一枚平頂圓基兩戶相對制同神造雕鏤駭人乃用盛舍利安瓶置內恰得相容州民禽巨海者患瘂六年聞舍利至自書請瑞見本一粒分為三分色如黃金乍沈乍舉又見三佛從空而降即能陳述詞句如流觀還京都不委終事釋靈達恒州人先在儒門備參經史唯見更相圖略時有懷仁抱義然復終淪諸有未免無常乃釋髮道流希崇正軌從遠公學義咸知大意因即依隨三業無捨及達之入京輦慕義相從晚住延興退隱自守端斂身心終月禪默衣食麁弊不希華美仁壽中勅召送舍利於本州龍藏寺初定基趾聞有異香漸漸芬烈隨風而至遍於寺內有民金玄瓚者住在寺側先患鼻塞二十餘年莫知香臭當于此日忽聞香氣驚尋至寺因爾齆差又雨天花從空而下光彩鮮淨晃若金銀先降塔所後及寺院道俗競接輕薄如鏤下舍利訖有雙白鶴旋於塔上良久翔逝達後連尋定業追訪山世不顧名實頭陀林塚雖逢神鬼都不怖憚大業之始終於墓叢初不委之村人怪不乞食就看已卒加趺如在因合床殮於杜城窟中釋僧昕潞州上黨人自騖道法津周聽大小逮諸禪律莫不登臨傾渴身心無席不赴而導戒愚智眾通諠靜昕一其正度恭慎橫經聆其披析曾不忽忘初眾見其低目寡言絕杜論道皆號為曚叟也後有智者問其文理咸陳深奧輕浮章句略不預懷有問其故答曰勿輕未學妙德常藏惟夫大覺方能靜照盛德明約可無細瑕愚師軌物時有通悟惟自兩明殷鑒方取會不得以法累人致乖祇奉暨周滅二教逃隱泰山大隋開法還歸聽習遊步洛下從學遠公十地涅槃咸究宗領後入關住興善寺體度高爽不屈非濫時復談講辯詞迅舉抑揚有度至於僧務營造情重勤切躬事率先擔摙運涉仁壽中歲置塔毛州護法寺下勅令送舍利初至公館有沙門曇義者高行名僧聞諸舍利皆放光明我等罪業一無所現即解衣為懺燒指為燈竟夕供養明旦出光通屬人物又出金瓶迴旋行道青赤白光三色流照經于信宿其光乃隱四月七日初夜放光赫赤欻然滿佛堂內須臾出戶流照四檐將入函時又放赤光烈盛逾日通夜又放照于函內四月十日天花如雪從空亂下五色相間人皆收得又感異香微風普遍熏塞寺內其函忽變為青琉璃內外通徹人以白綾周匝數重漫覆其函又加甎累灰泥其上尋照其泥還如函色又灰泥上畫作十花飾以金薄及成就後唯一金色餘花皆釆未下塔前有張世謙清信士也常持八戒遠離妻孥靜室誦經乃聞輿所梵讚之聲出戶看之見有群僧各執香花遶旋供養迫之遂失又見天人持諸幡蓋及以香花東南飛來當于塔上變成大雲旋空良久又見百餘沙門在塔基上執輦土以陪增者比及明晨寂無所見時經夏暑土地乾燥人皆思雨應念即降三四寸許川野除煩沙丘縣民路如意者迴心信佛望見光相路雖遠映舉目徹見寺僧五人在佛堂內又聞塔邊音樂讚歎聲極亮遠重雨天花滿四十里塔基倍多昕慶斯眾瑞即具表聞晚還資業不測其卒釋玄鏡趙州人立志清貞不干流俗四分一律文義精通不樂闡揚恒尋異部激發違順品章廢立有神彩焉住空觀寺閑散優遊無為僧也仁壽二年奉勅置塔本州無際寺建基趾日尋放赤光變轉不常或如形像乍似樓闕又出白光時吐大小巡繞瓶側四月四日又放光明紫綠相間三度乃止又於光內見佛像形長二尺餘坐蓮花座并有菩薩俠侍嚴儀從卯至酉方始歇滅當此之時有目皆覩鏡還空觀復學禪宗居止東院合集同侶多行頭陀遂終其寺也釋智揆冀州人愛慕涅槃淨持戒行不重榮渥知足無求住弘濟寺閉門習業僧眾服其智德敬而宗之每處勝筵推其名實而揆弗之顧也退屏自修若無聞見仁壽之歲弘塔四方有勅召揆送舍利於魏州開覺寺初屆治所遂放大光紫白相宣五色遽發有尼智曠冷疰積年因禮發願乃見赤光遍室便吐惡物其患即除有患重者聞斯嘉慶伏枕發願亦蒙光照平復如本方來塔所其例眾夥不復具書又楊大眼者先患兩目冥無所見牽來至輿乞願求恩即見舍利如本明淨斯例復眾四月八日下塔既訖西北雲來雨花塔上紛霏如雪色似黃金寺院皆遍道俗收取狀如金花感一黑狗莫知由來直入道場周旋行道每日午後與餅不食與水便飲至解齋時與粥方食寺內群犬非常噤惡一見此狗低頭畏敬不敢斜視塔所樹碑厚三尺半忽發光彩狀如琉璃映物對視分明悉見又見象六並現石碑內至五月末來於其碑中七變相狀或為佛像聖僧雙樹眾瑞非一並以事聞揆晚徙迹終南居閑禪寂登陟巖藪往而不返釋僧範冀州人學大小乘靜務心業追師禪念傾屈盡禮所獲定要倍於同侶住勝光寺以慧解見推及帝建塔下勅徵召送舍利於本州覺觀寺每至日沒常放光明黃赤交焰變化非一沙門僧辯患耳四年聞聲如壁一覩舍利兩耳洞開有逾恒日州民蘇法會左足攣跛十有餘年委杖自扶來禮乞願尋得除差放杖而歸範目覩靈驗神道若斯信知經教非徒虛誕但由誠節未著故致有差後歸本寺還遵前轍未詳其卒釋寶安兗州人安貧習學見者敬之初依慧遠聽涉涅槃博究宗領周滅齊亡南投陳國大隋一統還歸鄉壤行次瀍洛又從遠焉因仍故業彌見深隱開皇七年慕義入關住淨影寺當遠盛日法輪之下聽眾將千講會制約一付安掌于時遠方輻湊名望者多難用緝諧故在斯任安隨機喻接匡救有儀雖具徵治而無銜怨各懷敬歎登白稱焉講十地涅槃純熟時匠性存攝默不好揚演有問酬對辯寫泉流仁壽二年奉勅置塔於營州梵幢寺即黃龍城也舊有十七級浮圖擁在其內安置舍利當夜半上並放白光狀如雲霧初惟一丈漸大滿院明徹朗然良久乃滅前後三度相類並同舊有石龜形狀極大欲作函用引致極難匠石規模斵截成函三分去二安自思念石大函小何由卒成懼日愆期內懷憂灼比曉看之其石稱函自然分析不勞鐫琢宛爾成就函雖神造計應大重薄用拖曳輕迅若馳不勞至寺便依期限深慶情願晚還京寺不測其終釋寶巖幽州人標意十地次綜毘曇未究成實故於宗部涉獵繁焉戶牖玄文踈條本幹時傳富博而性殊省事不樂談說苦祈敷散精理載揚住京下仁覺寺守道自娛無事交厚仁壽下勅召送舍利于本州弘業寺即元魏孝文之所造也舊號光林依峯帶㵎面勢高敞多挾徵異事遵清肅故使行僻之徒必致驚悚由斯此眾濫迹希過自開皇將末舍利到前山恒傾搖未曾休止及安塔竟山動自息又仁壽初歲天降剃刀三十三枚用甚銛利而形制殊別今僧常用以剃剪也又初造石函明如水鏡文同馬瑙光似琉璃內外照徹紫焰光起函外生文如菩薩像及以眾仙禽狩師子林樹雜相非一四月三日夜放大光明照天地有目皆見巖事了還不測其卒釋明馭瀛州人初學涅槃後習攝論推尋理源究括疑滯晚遊鄴下諮訪未聞隱義重玄皆所披覽開皇八年來儀帝里更就遷師詢求攝論意量弘廣容姿都雅人有勃怒初不改容眾服其忍力也住無漏寺講誦為業仁壽中年勅請送舍利于濟州崇梵寺寺基帶危峯多饒異樹山泉盤屈脩竹蒙天寔佳地也剋日將下寺有育王瑞像乃放三道神光遍于體上金石榴色朗晃奪精經一食頃乃遂漸歇又聞磬聲搖曳長遠寺東巖上唱善哉聲清暢徹心追尋莫委又舍利函上光高三尺狀如花樹本送舍利分為二粒出琉璃瓶相隨而轉並放光明有黃白雲從西南來聲如雨相流音樂聲正當塔上凝住不動復見二花從雲中出或時上下大鳥群飛迴旋塔上又於雲中現仙人頭其數無量於此之時莘州城人見諸仙人從空東來向于魏州馭當斯運欣慶嘉瑞說不可盡民百捨物積之如山並用構塔沙門五人生逢奇瑞捨戒為奴供養三寶因勒銘紀廣如別傳獻后昇遐造禪定寺召而處之遂終世矣釋道生蒲州人延統是其師也名父之子係迹厥師雖雅尚未齊而思力方遠仁正致懷聲色無染受持戒護耽詠文言四分一律薄霑聲教講誨時揚器法難擬住興善寺卓卓標異目不斜眄威儀安帖眾敬憚之仁壽二年勅召送舍利于楚州初停公館感一野鹿直入城門防人牽來詣舍利所自然屈拜馴善安隱生曰爾為舍利可上升階必若他緣隨意而去鹿聞此語遂即升階出入帳前往還無難乃為說歸戒鹿乃頓頭香案如有聽受因以繒帛繫之即舐人手夜臥輿邊或往生房經停兩宿自然退出還歸荒野及當下日白鶴兩雙飛旋塔上覆訖方逝生覩斯瑞與諸僚屬具表以聞并銘斯事在于塔所既還京室不測所終釋法性兗州人少習禪學精厲行道少欲頭陀孤遊海曲時復入俗形骸所資終潛林阜沈隱為任開皇十四年文帝東巡搜訪巖穴因召入京住勝光寺仁壽之年勅召送舍利於本州普樂寺初營外函得一青石錯磨始了將欲鎣飾變成馬瑙五色相雜文彩分明函內斑剝雜生白玉凝潤光淨函之內外光如水鏡洞照無障當入函時正當基上白鳥一雙翱翔緩飛遶塔而轉塔西奈樹枝葉並變為真金色及文帝既崩置大禪定延住供養遂卒于寺八十餘矣釋辯寂徐州人少以慧學播名汎浪人世遊講為業末在齊都專攻大論及阿毘曇心未越周年粗得通解會武平末歲國破道亡南適江陰復師三論神氣所屬鏡其新理開皇更始復返舊鄉桑梓仍存友朋殂落西入京室復尋昔論龍樹之風復由光遠仁壽置塔勅召送于本州流溝寺及初達也舍利塔所忽見異光照寺北嶺及以南山朗同朝日又於石佛山內採石為函磨飾纔了彩文間發彪炳光現山海禽狩仙人等像備出其中雖復圖取十不呈一晚綜前業演散京華福利所兼俱充寺府不測其終釋靜凝汴州人遷禪師之門人也早年聽受深閑邪正經律十地是所詢求後師攝論備嘗幽顯常樂止觀掩關思擇緣來便講唱吼如雷事竟退靜狀如愚叟世間之務略不在言人不委者謂為庸劣同住久處方知有道兼以行不涉疑口無慶弔塊然卓坐似不能言開皇六年隨遷入雍住興善寺仁壽二年下勅送舍利于杞州初至頻放白光狀如皎月流轉通照及下塔日白鳥空中旋繞基上瘞訖遠逝更有餘相凝為藏隱示出一二知大聖之通瑞也餘則隱之不書及至京師又被責及方便解免不久而終釋法揩曹州人十五出家依相京賢統而為弟子師習涅槃通解文義及受具後專攻四分雲暉兩匠振紐齊都備經寒暑伏面諮稟皆賜其深奧無所子遺及齊法俱亡南避淮表壽山之陽隨開律教開皇首歲大闢法門還返曹州欲終山水將趣海岸而道俗邀留不許東騖揩性虛靜更於城北三里左丘山營造一寺名曰法元高顯平博下臨城邑遙望發心皆來受法未為安而能遷古人所尚久在塵厭不無流轉便入關壤觀化京都住揚化寺復揚戒律仁壽置塔奉勅送舍利於曹州揩以初基有由欲報斯地表請樹塔還置法元上帝不違任從所請初達曹部置輿州內廣現神瑞備如別紀但學未經遠難得遍知故略編之想未繁撓日別異見具如後述於三月十四日中時見佛半身面白如玉舍利輿前佛頂之上黃赤光起二十九日夜降甘露味甜逾蜜現於赤光遍於城上須臾流照達于塔所四月五日舍利上踊白色鮮明其日申時帳上北面忽見光影中有白雲氣中生樹狀如青桐下有青色師子面西而蹲六日卯時復有光影見雲氣內有三蓮花兩廂雙樹下有佛像樓閣樹林沓重而出上有立菩薩像辰時又見金色光明出沒漸大已時復見重閣閣上有樹葉如貝多旁立聖僧午時復現雙樹之形下列七佛申時雙樹又見一佛二菩薩像三花承足又見天人擎花在空黃師子等亥時帳後見千佛形舍利室內出黃白光四月七日又見雙樹黃雀一頭及以光雲師子等像辰時又見金翅鳥身飛龍樹林寶蓋等像傍現二菩薩及黃師子已時又見寶幢樹林下有菩薩黃衣居士白色師子蹲踞石上又有雲氣樹林樓閣菩薩午時又見白色雲氣寶幢樹林青色師子申時又現雙樹繁茂須臾變為宮殿樓閣佛坐花臺其色黃白亥時雲起西北雨潤三寸雲上六天一時見身四月八日將欲下塔平旦之時天雨白花飛颺不下卯時又見諸天寶蓋樹側菩薩及黃師子辰時又見大蓋兩重眾寶莊嚴下坐菩薩及白師子踞在石上帳上又見光影雲氣氣中金光乍大乍小下有蓮花時開時合又雨天花大者在空面闊尺餘小者墮地狀如桃花已時帳後見三諸天三師子及蓮花水池午時將下又見雙樹并立菩薩舍利忽分以為五粒流轉光曜四月九日填平已後帳後板上光影之內疊石文生又見大樹青衣沙門執爐而立又感奇香郁烈人鼻楷具列聞帝大悅令圖繢之以流海內自仁壽創塔前後百餘感徵最優勿高於楷後以常業終於本寺釋智能李氏懷州河內人布意遠塵束懷律教收聽令譽風被河右開皇之始觀道渭陰隨奉資行住轉輪寺仁壽置塔奉勅召送於青州勝福寺中處約懸峯山參天際風樹交結逈瞰千里古名巖勢之道場也元魏末時創開此額初置基日疏山鑿地入土三尺獲古石函長可八尺深六尺許表裏平滑殆非人運所謂至感冥通有祈斯應矣及下舍利大放光明挺溢山宇道俗俱見乃至出沒流轉變狀匹論能晚還寺更崇定業林泉栖託不預僧倫逃名永逝莫測其終釋曇良姓栗潞州人十六出家專尋經典及長成德以大論傳名兼講小經接敘時俗亟發歸信為眾賢之賞入京遊聽住真寂寺文帝下勅召送舍利于亳州開寂寺將欲起塔先造石函地非山鄉周訪難得良曰待覓得石期至匹成但發勝心何緣不濟乃要心祈請願賜哀給忽於州境獲石三枚底廂及蓋各是異縣運來合之宛是一物眾嘉異之具聞臺省良性樂異迹周覽觀之亳州西部穀陽城中有老君宅今為祠廟庭前有栢三十餘株碑文薜道衡製廟東百餘步老君母宅亦有廟舍次西十里有苦城即傳所云李聃苦縣人斯處是也還歸本寺專誠懺禮食息已外常在佛前唐初卒也八十餘矣釋道嵩姓劉瀛州河間人十三出家遊聽洛下訪訊明哲終日拪遑衣服麁單全不涉意值慧遠法師講諸經論陶染積時遂寢幽極隨入京室為慕義學士同侶推崇道心人也仁壽置塔勅召送於蘇州舍利將至井吼出聲二日乃止造基掘地得古甎函內有銀合獲舍利一粒置水瓶內旋遶呈祥同藏大塔嵩還京室住總化寺餐味涅槃依行懺悔身戒心慧悉戴奉之一鉢三衣盈長不畜遵經聖行息世譏嫌遂卒於世釋智嶷姓康本康居王胤也國難東歸魏封于襄陽因累居之十餘世矣七歲初學尋文究竟無師自悟敬重佛宗雖晝權俗緣令依學侶而夜私誦法華竟文純熟二親初不知也十三拜辭即蒙剃落更諮大部情因彌著二十有四方受具足携帙洛濱依承慧遠傳業十地及以涅槃皆可敷導後入關中住靜法寺仁壽置塔勅召送于瓜州崇教寺初達定基黃龍出現於州側大池牙角身尾合境通矚具表上聞嶷住寺多年常思定慧非大要事不出戶庭故往參候罕覩其面末以年事高邁勵業彌崇寺任眾務並悉推謝唐初卒也七十餘矣釋道顏姓李氏定州人初學遠公涅槃十地領牒樞紐最所殷贍仍頻講授門學聯塵道啟東川開悟不少後入京輦還住淨影寺當遠盛世居宗紹業仁壽中年置塔赤縣下勅徵召送舍利于桂州初入州境有鳥數千齊飛行列來迎輿上從野入城良久方散及下安處感五色雲靉靆垂布屯聚基上餘便廓清日曜天地後返京邑常尊上業唐運惟新宇內尚梗崇樹齋講相循淨影因疾而卒春秋七十餘即武德五年矣臨終清漱手執香爐若有所見奄然而逝自顏之處世也衣服麁素不妄朋從行必以時情避嫌郄言必詳審深惟物忤又兼濟禽畜慈育在心微經惱頓便即垂泣不忽童稚不行楚叱縱有輕陵事同風拂顧諸屬曰不久去也何煩累人故於無常得其旨矣釋淨辯姓韋齊州人少涉儒門備聞丘索孔墨莊老是所詢謀忽厭浮假屏迹出家經律具嘗薄通幽極復纏名教避世山林受習禪門息緣靜慮開皇隆法入住京師依止遠公住淨影寺更學定境又從遷尚受攝大乘積歲研求遂終此業曾與故友因事相乖彼加言謗辯終不雪及委由問答曰吾思其初結交也情欣若弦豈以後離復陳其失時以此高之後勅召送舍利於衡州岳寺本號大明即陳宣帝為思禪師之所立也行達江陵風浪重阻三日停浦波猶未靜又迫嚴程憂遑無計乃一心念佛衝波直去即蒙風止安流沿下既入湘水泝流極難又依前念舉帆利涉不盈半月便達衡州及至岳寺附水不堪巡行山亭平正可搆正當寺南而有伏石辯乃執爐發願必堪起塔願降祥感便見岳頂白雲從上而下廣可一匹長四十里至所迀基三轉旋迴久久自歇又感異香形如削沈收獲數斤氣煙倍世道俗稱慶因即搆成初此山僧顗禪師者通鑒僧也曾有一粒舍利欲建大塔在寺十年都無異相及今送至乃揚瑞迹黃白大小聚散不定當下之日衡山縣治顯明寺塔放大光明遍照城邑道俗同見古老傳云此寺立來三百餘年但有善事必放光明經今三度將非帝王弘福思與眾同感見之來誠有由矣辯欣斯瑞迹合集前後見聞之事為感應傳一部十卷後興禪定復請住之大業末年終於此世論曰夫吟嘯之鼓風雲律調之通寒暑物理相會有若自天況乃神道玄謀義乖恒應而可思也故聖人之為利也權巧眾途示威雄以攝生為敦初信現光明而授物情在悟宗規模之道既弘汲引之功無墜至於混小大之非有均彼我之恒儀齊色心於性空絕形有之流轉幽通而揚化本極變以達神源斯道窮微非厝言也然則教敷下土匪此難弘先以威權動之後以言聲導之轉發信然所以開萌漸也像末澆競法就崩離神力靜流通感殆絕二石之世澄上揚名兩蕭接統誌公標德備諸紀錄未敢詳之頃世蒙俗情多浮濫時陳靈相或加褒飾考覈本據顛墜淫邪妖異之諺林蒸是非之論蜂起至如觀音之拔濟信而有徵大聖之通夢華實相半斯則託事親蒙難免語意無涉餘求想象實假冥緣故得有淪虛指因斯以言良有以也圓通之遊聖寺昭達之涉仙宮信其言焉難窮事矣前傳之敘蓬萊無乖鄙例曩者顯宗通感創開玄化之基法本內傳具列靈通之應或騰虛而現奇或飛光而吐瑞有晉嘉相雜沓臻焉曇翼之感育王陶偘之逢妙德自後繁華難具陳矣隋高建塔之歲踊瑞紛綸神光囑於群物至澤通於疾癘天花與甘露同降靈芝共瑞鹿俱程空遊仙聖結霧來儀水族龜魚行鱗出聽百有餘塔皆備潛通君臣相慶緇素欣幸其德榮明不可加也然而當年即世或墜流言俗習常談五福欣其壽考通神達命三畏君子所弘及煬帝鎔鑄高陽開模之始其像頂含翠髻身曜紫金靈光通普顯五色之希奇瑞花滿庭開六彩之殊相上下同泰無德稱焉下詔圖之遠頒郡國義當嚮斯厚澤荷福無疆遺厥宗社如山之固尋復兵飢荐集宇內分崩亡曆喪寶卒于身世統詳終古五運非不推遷近以情求殃慶迷其倚伏又如聖母上天功高遂舉輪王樹塔禍及凶終何以明其然乎信由業命之淳薄故感報果之休咎耳豈以恒人之耳目而遠籌於三世之道哉若夫卜商賈誼之為言班彪季康之著論但知混而謂之命莫辯命之所以為然何異見羅紈於篋笥而未識成之由機杼也覩百穀於倉廩而未知得之由稼穡也儒之所云命也釋之所云業也命繫於業業繫於心心發其既參差業成故亦無准是以達命業之開士知報熟而無辭迷因果之恒人謂徒言而不應故馬遷嗟報施之爽積疑而莫之通范滂惑善惡之宜含情而無以釋斯皆覩流而不尋源見一而不知二覽釋門之弘教豈復淪斯網哉夫造業千端感報萬緒或始善而終惡故先榮而後枯或吉凶之雜起故禍福而同萃惟色一也等面異而殊形惟心一也齊百化而無定故無學或盡於此生往業終於即世有縛感由於既往受報未止於今時身子悟理之通人常懷疾惱目連威雄之達士終纏碎身至聖納謗於祇園王子被讒於清眾儒宗絕粒於陳壤堯湯遭變於中原雖玄素之相或乖而業命之緣無爽是知文煬大寶往福終於此世崇建塔像今業起於將來交運相投無識因之致惑隋遭兩鏡通命豈其然乎復有深宮法濟寄神祝而銷災慧日法安憑研石而流水轉明之越巨浸通達之沐炎湯瓊公拜而邪象崩道英終而大地轉斯德眾矣其徒繁矣既云神化固不可以由來擬之輒敘篇中識僧倫之難偶耳遺身篇第七正傳十二附見二南齊蜀部會州寺沙門釋法凝傳一周益部沙門釋僧崖傳二周雍州逸沙門釋普圓傳三隋終南山沙門釋普濟傳四又普濟隋京師郊南逸僧釋普安傳五隋九江廬山沙門釋大志傳六唐偽鄭沙門釋知命傳七唐京師弘福寺釋玄覽傳八唐京師弘善寺釋法曠傳九唐終南豹林谷沙門釋會通傳十唐梓州沙門紹闍梨傳十一唐雍州新豐福緣寺釋道休傳十二釋法凝會州人也俗姓龐氏初齊武帝夢遊齊山不知在何州縣散頒天下覓之時會州父老奏稱去州城北七里臣人山是舊號齊山武帝遣於上立精舍度僧給田業凝以童子在先得度專心持戒道德日新月六年三齋供不斷但以坐禪為念出禪則誦經恒常入禪百姓爭往看而不敢入唯於窓中遙見動經一月出猶不食大德名僧多往勸之雖復進食漸漸微少後年至七十於佛像前置座而坐初燒一指晝夜不動火然及臂諸人與弟子欲往撲滅及有叫喚者復有禁止不聽者臂然火焰彌熾遂及身七日七夜時俗男女有號哭自搥者又有頂禮讚歎者至身盡唯一聚灰眾共埋之於上起塔今唯有一精舍在餘皆摧滅釋僧崖姓牟氏祖居涪陵晉義熙九年朱齡石伐蜀涪陵獽三百家隨軍平討因止于廣漢金淵山谷崖即其後也而童幼少言不雜俳戲每遊山泉必先禮而後飲或諦視不瞬坐以終日人問其故答曰是身可惡我思之耳後必燒之及年長從戎毅然剛正嘗隨伴捕魚得己分者用投諸水謂伴曰殺非好業我今舉體皆現生瘡誓斷獵矣遂燒其獵具時獽首領數百人共築池塞資以養魚崖率家僮往彼觀望忽有異蛇長尺許頭尾皆赤須臾長大乃至丈餘圍五六尺獽眾奔散蛇便趣水舉尾入雲赤光遍野久之乃滅尋爾眾聚具論前事崖曰此無憂也但斷殺業蛇不害人又勸停池堰眾未之許俄而隄防決壞時依悉禪師施力供侍雖充驅使而言語訥澁舉動若癡然一對一言時合大理經留數載無所異焉至玄冬之月禪師患足冷命之取火乃將大鑪炎炭直頓於前禪師責之曰癡人何煩汝許多火乃正色答曰須火却寒得火嫌熱孰是癡人情性若斯何由得道禪師謂曰汝不畏熱試將手置火中崖即應聲將指置火中振吒作聲卒煙涌出都不改容禪師陰異之未即行敬又以他日諸弟子曰崖耐火共推之火爐被燒之處皆並成瘡而忻笑自如竟無痛色諸弟子等具諮禪師禪師喚來謂曰汝於此學佛法更莫漫作舉動或亂百姓答曰若不苦身焉得成道如得出家一日便足禪師遂度出家自為剃髮但覺鬢鬚易除猶如自落禪師置刀於地攝衣作禮曰崖法師來為我作師我請為弟子崖謙謝而已既法衣著體四輩尊崇歸命輸誠無所悋惜或有疾病之處往到無不得除三十年間大弘救濟年踰七十心力尚強以周武成元年六月於益州城西路首以布裹左右五指燒之有問燒指可不痛耶崖曰痛由心起心既無痛指何所痛時人同號以為僧崖菩薩或有問曰似有風疾何不治之答曰身皆空耳知何所治又曰根大有對何謂為空答曰四大五根復何住耶眾服其言孝愛寺兌法師者有大見解承崖發迹乃率弟子數十人往彼禮敬解衣施之顧大眾曰真解波若非徒口說由是道俗通集倍加崇信如是經日左手指盡火次掌骨髓沸上涌將滅火焰乃以右手殘指挾竹挑之有問其故崖曰緣諸眾生不能行忍今勸不忍者忍不燒者燒耳兼又說法勸勵令行慈斷肉雖煙焰俱熾以日繼夕並燒二手眉目不動又為四眾說法誦經或及諸切詞要義則頷頭微笑時或心怠私有言者崖顧曰我在山中初不識字今聞經語句句與心相應何不至心靜聽若乖此者則空燒此手何異樵頭耶於是大眾懍然莫不專到其後復告眾曰末劫輕慢心轉薄淡見像如木頭聞經如風過馬耳今為寫大乘經教故燒手滅身欲令信重佛法也闔境士女聞者皆來遶數萬匝崖夷然澄靜容色不動頻集城西大道談論法化初有細雨殆將霑漬便斂心入定即雲散月明而燒臂掌骨五枚如殘燭燼忽然各生並長三寸白如珂雪僧尼僉曰若菩薩滅後願奉舍利起塔供養崖乃以口嚙新生五骨㧋而折之吐施大眾曰可為塔也至七月十四日忽有大聲狀如地動天裂人畜驚駭於上空中或見犬羊龍蛇軍器等象少時還息人以事問崖曰此無苦也驚睡三昧耳吾欲捨身可辦供具時孝愛寺導禪師戒行清苦耆年大德捨六度錫杖并及紫被贈崖入火揵為僧淵遠送班納意願隨身于時人物諠擾施財山積初不知二德所送物也至明日平旦忽告侍者法陀曰汝往取導師錫杖紫被及納袈裟來為吾著之便往造焚身所于時道俗十餘萬眾擁輿而哭崖曰但守菩提心義無哭也便登高座為眾說法時舉目視於薪𧂐欣然獨笑乃傾右脇而寢都無氣息狀若木偶起問曰時將欲至仍下足白僧曰佛法難值宜共護持先所積柴疊以為樓高數丈許上作乾麻小室以油潤之崖緩步至樓遶旋三匝禮拜四門便登其上馮欄下望令念般若有施主王撰懼曰我若放火便燒聖人將獲重罪崖陰知之告撰上樓臂摩頂曰汝莫憂造樓得罪乃大福也促令下火皆畏之置炬著地崖以臂挾炬先燒西北次及西南麻燥油濃赫然熾合於盛火中放火設禮比第二拜身面焦炘重復一禮身踣炭上及薪盡火滅骨肉皆化惟心尚存赤而且濕肝腸脾胃猶自相連更以四十車柴燒之腸胃雖卷而心猶如本兌法師乃命收取葬于塔下今在寶園寺中初未燒前有問者曰菩薩滅度願示瑞相崖曰我身可盡心不壞也眾謂心神無形不由燒蕩及後心存方知先見留以一心之不朽也然崖自生及終頻現異相有數十條曾於一家將欲受戒無何笑曰將捨寶物生疑慮耶眾相推問有楊氏婦欲施銀釵恐夫責及因決捨之有孝愛寺僧佛與者偏嗜飲噉流俗落度隨崖輿後私發願曰今值聖人誓斷酒肉及返至寺見黃色人曰汝能斷肉大好汝若食一眾生肉即食一切眾生肉若又食者即食一切父母眷屬肉矣必欲食者當如死屍中蟲蟲即肉也又曰有六時念善大好若不能具一時亦好如是一念其心亦好皆能滅惡也見其言詞真正音句和雅將欲致問不久而滅於是佛與翹心精進繞塔念誦又聞空中聲曰汝勤持齋願令眾生得不食身又令餓鬼身常飽滿觀其感被皆崖力也初登柴樓沙門僧育在大建昌寺門見有火光高四五丈廣三四丈從地而起上衝樓邊久久乃滅又初焚日州寺大德沙門寶海問曰等是一火何故菩薩受燒都無痛相崖曰眾生有相故痛耳又曰常云代眾生受苦為實得不答曰既作心代受何以不得又曰菩薩自燒眾生罪熟各自受苦何由可代答曰猶如燒手一念善根即能滅惡豈非代耶時普法師又問曰二家共諍大義終莫之決一云佛智緣無相理理是緣境智是能緣一云除倒息妄即是真諦何者為定崖曰佛即無相無別異相海法師曰佛即無相無相之相本無異相若如此者菩薩即釋迦觀音崖曰我是凡夫誓入地獄代苦眾生願令成佛耳海曰前佛亦有此願何故早已成佛答曰前佛度一時眾生盡也又問藥王等聖何故成佛今菩薩獨未成佛而救眾生是則前佛殊墮答曰前段眾生已得藥王意今眾生未得我意由我始化如將落之花也故其應對一時皆此之類乃謂侍者智炎曰我滅度後好供養病人並難可測其本多是諸佛聖人乘權應化自非大心平等何能恭敬此是實行也坐中疑崖非聖人者乃的呼其人名曰諸佛應世形無定方或作醜陋諸疾乃至畜生下類檀越慎之勿妄輕也及將動火也皆覩異相或見圓蓋覆崖有三道人處其蓋上或見五色光如人形像在四門者或見柴樓之上如日出形並兩諸花大者如兩斛兜許小者鍾乳片五色交亂紛紛而下接取非一棖觸皆消又聞大鼓磤磤深遠久久方息及崖滅後郫縣人於郫江邊見空中有油絡輿崖在其上身服班納黃偏袒紫被捉錫杖後有五六百僧皆罩竹傘乘空西沒又潼州靈果寺僧慧策者承崖滅度乃為設大齋在故市中於食前忽見黑雲從東南來翳日廕會仍兩龍毛五色分明長者尺五短猶六寸又雨諸花幡香煙滿空繽紛大眾通見又初收心舍利至常住寺中皆見花叢含盛光榮庭宇又阿迦膩吒寺僧慧勝者抱病在床不見焚身心懷悵恨夢崖將一沙彌來帊裹三㪶許香并檀屑分為四聚以遶於勝下火焚香勝怖曰凡夫耳未能燒身也崖曰無怖用熏病耳煨燼既盡即覺爽健又請現瑞答曰我在益州詭名崖耳真名光明遍照寶藏菩薩勝從覺後力倍於常有時在於外村為崖設會勝自唱導曰潼州福重道俗見瑞我等障厚都無所見因即應聲二百許人悉見天花如雪紛紛滿天映日而下至中食竟花形漸大如七寸盤皆作金色明淨耀日四眾競接都不可得或緣樹登高望欲取之皆飛上去又成都民王僧貴者自崖焚後舉家斷肉後因事故將欲解素私自評論時屬二更忽聞門外喚檀越聲比至開門見一道人語曰慎勿食肉言情酸切行啼而去從後走趁似近而遠忽失所在又焚後八月中獽人牟難當者於就嶠山頂行獵搦箭聲弩舉眼望鹿忽見崖騎一青麖獵者驚曰汝在益州已燒身死今那在此崖曰誰道許誑人耳汝能燒身不射獵得罪也汝當勤力作田矣便爾別去又至冬間崖兄子於溪中忽聞山谷喧動若數萬眾舉望見崖從以兩僧執錫杖而行因追及之欲捉袈裟崖曰汝何勞捉我乃指前雞猪曰此等音聲皆有詮述如汝等語他人不解餘國言音汝亦不解人畜有殊皆有佛性但為惡業故受此形汝但力田莫養禽畜言極周委故其往往現形豫知人意率皆此也具如沙門忘名集及費氏三寶錄并益部集異記釋普圓不知何許人聲議所述似居河海周武之初來遊三輔容貌姿美其相偉大言顧弘緩有丈夫之神采焉多歷名山大川常以頭陀為志樂行慈救利益為先人有投者輒便引度示語行要令遵苦節誦華嚴一部潛其聲相人無知者弟子侍讀後因知之然而常坐繩床斂容在定用心彌到不覺經過晨夕有時乞食暫往村聚多依林墓取靜思惟夜有強鬼形極可畏四眼六牙手持曲棒身毛垂下徑至其前圓怒目觀之都無怖懾不久便退其例非一又有惡人從圓乞頭將斬與之又不肯取又復乞眼即欲剜施便從索手遂以繩繫腕著樹齊肘斬而與之心悶委地村人明乃聞知因斯卒于郊南樊川也諸村哀其苦行爭欲收葬眾議不決乃分其屍為數段各修塔焉釋普濟雍州北山互人初出家依止圓禪師儀軌行法獨處林野不宿人世跏坐修禪至于沒齒栖遲荒險不避豺虎雖遊浪物表而手不釋卷甞讀華嚴依而結業自佛法淪廢便投太白諸山行不裹糧依時噉草咀嚼咽飲都不為患願像教一興捨身供養修普賢行生賢首國開皇之始大闡法門思願既滿即事捐捨引眾集於炭谷之西崖廣發弘誓自投而殞遠方填赴充於巖谷為建白塔于高峯焉近貞觀初有山居沙門普濟者立操標勇貞專自固恒遊名山習誦經典大品法花偏所通利其所造集多誦兩經仍隨文句時重解釋聲氣所及周于一里故使數萬眾中無不聞者以武德十八年西入關壤時經邑落還居林靜貞觀度僧時以濟無貫擢預公籍住京師光明寺眾聚山結樂聞經旨濟弊斯諠擾遂遺名逃隱不測所之有說今在終南幽巖獨坐傍饒山果須者負還重更追尋便失來徑余曾同聚目悅斯人衣則百結相連鉢則纔充受用汲灌瓦瓶麻繩繫頸坐則籍草脇無著地驍悍果敢睡蓋莫欺節約儉退利賊潛迹言論所指知足為先談授正義如行為最所以一坐說法施積如山曾無顧涉任委監護乃重惟曰城邑所屬五欲為根余力既微無宜自陷遂逃遁矣釋普安姓郭氏京兆涇陽人小年依圓禪師出家苦節頭陀捐削世務而性在和忍不憙怨酷或代執勞役受諸勤苦情甘如薺恐其事盡晚投藹法師通明三藏常業華嚴讀誦禪思准為標擬周氏滅法栖隱于終南山之楩梓谷西坡深林自庇廓居世表潔操泉石連蹤由甫又引靜淵法師同止林野披釋幽奧資承玄理加以遵修苦行亡身為物或露形草莽施諸蚊虻流血被身初無懷憚或委臥亂屍用施豺虎望存生捨以祈本志而虎豹雖來皆嗅而不食常懷介介不副情願孤踐狩蹤冀逢食噉于時天地既閉像教斯蒙國令嚴重不許逃難京邑名德三十餘僧避地終南投骸未委安乃總召詳集洲渚其心幽密安處自居顯露身行乞索不懼嚴誅故得衣食俱豐修業無廢亂世知士安其在歟時有重募捉獲一僧賞物十段有人應募來欲執安即慰喻曰觀卿貧煎當欲相給為設食已俱共入京帝語此人曰我國法急不許道人民間爾復助急不許道人山中若爾遣他何處得活宜放入山不須檢校又周臣柳白澤者奉勅傍山搜括逃僧有黨告云此楩梓谷內有普安道人因遣追取即與俱至澤語黨曰我不得見宜即放還於是釋然復歸所止前後遭難曾無私隱皆見解勉例如此也時藹法師避難在義谷杜映世家掘窰藏之安被放還因過禮覲藹曰安公明解佛法頗未寬多而神志絕倫不避強禦蓋難及也安曰今蒙脫難乃惟花嚴力耳凡所祈誠莫不斯賴因請藹還山親自經理四遠承風投造非一藹乃與安更開其所住具如別傳隋文創曆佛教大興廣募遺僧依舊安置時楩梓一谷三十餘僧應詔出家並住官寺惟安欣茲重復不為名馳依本山居守素林時行村聚惠益生靈終𥨊煙霞不接浮俗末有人於子午虎林兩谷合㵎之側鑿龕結庵延而住之初止龕日上有大石正當其上恐落掘出逐峻崩下安自念曰願移餘處莫碎龕窟石遂依言迸避餘所大眾共怪安曰華嚴力也未足異之又龕東石壁㵎左有索頭陀者川鄉巨害縱橫非一陰嫉安德恒思誅殄與伴三人持弓挾刃攘臂挽弓將欲放箭箭不離弦手張不息怒眼舌噤立住經宿聲相通振遠近雲會鄉人稽首歸誠請救安曰素了不知豈非華嚴力也若欲除免但令懺悔如語教之方蒙解脫又龕西魏村張暉者夙興惡念以盜為業夜往安所私取佛油瓮受五斗背負而出既至院門迷昏失性若有所縛不能動轉眷屬鄉村同來為謝安曰余不知蓋華嚴力乎語令懺悔扶取油瓮如語得脫又龕南張卿者來盜安錢袖中持去既達家內寫而不出口噤無言卿尋歸懺復道而返有程郭村程暉和者頗懷信向恒來安所聽受法要因患身死已經兩宿纏屍於地伺欲棺殮安時先往鄠縣返還在道行達西南之德行寺東去暉村五里遙喚程暉和何為不見迎耶連喚不已田人告曰和久死矣無由迎也安曰斯乃浪語吾不信也尋至其村厲聲大喚和遂動身旁親乃割所纏繩令斷安入其庭又大喚之和即屈起匍匐就安令屏除棺器覆一筈筌以當佛坐令和遶旋尋服如故更壽二十許歲後遇重病來投乞救安曰放爾遊蕩非吾知也便遂命終時安風聲搖逸道俗榮荷其例眾也皆來請謁興建福會多有通感略述一兩昆明池北白村老母者病臥床枕失音百日指撝男女思見安形會其母意請來至宅病母既見不覺下迎言問起居奄同常日遂失病所在于時聲名更振村聚齊集各率音樂巡家告令欲設大齋大萬村中田遺生者家途壁立而有四女妻著弊布齊膝而已四女赤露逈無條綫大女名華嚴年已二十惟有麁布二尺擬充布施安引村眾次至其門愍斯貧苦遂度不入大女思念由我貧煎不及福會今又不修當來倍此周遍求物閴爾無從仰面悲號遂見屋甍一把亂床用塞明孔挽取抖擻得穀十餘挼以成米并將前布擬用隨喜身既無衣待至夜暗匍匐而行趣齋供所以前施物遙擲眾中十餘粒米別奉炊飯因發願曰女人窮業久自種得竭貧行施用希來報輒以十餘黃米投飯甑中必若至誠貧業盡者當願所炊之飯變成黃色如無所感命也奈何作此誓已掩淚而返於是甑中五石米飯並成黃色大眾驚嗟未知所以周尋緣構乃云田遺生女之願也齋會齊率獲粟十斛尋用濟之安辦法衣仍度華嚴送入京寺爾後聲名重振弘悟難述安居處雖隱每行慈救年常二社血祀者多周行救贖勸修法義不殺生邑其數不少嘗於龕側村中縛猪三頭將加烹宰安聞往贖社人恐不得殺增長索錢十千安曰貧道見有三千已加本價十倍可以相與眾各不同更相忿競忽有小兒羊皮裹腹來至社會助安贖猪既見諍競因從乞酒行飲行舞焜煌旋轉合社老少眼並失明須臾自隱不知所在安即引刀自割髀肉曰此彼肉耳猪食糞穢爾尚噉之況人食米理是貴也社人聞見一時同放猪既得脫繞安三匝以鼻䖶觸若有愛敬故使郊之南西五十里內雞猪絕嗣乃至于今其感發慈善皆此類也性多誠信樂讀華嚴一鉢三衣累紀彌勵開皇八年頻勅入京為皇儲門師長公主營建靜法復延住寺名雖帝宇常寢巖阿以大業五年十一月五日終于靜法禪院春秋八十遺骸於終南起塔在至相寺之側矣釋大志姓顧氏會稽山陰人發蒙出家師事天台智者顗禪師顗覩其形神灑落高放物表因名為大志禪誦為業苦節自專四方名所無遠必造而言氣清穆儀相貞嚴故見者眄睞知非凡器開皇十年來遊廬岳住峯頂寺不隷公名不豫僧伍誦法華經索然閑雅絕能清囀使諸聽者忘疲後於花山甘露峯南建靜觀道場頭陀為業孑爾一身不避虓虎聞有惡狩輒往投之皆避而不噉山粒本絕終日忘餐或以餅果繼命而已外覩不堪其惱而志安之容色如故經于七載禪業無斷晚住此山福林寺會大業屏除流徙隱逸慨法陵遲一至於此乃變服毀形頭擐孝服麁布為衣在佛堂中高聲慟哭三日三夕初不斷絕寺僧慰喻志曰余歎惡業乃如此耶要盡此形骸伸明正教耳遂往東都上表曰願陛下興顯三寶當然一臂於嵩岳用報國恩帝許之勅設大齋七眾通集志不食三日登大棚上燒鐵赫然用烙其臂並令焦黑以刀截斷肉裂骨現又烙其骨令焦黑已布裹蠟灌下火然之光耀巖岫于時大眾見其行苦皆痛心貫髓不安其足而志雖加燒烙詞色不變言笑如初時誦法句或歎佛德為眾說法聲聲不絕臂燒既盡如先下棚七日入定加坐而卒時年四十有三初志出家至終結操松竹冬夏一服無禦縑纊布艾麁素自此為常形極鮮白脣如丹畫裙垂半脛足躡蒲屩言氣爽朗調逸風雲人或不識怪所從來者便捋眉告曰余九江廬山福林寺小道人大志耳又善屬文藻編詞明切撰願誓文七十餘紙意在共諸眾生為善知識也僧為強禦難奉信者有見此誓無不掩淚今廬山峯頂每至暮年諸寺見僧宿集一夜讀其遺誓用曉道俗合眾皆酸結矣釋智命俗姓鄭名頲滎陽人族望清勝文華曜世詞鋒所指罕有當之初仕隋為羽騎尉班位斯薄逃官流俗備歷講會餐寢法奧就耕于寧州大業初年僕射楊素因事往彼乃通名謁見與語終日素曰觀卿風韻殊非鄙俗所懷乃廊廟偉器耳且權抑忍辱尋當徵召及元德作貳搜訪賢能素遂拔之對晤宣傳應變不一有令試以三百對語一遍授之覆無遺漏致大重敬遷為中舍人官至五品及元德云薨不仕於世遊聽三論法華研味積年逾深信篤皇泰之初越王即位歷官至御史大夫偽鄭開明連任不改深謀廣略有國惟寄于斯時也今上任總天策御兵西苑李密鴟張蟻結咆休洛汭世充獨固一都內外煎迫上下同懼頲弊斯紛梗情慕出家頻請鄭主為國修道既不遂志惟思剪剃不累形科夜則潛讀方等諸經晝則緝理公政斯須不替經四十日誦得法華暢滿胸襟決心出俗又勸婦氏歸宗釋教言既切至即依從之更互剃髮頲語妻曰吾願滿矣不死而生當啟鄭主不宜爾也便法服擎錫徑至宮門云鄭頲輒已出家故來奉謁世充不勝憤怒下勅斬之頲聞喜曰吾願又滿矣欣笑泰然行至洛濱時惟旭旦未合行決頲曰若為善知識者願早見過度不爾尋應被放不滿本懷于時道俗圍遶勸引至暮而頲厲色昌言不許因即斬之尋有勅放既所不救舉朝怨恨即偽鄭開明之初年也初頲從吉藏法師聽講有僧告曰觀卿頭顱額頷有富貴相但以眄睞後顧恐不得其終頲曰豈非傷死耶必如所相乃是本願嘗見諸死者疾甚危弱心不自安紛擾不定便就後世生死終一期也定不能免何如發正願緣勝境心力堅明不有馳散刀落命終神爽自在豈不善乎故頲之臨刑遍禮十方口詠般若索筆題詩曰幻生還幻滅大幻莫過身安心自有處求人無有人與諸知故別已合眼少時曰可下刀矣尋聲斬之面貌熙怡有逾恒日妻為比丘尼見住洛州寺也釋玄覽姓李隨州房子人昆季五人最處其末伯父任蒲州萬泉令久而無子養之若親年十三心慕出家深見俗過遂逃迸山谷北達汾州超禪師所見其言情博遠即依而出家令既失之遣人羅捕雖復藏竄不免捉獲口云身屬伯耳心屬諸佛終無俗志願深照也伯乃愍而放之貞觀年初入京蒙度配名弘福常樂禪誦禮悔為業每語法屬曰雖同恒業而誓欲捨身至貞觀十八年四月初脫諸衣服總作一幞付本寺僧惟著一覆單衣密去至京東渭陰洪陂坊側且臨渭水稱念禮訖投身瀅中眾人接出覽告眾曰吾誓捨身命久矣意欲仰學大士難捨能捨諸經正行幸勿固遮兩妨其業眾悟意故乃從之即又入水合掌稱十方佛廣發弘願已投于旋渦中三日後其屍方出村人接之起塔本寺怪其不歸顧問無處便開衣幞乃見遺文云敬白十方三世諸佛弟子玄覽自出家來一十二夏雖沾僧數大業未成今欲修行檀波羅蜜如薩埵投身尸毘割股魚王肉山經文具載請從前聖教附後塵衣物眾具任依佛教臨終之人多不周委同學等見其遺文往尋究云釋法曠姓駱雍州咸陽人少有異節偏愛儒素後聽弘善寺榮師大論榮即周世道安之弟子也創染玄業便悟非常資學之勤不出門院年十六講解前論道穆京華酬答冷然無替玄理專修念定無涉時方無量壽經世稱難誦曠聞試尋一日兩卷文言闇了故其誦持罕有加者自爾藏經披讀以為恒任文理所指問無不知顧諸布薩人多說欲乃自勵心力立誦千遍數旬之間便得滿願性樂儉約不尚華靡故其房中無有氈席滿院種莎用擬隨坐頭陀行也勗誡門人惟存離著以末代根機隨塵生染故也年登知命便袒三衣瓶鉢以外一無受畜卓然正色懍潔風霜人有與語惟言離著至時分衛一食而已每曰余惟生死滯著無始輪迴生厭者希死厭又少常懷怏怏欲試捨之以貞觀七年二月二十一日入終南山在炭谷內四十里許脫衣掛樹以刀自刎既獨自殯無由知處諸識故等至八月中方始訪得其遺身頌云又近有汾州大乘寺僧忘名者常厭生死濁世難度誓必捨身先節食服香至期道俗通集香花幡蓋列衛而往西山子夏學巖面西斂容眾唱善哉咸送隨喜乃放身懸壑至地起坐及眾就視方知已逝博訪遺身其類甚眾且隨疏出示為一例餘者蓋闕釋會通雍州萬年御宿川人少欣道檢遊泊林泉苦節戒行是其顧習投終南豹林谷潛隱綜業讀法花經至藥王品便欣厭捨私集柴木誓必行之以貞觀末年靜夜林中積薪為窟誦至藥王便令下火風驚焰發煙火俱盛卓爾加坐聲誦如故尋爾西南有大白光流入火聚身方偃仆至曉身火俱滅乃收其遺骨為起白塔勒銘存焉貞觀之初荊州有比丘尼姊妹同誦法花深厭形器俱欲捨身節約衣食欽崇苦行服諸香油漸斷粒食後頓絕穀惟噉香蜜精力所被神志鮮爽周告道俗剋日燒身以貞觀三年二月八日於荊州大街置二高座乃以蠟布纏身至頂惟出面目眾聚如山歌讚雲會誦至燒處其姊先以火柱妹頂請妹又以火柱姊頂清夜兩炬一時同耀焰下至眼聲相轉明漸下鼻口方乃歇滅恰至明晨合坐洞舉一時火花骸骨摧朽二舌俱存合眾欣嗟為起高塔近并州城西有一書生年二十四五誦法華經誓燒供養乃集數束蒿乾籠之人問其故密而不述後於中夜放火自燒及人往救火盛已死乃就加柴薪盡其形蔭近有山僧善導者周遊寰寓求訪道津行至西河遇道綽部惟行念佛彌陀淨業既入京師廣行此化寫彌陀經數萬卷士女奉者其數無量時在光明寺說法有人告導曰今念佛名定生淨土不導曰念佛定生其人禮拜訖口誦南無阿彌陀佛聲聲相次出光明寺門上柳樹表合掌西望倒投身下至地遂死事聞臺省紹闍梨者梓州玄武人也俗姓蒲氏未出家前山行見一蟲甚瘦又將一子於㵎中取鰕子鰕子又不可得紹乃歎曰此蟲應在深山今乃出路飢渴甚矣等是一死不如充此飢渴乃脫衣往臥蟲前蟲乃避去後方出家唯誦經行道而已更無異行大業之初汝州界蟲暴非常三五十人持仗不敢獨行害人既多紹乃往到其處立茅苫坐蟲並遠去道路清夷年一百九歲乃見疾謂弟子曰我欲露屍乞諸蟲鳥而彪嫌我身生尚不食豈死能甞可焚之無餘燼弟子等不忍依其言乃露屍月餘鳥獸不犯乃收葬之釋道休未詳氏族住雍州新豐福緣寺常以頭陀為業在寺南驪山幽谷結草為庵一坐七日乃出其定執鉢持錫出山乞食飯鉢滿已隨處而食還來菴所七日為期初無替廢所以村野有信剋日至山路首迎逆而休歡笑先言卑詞問訊行說禁戒誨以慈善諸俗待其食已從受歸戒送入山門然後乃返積四十餘載貞觀三年夏內依期不出就庵看之端拱而卒眾謂入定於傍宿守乃經信宿迫而察之方知氣盡加坐不腐儼若生焉仍就而掩扉外加棘刺恐蟲傷也四年冬首余往覲焉山北人接還村內為起廟舍安置厥形雖皮鞕骨連而容色不改加坐如故乃於其上加漆布焉然休出家已來常袒三衣不服繒纊以傷生也又所著布衣積有年稔塵朽零破見者寒心時屬嚴冬忽然呻噤即合脫三衣露背而坐冷厲難耐便取一重披之遂便覺暖自誡勸曰汝亦易誑前後俱冷俱是一衣如何易奪遂覺暖也汝不可信當為汝師或時欲補衣以布相著欲加縫綴即便入定後出之時收而乞食斯季世以死要生業道者罕有蹤也余曾參翻譯親問西域諸僧皆以布氈而為袈裟都無繒絹者縱用以為餘衣不得加受持也其龜茲于遁諸國見今養蠶惟擬取綿亦不殺害故知休之慈救與衡岳同風前已廣彰恐迷重舉自餘服翫安可言矣論曰竊聞輕生徇節自古為難苟免無恥當今為易志人恒人之傳列樹風猷上達下達之言照揚經典皆所以箴規庸度開導精靈惟道居尊惟德生物故能兼忘通塞兩遣是非體流縛之根源曉想倒之條緒也是以達人知身城之假合如塵無性鑒命算之若流惟心生滅由斯以降同是幻居安有智者而能常保然則宅生附世纏取未捐寄以弘因用清心惑或挫拉以加惱辱或抑制以事奴駘或焚灼以拔貪源或刳剔以窮癡本纏身為炬且達迷途然臂為明時陳報德出燈入鐵之相其蹤若林肉山乳海之能備聞前策斯皆拔倒我之宏根顯坏形之可厭以將崩之朽宅貿金剛之法身經不云乎誠至言矣若夫厚生所寶極貴者形就而揆之其實惟命大聖成教豈虛構哉故藥王上賢焚體由其通願下凡仰慕灼爛寧不失心然僧崖正身於猛焰言聲不改大志刳臂以熱鐵神操逾新玄覽致命於中流雖出還沒法安亡形於縲紲放免來投是知操不可奪行不可掩誠可嘉乎難行事矣復有引腸樹表條肉林中舒顏而臨白刃含笑而受輕辱並如本紀又可嘉哉然則四果正士灰身而避謗徒八千受決護法而逃忍界彼何力而登危此何情而脫苦自非懷安曠濟行杜我人觀色相為聚塵達性命如風燭故能追蹤前聖誠宗像末之寄乎或者問曰夫厭生者當拔生因豈斷苦果而推集本未聞其旨請為陳之斯立言也不無恒致且集因綿亘如山之相屬我為集本如煙之待搆生重惟身隨重而行對治如世之病任形而設方術故焚溺以識貪瞋謙虛以攻癡慢斯業可尚同靜觀而緣色心斯道可崇等即有而為空也必迷斯迹謂我能行倒本更繁徒行苦聚故持經一句勝捨多身世該所質惟斯人也但患聞而不行更增常結何如薄捐支節分遣著情聖教包羅義含知量自有力分虛劣妄敢思齊或呻嘷而就終或激激而赴難前傳所評何世無耶又有未明教迹婬惱纏封恐漏初篇割從閹隷矜誕為德輕侮僧倫聖教科治必有深旨良以愛之所起者妄也知妄則愛無從焉不曉返檢內心而迷削於外色故根色雖削染愛逾增深為道障現充戒難尚須加之擯罪寧敢依之起福又有臨終遺訣露骸林下或沈在溷流通資翔泳或深瘞高墳豐碑紀德或乘崖漏窟望遠知人或全身化火不累同生之神或灰骨塗像以陳身奉之供鑽膚劓刖謂遣塵勞剜目支解言傾情慾斯途眾矣因而敘之且夫陳屍林薄少袪鄙悋之心飛走以之充飢幽明以於熏勃得失相補尠能兼濟遂有蟲蛆涌於肉外烏隨啄吞狼籍膏於原野傷於慈惻然西域本葬其流四焉火葬焚以蒸新水葬沈於深淀土葬埋於岸旁林葬棄之中野法王輪王同依火祀世重常習餘者希行東夏所傳惟聞林土水火兩設世罕其蹤故瓦掩虞棺廢林薪之始也夏后聖周行瓦棺之事也殷人以木槥櫝藤緘之也中古文昌仁育成治雖明窆葬行者猶希故掩骼埋胔𭩀而瘞也上古墓而不墳未通庶類赫胥盧陵之后現即因山為陵下古相沿同行土葬紜紜難紀故且削之若乃裨行紀言導後業之清緒施輪樹塔表前德之徽功阿含之所開明即世彌其昌矣至於埋屍塔側尚制遠撤邊坊親用骨塗寔乃虛通諂附又有厭割人世生送深林廣告四部望存九請既失情投僶俛從事道俗讚善儐從相催嚬蹙不已放身巖壑據律則罪當初聚論情則隨興大捨餘有削略贅疣雖符極教而心含不淨多存世染必能曠蕩無寄開化昏迷故非此論所詳自可仰歸清達而世或多事妄行斷粒練形以期羽化服餌以却重尸或呼吸沆瀣或吐納陰陽或假藥以導遐齡或行氣以窮天地或延生以守慈氏或畏死以求邪術斯蹤極眾焉足聞乎並先聖之所關鍵後賢之所捐擲方復周章求及追賞時澆負钁陵峯望五芝之休氣擔鍬赴壑趣八石之英光以左道為吾賢用淫祀為終志畢從小朴未免生涯徒寄釋門虛行一世可為悲夫是知生死大期自有恒數初果分齊餘未詳論而忽廁以凡心籌諸聖慮通成愚結知何不為然則寒林之動庸識因悟無常捨生而存大義用開懷道全身碎身之相權行實行之方顯妙化之知機通大聖之宏略也水清有著終果言於厚葬虛心不賓則任物之行藏斯道不窮固略言矣讀誦篇第八正紀十四人附見七人魏泰岳人頭山銜草寺釋志湛傳一魏益州五層寺釋法建傳二益州招提寺釋慧恭傳三眉州隆山鼎鼻山釋法泰傳四唐終南山藍谷悟真寺釋慧超傳五伯濟國達拏山寺釋慧顯傳六唐益州福成寺釋道積傳七洪遠僧思智曄唐益州福壽寺釋寶瓊傳八唐驪山津梁寺釋善慧傳九唐終南山悟真寺釋法誠傳十唐京師會昌寺釋空藏傳十一唐京師大莊嚴寺釋慧銓傳十二智證宋公唐雍州醴泉沙門釋遺俗傳十三玄秀史擔唐京師羅漢寺釋寶相傳十四法達釋志湛齊州山荏人是朗公曾孫之弟子也立行純厚省事少言仁濟為務每遊諸禽獸而群不為亂住人頭山邃谷中銜草寺寺即宋求那跋摩之所立也讀誦法華用為常業將終之日沙門寶誌奏梁武曰北方山荏縣人住今銜草寺須陀洹果聖僧者今日入涅槃楊都道俗聞誌此告皆遙禮拜故湛之亡也寂無餘惱端然氣絕兩手各舒一指有西天竺僧解云若二果者舒兩指驗湛初果也還收葬于人頭山築塔安之石灰泥塗鳥狩不敢凌污今猶存焉又范陽五侯寺僧失其名常誦法華初死之時權殯堤下後遷改葬骸骨並枯惟舌不壞雍州有僧亦誦法華隱于白鹿山感一童子常來供給及死置屍巖下餘骸枯朽惟舌如故齊武成世并州東看山側有人掘地見一處土其色黃白與旁有異尋見一物狀如兩脣其中有舌鮮紅赤色以事聞奏帝問諸道人無能知者沙門大統法上奏曰此持法華者六根不壞報耳誦滿千遍其徵驗乎乃勅中書舍人高珍曰卿是信向之人自往看之必有靈異宜遷置淨所設齋供養珍奉勅至彼集諸持法華沙門執爐潔齋遶旋而呪曰菩薩涅槃年代已遠像法流行奉無謬者請現感應纔始發聲此之脣舌一時鼓動雖無響及而相似讀誦諸同見者莫不毛豎珍以狀聞詔遣石函藏之遷于山室云又元魏北代乘禪師者受持法華精勤匪懈命終託河東𦵮氏為第五子生而能言自陳宿世不願處俗其父任北肆州刺史隨任便往中山七帝寺尋得本時弟子語曰汝頗憶從我度水往狼山不乘禪師者我身是也房中靈几可速除之父母恐其出家便與納室爾後便忘宿命之事而常興厭離端拱靜居又太和初年代京閹官自慨刑餘不逮人族奏乞入山修道有勅許之乃齎一部花嚴晝夜讀誦禮悔不息夏首歸山至六月末髭鬢盡生復丈夫相還狀奏聞高祖信敬由來忽見驚訝更增常日於是大代之國花嚴一經因斯轉盛並見侯君素旌異記釋法建者廣漢雒縣人也俗姓朱氏誦經一千卷仍多閑暇遨遊偶俗無所異焉忽復閉門則累日不出無所食矣唯聞誦經然小聲吟諷音不外徹有人倚壁竊聽臨響但聞斖斖細細似伏流之吐波時乃一出追從無聞武陵王東下令弟規守益州魏遣將軍尉遲逈來伐蜀規既降欵城內大有名僧皆被拘禁至夜忽有光明逈遣人尋光乃見諸僧並睡唯法建端坐誦經光從口出逈聞自到建所頂禮坐聽至旦始休逈問曰法師昨夜所誦名作何經答曰華嚴經下帙十卷逈曰何不從頭誦之答曰貧道誦次到此耳逈曰法師誦得幾許答曰貧道發心欲誦一藏情多懈怠今始偍千卷逈驚疑不信將欲試之曰屈總誦一遍應不勞損耶建報曰讀誦經典沙門常事豈憚勞苦乃設高座令諸僧眾並執本逐聽法建登座為誦或似急流之注峻其吐納音句呼噏氣息或類清風之入高松聰明者纔似聞餘音情疎意逸者空望塵躅七日七夜數已滿千猶故不止逈起謝曰弟子兵將不得久停請從此辭諸僧因並釋散逈既出歎息曰自如來寂滅之後阿難號為總持豈能過此蜀中乃有如此人所以常保安樂奇哉奇哉建年八十終釋慧恭者益州成都人也俗姓周氏周末廢佛法之時與同寺慧遠結契勤學遠直詣長安聽採恭長往荊楊訪道遠於京師聽得阿毘曇論迦延拘舍地持成實毘婆沙攝大乘並皆精熟還益州講授卓爾絕群道俗欽重䞋施盈積恭後從江表來還二人相遇欣歡共敘離別三十餘年同宿數夜語說言談遠如泉涌恭竟無所道問恭曰離別多時今得相見慶此歡會伊何可論但覺仁者無所說將不得無所得耶恭對曰為性闇劣都無所解遠曰大無所解可不誦一部經乎恭答曰唯誦得觀世音經一卷遠厲色曰觀世音經小兒童子皆能誦之何煩大汝許人乎且仁者童子出家與遠立誓望證道果豈復三十餘年唯誦一卷經如指許大是非闇鈍懶墮所為請與斷交願法師早去無增遠之煩惱也恭曰經卷雖小佛口所說遵敬者得無量福輕慢者得無量罪仰願暫息瞋心當為法師誦一遍即與長別遠大笑曰觀世音經是法華經普門品遠已講之數過百遍如何始欲閙人耳乎恭曰外書云人能弘道非道弘人但至心聽佛語豈得以人棄法乃於庭前結壇壇中安高座繞壇數匝頂禮昇高座遠不得已於是下據胡床坐聽恭始發聲唱經題異香氛氳遍滿房宇及入文天上作樂雨四種花樂則寥亮振空花則雰霏滿地經訖下座自為解座梵訖花樂方歇慧遠接足頂禮淚下交連謝曰慧遠臭穢死屍敢行天日之下乞暫留賜見教誨恭曰非恭所能諸佛力耳即日拂衣長揖沿流而去爾後訪問竟不知其所之其寺久已湮滅釋法泰眉州隆山縣人也俗姓呂氏初為道士十餘年中間忽自悟迴心正覺因即剃除始誦法華經尋即通利乃精勤寫得法華經一部數有靈瑞欲將向益州莊潢令一人擔負一頭以籠盛錢二千束縛經置錢上一頭是衣服擔行至地名莋橋橋忽斷泰在後負擔人俱墜水中人浮得出擔沒不見泰於岸上搥胸號哭曰錢衣豈非閑事何忍溺經即高聲唱言如能為漉得者賞錢兩貫時有一人聞之脫衣入水沒求之數度出入得錢與衣幞而不得經泰轉悲泣巡岸上下望小洲上有一幞命人取之乃是經也草木擎之宛無濕處泰不勝歡喜即以二千錢償所漉人曰法師悲號劇喪父母故為急覓非是貪錢弟子雖傭夫亦知福報請以此錢充莊嚴之直言訖遁去更欲與言去已遠矣泰至城都裝潢以檀香為軸表帶及帙并函將還本寺別處安置夜夜有異香泰勤誦持一夜一遍時彪法師彼寺講夜欲看讀恒嫌泰鬧亂其心自欲往請令稍下聲乃見泰前大有人眾皆胡跪合掌彪退流汗即移所住泰年八十終矣釋慧超姓汎氏丹陽建元人稟懷溫裕立性懷仁弱齡厭俗自出家後誦法華經聞光州大蘇山慧思禪師獨悟一乘善明三觀與天台智者仙城命公篤志幽尋積年請業行優智遠德冠時賢思對眾命曰超之神府得忍人也及遊衡嶺復與同途留誦經停亟移歲序自隋初廓定北入嵩高餌藥坐禪冀言終老隋太子勇召集名德總會帝城以超業行不群特留供養而恭慎凝攝不顧世華及勇廢免一無所涉晚移定水高振德音道俗歸宗仰其戒範會淨業法師卜居藍田谷之悟真寺欽超有道躬事邀迎共隱八年倍勤三惠及大業承運禪定初基爰發詔書延入行道屢辭砭疾後許還山德感物情頗存汲引四川貴望一縣官民莫不委質投誠請傳香德并為經始伽藍繼綜羞粒大唐伊始榮重於前京邑名僧慧因保恭等情慕隱淪咸就栖止蔭松偃石論詳道義皆曰斯誠出要樂也後臥疾少時弟子跪問答曰吾之常也長生不欣夕死不慼乃面西正坐云第一義空清淨智觀言如入定奄遂長往春秋七十有七即武德五年十二月六日也露骸松石一月餘日顏色不變天策上將聞稱希有遣人就視端拱如生自超九歲入道即誦法華五十餘年萬有餘遍感靈獲瑞不可勝言弟子法成等為建白塔于寺之北峯焉釋慧顯伯濟國人也少出家苦心精專以誦法華為業祈福請願所遂者多聞講三論便從聽受法一染神彌增其緒初住本國北部修德寺有眾則講無便清誦四遠聞風造山諠接便往南方達拏山山極深險重隒巖固縱有往展登陟艱危顯靜坐其中專業如故遂終于彼同學輿屍置石窟中虎噉身骨並盡惟餘髏舌存焉經于三周其舌彌紅赤柔軟勝常過後方變紫鞕如石道俗怪而敬焉俱緘閉于石塔時年五十有八即貞觀之初年也釋道積蜀人住益州福成寺誦通涅槃生常恒業凡有宣述必洗滌身穢淨衣法座然後開之立性沈審慈仁總務諸有厲疾洞爛者其氣彌復欝勃眾咸掩鼻而積與之供給身心無貳或同器食或為補浣時有問者積云清淨臭處心憎愛也吾豈一其神慮耶寄此陶練耳皆慕其為行也而患己不能及之以貞觀初年五月終于住寺春秋七十餘矣時屬炎夏而不腐臭經停百日跏坐如初莫不嗟尚乃就加漆布興敬巴蜀京邑諸僧受誦涅槃其列非少又有沙門洪遠僧恩並誦涅槃皂素迴向遠志尚敦慤情捐名利徵入會昌隆禮供給恩道心清肅成節動人弘福禪定兩以崇德而卑牧自處蒙俗罕知時弘福寺有沙門智曄者本族江表隋朝徵入深樂法華鎮恒抄寫所得外利即用雇人前後出本二千餘部身恒自勵日寫五張年事乃秋斯業無怠今總寺任彌勤恒業年七十餘矣釋寶瓊馬氏益州綿竹人小年出家清貞儉素讀誦大品兩日一遍為常途業歷遊邑洛無他方術但勸信向尊敬佛法晚移州治住福壽寺率勵坊郭邑義為先每結一邑必三十人合誦大品人別一卷月營齋集各依次誦如此義邑乃盈千計四遠聞者皆來造欵瓊乘機授化望風靡服而卑弱自持先人後德經行擁鬧下道相避言問酬對怡聲謙敬斯實量也不媚於時本邑連比什邡諸縣並是道民尤不奉佛僧有投寄無容施者致使老幼之徒於沙門像不識者眾瓊雖桑梓習俗難改徒有開悟莫之能受李氏諸族正作道會邀瓊赴之來既後至不禮而坐僉謂不禮天尊非法也瓊曰邪正道殊所事各異天尚不禮何況老君眾議紜紜頗相凌侮瓊曰吾禮非所禮恐貽辱也遂禮一拜道像並座動搖不安又禮一拜連座返倒摧殘在地道民相視謂是風鼓競來周正瓊曰斯吾所為勿妄怨也初未之信既安又禮如前崩倒合眾驚懼舉掌禮瓊一時迴信從受戒法傍縣道黨相將歎訝咸復奉法時既創開釋化皆授菩薩戒焉縣令高遠者素有誠敬承風敷導更於州寺召僧弘講合境傾味自此而繁以貞觀八年終於所住釋善慧姓苟氏河內溫人博通群籍統括文義逮于九章律歷七曜盈虛皆吞若胸中指掌符會乃深惟世務終墜泥塗遂解褐抽簪創歸僧伍初在徐州之彭城寺誦法華經聽收攝論時遭寇蕩兵食交侵而慧抱飢自勵奉法無殆洗穢護淨彌隆恒日但以邊邑寡學文字紕謬至於音詁眾議紛然雖復俗語時通而慧意存雅正周訪明悟還同昔疑乃以大業末齡負錫西入屢逢群盜衣裳略盡但有弊布自遮猶執破瓶常充淨用既達關口素闕繻文遂即正念直前從門而度于時中表列刃曾無遮止孟冬十月初達京師值沙門吉藏正講法華深副本圖即依聽受形服鄙惡眾不納之乃掃雪藉地單裙𭣋坐都講財唱傾耳詞句擬定經文藏既闡揚勇心承旨望通理義由情存兩得不暇忍寒歡笑熙熙如賈獲寶竟冬常爾眾方美之問以詞旨片無遺忘乃以聞法同屬禪定寺沙門法喜便脫衣迎之引至房中智觀無濫慧又師喜兩振芳規武德初年隨住藍田之津梁寺俗本驪戎互相梗戾率獎陶化十室而九然而性愛英賢樂相延致自西自東百有餘里名林勝地皆建禪坊所以逃逸之儔賴其安堵以貞觀九年正月終於驪山之陽涼泉精舍春秋四十有九初慧棄擲俗典蒞此玄模言不重涉專心道業省言節食佩律懷仁迎頓客旅雅重經教其有未曾覿者要必親觀若值行要累日誦持以為熏習之基也時太原沙門慧達者亦誦法華五千餘遍行坐威儀其聲不輟偏存物命直視低目地有蟲豸必迴身而避不敢跨越有問答曰斯之與吾生死不定將不先成正覺安可妄輕之耶以貞觀八年四月跏坐而終人謂入定停于五宿既似長逝又不臭腐乃合床內于窟中釋法誠姓樊氏雍州萬年人童小出家止藍田王效寺事沙門僧和和亦鄉族所推奉之比聖嘗有人欲害夜往其房見門內猛火騰焰昇帳遂即退悔性飲清泉潔清故也人或弄之密以羊骨沈水和素不知飲便嘔吐其冥感潛識為若此矣誠奉佩訓勗講法華經以為恒任又謁禪林寺相禪師詢于定行而德茂時宗學優眾仰晚住雲花綱理僧鎮隋文欽德請遵戒範乃陳表固辭薄言抗禮遂負笈長驅歷遊名岳追蹤勝友咸承志道因見超公隱居幽靜乃結心期栖遲藍谷處既局狹纔止一床旋轉經行恐顛深便剗迹開林披雲附景茅茨葺宇甕牖疎簷情事相依欣然符合今所謂悟真寺也法華三昧翹心奉行澡沐中表溫恭朝夕夢感普賢勸書大教誠曰大教大乘也諸佛智慧所謂般若於即入淨行道重惠匠人書八部般若香臺寶軸莊嚴成就又於寺南橫嶺造華嚴堂陻山闐谷列棟開甍前對重巒右臨斜谷吐納雲霧下瞰雷霆余曾遊焉實奇觀也又竭其精志書寫受持弘文學士張靜者時號筆工罕有加勝乃請至山舍令受齋戒潔淨自修口含香汁身被新服然靜長途寫經不盈五十誠料其見財兩紙酬其五百靜利其貨竭力寫之終部以來誠恒每日燒香供養在其案前點畫之間心緣目覩略無遺漏故其剋心鑽注時感異鳥形色希世飛入堂中徘徊鼓舞下至經案復上香爐攝靜住觀自然馴狎久之翔逝明年經了將事興慶鳥又飛來如前馴擾鳴唳哀亮貞觀初年造畫千佛鳥又飛來登上匠背後營齋供慶諸經像日次中時怪其不至誠顧山岑曰鳥既不至誠吾無感也將不兼諸穢行致有此徵言已欻然飛來旋環鳴囀入香水中奮迅而浴中後便逝前如此者非復可述素善翰墨鄉曲所推山路巖崖勒諸經偈皆其筆也手寫法華正當露地因事他行未營收舉屬洪雨滂注溝㵎波飛走往看之而合案並乾餘便流潦嘗却偃橫松遂落懸溜未至下㵎不覺已登高岸無損一毛又青泥坊側有古佛龕周氏瘞藏今猶未出誠夜夢其處大有尊形既覺往開恰獲古龕像年月積久並悉剝壞就而修理道俗稱善斯並冥術之功自誠開發至貞觀十四年夏末日忽感餘疾自知即世願生兜率索水浴訖又索終輿旁自檢校不許榮厚恰至月末明相將現無故語曰欲來但入未假弦歌顧侍人曰吾聞諸行無常生滅不住九品往生此言驗矣今有童子相迎久在門外吾今去世爾等佛有正戒無得有虧後致悔也言已口出光明照于楹內又聞異香苾芬而至但見端坐儼思不覺其神已逝時年七十有八然誠之誦習也一夏法華料五百遍餘日讀誦兼而行之猶獲兩遍縱有人客要須與語者非經部度中不他言略計十年之勤萬有餘遍釋空藏俗姓王氏先祖晉陽今在雍州之新豐焉母初孕日自然不食酒肉五辛時以同塵身子故密加異之既誕育後靈鑒日陳情用高遠讀誦經論思存拔濟至年十九同佛出家既惟一己二親留礙乃於父前以身四布七日不起恐其命絕方從所願即辭向藍田負兒山中私自剃落初齎麵六斗擬作月糧日噉二升三年不盡屢感神鼎自然而至由是增其禪誦晨宵無輟後依止判法師住龍池寺欽重經論日誦萬言前後總計三百餘卷三論涅槃探窮巖穴大業之始以藏名稱惟遠道俗所聞下勅徵延入住禪定唐運既興崇繕法宇有勅於金城坊建會昌寺并請大德十人度僧五十人永用住持以藏行德夙彰又請住焉供事彌隆極光恒美而性樂山水志存清曠每年仲春遊浪林阜行次玉泉遂有終焉之思居止載紀眾聚如山說導亡疲開悟逾廣後為亢旱經時山泉乃竭合寺僧眾咸以驚嗟藏乃至心祈請其泉應時還復遠近道俗動色相歡兼又弘操嶽峙器局川停不擾榮利不懷寵辱濟度群有不略寸陰乃鈔摘眾經大乘要句以為卷軸紙別五經三經卷部二十五十總有十卷每講開務極增成學聞義兩持偏無迷忘夏分常行方等懺法賢劫千佛日禮一遍常坐不臥垂三十年翹勤專注難加係迹以貞觀十六年五月十二日終於會昌春秋七十有四遺身於龍池寺側收骨起塔觀其讀誦之富振古罕儔視其髏骨兩耳通明頂有雙孔眼眶含竅各有三焉弟子等追惟永往樹碑於會昌寺中金紫光祿大夫衛尉卿于志寧為文釋慧銓姓蕭氏今特進宋公瑀之兄子也父仕隋為梁公祖即梁明帝矣性度恢簡志用冲粹姑即隋煬之后也自幼及長恒在宮闕慕樂超世無因自達年既冠成帝乃尚以秦孝王女為妻非其願也事不獲已時行伉儷及妻終後方遂夙心以鄭氏東都預茲剃落及武德初歲方還京輦住莊嚴寺廣聽眾部而以攝論為心頗懷篇什尤能草隷隨筆所被用為模楷故經題寺額咸推仰之兄鈞任東宮中舍文才之舉朝廷攸屬每歲春秋相携巖岫觸興題篇連句同韻時以為難兄弟也又弟智證出家同住即宋公之兄太府卿之子也略榮位之好欣懷道業勤勤自課無擇昏曉證與兄銓相次而卒以家世信奉偏弘法華同族尊卑咸所成誦故蕭氏法華皂素稱富特進撰疏總集十有餘家採掇菁華揉以胸臆勒成卷數常自敷弘時召京輦名僧指摘瑕累或集親屬僧尼數將二十給惠以時四事無怠故封祿所及惟存通濟太府情好讀誦為先故生至終誦盈萬遍雇人抄寫總有千部每日朝參必使儐者執經在前至於公事微隙便就轉讀朝伍仰屬以為絕倫自釋化東傳流味彌遠承受讀誦世罕伊人蕭氏一門可為天下模楷矣釋遺俗不知何許人以唐運初開遊止雍州醴泉縣南美泉鄉陽陸家鎮常供養清儉寡慾惟誦法華為業晝夜相係乃數千遍以貞觀初因疾將終遺囑友人慧廓曰比雖誦經意望靈驗以生蒙俗信向之善若身死後不須棺盛露骸埋之十載可為發出舌根必爛知無受持若猶存在當告道俗為起一塔以示感靈言訖而終遂依埋葬至貞觀十一年廓與諸知故就墓發之身肉都銷惟舌不朽一縣士女咸共仰戴誦持之流又倍恒度乃函盛其舌於陽陸村北甘谷南岸為建甎塔識者尊嚴彌隆信敬誦讀更甚又京城西南豐谷鄉福水南史村史呵擔者少懷善念常誦法華行安樂行慈悲在意不乘畜產虛約為心名霑令史往還京省以習誦相仍恐路逢相識人事暄涼便廢所誦故其所行必小徑左道低氣怡顏緣念相續初不告倦及終之時感異香氣充於村曲親疎同怪遂埋殯之爾後十年妻亡乃發屍出舌根鮮明餘並朽盡乃別標顯葬又黃州隨華寺僧玄秀者性清慎溫恭為志常誦法華每感徵異未以為怪時屬炎暑同友逐涼遣召秀來欲有談笑既至房前但見羽衛嚴肅人馬偉大怖而返告同往共觀如初不異轉至後門其徒彌盛上望空中填塞無際多乘象馬類雜鬼神乃知其感通也置而却返明晨慚謝朋從遂絕秀專斯業隋末終寺釋寶相姓馬雍州長安人十九出家清貞栖德住羅漢寺專聽攝論深惟妄識之難伏也無時不諠乃入禪坊頭陀自靜六時禮悔四十餘年夜自篤課誦阿彌陀經七遍念佛名六萬遍晝讀藏經初無散捨後專讀涅槃一千八十遍兼誦金剛般若終于即世然身絕患惱休健翕習冷食麁衣隨得便服情無憚苦又志存正業翹注晨霄蚤蝨流身不暇觀採遇患將極念誦無捨剋至大期累屬道俗以念佛為先西方相待勿虛度世又屬當燒散吾屍不勞銘塔用塵庸俗言訖而逝年八十三六十二夏不畜尺財無勞僧法又同寺僧法達者以誠素見稱供嚫之直用寫華嚴八部般若燒香自讀一百餘遍而生常清潔不畜門人單己自怡食無餘粒斯亦輕清之高士也年登七十便齎所讀經贈同行者但捧勝天一部以為終老即擲公名趣雲陽巖中擁緣送死經于四載遂卒彼山並是即目近事且夫讀誦徵感其類繁焉別有紀傳故不曲盡略引數條示光緒耳論曰尋夫讀誦之為業也功務本文經歎說行要先受誦何以然耶但由庸識未剖必假聞持崑竹不斷鳳音寧顯義當纔登解髮即須通覽採酌經緯窮搜名理疑偽雜錄單複出生普閱目前銓品人世然後要約法句誦鎮心神廣說緣本用疎迷結遂能條貫本支釋疑滯以通化統略玄旨附事用以徵治是故經云受持讀誦書寫解說如法修行斯誠誡也世多惰學愚計相封以尋理為諸見用博文為障道故調達善星之廣富未免泥犁槃特薄拘之寡約尚參中聖凡斯等議未成通論原夫道障之起起乎心行道在無滯滯則障道焉有多聞能為道障夫聞本筌解封附不行此則滯指亡月正違出要是以愚夫當斯一計莫非學既未功隨言便著於經律論生未曾沾惑妄發心誓不執卷見學教者目為文字故使慢水覆心膏肓誰遣至於決斷篇聚判析偽真由來未知事逾聾瞽既恥來問反啟寧陳遂即惟心臆斷汎浪無准傍為啟齒何急如前又有薄讀數帙略誦短章謂為止足更絕欣尚便引大集法行比丘十住不貴多讀竊以教門宏曠待對塵勞藥病相投豈徒繁積藏部所設止在奉持聞而莫依校量非一今倒想如草之蔓慢我如山之立要資博讀見有廣治之能隨境流觀務存祛滯之本但以暗識未萌集熏怠構稱情昏倒反福成罪故此方見錄卷止六千尚怖不希壅迷頓足何論天竺遺典龍藏現經敢慕窺求通觀聞海必能追功起觀無暇廣尋要拔苦輪方聞為飾斯則莊嚴道論慧解前驅不待抑揚自然會理又有曲媚佛言詐辭學論便言論作小聖吐言隱密彫淳樸散道味已離故我誦持無心悟入斯言何哉妄有穿鑿原夫諸佛說法本惟至道赴接凡小方便乘權權道多謀任機而現或以聲光動之或以威容鼓之法譬亂舉緣事相開以悟達為本言以亡筌為意得但以去聖久遠時接澆浮專寶文詞罕會幽旨所以大小諸聖悲大道之將崩廣採了義製明論以通教故文云隨聲取義有五過失謗佛輕法誑人退信斯言極矣不量己之神府而輒揆於成教明佛而侮賢聖憎愛於是由生嗟乎法侶又何詳哉且夏屋非散材所成大智豈庸情所搆固當通其所滯悟其所迷不然則至聖於何起悲正士於何揚化事敘緣於本紀故不廣之興福篇第九正紀十二人附見五人梁蜀部沙門釋明達傳一周鄜州大像寺釋僧明傳二僧護隋天台山瀑布寺釋慧達傳三唐綿州振嚮寺釋僧晃傳四唐楊州長樂寺釋住力傳五唐京師大莊嚴寺釋智興傳六善因唐蒲州普救寺釋道積傳七唐京師會昌寺釋德美傳八靜默曇獻唐京師清禪寺釋慧胄傳九法素唐梓州牛頭山寺釋智通傳十唐梓州通泉寺釋慧震傳十一唐京師弘福寺釋慧雲傳十二釋明達姓康氏其先康居人也童稚出家嚴持齋素初受十戒便護五根年及具足行業彌峻脇不著席日無再飯外肅儀軌內樹道因廣濟為懷遊行在務以梁天鑒初來自西戎至于益部時巴峽蠻夷鼓行抄劫州郡徵兵克期誅討達愍其將苦志存拯拔獨行詣賊登其堡壘慰喻招引未狎其情俄而風雨晦冥雷霆振擊群賊驚駭惻爾求哀達乃教具千燈祈誠三寶營辦始就昏霾立霽山澤通氣天地開朗翕然望國並從王化繈負排藪獺弁前趨者其徒充澤遂使江路肅清往還無阻兵威不設而萬里坦然達之力也後因行汶中路逢有人縛㹠在地聲作人語曰願上聖救我達即解衣贖而放之嘗於夜中索水洗脚弟子如言而泥竟不脫重以湯洗如前不去乃自以水灌之其脚便淨達曰此魚膏也更莫測其所從行至梓州牛頭山欲構浮圖及以精舍不訪材石直覓匠工道俗莫不怪其言也于時二月水竭即下求水乃於水中得一長材正堪剎柱長短合度僉用欣然仍引而竪焉至四月中涪水大溢木流翳江自泊村岸都無溜者達率合皂素通皆接取縱橫山積創修堂宇架塔九層遠近併力一時繕造役不逾時欻然成就而躬襲三衣並是麁布破便治補寒暑無革有時在定據于繩床赫然火起眾往撲滅惟覺清涼有沙門僧救者積患攣躄來從乞差達便授杖令行不移晷景驟步而返斯陰德顯濟功不可識其例甚矣又布薩時身先眾坐因有偷者穿牆負物既出在外迷悶方所還來投寺遂喻而遣之故達化行楚蜀德服如風之偃仆也故使三蜀氓流或執爐請供者或散花布衣者或捨俗歸懺者或剪落從法者日積歲計又不可紀以天鑒十五年隋始興王還荊州冬十二月終于江陵春秋五十有五達形長八尺容式偉然敷弘律訓及以講誦乍諷俗書用悟昏識銓序罪福無待重尋故詳略而傳矣釋僧明俗姓姜鄜州內部人住既山栖立性淳素言令質樸敘悟非任而能守禁自修不隨鄙俗雖不閑明經誥然履操貞梗有聲時俗因遊邑落往還山谷見一陭岸屢有異光怪而尋討上下循擾乃見㵎底石趺一枚其狀高大遠望岸側臥石如像半現於外遂加功發掘乃全像也形同佛相純如鐵磺不加鏨琢宛然圓具舉高三丈餘時周武已崩天元嗣曆明情發增勇不懼嚴誅顧問古老無知來者其地久荒榛梗素非寺所明自惟曰當是育王遺像散在人間應現之來故在斯矣即召四遠同時拕舉事力既竭全無勝致明乃執爐誓曰若佛法重興蒼生有賴者希現威靈得遂情願適發言已像乃忽然輕舉從山直下徑趣趺孔不假扶持卓然峙立大眾驚嗟得未曾有因以奏聞帝用為嘉瑞也乃改元為大像焉自爾佛教漸弘明之力也又尋下勅以其所住為大像寺今所謂顯際寺是也在坊州西南六十餘里時值陰暗便放神光明重出家即依此寺盡報修奉大感物心以開皇中年卒于彼寺余以為興福之來事有機會感見奇跡其相彌隆略引五三用開神理至如徐州吳寺太子思惟瑞像者昔東晉沙門法顯厲節西天歷觀聖迹往投一寺小大承迎顯時遇疾心希鄉飯主人上坐親事經理勅沙彌為取本鄉齋食倏忽往還脚有瘡血云往彭城吳蒼鷹家求食為犬所囓顯怪其旋轉之頃而遊萬里之外方悟寺僧並非常也及隨船還故往彭城訪吳蒼鷹具知由委其犬囓餘血塗門之處猶在顯曰此羅漢聖僧血也當時見為取食何期犬遂損耶鷹聞懺咎即捨宅為寺自至揚都廣求經像正濟大江船遂傾側忽有雙骨各長一丈隨波騰漾奄入船中即得安流昇岸以事奏聞有司觀檢乃龍齒也鷹求像未獲泝江西上暫息林間遇見婆羅門僧持像而行云往徐州與吳蒼鷹供養鷹曰必如來言弟子是也便以像付之鷹將像還至京詔令模之合造十軀皆足下置字新舊莫辯任鷹探取像又降夢示其本末恰至鷹取還得本像乃還徐州每有神瑞元魏孝文請入北臺高齊後主遣使者常彪之迎還鄴下齊滅周廢為僧藏弆大隋開教還重興世今在相州鄴縣大慈寺也又京師崇義寺石影像者形高一尺徑六寸許八楞紫色內外映徹其源梁武太清中有天竺僧齎來謁帝會侯景作亂便置江州廬山西林寺大像頂上至開皇十年煬帝作鎮江海廣搜英異文藝書記並委讎括乃於雜傳得影像記即遣中使王延壽往山推得王自虔奉在內供養在蕃歷任每有行往函盛導前初無寧舍及登儲貳乃送於曲池日嚴寺不令外人瞻覩武德七年廢入崇義像隨僧來京邑道俗備得觀仰其中變現斯量難准或佛塔形像或賢聖天人或山林帳蓋或三途苦趣或前後見同或俄頃轉異斯並目矚而敘之信業鏡而非謬矣貞觀六年下勅入內外遂絕也又梁襄陽金像寺丈六無量壽瑞像者東晉孝武寧康三年二月八日沙門釋道安之所造也明年季冬嚴飾成就刺史郗恢創蒞此蕃像乃行至萬山恢率道俗迎還本寺復以其夕出住寺門合境同嗟具以聞奏梁普通三年勅於建興苑鑄金銅花趺高六尺廣一丈上送承足立碑讚之劉孝儀為文又荊州長沙寺瑞像者晉太元年此像現于城北光相奇特具如前傳形甚瓌異高於七尺昔經夜行人謂非類以刀擊之及旦往視乃金像也刀所擊處文現於外梁高奉法情欲親謁雖加事力終無以致後遣侍中廣齎香供丹欵既達夜忽放光似隨使往旦加延接還復留礙重竭請祈方許從就去都十八里帝躬出迎竟路放光相續不絕白黑欣慶在殿供養三日已後從大通門送同泰寺末被火燒堂塔並盡惟像居殿巋然獨存又高齊定州觀音瑞像及高王經者昔元魏天平定州募士孫敬德於防所造觀音像及年滿還常加禮事後為劫賊所引禁在京獄不勝拷掠遂妄承罪並處極刑明旦將決心既切至淚如雨下便自誓曰今被枉酷當是過去曾枉他來願償債畢了又願一切眾生所有禍橫弟子代受言已少時依俙如睡夢一沙門教誦觀世音救生經經有佛名令誦千遍得免死厄德既覺已緣夢中經了無謬誤比至平明已滿百遍有司執縛向市且行且誦臨欲加刑誦滿千遍執刀下斫折為三段三換其刀皮肉不損怪以奏聞丞相高歡表請免刑仍勅傳寫被之於世今所謂高王觀世音是也德既放還觀在防時所造像項有三刀迹悲感之深慟發鄉邑又昔彌天襄陽金像更歷晉宋迄于齊梁屢感靈相聞之前紀周武滅法建德三年甲午之歲太原公王秉為荊州副鎮將上開府長孫哲志性凶頑不信佛法聞有此像先欲毀之邑中士女被廢僧尼掩淚痛心無由救止哲見欽崇彌至瞋怒彌盛逼逐侍從速令摧殄令百餘人以繩繫項牽挽不動哲謂不用加力便杖監事人各一百牽之如故鏗然逾固進三百人牽猶不動哲怒彌盛又加五百牽引方倒聲振地動人皆悚慄哲獨喜勇即遣鎔毀之都無慚懼自又馳馬欲報刺史裁可百步堛然落地失瘖直視四支不勝至夜而卒道俗唱快當毀像時於腋下倒垂衣內銘云晉太元十九年歲次甲午比丘道安於襄陽西郭造丈八金像此像更三周甲午百八十年當滅計勘年月興廢悉符同焉信知印手聖人崇建容範動發物心生滅之期世相難改業理之致復何虛矣又揚都長干寺育王瑞像者光趺身相祥瑞通感五代侯王所共遵敬具如前傳每有亢陽之歲請像入宮必乘御輦上加油帔僧眾從像以蓋自遮初雖炎赫洞天像出中途無不雨流滂注家國所幸有年斯賴所以道俗恒加雨候至陳氏禎明年中像面轉西直月監堂屢迴正南及至晨起還西如故具以奏聞勅延太極殿設齋行道先有七寶冠在于像頂飾以珠玉可重百斤其上復加錦帽經夜至曉寶冠掛于像手錦帽猶加頭上帝聞之乃燒香祝曰若必國有不祥還脫冠也仍以冠在頂及至明晨脫掛如故上下同懼莫惻其徵及隋滅陳降舉朝露首面縛京室方知其致文帝後知乃遣迎接大內供養以像立故帝恒侍奉不敢對坐乃下勅曰朕年老不堪久立侍佛可令有司造坐像其相還如育王本像送興善寺既達此寺形相偉壯不會即機遂置于北面及明見像乃在南面中門眾咸異焉還送北面堅封門鑰明旦更看像還在南僉皆愧悔謝其輕侮即見在寺圖寫殷矣又梁高祖崇重釋侶欣尚靈儀造等身金銀像二軀於重雲殿晨夕禮敬五十許年初無替廢及侯景篡奪猶在供養太尉王僧辯誅景江南元帝渚宮復沒辯乃通欵於齊迎貞陽侯為帝時江左未定利害相雄辯女婿杜龕典衛宮闕為性兇捍不見後世欲毀二像為金銀挺先遣數十人上三休閣令鑱佛項二像忽然一時迴顧所遣眾人失瘖如醉不能自勝杜龕即被打築遍身青腫惟見金剛力士怖畏之像競來打擊略無休息呻號數日洪爛而死及梁運在陳武帝崩背兄子陳蒨嗣膺大業將修葬具造轀輬車國創新定未遑經始勅取重雲殿中佛像寶帳珩珮珠玉鎣飾之具將用送終人力既豐四面齊至但見雲氣擁結圍遶佛殿自餘方左白日開朗百工聞怪同本看覩須臾大雨橫注雷電震吼煙張鵄吻火烈雲中流光布焰高下相涉並見重雲殿影二像峙然四部神王并及帳座一時騰上煙火相扶歘然遠逝觀者傾都咸生深信雨晴之後覆看故所惟見柱礎存焉至後月餘有從東州來者是日同見殿影東飛于海今有望海者時往見之近高齊日沙門僧護守道直心不求慧業願造丈八石像咸怪其言後於寺北谷中見一臥石可長丈八乃雇匠營造向經一周面腹粗了而背著地以六具拗舉之如初不動經夜至旦忽然自翻即就營訖移置佛堂晉州陷日像汗流地周兵入齊燒諸佛寺此像獨不變色又欲倒之人牛六十餘頭挽不可動忽有異僧以瓦木土墼壘而圍之須臾便了失僧所在像後降夢信心者曰吾患指痛其人寤而視焉乃木傷其二指也遂即補之開皇十年有盜像幡蓋者夢丈八人入室責之賊遂慚怖悔而謝焉其像現存並見旌異記及諸僧錄然斯通感佛教備彰但是福門無非靈應竊以像避延燒狩驚邪道影覆異術經焚不灰靈骨之放神光密迹之興弘護其相大矣具在前聞至如貞觀五年梁州安養寺慧光師弟子母氏貧窶內無衵衣來入子房取故袈裟作之而著與諸隣母同聚言笑忽覺脚熱漸上至腰須臾雷震擲隣母百步之外土泥兩耳悶絕經日方得醒悟所用衣者遂被震死火燒焦踡題其背曰由用法衣不如法也其子收殯又再震出乃露骸林下方終銷散是知受持法服惠及三歸之龍信不虛矣近有山居僧在深巖宿以衣障前感異神來形極可畏伸臂內探欲取宿者畏觸袈裟礙不得入遂得免脫如是眾相不可具紀如上下諸例中釋慧達姓王家于襄陽幼年在道繕修成務或登山臨水或邑落遊行但據形勝之所皆厝心寺宇或補緝殘廢為釋門之所宅也後居天台之瀑布寺修禪繫業又北遊武當山如前攝靜有陳之日癘疫大行百姓斃者殆其過半達內興慈施於楊都大市建大藥藏須者便給拯濟彌隆金陵諸寺數過七百年月逾邁朽壞略盡達課勸修補三百餘所皆鎣飾華敞有移恒度仁壽年中於楊州白塔寺建七層木浮圖材石既充付後營立乃泝江西上至鄱陽預章諸郡觀檢功德願與眾生同此福緣故其所至封邑見有坊寺禪宇靈塔神儀無問金木土石並即率化成造其數非一晚為沙門慧雲邀請遂上廬岳造西林寺重閣七間欒櫨重疊光耀山勢初造之日誓用黃楠闔境推求了無一樹僉欲改用餘木達曰誠心在此豈更餘求但至誠無感故訪追不遂必心期果決松散並變為楠如求不獲閣成則無日矣眾懼其言四出追索乃於境內下巢山感得一谷並是黃楠而在窮㵎幽深無由可出達尋行崖壁忽見一處晃有光明窺見其中可通材道惟有五尺餘並天崖遂牽曳木石至於江首中途灘澓𥱼筏並壞及至廬阜不失一根閣遂得成宏冠前構後忽偏斜向南三尺工匠設計取正無方有石門㵎當于閣南忽有猛風北吹還正于今尚在晚往長沙鑄鍾造像所至方面若草從焉傾竭金貝者兢兢業業恐其不受達任性造真言無華綺據經引喻篤勵物情然其形服弊麁殆不可覩外綜繁殷內收理靜傍觀沈伏似不能言而指撝應附立有成遂斯即處煩不撓固其人矣又為西林閣成尊容猶闕復沿江投造修建充滿故舉閣圓備並達之功大業六年七月晦日舊疾忽增七日倚臥異香入室旋繞如雲閣中像設並汗流地眾見此瑞審達當終官人檢驗具以聞奏達神志如常累以餘業奄爾長逝年八十七矣釋僧晃姓馮氏綿州涪城南昌人形長八尺顏貌都偉威容整肅動中規矩而鷹眼虎身鵝行象步聲氣雄亮志略宏遠綱維法任有柱石焉故使岷巴領袖咸所推仰昔年在志學文才博達時共聲譽嘗夢手擎日月太虛中坐便晃然厭俗欣慕出家私即立名為僧晃也父母未之許拘械兩足牢繫屋柱決意已絕誓心無改不移旦夕鎖自然解乃歎曰夫志之所及也山岳以之轉江河以之絕城臺以之崩瀛海以之竭日月為之潛光須彌為之崩頹星辰為之改度嘉樹為之藏摧況復金木之與桎梏奚足以語哉二親顧其冥感任從道化依彖法師出家受業學通大小夙夜匪懈會梁末周初佛法淆濫行多浮略迂誕毘尼晃具戒未聞而超然異表少能精苦性自矜持卒非師友所成立也眾皆挹其神宇密相高尚及昇壇之後偏攻十誦數年劬勞朗鑒精熟研微造盡彬欝可崇周保定後更業長安進學僧祇討其幽旨有難必究是滯能通又於曇相禪師稟受心法觀道圓淨由此彌開又於開禪師方等行道洞入時倫無與相映自此罕得而傳者由多營福業勞事有為是以隱墜世不稱也既而遐邇諷德聲聞天庭武帝下勅延於明德殿言議開闡彌遂聖心乃授本州三藏大隋啟祚面委僧正匡御本邑而剛決方正賞罰嚴平綿益欽風貴賤攸奉前後州主十有餘人皆授戒香斷惡行善開皇十五年又於寺中置頭陀眾僧事蠲免以引墮者仁壽以後重率寺眾共轉藏經周而復始初不斷絕供給䞋錫一出俗緣皆晃指授故福報所至如泉不窮僧業茂盛方類推舉以武德冬初終於所住之振嚮寺春秋八十五矣初未終前佛堂蓮華池自然枯竭池側慈竹無故彫死寺內薔薇非時發花曄如夏月眾以榮枯兩瑞不無生滅之懷德異常倫故感應之所期耳釋住力姓氏河南陽翟人避地吳郡之錢塘縣因而家焉宿植勝因早修慧業甫及八歲出家學道器宇凝峻虛懷接悟聲第之高有聞緇俗陳中宗宣帝於京城之左造泰皇寺宏壯之極罄竭泉府迺勅專監百工故得揆測指撝面勢嚴淨至德二年又勅為寺主值江表淪亡僧徒乖散乃負錫遊方訪求勝地行至江都乃於長樂寺而止心焉隋開皇十三年建塔五層金槃景耀峨然挺秀遠近式瞻至十七年煬帝晉蕃又臨江海以力為寺任繕造之功故也初梁武得優填王像神瑞難紀在丹陽之龍光寺及陳國云亡道場焚毀力乃奉接尊儀及王謐所得定光像者並延長樂身心供養而殿宇褊狹未盡莊嚴遂宣導四部王公黎庶共修高閣並夾二樓寺眾大小三百餘僧咸同喜捨畢願締構力乃勵率同侶二百餘僧共往豫章刊山伐木人力既壯規摹所指妙盡物情即年成立制置華絕力異神工宏壯高顯挺冠區宇大業四年又起四周僧房廊廡齋厨倉庫備足故使眾侶常續斷緒無因再往京師深降恩禮還至江都又蒙勅慰大業十年自竭身資以栴檀香木模寫瑞像並二菩薩不久尋成同安閣內至十四年隋室喪亂道俗流亡骸若萎朽充諸衢市誓以身命守護殿閣寺居狐兔顧影為儔啜菽飲水再離寒暑雖耆年暮齒而心力逾壯泥塗褫落周匝火燒口誦不輟手行治葺賊徒雪泣見者哀歎往往革心相佐修補皇唐受命弘宣大法舊僧餘眾並造相投邑室雖焚此寺猶在武德六年江表賊帥輔公祐負阻繕兵戈潛圖反叛凡百寺觀撤送江南力乃致書再請願在閣前燒身以留寺宇祐偽號尊稱志在傾殄雖得其書全不顧遇力謂弟子曰吾無量劫來積習貪愛不能捐捨形命以報法恩今欲自於佛前取盡決不忍見像濟江可積乾薪自燒供養吾滅之後像必南渡衣資什物並入尊像泣服施靈理宜改革便以香湯沐浴加趺面西引火自焚卒於炭聚時年八十即武德六年十月八日也命終火滅合掌凝然更足闍維一時都化初力在佛前焚時群鵲哀鳴其聲甚切右遶七匝方始飛去及身沒後像果南遷殿閣房廊得免煨燼法寶僧眾如疇昔焉門人慧安智賾者師資義重甥舅恩深為樹高碑于寺之內東宮庶子虞世南為文今像還歸於本閣云釋智興俗緣宋氏洛州人也謙約成務厲行堅明誦諸經數十卷并行法要偈數千行心口相師不輟昏曉住禪定寺今所謂大莊嚴也初依首律師隨從講會思力清澈同侶高之徵難鱗錯詞鋒驚挺又能流靡巧便不傷倫次時以其行無諍也大業五年仲冬次掌維那時鍾所役奉佩勤至僧徒無擾寺僧三果者有兄從帝南幸江都中路亡沒初無凶告忽通夢其妻曰吾行從達於彭城不幸病死生於地獄備經五苦辛酸叵言誰知吾者賴以今月初日蒙禪定寺僧智興鳴鍾發聲響振地獄同受苦者一時解脫今生樂處思報其恩可具絹十匹奉之并陳吾意從睡驚覺怪夢所由與人共說初無信者尋又重夢及諸巫覡咸陳前說經十餘日凶問奄至恰與夢同果乃奉絹與之而興自陳無德並施大眾有問興曰何緣鳴鍾乃感斯應興曰余無他術見付法藏傳罽膩吒王劍輪停事及增一阿含鍾聲功德敬遵此轍苦力行之每冬登樓寒風切肉僧給皮袖用執鍾槌余自厲意露手捉之嚴寒裂肉掌中凝血不以為辭又至諸時鳴鍾之始願諸賢聖同入道場然後三下將欲長打如先致敬願諸惡趣聞此鍾聲俱時離苦如斯願行志常奉修豈惟微誠遂能遠感眾服其言以貞觀六年三月遘疾少時自知後世捨緣身資召諸師友因爾陳別尋卒莊嚴春秋四十有五葬於杜城窟中弟子善因宗師戒範講四分律講法華經冥神福慧著聞京邑釋道積河東安邑人也俗姓相里名子材既蒞玄門更名道積其先蓋鄭大夫子產之苗裔矣昔子產生而執拳啟手觀之文成相里其後因而氏焉父宣恢廓有大志好學該富宗尚嚴君積早習丘墳神氣爽烈年二十將欲出家未知所適乃遇律師洪湛見而異之即為剃落晦迹雙巖又依法朗禪師希求心學絕影三載不出山門然為幽證自難聖教須涉開皇十三年辭師擐鉢周行採義路經滄冀就遠行寺普興法師尋學涅槃慶所未聞乃經四載情通三事為門學所推至十八年入於京室依寶昌寺明及法師諮習地論又依辯才智凝法師攝大乘論於十義熏習六分轉依無塵惟識一期明悟仁壽二年又往并州武德寺沙門法稜所聽採地持故得十法三持畢源斯盡四年七月楊諒作亂遂與同侶素傑諸師南旋蒲坂既達鄉壤法化大行先講涅槃後敷攝論并諸異部往往宣傳及知命將隣偏弘地持以為誡勗之極特是開心之要論也故成匠道俗並潤朱藍結宗慈訓遠近通洽而深護煩惱重慎譏疑尼眾歸依初不引顧每謂徒屬曰女為戒垢聖典常言佛度出家損減正法尚以聞名污心況復面對無染且道貴清顯不參非濫俗重遠嫌君子攸奉余雖不逮請遵其度由此受戒教授沒齒未登參謁諮請不聽入室斯則骨梗潔己清貞高蹈河東英俊莫與同風先是沙門寶澄隋初於普救寺創營大像百丈萬工纔登其一不卒此願而澄早逝鄉邑耆艾請積繼之乃惟大造之未成也且引七貴而崇樹之修建十年彫莊都了道俗慶賴欣喜相并初積受請之夕寢夢崖傍見二師子於大像側連吐明珠相續不絕既覺惟曰狩王自在則表法流無滯寶珠自涌又喻財施不窮冥運潛開功成斯在即命工匠圖夢所見於彌勒大像前今猶存焉其寺蒲坂之陽高爽華博東臨州里南望河山像設三層巖廊四合上坊下院赫奕相臨園磑田蔬周環俯就小而成大咸積之功撝空樹有皆積之力而弊衣菲食輕財重命普救殷贍追靜歸閑為而不恃即處幽隱天懷抗志頓絕人世不令而眾自嚴不出而物自往僕射裴玄真寵居上宰欽其令問頻贈香衣刺史杜楚客知人之重造展求法其感動柔靡皆此類也往經隋季擁閉河東通守堯君素鎮守荒城偏師肆暴時人莫敢竊視也欲議諸沙門登城守固敢諫者斬玄素同憂無能忤者積憤歎內發不顧形命謂諸屬曰時乃盛衰法無隆替天之未喪斯文在斯且沙門塵外之賓迹類高世何得執戈擐甲為禦侮之卒乎遂引沙門道愻神素歷階厲色而諫曰貧道聞人不畏死不可以死怖之今視死若生但懼不得其死死而有益是所甘心計城之存亡公之略也世之否泰公之運也豈五三虛怯而能濟乎昔者漢欽四皓天下隆平魏重干木舉國大治今欲拘繫以從軍役反天常以會靈祇恐納不祥之兆耳敢布腹心願深圖之無宜空肆一朝自傾於後為天下笑也公若索頭與頭仍為本願必縱以殘生逼充步甲者則不知生為何生死為何死積陳此語傍為寒心素初聞諫重積詞氣但張目直視曰異哉斯人也何乃心氣若斯之壯耶因捨而不問果詣積陳懺堯素以殺戮無度騁其毒心加又舉意輕陵雖當時獲寢而禍作其兆卒為城人薛宗所害自積立性剛果志決不迴遇逢瞋忿動為魚肉既出家後訶責本緣挫拉無情轉增和忍歲登耳順此行彌隆習與性成斯言不爽以貞觀十年九月十七日終於本寺春秋六十有九初積云疾的無所苦自知即世告門人曰吾今七十有五吾卒今年矣其徒曰師六十九矣何遽辭耶告曰死生法爾吾不懼也且老僧將年七十刺史貌吾增為六歲故其命在旦夕宜深剋勵視吾所行又曰經不云乎世實危脆無牢強者去終三日鍾不發聲逝後如舊眾咸哀歎釋德美俗姓王清河臨清人也年在童稚天然樂善口中所演恒鋪讚唄擁塵聚戲必先景塔每見形像生知禮敬由是親故密而異之知非紹續之胤也任從師學十六辭親投諸林野廣訪名賢用為師傅年至十九方蒙剃落謹敬謙恪專思行務雖經論備閱而以律要在心故四分一部薄通宗系追求善友無擇遐邇潔然自厲不群非類開皇末歲觀化京師受持戒檢禮懺為業因往太白山誦佛名經一十二卷每行懺時誦而加拜人以其總持念力功格涅槃太白九隴先有僧邕禪師道行僧也因又奉之而為師導從受義業亟染暄涼後還京輦住慧雲寺值默禪師又從請業默即道善禪師之神足也善遵承信行普功德主節約形心不衣皮帛默從受道聞見學之望重京都偏歸俗眾美依承默十有餘年三業隨從深相器待所以每歲禮懺將散道場去期七日苦加勵勇萬五千佛日別一遍精誠所及多感徵祥自爾至終千有餘遍故默之弘獎福門開悟士俗廣召大眾盛列檀那利養所歸京輦為最積而能散時又珍重常於興善千僧行道期滿䞋奉人別十縑將及散晨外赴加倍執事懼少依名付物默聞告曰何有此理不成僧義必若約截凡聖難知但當供養不慮虛竭庫先無貯物出散之晨及設大會七眾俱集施物山積新舊咸充時又欽之謂其志大而致遠故使靈祇冥助也不然誰能覩斯不懼耶故自開皇之末終於大業十年年別大施其例咸爾默將滅度以普福田業委於美美頂行之故悲敬兩田年常一施或給衣服或濟糇糧及諸造福處多有匱竭皆來祈造通皆賑給又至夏末諸寺受盆隨有盆處皆送物往故俗所謂普盆錢也往住禪定斯事無殆大業末歲夏召千僧七日行道忽感異人形服率然來告美曰時既炎熱何不打餅以用供養美曰麵易辦也人多餅壞何由可致便曰易可辦耳且溲三十斛麵作兩日調餅不壞也即隨言給但云多辦瓫水槽多貯冷水明旦將設半夜便起打麵搥案鼓動人物僧俗聚觀驚亂眼耳須臾打切麵已將半命人煮之隨熟內水自往攪之及明行餅皆訝緊韌抽拔難斷千人一飽咸共欣泰試尋匠者通問失所餘有槽瓮中餅日別供僧乃盡限期一無爛壞合眾悲慶感通斯應武德之始創立會昌又延而住美乃於西院造懺悔堂像設嚴華堂宇宏麗周廊四注複殿重敞誓共含生斷諸惡業鎮長禮悔潔淨方等凡欲進具必先依憑蕩滌身心方登壇位又於一時所汲浴井忽然自竭徒眾駐立無由洗懺美乃執爐臨井苦加祈告應時泉涌還同恒日時共宗焉所畜舍利藏以寶函隨身所往必齎供養每諸起塔祈請散之百粒千粒隨須而給精苦所感隨散隨滿由是增信彌隆勤懇不絕又年經秋夏常行徒跣恐蹈蟲蟻慈濟意也或行般舟一夏不坐或學止過三年不言或効不輕通禮七眾或同節食四分之一如斯雜行其相紛綸即目略舒羌難備舉生常輟想專固西方口誦彌陀終于命盡以貞觀十一年十二月二十六日合掌稱佛卒于寺院春秋六十三矣乃送於南山鴟鳴塠後又收骸於楩梓谷起塔弟子等樹碑于會昌寺侍中于志寧為文又京邑沙門曇獻者亦以弘福之業功格前賢身令成範眾所推揖所造福業隨處成焉故光明寶閣冠絕寰中慈悲佛殿時所驚異人世密爾故不廣焉釋慧胄姓王蒲州蒲坂人少在道門樂崇福事受具已後師表僧祇及至立年又專禪誦曉夕相繼偏重法華後住京邑清禪寺草創基構並用相委四十餘年初不告倦故使九級浮空重廊遠攝堂殿院宇眾事圓成所以竹樹森繁園圃周遶水陸莊田倉廩碾磑庫藏盈滿莫匪由焉京師殷有無過此寺終始監護功實一人年至耳順便辭僧任眾以勤劬經久且令權替及於臨機斷決並用諮詢寺足淨人無可役者乃選取二十頭令學鼓舞每至節日設樂像前四遠同觀以為欣慶故家人子弟接踵傳風聲伎之最高於俗里遇患極困自然知卒香湯沐浴正理衣襟曰吾有小罪須加重病事由營造掘鑿故也至於終晨言氣不昧告弟子曰酬債了矣吾其去矣尋聲而卒春秋六十有九即貞觀初年也乃露骸收葬為起方墳就而銘之時京邑會昌有沙門法素者倜儻不倫操業奇卓雅為眾怪本師智顗專行勸福昔在江表遊適所至皆設萬人大會夜告纔竟明即成辦此例非一隋末東都嬰城自固肌骨相望有若塊焉寺有金像二軀各長一丈素不忍見斯窮厄取一融破籴米作糜餧諸餓者須臾米盡又取欲壞時沙門辯相與諸僧等拒諍不與素曰諸大德未知至理也昔如來因地為諸眾生尚不惜頭目髓腦或生作肉山或死作大魚以濟飢餧如何成果復更貪惜化形必不然矣素今身肉堪者亦所不惜大德須知今此一像若不惠給眾生城破之後亦必從毀則墜陷多人何如素今一身當也眾不許之及偽鄭降日像先分散如其言焉然其言行譎詭險而難遵其例不一後入京室卒會昌寺釋智通姓陳住梓州八歲出家為正道法師弟子後誦法華并講在牛頭山善持威儀奉戒貞苦降伏皇老士女奏章必杖之五十遠近皆憚寺宇成就惟其終始合眾畏懾無蓄私財者常有雙鵝依時聽講講百餘遍兩度放光至貞觀二十三年十月十三日告眾吾造山寺可用十萬貫恨未周備今便永別言訖而卒春秋九十七矣小食時終合寺房堂皆動而作白色經一食頃釋慧震姓龐住梓州通泉寺身長八尺後聽暠師三論大領玄旨福力所被蜀部遙推暠之還南得袈裟二百領以贈路首每年正月轉藏經千人袈裟奉施無闕常弘三論聽眾百餘忽於高座似悶見人語曰西山頭好造大佛既覺下座領眾案行中堪造像兩邊泉流即命石工鐫鏨座身高百三十尺貞觀八年周備成就四面都集道俗三萬慶此尊儀其像口中放大白光遠近同奉先有一馬日行五百曾經入陣餘馬並死惟此得還至十四年七月忽自嘶鳴不食三日震聞毛竪有一異僧名為十力語震曰馬與主別主當先行來年正月十五日日正中時應入涅槃法師須散財物無留於後於身何益言已而隱莫知其由先造藏經請僧常轉開大施門四遠悲敬來者皆給至終年初又請眾僧讀經行道作三七日俗緣昆季內外皆集至於八日香氣欝勃充滿寺中傾邑道俗共聞異香捨散山積至十五日氣猶不歇從旦至午寺內樹木土地皆生蓮華眾覩奇瑞知其即世震曰嘉相已現不容待滿便行䞋施早食訖手執香爐繞盧舍那三匝還於佛前䠒跪正念大眾滿堂不覺已逝春秋六十有六停喪待滿香氣猶存兄弟三人各捨五十萬於墓所作僧德施及以悲田作石塔高五丈龕安繩床扶屍置上經百餘日猶不委仆道俗萬餘悲涼相結云釋慧雲姓王太原人也遠祖避地止于九江弱年樂道投匡山大林寺沙門智鍇而出家焉鍇亦標領當時有聲出世而雲慷慨時俗精厲歸從故得獨異恒倫不拘物累致有大節大務偏所留心時年二十有五達禪師者江淮內外所在興造事力不遂咸來祈請雲為寺廟毀壞故致邀延達不許之雲以來告不申便陳死請委身在地涕泗滂沱流迸塗漫滿五尺許又以頭叩地青腫覆眼加諸誓願曰若不蒙赴雲亦投江達見其意盛歘然迴意雲即前告道俗所在迎候披草望山行不由徑路值群虎不暇駐目延達至山須有經始泝流諸處檢校功德時屬嚴冬氷擁船路崩砂頹結屢阻舟人雲乃急繫衣裳破氷挽纜腰胯以下凌澌截肉流血凝住不覺疲苦自此船行二百餘里方登所在其懇誠難繼並例此也隋季末齡中表賊亂有林士弘者結眾豫章偽稱楚帝偽尚書令鄱陽胡秀才親領士眾臨據九江因感發心欲寫廬山東林文殊瑞像盡所鎮境訪監護者道俗僉議以雲有出眾之奇雅當此選鑪錘既辦便就鎔範光儀乃具惟頸及脇兩處有孔時眾未之悟也其年秀才偽勅所追有像色金百二十兩盛以竹筒雲以賊徒蜂起無方守護並用付才又以念誦銅珠一環遺才為信行至宮亭軍士乞福才得便風舉帆前引於江中路遭浪船沒財物蕩盡惟人達岸才諸無所恨但失像色金煩冤江畔呼嗟不絕誓願不成深為業也須臾金筒隨浪逆流并遺銅珠前後相繼汎隱向岸就才既獲色金舉眾同叫歡欣無量計被沒處至所出岸三十餘里重而能浮逆波相授軍民通怪驚異靈感及才之遇害也刃開頸脇恰符像焉初才之欲擊賊以金用委叔父曉禪師及楚都既覆群寇交侵曉用弊布裹金擔以避難不免為賊所奪既失像金取求無計尋有賊中來者盜金投曉俱不知是金擔也曉得本金委雲成就光相超挺今在山閣初鑄像時有李五戒者私發願曰若鎔金日誓然一臂雲為模樣早成遂前期日李氏不知已鑄乃夢像曰汝先願然臂如何違信耶李氏夢寤因始知之即於像前以刀解臂蠟布纏骨而燒焉又感徵應略其事也雲以江介威紆累逢草竊經論乃積而戒律未弘遠趣帝京躬參學府值首律師當陽開化大適本志悲喜交并採掇行務有聞朝省下勅令住弘福而形貌長偉骨面多髯言晤成章眾所知識偏能讀誦頗盛威容故齋福大集恒居坐首群公卿士側席虛心一舉五卷須臾尋了未聞𠲿噎莫不嘉尚然其程器即目故略敘之論曰夫住持之相其例乃多包舉精博要惟二種道法弘世則靜倒絕其生源相法所持則導昏開其耳目宗途既闡萬代奉其風規雖或中微終亦依之成則昔如來創化寺開須達之源塔現古今初惟積土之漸沿斯已後福事彌隆無憂之碣林繁有信之園星布自摩滕入洛其相先揚建寺以宅僧尼顯福門之出俗圖繪以開依信知化主之神工故有列寺將千繕塔數百前修標其華望後進重其高奇遂得金剎干雲四遠瞻而懷敬寶臺架逈七眾望以知歸並弘道之初津攝度之權術也至如引風治閣出慧達之深誠傳聲停毒寔智興之通感僧明志開遺寄僧晃操動幽明達公因治水而集材美上假冥聖而陳供慧雲貞烈黃金以之不沈道積抗言白刃由斯不拔若斯監護不蔑由來然則經理眾事論陳退沒並由志節素少情非巧能致涉艱違便虧誓願功敗垂成義當斯也昔如來在世躬治院門大集僧務非聖不履迦葉之營五寺恒預蹋泥目連之任月直常供掃地是以福事之來導引逾遠下凡祖習故是常科而頃世惰窳每多欺負覩塗塔為庸夫謂引材為竪伍出道無宜行施入俗有絕清心斯語不倫殊乖正則故天報為貴尚行乞於人間聖果為高猶被餓於僧部斯徒眾矣略舉可知是以福智二嚴空有兩諦大經大論盛列綱猷即可師承難為排斥且自世有諸福其流多雜倚傍了經陳揚疑偽隋祖開皇之始釋教勃興真偽混流恐乖遺寄乃勅沙門法經定其正本所以人中造者五百餘卷同並燔之餘不盡者隨方間出比諸經藏惟錄正本通數則有三萬餘卷已外別生雜集並不寫之至於疑偽時復抄錄斯由未曾陶練故致此涉試為論之至如藥師行事源出宋朝比用在疑頗存沿俗隋煬洛水彥琮所翻義節全同文鋪少略斯則梵本有據祈福之元宰也但以世惟相有非相何以曉心大聖逗機任物而敷此要如說行者必致攘除恐涉懷己自虧名實故彼文云口為說空行在有中誠言得矣或有精專懇苦厚供彌隆而所祈無應者則往業堅明定須酬償故文云惟除宿殃餘則可脫然則業無永定皆可轉除任業增生無成聖義故經明懺止約內心有愧則亡無慚斯有三報輕重具顯涅槃六根淳薄亦陳實觀是知宿殃不請例是別時通諸理教義須隱括又有普賢別行金光總懺多歸清眾事乖通俗比有行事執著者多遍告雖來皆虧法利故彼文云諸業障海從妄想生還須體妄乃傾前業今則緣念彼此我所兩存倒想逾增故難遭聖義應塵無以表達真識有以明通俗在凡下位行漸若斯順舊常熏理非筌悟梁初方廣源在荊襄本以厲疾所投祈誠悔過哀茲往業悲慟酸涼能使像手摩頭所苦欻然平復同疾相重遂廣其塵乃依約諸經抄撮成部擊聲以和動發恒流談述罪緣足使汗垂淚瀉統括福慶能令藏府俱傾百司以治一朝萬化惟通一道被時濟世諒可嘉之而恨經出非本事須品藻六根大懺其本惟梁武帝親行情矜默識故文云萬方有罪在予一人當由根識未調故使情塵濫染年別廣行捨大寶而充儓僕心力所被感地震而天降祥是稱風靡欝成恒則有陳真觀因而廣之但為文涉菁華心行頗淡原夫懺悔之設務在專貞欲使肝膽露於眾前慚愧成於即日固得罪終福始言行可依如文宣之製淨住言詞可屬引經教如對佛述厭欣如寫面卷雖二十覽者不覺其繁文乃重生讀人不嫌其妨世稱筆海固匪浮言又有妄讀懺文行於悔法罪事叢雜不解位以十條因構煩挐未知本於三惱浪誦盡紙昏憒通於自他為師難哉墮負歸於彼此如斯遣累未曰清澄固約前論薄為准的六道慈懺源亦同前事在歲終方行此祀道別開奠海陸之味畢陳隨趣請祝慈悲之意弘矣原夫六道至果趣別重輕人含十等之差餘則舉例可悉阿含所述入處鬼道有親供祭心生隨喜心喜身飽故曰充飢非由供福業令自受以正法義理有所從無有自作他人受果斯則目連飯母事也自外五趣報局所收隨報位隔無由通給今則道別陳奠恐非臨饗然又報得諸通事含生趣不妨他心徹視待會而從祭酹自此已外其例難收或度星安宅決明罪福占察投輪懷疑結線同歸淺俗未入深經然罪積由來福興伊始俱惟妄想而善卦難諧愚凡所履諒參其用又有不揆分量登冐聖賢端然思道剋成位地此並想心懷道不識道是妄心知妄思心不起有起實歸惟識識心達俗知何不為用此投輪應分業相又有方等佛名般舟誦呪多以夢王表淨准此用顯澆淳且夢惟冥妄想象尚取依憑況在現輪舉擲其心可准若夫惑業所起梯構有因惑必違理而生故懺務觀其理業生依事而起故懺還須緣事悔必勤身營構慚愧為其所宗理悔必析破我人知妄是其大略並如別錄悔法廣之是知釋宗一化大較三門若樂罪時須弘福事因修福故便起想著則應破遣教思理觀如斯易奪集業可期若滯此三全乖教意惟夫大聖垂世末欲增生福順情欣還資故習義須思擇斷結入道斯言極矣世不達者以福為道耽附情纏用為高勝正是戒見二結所收我倒常行何能遣縛是以通人審權實之有從達界繫之無爽明惑性之重輕曉分量之優劣莫不以罪障天人一向須捨福為有基雖行不普由諸八禪滯情六度不淨事觀及世順善皆為有法大論明言計並封心故非道業至如色有初定凡聖通行非想極居無生不止終乖出要未靜輪迴但為封迷不厭故也況以亂善用充靜業有識聞之足為殷鑒流俗儒素尚捐固我之心但謂我能行之故非清蕩所攝豈得心用浮動觸境增迷妄計為道一何可笑復聞福為有本潛神不修身行處世何能無事事涉罪福理必通知且如衣食四資無時不假佛制取納惟依觀門輕侮對治斯誠罪也奉觀勤行斯誠福也謂我能行便成違理我不能行又是違事違事則業繫三途違理則福纏諸欲在凡使性何能靜心入止正見方傾苦趣故知因修世相知何不為惟勤觀用漸當缺有不爾沈淪還歸無始伊我同舟可不免哉雜科聲德篇第十正傳十二附見八陳楊都光宅寺釋慧明傳一高齊鄴下沙門釋道紀傳二隋京師定水寺釋法稱傳三智雲隋杭州靈隱山天竺寺釋真觀傳四隋蘇州栖霞寺釋法韻傳五隋東都慧日道場釋立身傳六慧寧廣壽隋西京日嚴道場釋善權傳七法綱隋東都慧日道場釋智果傳八玄應智騫隋京師日嚴道場釋慧常傳九道英神爽唐京師玄法寺釋法琰傳十唐京師定水寺釋智凱傳十一唐京師法海寺釋寶巖傳十二釋慧明不知何人貌儀象胡故世以胡明為目然其利口奇辯鋒涌難加摛體風雲銘目時事吐言驚世聞皆諷之後乃聽採經論傍尋書史捃掇大旨不存文句陳文御世多營齋福民百風從其例遂廣眾以明騁衒脣吻機變不思諸有唱導莫不推指明亦自顧才力有餘隨聞即舉牽引古今包括大致能使聽者欣欣恐其休也宣帝在位大建五年將事北征觀兵河上已遣大都督程文季等領軍淮浦與齊對陣雄氣相傾帝甚憂及乃於太極殿命龜卜之試卦腹文颯然長裂君臣失色為不祥也即請百僧齋時一會臨中獊猝未測所由及行香訖乃陳卜意明抗聲敘致又述緣曰卜征龜破可謂千里路通既其文季前鋒豈不一期程捷時以為浮飾也至四月中次大小峴與齊大戰俘虜援兵二十餘萬軍次譙合呂梁彭越前無橫陣故下勅云今歲出師薄伐邊服所獲梁土則江淮二百許城東西五千餘里然龜腹長文號千里也遠驗明言宛同符契故明承此勢為業復隆偏意宗猷達悟登白者其量弘矣不測其終釋道紀未詳氏族高齊之初盛弘講說然以成實見知門學業成分部結眾紀用欣然以教習之功成遺業也天保年中秋初立講紀引眾首出鄴城南彼舊門人又引眾入正於閫側欻爾相值紀曰卿從何來殊無禮也如何師範輒抗拒耶既不傾屈理宜下道彼曰法鼓競鳴利建斯在聲榮之望師資焉有紀不答自為下道出于城外迴首告其屬曰吾講成實積三十載開悟匠導望有功夫解本擬行斯遺誡也今解而不行還如根本不解矣徒失前功終無後利往不可追來猶可及請並返京吾當別計乃退掩房戶廣讀經論為彼士俗而行開化故其撰集名為金藏論也一帙七卷以類相從寺塔幡燈之由經像歸戒之本具羅一化大啟福門論成之後與同行七人出鄴郊東七里而頓周匝七里士女通集為講斯論七日一遍往必荷擔不恥微行經書塔像為一頭老母掃帚為一頭齊佛境內有塔斯掃每語人曰經不云乎掃僧地如閻浮不如佛地一掌者由智田勝也親供母者以福與登地菩薩齊也故其孝性淳深為之縫補衣著食飲大小便利必身經理不許人兼有或助者紀曰吾母也非他之母形骸之累並吾身也有身必苦何得以苦勞人所以身為苦先幸勿相助因斯以勵道俗從者眾矣又復勸人奉持八戒行法社齋不許屠殺所期既了又轉至前還依上事周歷行化數年之間遶鄴林郊奉其教者十室而九有同侶者故往候曰比行化俗何如道耶紀曰彼講可追今則無悔既往不咎知復何言後遭周氏吞併玄教同廢呼嗟俗壤每崇斯業及開法始更廣其門故彼論初云邪見者是也所以世傳何隱論師造金藏論終惟紀也故改名云然其所出抄略正文深可依准後不測其終釋法稱江南人通諸經聲清響動眾陳氏所化舉朝奉之又善披導即務標奇雖無希世之明而有隨機之要隋平南服與白雲經師同歸秦壤住興善寺每引內禁敘論正義開納帝心即勅正殿常置經座日別差讀經聲聲不絕聽覽微隙即問經旨遂終昇遐晚住定水與雲同卒俱八十餘仁壽年也時有智雲亦善經唄對前白者世號烏雲令望所高聲飛南北每執經對御嚮振如雷時慘哀囀停駐飛走其德甚眾祕不泄之故無事緒可列又善席上談吐驚奇子史丘索都皆諳曉對時引挽如宿搆焉隋煬在蕃彌崇敬愛召入慧日把臂朋從欣其詞令故也年登五十卒於京師王悲惜焉數日不出廣為追福又教沙門法論為之墓誌見於別集釋真觀字聖達吳郡錢唐人俗姓范氏祖延蒸給事黃門侍郎父兌通直散騎常侍母桓氏溫良有德嘗悱憤無胤潔齋立誓誦藥師觀世音金剛波若願求智子紹嗣名家時獻統所圖迦毘羅王者在上定林寺巨有靈異躬往祈禱刻寫容影事像若真依藥師經七日行法至於三夕覺遊光照身自爾志性非恒言輒詣達豈非垂天託人寄范弘釋者也及其誕育奇相不倫左掌仙文右掌人字口流津液充閏榮府從幼至終未嘗患渴故體膚光偉雖老不衰舌文交加狀如羅綺故得含章蘊辯開神明晤又聲韻鍾鈴捷均風雨其見聞者莫不驚異小有大概五歲能蔬齋或登衣篋或執扇帚戲為談講八歲通詩禮和庾尚書林檎之作十六儒道群經柱下河上無所遺隱時又流涉碁琴暢懷文集日新月異師友驚忻嘗共友人逍遙津渚有善相者迎而拜曰年少當為大法師後即專誦淨名般若志存入道伺機承色二親弗許乃曰迦毘降夢子欲開籠拘令在網此非黠慧父母咸開心隨喜啟勅降言并賜衣鉢義興生法師行潔小震躬為翦落大功德貞律師道藹雲陽請任和上研思十誦一遍能述又從華林園法師受成實論十遍十覆超振前標自謂解成可填以行也始誦法華日限一卷因斯通夢汝有大根忽守小道深可惜也遂往興皇聽摩訶衍質疑明難唐突玄門朗公精通綽然復加脂粉吾出講八年無一問至此能使妙義開神真吾師矣仍從北面數載研尋開善大忍法師匿影鍾山遊心方等將欲試瞻先達問津高士因操桴扣寂用程玄妙乃歎曰龍樹之道方興東矣辯勇二師當塗上將頻事開折亟經重席時人語曰錢唐有真觀當天下一半沙門洪偃才邁儒英鉤深釋傑面相謂曰權高多智耳目有名我有四絕爾具八能謂義導書詩辯貌聲棊是也由此王公貴遊多所知識始興王東臨禹井請以同行于時興皇講筵選能義集觀臨途既促咸推前次既登高座開二諦宗百並縱橫一言氷泮學士傅繹在席嗟曰三千稱首七十當初是上人者當為酬對金陵道俗見知若此既達東夏住香嚴寺講大涅槃四方義集復增榮觀興皇又三追曰吾大乘經論略已弘通而燕趙齊秦引領翹足專學雖多兼該者寡宜速反東蕃法門相寄于斯時也征周失律朝議括僧無名者休道觀乃傷迷歎曰夫剎利居士皆植福富強黎庶廝小造罪貧弱欲茂枝葉反剋根本斯甚惑矣人皆惜命偷生我則亡身在法乃致書僕射徐陵文見別集陵封書合奏帝懍然動容括僧由寢據斯以言非但梁柱佛法亦乃明略佐時矣江夏王出鎮于越復請同行朗師吞咽良久言曰能住三年講堂相委復屬英王尚法利益深不可留也仍於禹穴屢動法輪特進杜稜請歸光顯傳教學徒及永陽鄱陽二王司空司馬消難並相次海運延仰浙東故得塗香慧炬以業以煥頂敬傾心盡誠盡節天台智者名行絕倫先世因緣敦猷莫逆年臘既齊為法兄弟共遊秦嶺凌雲舊房朝陽澄景則高談慧照夕陰匿采則深安禪寂及智者徵上闕庭觀便孤園敷說大流法味載廣俗心永陽還京仰奏清德舉朝僧正同請絲綸遂逢祚終斯事便寢隋祖尚法惟深三勅勞問秦王蒞蕃二延總府皆辭以疾確乎不就齊王晚迎江浦躬申頂禮傳以香火送還舊邑之眾善寺開皇十四年時極亢旱刺史劉景安請講海龍王經序王既訖驟雨滂霔自斯厥後有請便降吳越宗仰其若神焉縣西有靈隱山者舊曰仙居峯吐蓮華洞藏龍穴信江東之秀嶽也觀既仁智內冥山水外狎共道安禪師頭陀石室檀越陳仲寶率諸同侶開藏拓基構立精舍號南天竺遂即去邑還谷栖止終焉眾善講堂付門人玄鏡鏡承瓶瀉相從不絕及文皇造塔形勝所歸不謀同集取決於觀乃指崔嵬高石可安塔基雖發誠言孰為可信俛仰穿鑿洞穴自然狀似方函宛如奩底天工神匠冥期若符自爾在山常講法華用為心要受持讀誦躬自書弘五種法師於斯乎在又特於經旨明練深趣談吐新奇非尋紙墨智思擊揚逈飛文外又感盥洗遺渧地不為濡事理異人經之力也睪亭神姓陳名重降祝請講法華一遍遺以錢物又降祝捨其廟堂五間為眾善佛殿據斯以言感靈通供誠希有也大業七年四月八日司馬李子深更延出邑講大涅槃初出天竺自標葬地至現病品夢見三人容服甚盛把幡俱禮云淨居遣迎至六月六日以疾而臥又夢與智者同輿夾侍尊像翼佛還山覺已歎曰昔六十二應終講法華力更延一紀今七十四復致斯應生期畢矣即集內眾訓將來事曰欲生善道欲備神力欲出生死欲具佛法宜須持戒修定學慧弘通正法勿令空過無所得也爾日天台送書并致香蘇石蜜觀覽書曰宿世因緣最後信矣命兩如意一東向天台一留西法志諸雜服式吾眼自分一還僧羯磨二成第五僧施嘗有人夢飛殿來迎沙門寶慧又聞空中鼓樂至七月一日中夜跏坐盥嗽整服曰有人請講菩薩戒也端坐怡然不覺已滅逝於眾善之舊寺從子至午心頂俱煖身體柔軟顏色不變右手內掘三指信宿流汗遍身至四日移入禪龕時屬流火焰氣尚嚴而儼若生存寔資神力從此至二十五日四方輻湊六縣同集道俗公私一期咸萃皆就屍手傳香表別敘德號慕悲起纏雲追惟戒德泣垂零雨至香花供獻日有千群隨次大齋開龕瞻奉而色相光潔眉毫更長倍異生前咸加奇歎至二十六日乃永窆於靈隱山真容掩方墳寫狀留天竺是日四部亘一由旬香蓋成蔭幢幡蔽野存亡榮慶非可勝言初觀聲辯之雄最稱宏富江表大國莫敢爭先自正法東流談導之功衛安為其稱首自爾詞人莫不宗猷於觀是知五百一賢代興有日佛法榮顯寔賴斯乎開皇十一年江南叛反王師臨弔乃拒官軍羽檄競馳兵聲逾盛時元帥楊素整陣南驅尋便瓦散俘虜誅剪三十餘萬以觀名聲昌盛光揚江表謂其造檄不問將誅既被嚴繫無由申雪金陵才士鮑亨謝瑀之徒並被擁略將欲斬決來過素前責曰道人當坐禪讀經何因妄忤軍甲乃作檄書罪當死不觀曰道人所學誠如公言然觀不作檄書無辜受死素大怒將檄以示是爾作不觀讀曰斯文淺陋未能動人觀實不作若作過此乃指擿五三處曰如此語言何得上紙素既解文信其言也觀曰吳越草竊出在庸人士學儒流多被擁逼即數鮑謝之徒三十餘人並是處國賓王當世英彥願公再慮不有怨辜素曰道人不愁自死乃更愁他觀曰生死常也既死不可不知人以為深慮耳素曰多時被縶叵解愁不索紙與之令作愁賦觀攬筆如流須臾紙盡命且將來更與一紙素隨執讀驚異其文口唱師來不覺起接即命對坐乃盡其詞故賦略云若夫愁名不一愁理多方難得覼縷試舉宏綱或稱憂憒或號酸涼蓄之者能令改貌懷之者必使迴腸爾其愁之為狀也言非物而是物謂無象而有象雖則小而為大亦自狹而成廣譬山岳之穹隆類滄溟之滉瀁或起或伏時來時往不種而生無根而長或比煙霧乍同羅網似玉葉之晝舒類金波之夜上爾乃過違道理殊乖法度不遣喚而輒來未相留而忽住雖割截而不斷乃驅逐而不去討之不見其蹤尋之靡知其處而能奪人精爽罷人歡趣減人肌容損人心慮至如荊軻易水蘇武河梁靈均去國阮叔辭鄉且如馬生未達顏君不遇夫子之詠山梁仲文之撫庭樹並㤞慸於胸府俱讚揚於心路是以虞卿愁而著書束皙憑而作賦又如蕩子從戎倡婦閨空悠悠塞北杳杳江東山川既阻夢想時通高樓進月傾帳來風愁眉歇黛淚瞼銷紅莫不咸悲枕席結怨房櫳乃有行非典則心懷疑惑未識唐虞之化寧知禹湯之德霧結銅柱之南雲起燕山之北箭既盡於晉陽水復乾於疎勒文多不載素大嗟賞即坐釋之所達文士免死而為僕隸觀以才學之富弘導不疲講釋開悟榮光俗塵具於前敘其所講大乘四十二載又造藏經三千餘卷金銅大像五軀搆塔五層五僧德施造寺二所著諸導文二十餘卷詩賦碑集三十餘卷近世竊用其言眾矣釋法韻姓陳氏蘇州人追慕朋從偏工席上騷索遠度罕得其節誦諸碑誌及古導文百有餘卷并王僧孺等諸賢所撰至於導達善能引用又通經聲七百餘契每有宿齋經導兩務並委於韻年至三十弊於諠梗邀延疏請日別重疊乃於正旦割繩永斷即聽華嚴不久便覆恨悢棄功妄銷脣舌承栖霞清眾江表所推尋聲即造從受禪道又聞泰岳靈巖因往追蹤般舟苦行特立志梗潔不希名聞擔石破薪供給為任晚還故鄉有浮江石像者如前傳述後被燒燼而不委相量無由可建便於石像故基願禮八萬四千塔樹功既滿感遇野姥送一卷書及披讀之乃是昔像之緣也既有樣度依而造成大有徵應海中有陽虎島者去岸三百韻往安禪惟服布艾行慈故也初達逢怪大風鬼物既見如常心毛不動九十日後帖然大安自知終事還返栖霞不久便卒春秋三十五即仁壽四年矣釋立身江表金陵人志節雄果不緣浮綺威容肅然見者憚懾有文章工辯對時江左文士多興法會每集名僧連霄法集導達之務偏所牽心及身之登座也創發謦咳砰磕如雷道俗斂襟毛竪自整至於談述業緣布列當果冷然若面人懷厭勇晚入慧日優贈日隆大業初年聲唱尤重帝以聲辯之功動衷情抱賜帛四百段氈四十領性本清儉無兼儲蓄率命門學通共均分從駕東都遂終于彼時年八十餘矣時西京興善官供尋常唱導之士人分羽翼其中高者則慧寧曠壽法達寶巖哮吼之勢有餘機變之能未顯人世可覿故不廣也釋善權楊都人住寶田寺聽採成論深有義能欻爾迴思樂體人物隨言聯貫若珠璧也眾以學工將立不願弘之而權發悟時機為功不少適詣為得遂從其務然海內包括言辯之最無出江南至於銓品時事機斷不思莫有高者晚以才術之舉煬帝所知召入京師住日嚴寺獻后既崩下令行道英聲大德五十許人皆號智囊同集宮內六時樹業令必親臨權與立身分番禮導既絕文墨惟存心計四十九夜總委二僧將三百度言無再述身則聲調陵人權則機神駭眾或三言為句便盡一時七五為章其例亦爾煬帝與學士柳顧言諸葛頴等語曰法師談寫乍可相從導達鼓言奇能切對甚可訝也頴曰天授英辯世罕高者時有竊誦其言寫為卷軸以問於權權曰唱導之設務在知機誦言行事自貽打棒雜藏明誡何能輒傳宜速焚之勿漏人口故權之導文不存紙墨每讀碑誌多疏麗詞傍有觀者若夢遊海及登席列用牽引囀之人謂拔情實惟巧附也大業初年終日嚴寺時年五十三矣門人法綱傳師導法汪汪任放譎詭多奇言雖不繁寫情都盡蕭僕射昆季時號學宗常營福祀登臨莫逮每有檀會必遣邀迎然其令響始飛颯焉早逝釋門掩扇道俗咸惋釋智果會稽剡人率素輕清慈物在性常誦法華頗愛文筆經史固其本圖摛目得其清致時弘唱讀文學所欣俗以其書勢逼右軍用呈蕃晉王乃召令寫書果曰吾出家人也復為他役都不可矣一負聲教之寄二違發足之誡王逼吾身心不可逼乃云眼闇不能運筆王大怒長囚江都令守寶臺經藏及入京儲貳出巡楊越乃上太子東巡頌其序略云智果振衣出俗慕義遊梁感昔日之提獎喜今辰之嘉慶遂下令釋之賜錢一萬金鍾二枚召入慧日終于東都六十餘矣時慧日沙門智騫者江表人也偏洞字源精閑通俗晚以所學追入道場自祕書正字讐校著作言義不通皆諮騫決即為定其今古出其人世變體詁訓明若面焉每曰余字學頗周而不識字者多矣無人通決以為恨耳造眾經音及蒼雅字苑宏敘周贍達者高之家藏一本以為珍璧晚事導述變革前綱既絕文縟頗程深器綴本兩卷陳敘謀猷學者祕之故斯文殆絕京師沙門玄應者亦以字學之富皂素所推通造經音甚有科據矣釋法琰俗姓嚴江表金陵人本名法藏住願力寺聽莊嚴寺皭公成實入義知歸時共讚賞每聞經聲唄讚如舊所經充滿胸臆試密尋擬意言通詣即以所解用諮先達咸曰卿曾昔習故有今緣不可怪也遂取瑞應依聲盡卷舉擲旁迸囀態驚馳無不訝之皆來返啟乃於講隙一時為敘陳國齋會有執卷者若不陳聲齋福不濟故使人各所懷相從畢聽清音盈耳頌聲洋溢廣流世路晚被晉府召入日嚴終于武德復居玄法雖年迫期頤而聲喉不敗京室雖富聲業甚貧諸有尋味莫有高於琰者然而性在知足不畜貲財福利所歸隨皆散盡以貞觀十年卒于此寺九十餘矣釋慧常京兆人以梵唄之工住日嚴寺尤能却囀哢響飛揚長引滔滔清流不竭然其聲發喉中脣口不動與人並立推檢莫知自非素識方明其作時隋文興法煬帝倍隆四海輻湊同歸帝室至於梵導讚敘各重家風聞常一梵颯然傾耳皆推心喪膽如飢渴焉僉曰若此聲梵有心聞之何得不善也眾雖效學風骨時參至於用與牽挽皆不及矣晚入東都梟感作亂齋梵總任咸共委常及平殄後復還關壤時有僣帝曰逆賊建福言涉國家並可收之因即募覓常被固送行次莎逃賊留曰往必被戮可於此止常曰債負久作終須償了遂至東都果如言焉年四十餘矣時京師興善有道英神爽者亦以聲梵馳名道英喉顙偉壯詞氣雄遠大眾一聚其數萬餘聲調稜稜高超眾外興善大殿鋪基十畝櫺扇高大非卒搖鼓及英引眾遶旋行次窓門聲聒衝擊皆為動振神爽唱梵彌工長引遊囀聯綿周流內外臨機賒促愜洽眾心貞觀年中豫州治下照機寺曇寶禪師者斷穀練形戒行無點年六十許常講觀音導引士俗而聲調超挺特異人倫寺有塔基至於靜夜於上讚禮聲響飛衝周三十里四遠所聞無不驚仰釋智凱姓安江表楊都人家世大富奴僕甚多年在童丱雅重謿謔引諸群小乃百數人同戲街衢以為自得陳氏臺省門無衛禁凱乃率其戲侶在太極殿前號令而過朝宰江總等顧其約束銓敘駐步訝之相視笑曰此小兒王也及至學年總擲前緒承沙門吉藏振宗禹穴往者談之光聞遠邇便辭親詣焉從受三論偏工領疊所以初章中假複詞遣滯學人苦其煩拏而凱統之冷然釋頓各有投詣及藏入京因倍同住義業通廢專習子史今古集傳有關意抱輒條疏之隨有福會因而標擬至於唱導將半更有緣來即為敘引冥符眾望隋末唐初嘉猷漸著每有殿會無不仰推廣誦多能罕有其類嘗於內殿佛道雙嚴兩門導師同時各唱道士張鼎雄辯難加自恨聲小為凱陵架欲待言了方肆其術語次帝德鼎延其語凱斜目之知其度也乃含笑廣引古今皇王治亂濟溺得喪銓序言無浮重文極鋪要鼎搆既窮凱還收緒一代宰伯同賞標奇臨機之妙銛鋒若此而情均貧富赴供不差存念寒微多行針療後以蠅點所拘申雪無路徙於原部乃冠服古賢講開莊老時江夏王道宗昔在京輦第多福會至於唱敘無非凱通後督靈州携隨任所留連歲稔欣慕朋從及巡撫燕山問罪泥海皆與連騎情同比影在蕃齋祀須有導達乃隔幔令凱作之至于終詞無不泣淚王亦改容遂卒於彼釋寶巖住京室法海寺氣調閑放言笑聚人情存道俗時共目之說法師也與講經論名同事異論師所設務存章句消判生起結詞義巖之制用隨狀立儀所有控引多取雜藏百譬異相聯璧觀公導文王孺懺法梁高沈約徐庾晉宋等數十家包納喉衿觸興抽拔每使京邑諸集塔寺肇興費用所資莫匪泉貝雖玉石通集藏府難開及巖之登座也案几顧望未及吐言擲物雲崩須臾坐沒方乃命人徙物談敘福門先張善道可欣中述幽途可厭後以無常逼奪終歸長逝提耳抵掌速悟時心莫不解髮撤衣書名記數剋濟成造咸其功焉時有人云夫說法者當如法說不聞陰界之空但言本生本事巖曰生事所明為存陰入無主但濁世情鈍說陰界者皆昏睡也故隨物附相用開神府可不佳乎以貞觀初年卒于住寺春秋七十餘矣論曰自古諸傳多略後科晉氏南遷方關名實然則利物之廣在務為高忍界所尊惟聲通解且自聲之為傳其流雜焉即世常行罕歸探索今為未悟試揚攉而論之爰始經師為德本實以聲糅文將使聽者神開因聲以從迴向頃世皆捐其旨鄭衛彌流以哀婉為入神用騰擲為清舉致使淫音婉孌嬌哢頻繁世重同迷尠宗為得故聲唄相涉雅正全乖縱有刪治而為時廢物希貪附利涉便行未曉聞者悟迷且貴一時傾耳斯並歸宗女眾僧頗兼之而越墜堅貞殊虧雅素得惟隨俗失在戲論且復彫訛將絕宗匠者希昔演三千今無一契將非沿世遷貿固得行藏有儀乎道達之任當今務先意在寫情疎通玄理本寔開物事屬知機不必誦傳由乖筌悟故佛世高例則身子為其言初審非斯人則雜藏陳其殃咎統其朗拔終歸慧門法師說法之功律師知律之用今且隨相分位約務終篇俗有無施不可又陳無備一人道則不輕未學亦開降外須博是以前傳所敘殷勤四能即用以觀誠如弘例何以明耶若夫聲學既豐則溫詞雅贍才辯橫逸則慧發隣幾必履此蹤則軌躅成於明道如乖此位則濫罔翳於玄津但為世接五昏人纏九惱俗利日隆而道弘頗躓所以坐列朝宰或面對文人學搆疎蕪時陳鄙俚褒獎帝德乃類阿衡讚美寒微翻同旒冕如陳滿月則曰聖子歸門悉略璋弧豈聞床几若敘閨室則誦窈窕從容能令子女奔逃尊卑動色僧倫為其掩耳士俗莫不寒心非惟謂福徒施亦使信情萎萃又有逞衒脣吻搖鼓無慚艶飾園庭閏光犬馬斯並學非師授詞假他傳勇果前聞無思箴艾遂即重輕同迹真誤混流顏厚既增彌深癡滯寧謂道達豈並然耶至如善權之對晤儲兩千紙不弊其繁華真觀之拔難程神百句彌開其邪信故得存亡定其尊考佳嚴審其郊邑詞調流便奕奕難窮引挽倫綜愜當情事能令倨傲折體儒素解頤便識信牢強頌聲載路今且略明機舉則得人開悟如此有背斯言則來誚掩化如彼輒試論矣臨機難哉唄匿之作沿世相驅轉革舊章多弘新勢討覈原始共委漁山或指東阿昔遺乍陳竟陵冥授未詳古述且敘由來豈非聲乖久布之象唯信口傳在人為高畢固難准大約其體例甚眾焉至如梵之為用則集眾行香取其靜攝專仰也考其名實梵者淨也寔惟天音色界諸天來覲佛者皆陳讚頌經有其事祖而習之故存本因詔聲為梵然彼天音未必同此故東川諸梵聲唱尤多其中高者則新聲助哀般遮掘勢之類也地分鄭魏聲亦參差然其大途不爽常習江表關中巨細天隔豈非吳越志揚俗好浮綺致使音頌所尚惟以纖婉為工秦壤雍梁音詞雄遠至於詠歌所被皆用深高為勝然則處事難常未可相奪若都集道俗或傾郭大齋行香長梵則秦聲為得五眾常禮七貴恒興開發經講則吳音抑在其次豈不以清夜良辰昏漠相阻故以清聲雅調駭發沈情京輔常傳則有大小兩梵金陵昔挵亦傳長短兩引事屬當機不無其美劍南隴右其風體秦雖或盈虧不足論評故知神州一境聲類既各不同印度之與諸蕃詠頌居然自別義非以此唐梵用擬天聲敢惟妄測斷可知矣唄匿之作頗涉前科至於寄事置布仍別梵設發引為功唄匿終於散席尋唄匿也亦本天音唐翻為靜深得其理謂眾將散恐涉亂緣故以唄約令無逸也然靜唄為義豈局送終善始者多慎終誠寡故隨因起誡而不無通議頌讚之設其流寔繁江淮之境偏饒此翫彫飾文綺糅以聲華隨卷稱揚任契便搆然其聲多艶逸翳覆文詞聽者但聞飛哢竟迷是何筌目關河晉魏兼而重之但以言出非文雅稱呈拙且其聲約詞豐易聽而開深信惟彼南服文聲若林向若節之中和理必諧諸幽遠隨墮難泝返亦希焉至如生嚴之詠佛緣五言結韻則百藏宗為師轄遠運之讚淨土四字成章則七部欽為風素斯並無聲以廁其本故得列代傳之或者問曰向敘諸讚唄績由聲余聞非聲無以達心非聲不颺玄理故歌詠頌法以為音樂斯言何哉必有此陳未聞前喻義須鎔裁節約得使文質相勝詞過其實世該所非聲覆法本佛有弘約何得掩清音而希激楚忽雅眾而冒昏夫斯誠恥也京輦會坐有聲聞法事者多以俗人為之通問所從無由委者昌然行事謂有常宗並盛德之昔流未可排斥至於聖哲彝訓通別兩序以命章述經敘聖人法諸頌以標首雖復序頌文別而開發義同古聖垂範於教端今賢祖承於事表世遠莫測其面斯推想得其蹤信有依焉固非誕妄且大集叢鬧昏雜波騰卒欲正理何由可靜未若高颺洪音歸依三寶忽聞駭耳莫不傾心斯亦發萌草創開信之奇略也世有法事號曰落花通引皂素開大施門打剎唱舉抽撤泉貝別請設坐廣說施緣或建立塔寺或繕造僧務隨物讚祝其紛若花士女觀聽擲錢如雨至如解髮百數數別異詞陳願若星羅結句皆合韻聲無暫停語無重述斯實利口之銛奇一期之走捷也餘則界得僧得其徒復弘尋常達嚫科要易悉故不廣也若夫適化無方陶甄不一知微詎幾達信誰焉然則堅信終乎我亡知微極乎想滅自斯階降漸次不倫達化以識變為明通法以濫委為闇故身子謬說無昇悟入眾首妄悔畢為譏訶自餘下凡諒難圖矣且道開物悟信乎說道之功既非會正何能審觀止可登機之務以意商量接俗之能存乎此舉猶應執文信度懲革者希擬人以倫固當非咎悠哉遐想通斯意焉終南大一山沙門京兆釋道宣敢告法屬曰竊以法流所被非人不弘頃世澆離多乖名實後學奔競未志尋籌致混篇章凋殘者眾自梁已後僧史荒蕪追討英猷罕有徽緒豈非綴緝寡鮮聞見遂沈高行明德湮埋難紀輒不涯揆且掇在言至於傳述固𮓪嘉績猶賢絕墜無聞於世所以江表陳統瓊晃琰皭之疇河北高都融琛散魏之侶英聲冐於天漢盛行動於人心並可楷模俱從物故嘗以暇日遍訪京賢名尚不聞何論景行撫心之痛自積由來相成之規意言道合仰託周訪務盡搜揚勿謂繁多致乖弘略世之三史卷餘四百尚有師尋豈喻釋門三五帙也故當微有操行可用師模即須綴筆更廣其類豈不光聞僧海舟徑聖蹤則釋門道勝顧思齊之有日俗流上達增景仰於生常邪輒舒傳末冀期神之有據耳
