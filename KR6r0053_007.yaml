body:
  text: 大唐西明寺沙門釋道宣撰義解篇三正紀十附見四陳楊都宣武寺釋洪偃傳一陳楊都興皇寺釋法朗傳二陳楊都大禪衆寺釋慧勇傳三陳楊都大彭城寺釋寶瓊傳四明解陳楊都白馬寺釋警韶傳五陳鍾山耆闍寺釋安廩傳六陳攝山栖霞寺釋慧布傳七僧詮玄辨周渭濱沙門釋亡名傳八僧琨魏鄴下沙門釋道竉傳九齊彭城沙門釋慧嵩傳十釋洪偃俗姓謝氏會稽山陰人祖茂恭和凝慎不交世俗父藏博綜經史善屬文藻梁衡陽王聞而器之引為僚友偃風神頴秀弱齡悟道晝讀經論夜諷詩書良辰華景未嘗廢學自爾幼而聰敏州里稱焉及長遊聽京邑遍聞數論後值龍光寺綽法師便委心受業特加賞接以為絶倫由是學侶改觀轉相推伏二三年中便盡幽奧乃開筵聚衆闡揚成實舉厝間雅詞吐抑揚後學舊齒稽疑了義橫經荷笈虛往實歸由此仰膺法輪總持諸部勇氣無前任其披解宿望弘量因循舊章偃屬思雲霄曾無接對見忤前達不能降情自是來學有隔聽者踈焉遂閉志間房高尚其道間以尋緗閲史廣求多見秋水春臺清文逈出壯思雲飛英詞錦爛又善草隸見稱時俗纖過芝葉媚極銀鉤故貌義詩書號為四絶當時英傑皆推賞之梁太宗之在東朝愛其俊秀欲令還俗引為學士偃執志不回故弗能致會武帝發講重雲延德肆問而年非宿老座第甚遠抗言高論精理入神帝賞嘆久之莫不矚目偃形止自若神守如初僉服其高亮也及引進後堂加優其禮屬戎羯陵踐兵飢相繼因避地于縉雲眷眄泉石又寇斥山侶遂越嶺逃難落泊馳滯曾無安堵梁長沙王韶鎮郢聞風敘造俄而渚宮陷覆上流阻亂便事東歸因懷自靜有顧林泉乃杖策若耶雲門精舍歷覽山水美其拪遲登吳升平亭賦詩曰蕭蕭物候晚肅肅天望清旅人聊杖策登高蕩客情川源多舊迹墟里或新名宿煙浮始旦朝日照初晴獨遊乏徒侶徐步寡逢迎信矣非吾託賞心何易并遂泛浪巖峰有終焉之志葺修寺宇結衆礪業逮陳武廓定革命惟新京輔舊僧纍相延請乃顧山衆曰吾勤苦積學五十餘年事故流離未遑敷說今時來不遂何謂為法亡身乎以天嘉之初出都講于宣武寺學徒又聚莫不肅焉雖樂說不疲而幽心恆結每因講隙遊鍾山之開善定林息心宴坐時又引筆賦詩曰杖策步前嶺褰裳出外扉輕蘿轉蒙密幽徑復紆威樹高枝影細山晝鳥聲希石苔時滑屣蟲網乍粘衣㵎旁紫芝曄巖上白雲霏松子排煙去常生寂不歸窮谷無還往攀桂獨依依會齊使通和舟車相接崔子武等擅出境之才議其瞻對衆莫能舉世祖文皇以偃內外優敏可與杭言敕令統接賓禮樞機溫雅容止方稜敷述皇猷光宣帝德才詞宏逸辨論旁馳潤以真文引之慈寄子武等頂受誥命銜佩北蕃帝嗟賞厚惠更倍恆度皆推以還公一無所納是歲舊疾連發聽者復疏止於小室許有咨問懷不能已情有斐然乃著成論疏數十卷剖發精理構思深劇疾轉沈篤功不剋就以天嘉五年九月二十一日至于大漸神氣不昧命弟子曰衆生為貪心之所暗也貪我則惜落一毛貪他則永無厭足至於身死之後使高其墳重其墎必謂九泉之下還結四鄰一何可笑而皇甫謐楊王孫微得我意雖知會歸丘壤而未知初度之心今冥目之後以此脯臘鄙形布施上飛下走一切衆生若前身相負仍以相償如無相對則生我檀善此之微心亦趣菩提物莫不共矣言畢合掌終於宣武寺焉春秋六十有一知與不知咸懷惻愴即以其月二十二日尸陀於鍾山開善寺之東岡焉然偃始離俗迄于遷化唯學是務儉節掃衣弗事華廣每緣情觸興輒敘其致而文彩灑落罕有嗣者綴述篇章隨手散失後人掇聚集之成二十餘卷值亂零失猶存八軸陳太建年學士何俊上之封于祕閣釋法朗俗姓周氏徐州沛郡沛人也祖奉叔齊給事黃門侍郎青州刺史父神歸梁員外散騎常侍沛郡太守朗託生之始母曰劉氏夢見神人乘樓殿入懷夢中如言身與空等既而覺寤四體輕虛有異恆日五辛雜味因此悉斷爰在齠齓卓出凡童孝敬純備志操貞立家雄六郡氣蓋三邊少習軍旅早經行陳儉約治身寵辱無能移也俄而假節寧遠將軍徐子彥北伐門設長戟坐休大樹惟曰兵者凶器身曰苦因欲海邪林安能覺者年二十一以梁大通二年二月二日於青州入道遊學楊都就大明寺寶志禪師受諸禪法兼聽此寺彖律師講律本文又受業南㵎寺仙師成論竹㵎寺靖公毗曇當時譽動京畿神高學衆所以天口之侶藏耳之賓心計目覽莫不奔競但以鷲山妙法群唱罕弘龍樹道風宗師不輟前傳所紀攝山朗公解玄測微世所嘉尚人代長往嗣續猶存乃於此山止觀寺僧詮法師餐受智度中百十二門論並花嚴大品等經於即彌綸藏部探賾幽微義吐精新詞含華冠專門強學課篤形心可謂師逸功倍於斯為證永定二年十一月奉敕入京住興皇寺鎮講相續所以花嚴大品四論文言往哲所未談後進所損略朗皆指擲義理徵發詞致故能言氣挺暢清穆易曉常衆千餘福慧彌廣所以聽侶雲會揮汗屈膝法衣千領積散恆結每一上座輒易一衣闡前經論各二十餘遍二十五載流潤不絶其間興樹四部兩宮法輪之華當時莫偶以太建十三年歲在辛丑九月二十五日中夜遷神寺坊春秋七十有五即以其月二十八日窆于江乘縣羅落里攝山之西嶺初攝山僧詮受業朗公玄旨所明惟存中觀自非心會析理何能契此清言而頓迹幽林禪味相得及後四公往赴三業資承爰初誓不涉言及久乃為敷演故詮公命曰此法精妙識者能行無使出房輒有開示故經云計我見者莫說此經深樂法者不為多說良由藥病有以不可徒行朗等奉旨無敢言厝及詮化往四公放言各擅威容俱稟神略勇居禪衆辨住長干朗在興皇布仍攝領福門宏敞慧聲遐討皆莫高於朗焉然辨公勝業清明定慧兩舉故其講唱兼存禪衆抑亦詮公之篤厲也然其義體時與朗違故使興皇座中排斥中假之誚布勇兩公見于別紀昔梁天監十年六月七日神僧寶志記興皇寺云此寺當有青衣開士廣弘大乘及朗遊學之時初服青納及登元席乃與符同又南陌居士杜法粲年踰八十頗識歸心昔夢寺內有幡花天伎側塞殿堂緇素法衆充仞筵席洎朗來儀創會公私齊講又盛符焉又十二年五月七日帳下淨人解齊失曉朗夜扣閣催之而洪鍾自響良久不絶故其禎祥早著其例此也東朝於長春殿義集副君親搖玉柄述朗所竪諸師假名義以此榮稱豈惟釋氏宗匠抑亦天人儀表故其所獲檀嚫充造經像修治寺塔濟給窮厄所以房內畜養鵝鴨雞犬其類繁多所行見者無不收養至朗寢息之始皆寂無聲遊觀之時鳴吠喧亂斯亦懷感之致矣侍中領軍廬陵王聲懋權衡資承戒約遂仰奏承華為之銘頌其墓志文太子詹事濟陽江總故陳主叔寶時在春宮為之頌曰洪源遠來傳芳馥蕙君子哲人英芬是繼朱旄既杖青組仍曳紉虎戎印珥貂狄制功可冠軍業非出世揖彼聲色超此津濟津濟伊何裂斷網羅忍衣早記乘樓夜過航斯苦海涸此愛河非此智士孰寄宣揚法雲廣被慧日舒光既權衡櫓自闢金湯夢齊鼓說應異鍾霜識機知命同彼現病夙心栖遁度脫難竟化緣已矣乃宅丘阱智炬寂滅頽巖遼敻遼敻空岑搖落遠墅弦餘月暗霧曖松深香滅窮壟幡橫宿林切切管清遙遙鼓聲野煙四合孤禽一鳴風悽唄斷流急寒生神之淨土形沈終古勒此方墳用旌蘭杜釋慧勇厥姓桓氏其先譙國龍亢人也祖法式尚書外兵錢唐令因此遁迹于虎丘山後仍寓居吳郡吳縣東鄉桓里父獻弱齡早世母張氏嘗夢身登佛塔獲二金菩薩俄育二男並幼而入道長則慧聰勇其次也初出楊都依止靈曜寺則法師為和上鋭志禪誦治身蔬菲隨方受業不事專門豈非版金成寶方資銑鏤瑄玉有美必待刮摩誠有由矣年登具戒從靜衆寺峰律師遊學十誦有龍光寺僧綽建元寺法寵並道秀域中聲高梵表乃服膺坐右稟宗成實刻情砥礪寢食忘疲苦思沈淪坑岸斯墜彌曆寒暑博習大成至年三十法輪便轉自此遠致學徒盛開講肆高視上京鬱為翹采專講論文將十許遍俄而梁季傾覆人百沸騰每思遁世莫知其所于時攝山詮尚直轡一乘橫行山世隨機引悟有願遵焉嘗行報恩寺前忽見人云從攝山來授竹如意俄失謂勇曰尋當如意俄失蹤迹信宿之間又有漆函盛三論一部置房前窗上尋究莫知來也欣茲嘉瑞鋭勇難任因此拂衣里閈駕言泉石期神窅冥非企琴臺之侶修空習慧實追林遠之風便停止觀寺朝夕侃侃如也詮師忘以年期義兼師友抑亦宮羽相諧氷藍待益之志也自此言刈章句採擷希微凡厥釋經莫不包舉大法獲傳於焉是賴天嘉五年世祖文皇請講於太極殿百辟具陳七衆咸萃景仰之輩觀風繼踵遊息之伍附影成群自此聲名籍甚矣住大禪衆寺十有八載及造講堂也門人聽侶經營不日接霤飛軒製置弘敞題曰般若之堂也以至德元年五月二十八日遘疾少時平旦神逝春秋六十有九然其大漸之時神容不變經宿頂暖衆皆異之至六月六日窆于攝山西嶺自始至終講花嚴涅槃方等大集大品各二十遍智論中百十二門論各三十五遍餘有法花思益等數部不記又早捨親愛弱而貞苦文章聲辨時所高之爰至啓手啓足不淄不涅實象教之棟梁精義之林藪弟子等追深北面之禮鐫石碑之其文侍中尚書令濟陽江總制釋寶瓊姓徐氏本惟東莞避難辭莒後居毗陵曲阿縣焉祖雍齊右軍父僧達梁臨川王咨議並高器局崇遵儒素瓊潔潤山水峯瀾早被身長七尺五寸背胛龍文口三十九齒異相奇挺故能疏秀風采蘊籍威容少鄙錦裳便欣毳服綺年出俗師事沙門法通通初見而嗟重深為道器也不使服勤年過志學欲稟光宅寺雲法師義但以經藏飈拔聲實沸騰無礙奔涌談吐橫逸竊疑詞富兼駭唱高乃移聽南㵎仙師研精數論名解映徹洞殫義窟仙嘗覽瓊私記三復嗟賞後於高座普勸寫之自爾門徒傳寫此疏初受具年已能覆述未登五歲便為法主仍與仙公杭衡敷化梁高祖三教妙旨罔不疏通選揚名德分寄弘道瓊之高義簡在帝心爰降綸紱入壽光殿言重茂林更輕雲閣便辭還鄉之建安寺上黃侯曄分竹此邦每深尊敬情兼師友彼郡一旦老少相喧競云建安伽藍白龍出現奔排到寺惟見瓊講有識之士異而目之為白瓊焉素與簡子周弘正早申莫逆彼驟噫曰夫有希世之才而不在京華開導乘桴之嘆令人太息乃為學侶復請還都發成實題僧正慧令切難聯環瓊乃徐拂麈尾從容而對令乃引遠公舊責曰不疾而速杼軸何為答曰不思造業安得精固令間舉止雅音調賓主相悅殊加稱賞梁祖年暮惟事薰修臣下偃風清言扇俗搢紳學者必兼文義所以屢開理教維摩涅槃道被下筵憓飛上席解頤利齒木舌鋒牙畟塞駢羅煙隨霧涌亦有明王豐貂紆青拖紫車馬溢於寺衢衣簪滿於法座斯感物之盛罕有如也到茂灌民譽之重任孝恭詞筆之富皆執卷稽疑伏膺請業恭息世謨蔬菲好學後進英華隨父共聽偏深玄義遂講涅槃傳瓶不失于茲乃驗未仍入道奄至無常頂暖信宿手屈三指復與諸天飛下住宅對父談話宛若平生褒讚出家稱揚法利俄將翼從凌虛而沒留香在室經日不消故知彼此異人躬為學衆誠難測其本量也逮梁室版蕩有陳建業武帝尊法嗅味特深數引金言頻開玉諜降狎言笑詢訪名理永定三年夏於重雲殿閣正弘大品夢朱衣神禮而諫曰波若多難仰祈疾講頻爾數轉詞逾懇到至七月十日乃白僧曰昨夜神人見催經餘一卷午前取訖講竟出宮殿雷雹已響還才至寺驟雨便零震動雲雷一時都盡豈非勝人宣法幽冥敬重陳祖升遐方知前告文帝纂曆禮異彌深鬱下絲綸為京邑大僧正辭讓雖切敦喻更隆乃顧當仁俾膺範物遂之斯任然以金陵都會朝宗所依剎寺如林義筵如市五部六郡果含苗雜惟調水乳罕和鹽梅多沒象泥終枯鳥樹乃鎮之以清淨馭之以無為篇禁不煩遮罰每省故僧尼仰之自肅道俗稱之益敬七衆日用而不知四遠欽風而不足故得法位久司疵謗無玷屢陳表退去而復升始終惟令於是乎在自梁僧之於此任熏灼威儀翼衛亞於王公服玩陳於鄭楚故使流水照於衢路吏卒喧於堂廡瓊臨已來頓祛前政自營靈壽惟從息慈壞色蔽身尼壇容膝蕭然率爾有位若無朝野嘉其真素同侶美其如法海東諸國圖像還蕃頂禮遙敬古人有言匪馳令譽孰動殊方其見賢如此以至德二年甲辰之歲二月二十三日才覺不豫建初寺寶瓊法師當時之偶對也少而共學聲德齊揚爾夕神人忽來報曰彭城僧正今先無常自夢上天有疏請講暨三月二十日正念告終遺誡掩坎不煩銘志春秋八十一有詔慰焉喪事所須隨由資給仍以天子鹵簿仗借為榮飾終古所希幸也以四月五日窆于鍾山之陽名僧舊墓爾時填逵咽陌哀慟相奔皂素驚嗟郊坰失色初瓊入京將臨法席既無人識不許房居乃求僧正慧超寄南㵎住超聞未許見而駭曰此少俊當紹吾今位法門所託何慮無房即命寺綱欣然處置及孝宣請講太子常迎屢見神人形甚長偉密來翼從末為大將軍章照達講通感亦然又非測也然其厚德容衆鳴謙儉約出處無忤言行無擇剋壯不休孜孜講道吐音遙奕發義昭彰或遇勍手時逢命的薄麾象扇灌已氷消故實繁有徒服而無歝及晚僧望益重居處逾輕帷屏罔設飾用不置臘歲參謁黑白磨肩方便他行避斯榮供斯可謂狎人世而空間綰司存而無事也又聖人至理開士微言月落參橫清誦無逸及燭然香馥懺禮方宵迹怠心勤外和內祕宣揚之暇綽有餘間兼採玄儒每窮子史雕蟲隸體物摛玄並入性靈悉能該洽又可謂不撓大猷無遺小道也凡講成實九十一遍撰玄義二十卷講文二十遍文疏十六卷講涅槃三十遍製疏十七卷講大品五遍製疏十三卷餘有大乘義十卷法花維摩等經並著文疏故不備載布在州邑兄孫普光承藉風訓立履貞確思慕平昔追攀日永與同學道莊明解樹碑于金陵之舊墟其文慧日道場釋法論莊入室馳聲見于別紀解升堂流譽王領江都隋末尚存安危未測釋警韶姓顏氏會稽上虞人學年入道事叔僧廣以為師範廣律行貞嚴當時領袖初韶遊都聽講便能清論年登冠肇還鄉受戒護持奉信如擎油鉢有沙門道林請留鄉土乃夢韶舌相廣長而欲將斷既寤深惟留戀斯成墜失愧悔前請便勸出都於即大弘法化傳燈不絶即莊嚴旻公之遺緒也次稟龍光僧綽乃是開善瓊支末又探習三藏廣綜衆家年二十三講大品經味法當時磨肩溢道後還建元晉陵等寺敷演經論解冠群宗韶乃願年四十長就講說而學侶相顧不勝欽尚時年三十有九為建元寺講主臨終遺令傳法韶遵崇餘烈即坐演之受業之賓有逾師保梁簡文邵陵及嶽陽等大相欽重歸承訓誨從危難後世改情浮乃往豫章將通道務時逢豫州黃司空等素情所仰請為戒師會外國三藏真諦法師解該大小行攝自他一遇欣然與共談論諦嘆曰吾遊國多矣罕值斯人仍停豫都為翻新金光明并唯識論及涅槃中百句長解脫十四音等朝授晚傳夜聞晨說世諺瀉瓶重出知十再生者也梁樂陽王於荊立位遣信遠迎楚都弘法韶念報地之重來敕遂乖陳武定天文皇嗣業並弘尚正道敕請還都戒範承仰優禮彌隆天嘉四年有會稽慧藻同泰道倫等二百餘人連署請韶長講於白馬寺廣弘傳化十有餘年既登耳順便令慧藻續講躬往瓦官宴坐少時法門深妙時沙門智顗定慧難踰人神頗測靜嘆精利事等夙成共諸前學頻請重講留意綿久以疾辭之又為新安殿下黃司空等共僧三請不免勤注又於王府略說維摩龍光寺中廣敷成實亦得數年成諸學肆未辭朽老歸志山林乃入幽巖自靖十有餘載至德元年十月十一日中時右脅而臥神慮澄然終於開善寺春秋七十有六其月十六日窆於鍾嶺獨龍之山所講成實論五十餘遍涅槃三十遍大品四十遍新金光明三十餘遍維摩天王仁王等經遍數繁亂不紀廣敘釋安廩姓秦氏晉中書令靖之第七世也寓居江陰之利成縣焉考王妙思滔玄怡心屆寂乃製入神書一首洞曆三卷青烏之道莫不傳芳廩幼而聰頴獨悟不群十三偏艱孝知遠近斷水骨立聞者涕零古人有言知子父也乃攝以典教業遂多通而性好老莊早達經史又善太一之能並解孫吳之術是以才藝有功文武清播仍欲披榛問隱蓽門圭竇而虛懷機發體悟真權年二十五啓敕出家乃遊方尋道北詣魏國於司州光融寺容公所採習經論容律訓嚴凝肅成濟器並聽嵩高少林寺光公十地一聞領解頓盡言前深味名象並畢中意又受禪法悉究玄門請業之徒屢申弘益在魏十有二年講四分律近二十遍大乘經論並得相仍梁泰清元年始發彭沛門人擁從還届楊都武帝敬供相接敕住天安講花嚴經標致宏綱妙指機會值梁運既終法輪停轉洎大陳御㝢永定元年春乃請入內殿手傳香火接足盡虔長承戒範有敕住耆闍寺給講連續既會夙心遂欣久處世祖文皇又請入昭德殿開講大集樂說不窮重筵莫擬孝宣御曆又於華林園內北面受道闡化涉勞因以遘疾至德元年建寅之月遷化于房皇心惻悼𮚐贈有嘉即以其月窆於開善之西山春秋七十有七門人痛其安放士庶失其歸依矣釋慧布姓郝氏廣陵人也少懷遠操性度虛梗年十五處于江陽家門軍將時有戎役因願領五千人為將清平寇塞豈不果耶衆偉其言十六遭兄亡悟世非常思解俗網親眷知有武略咸不許之二十有一方從本願既蒙剃落便入楊都從建初寺瓊法師學成實論通假實之旨物議所歸而布恨斯至理未盡懷抱承攝山止觀寺僧詮法師大乘海嶽聲譽遠聞乃往從之聽聞三論學徒數百翹楚一期至於洞達清玄妙知論旨者皆無與尚時號之為得意布或云思玄布也故詮之解難聽者似解而領悟猶迷及依言領通而構難踈略致使談論之際每有客問必待布而為答時人為之語曰詮公四友所謂四句朗領語辨文章勇得意布布稱得意最為高也後於大品善達章中悟解大乘煩惱調順攝心奉律威儀無玷常樂坐禪遠離囂擾誓不講說護持為務末遊北鄴更涉未聞於可禪師所暫通名見便以言忤其意可曰法師所述可謂破我除見莫過此也乃縱心諸席備見宗領周覽文義並具胸襟又寫章疏六馱負還江表並遺朗公令其講說因有遺漏重往齊國廣寫所闕齎還付朗自無所畜衣鉢而已專修念慧獨止松林蕭然世表學者欣慕嘗造思禪師與論大義連徹日夜不覺食息理致彌密言勢不止思以鐵如意打案曰萬里空矣無此智者坐中千餘人同聲嘆悅又與邈禪師論義即命公之師也聯綿往還三日不絶邈止之嘆其慧悟遐舉而卑身節行不顯其美梁太清末侯景作亂荒餒纍年三日失食至第四日有人遺布飯而微以猪肉覆之雖腹如火然結心不食故得遭斯困厄不履非濫又曾患腳氣醫令服薤自此至終常陳此罪或見諸人樂生西方者告云方土乃淨非吾願也如今所願化度衆生如何在蓮花中十劫受樂未若三途處苦救濟也陳至德中邀引恭禪師建立攝山栖霞寺結淨練衆江表所推名德遠投稟承論旨時為開滯理思幽微不為僧師不役下位常自縫洗六時無闕才扣揵捶已居衆首端坐如木見者懍然名聞光遠請謁如市陳主諸王並受其戒奉之如佛末以年暮不參衆食敕給其乳牛而布回充入衆煢煢謹攝實高僧焉年七十與衆別云布命更至三五年在但老困不能行道住世何益常願生邊地無三寶處為作佛事去也幸各好住願努其力於是絶穀不食命將欲斷下敕令醫診之縮臂不許沈皇后欲傳香信又亦不許臨終遺訣曰長生不喜夕死無憂以生無所生滅無所滅故也諸有學士徒衆並委恭禪師吾無慮矣以陳禎明元年十一月二十三日卒于栖霞終後手屈三指捋之雖伸還屈乃至林中一月猶爾未終前大地連動七日便卒移尸就林山地又動太史奏云得道人星滅矣時以當之初將逝告衆前云昨夜二菩薩見迎一是生身一是法身吾已許之尋有諸天又來迎接以不願生故不許耳流光照於侃禪師戶侃怪光盛出戶見二人向布房中不知是聖也旦往述之恰然符合言已端坐而化有見鬼者望見幡花滿寺光明騰焰不測其故入山視之乃布公去世釋亡名俗姓宗氏南郡人本名闕殆世襲衣冠稱為望族弱齡遁世永絶妻孥吟嘯丘壑任懷遊處凡所憑准必映美阮嗣宗之為人也長富才華鄉人馳舉事梁元帝深見禮待有製新文帝多稱述而恭慎慈敬謙靜為心每從容御筵賜問優異及梁曆不緒潛志玄門遠寄汶蜀脫落塵纍初投兌禪師兌亦定慧澄明聲流關鄴名乃三業依憑四儀恭仰雕純假於禪誦興慮著於篇什預有學徒問道無倦會周氏跨有井絡少保蜀國公宇文俊鎮之性愛賢才重其德素禮供殊倫聲聞臺省後齊王續部伏敬日增任滿還雍遂勒歸謁帝勞遺既深處為夏州三藏朝省以名文翰可觀元非玄侶而冥德沒世將徵拔之測其器宇有經國之量朝省總議或以威恩加之或以情異轉之然名雅亮卓然曾無易節天和二年五月大冢宰宇文護遺書曰言念欽屬未敘企積道體休豫無虧慮耶蓋能仁處世志存匡救非先輪回獨尚茲善既道亞生知才高七步豈虛緇染沈流當塗但靈廓妙理三業同臻冀思莫二皂白非感耳怖解偏執讚我時朝匪惟真俗俱抽亦是彼我一貫故令往白念報雅懷名答云辱告深具懷抱寒暑異域苦樂殊心輒略常談且陳事實貧道稟質醜陋恆嬰疾惱因傴成恭惟道是務不曾棲息五十二年自捨俗緣十有五載萬人歸國皆停都邑羸病一僧獨流荒裔無罪可罰無能可使百慮九思是所未喻文多不載又列六不可十嘆息援據事敘綸貫始終書略結云沙門持戒心口相應所列六條若有一誑生則蒼天厭之死則鐵鉗拔之洋銅灌之仰戴三光行年六十不欺暗室況乃明世且鄉國殄喪宗戚衰亡貧道何人獨堪長久誠得收迹巖中攝心塵外支養殘命敦修慧業此本志也寄骸精舍乞食王城任力行道隨緣化物斯次願也如其不爾獨處丘壑安能憒憒久住閻浮地乎護得書體其難拔乃與書迎還云法師秉心彌固栖遊世表玄圭啓運不屈伯夷之節蒼精御曆豈捐嘉遁之志今遣往迎名達咸陽貴遊奉謁隆禮厚味彌增常限以稱謂廣流藏景難伏誓當栖玄後德便間放無纍乃著寶人銘曰余十五而尚屬文三十而重勢位值京都喪亂冠冕淪沒海內知識零落殆盡乃喟然嘆曰夫以回天倒日之力一旦早凋岱山磐石之固忽焉燼滅定知世相無常浮生虛僞譬如朝露其停幾何大丈夫生當降魔死當飼虎如其不爾修禪足以養志讀經足以自娛富貴名譽徒勞人耳乃棄其簪辨剃其鬚髮衣納杖錫聽講談玄戰國未寧安身無地自厭形骸甚於桎梏思絶苦本莫知其津大乘經曰如說行者乃名是聖不但口之所言小乘偈曰能行說為正不行何所說若說不能行不名為智者至於顏回好學勤改前非季路未修懼聞後語功勞智擾役神傷命為道日損何用多知誓欲枯木其形死灰其慮降此患纍以求虛寂乃作絶學針文名息心贊擬夫周廟其銘曰法界有如意寶人焉九緘其身銘其膺曰古之攝心人也誡之哉誡之哉無多慮無多知多智多事不如息意多慮多失不如守一慮多志散知多心亂心亂生惱志散妨道勿謂何傷其苦悠長勿言何畏其禍鼎沸滴水不停四海將盈纖塵不拂五嶽將成防末在本雖小不輕關爾七竅閉爾六情莫視於色莫聽於聲聞聲者聾見色者盲一文一藝空中小蚋一技一能日下孤燈英賢才藝是為愚弊捨棄淳朴耽溺淫麗識馬易奔心猿難制神既勞役形必損斃邪徑終迷修塗永泥莫貴才能是曰惛懵汙拙羡巧其德不弘名厚行薄其高速崩隆舒污卷其用不恆內懷憍伐外致怨憎或談於口或書於手邀人令譽亦孔之醜凡謂之吉聖以之咎賞悅暫時悲憂長久畏影畏迹逾走逾劇端坐樹陰迹滅影沈厭生患老隨思隨造心想若滅生死長絶不死不生無相無名一道虛寂萬物齊平何勝何劣何重何輕何賤何辱何貴何榮澄天愧淨皎日慚明安夫岱嶺固彼金城敬詒賢哲斯道利貞又著至道論淳德論遣執論去是非論影喻論修空論不殺論等並文多清素語恆勸善存質去華不存粉墨有集十卷盛重於世不知所終有弟子僧琨性沈審善音調為隋二十五衆讀經法主搜括群籍採托賢聖所撰諸論集為一部稱曰論場有三十卷披帙一閲俱覽百家亦新學之宗匠者矣後於曲池造靜覺寺每臨水映竹體物賦詩有篇什云魏鄴下沙門釋道寵傳釋道寵姓張俗名為賓高齊元魏之際國學大儒雄安生者連邦所重時有李範張賓齊鑣安席才藝所指莫不歸宗後俱任安下為副年將壯室領徒千餘至趙州元氏縣堰角寺側即今所謂應覺是也從寺索水沙彌持與問具幾塵方可飲之素不內涉罔然無對乃以水澆面賓大恧謂徒屬曰非為以水辱我直顯佛法難思吾今投心此道宜各散矣即日於寺出家寺法入道三年歷試以賓聰明大博不可拘於常制即日便與具戒遂入西山廣尋藏部神用深拔慨嘆晚知魏宣武帝崇尚佛法天竺梵僧菩提留支初翻十地在紫極殿勒那摩提在大極殿各有禁衛不許通言校其所譯恐有浮濫始於永平元年至四年方訖及勘讎之惟云有不二不盡那云定不二不盡一字為異通共驚美若奉聖心寵承斯問便詣流支訪所深極乃授十地典教三冬隨聞出疏即而開學聲唱高廣鄴下榮推時朝宰文雄魏收邢子才楊休之等昔經寵席官學由成自遺世網形名靡寄相從來聽皆莫曉焉寵默識之乃曰公等諸賢既稱榮國頗曾受業有所來耶皆曰本資張氏厭俗出家寵曰師資有由今見若此乃曰罪極深矣初聆聲相實等昔師容儀頓改致此無悟於是同敦三大罄此一心悲慶相循遂以聞奏以德溢時命義在旌隆日賜黃金三兩盡於身世匠成學士堪可傳道千有餘人其中高者僧休法繼誕禮牢宜儒果等是也一說云初勒那三藏教示三人房定二士授其心法慧光一人偏教法律菩提三藏惟教於寵寵在道北教牢宜四人光在道南教憑範十人故使洛下有南北二途當現兩說自斯始也四宗五宗亦仍此起今則闕矣輒不繁云齊彭城沙門釋慧嵩傳釋慧嵩未詳氏族高昌國人其國本沮渠涼王避地之所故其宗族皆通華夏之文軌焉嵩少出家聰悟敏捷開卷輒尋便了中義潛蘊玄肆尤玩雜心時為彼國所重嵩兄為博士王族推崇雅重儒林未欽佛理覩嵩英鑒勸令反俗教以義方嵩曰腐儒小智未足歸賞固當同諸糟粕餘何可論兄頻遮礙乃以易林祕隱問之嵩初不讀俗典執卷開剖挺出前聞兄雖異之殊不信佛法之博要也嵩以毗曇一偈化令解之停滯兩月妄釋紛紜乃有其言全乖理義嵩總非所述聊為一開泠然神悟便大崇信佛法博通玄奧乃恣其遊涉于時元魏末齡大演經教高昌王欲使釋門更闢乃獻嵩并弟隨使入朝高氏作相深相器重時智遊論師世稱英傑嵩乃從之聽毗曇成實領牒文旨信重當時而位處沙彌更搖聲略及進具後便登元座開判經誥雅會機緣乃使鋒鋭剠敵歸依接足既學成望遠本國請還嵩曰以吾之博達義非邊鄙之所資也旋環鄴洛弘道為宗後又重徵嵩固執如舊高昌乃夷其三族嵩聞之告其屬曰經不云乎三界無常諸有非樂況復三途八苦由來所經何足怪乎及高齊天保革命惟新上統榮望見重宣帝嵩以慧學騰譽頻以法義凌之乃徙於徐州為長年僧統仍居彭沛大闡宏猷江表河南率遵聲教即隋初志念論師之祖承也以天保年卒於徐部
